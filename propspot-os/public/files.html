<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Files</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <script>document.documentElement.classList.add('page-loading');try{var _c=document.documentElement.classList;if(localStorage.sidebar_collapsed==='1')_c.add('sidebar-collapsed');var _t=localStorage.getItem('propspot_theme');_c.add('theme-premium');if(_t==='dark')_c.add('theme-dark');}catch(e){}</script>
  <style>
    /* ── Layout: left nav + main area ── */
    .drive-layout { display:flex; gap:0; min-height:calc(100vh - 120px); }
    .drive-nav { width:220px; flex-shrink:0; border-right:1px solid var(--border); padding:16px 0; }
    .drive-main { flex:1; min-width:0; padding:0 24px; }

    .drive-nav-btn { display:flex; align-items:center; gap:10px; width:100%; padding:9px 20px; border:none; background:none; cursor:pointer; font-size:.85rem; font-weight:500; color:var(--text-muted); text-align:left; transition:all .1s; border-radius:0; }
    .drive-nav-btn:hover { background:var(--brand-light); color:var(--text); }
    .drive-nav-btn.active { background:var(--brand-light); color:var(--brand); font-weight:700; }
    .drive-nav-btn svg { width:18px; height:18px; flex-shrink:0; }
    .drive-nav-sep { height:1px; background:var(--border); margin:8px 16px; }
    .drive-nav-label { font-size:.68rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); font-weight:700; padding:12px 20px 4px; }

    .drive-new-btn { display:flex; align-items:center; gap:8px; margin:0 16px 16px; padding:10px 20px; border-radius:100px; border:none; background:var(--surface); box-shadow:var(--shadow); cursor:pointer; font-size:.88rem; font-weight:600; color:var(--text); transition:all .12s; }
    .drive-new-btn:hover { box-shadow:0 2px 12px rgba(0,0,0,.15); }
    .drive-new-btn svg { width:20px; height:20px; }

    /* ── Breadcrumb ── */
    .breadcrumb { display:flex; align-items:center; gap:4px; font-size:.85rem; margin-bottom:12px; flex-wrap:wrap; }
    .breadcrumb a { color:var(--brand); text-decoration:none; font-weight:500; }
    .breadcrumb a:hover { text-decoration:underline; }
    .breadcrumb .sep { color:var(--text-muted); }
    .breadcrumb .current { color:var(--text); font-weight:700; }

    /* ── Toolbar ── */
    .drive-toolbar { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
    .drive-toolbar .spacer { flex:1; }
    .view-toggle { display:flex; border:1.5px solid var(--border); border-radius:6px; overflow:hidden; }
    .view-toggle button { padding:5px 10px; border:none; background:var(--surface); cursor:pointer; color:var(--text-muted); transition:all .1s; display:flex; align-items:center; }
    .view-toggle button:first-child { border-right:1.5px solid var(--border); }
    .view-toggle button.active { background:var(--brand); color:#fff; }
    .view-toggle button svg { width:16px; height:16px; }

    /* ── Grid view ── */
    .drive-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
    .drive-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px 12px; text-align:center; cursor:pointer; transition:all .12s; border:2px solid transparent; position:relative; }
    .drive-card:hover { border-color:var(--brand); transform:translateY(-1px); }
    .drive-card.selected { border-color:var(--brand); background:var(--brand-light); }
    .drive-card .card-icon { font-size:2.5rem; margin-bottom:8px; line-height:1; }
    .drive-card .card-icon svg { width:40px; height:40px; }
    .drive-card .card-name { font-size:.82rem; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .drive-card .card-meta { font-size:.68rem; color:var(--text-muted); margin-top:4px; }
    .drive-card img.card-thumb { width:100%; height:80px; object-fit:cover; border-radius:4px; margin-bottom:6px; }
    .drive-card .card-badge { position:absolute; top:6px; right:6px; font-size:.6rem; padding:1px 6px; border-radius:100px; }
    .drive-card .card-badge.restricted { background:#f3e8ff; color:#7c3aed; }
    .drive-card .card-menu { position:absolute; top:4px; right:4px; opacity:0; background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:1.1rem; padding:2px 6px; border-radius:4px; }
    .drive-card:hover .card-menu { opacity:1; }

    /* ── List view ── */
    .drive-list { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
    .drive-list-header { display:grid; grid-template-columns:auto 1fr 120px 100px 80px; gap:12px; padding:8px 16px; font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--text-muted); border-bottom:1px solid var(--border); }
    .drive-list-row { display:grid; grid-template-columns:auto 1fr 120px 100px 80px; gap:12px; padding:10px 16px; align-items:center; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
    .drive-list-row:last-child { border-bottom:none; }
    .drive-list-row:hover { background:var(--brand-light); }
    .drive-list-row svg.list-icon { width:20px; height:20px; flex-shrink:0; }
    .drive-list-row .list-name { font-size:.85rem; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .drive-list-row .list-meta { font-size:.78rem; color:var(--text-muted); }

    /* ── Drop zone ── */
    .drop-zone-drive { border:2px dashed var(--border); border-radius:var(--radius); padding:40px 20px; text-align:center; color:var(--text-muted); font-size:.88rem; cursor:pointer; transition:all .15s; margin-bottom:16px; }
    .drop-zone-drive:hover, .drop-zone-drive.dragover { border-color:var(--brand); color:var(--brand); background:var(--brand-light); }

    .empty-drive { text-align:center; padding:60px 20px; color:var(--text-muted); }
    .empty-drive svg { width:56px; height:56px; margin-bottom:12px; opacity:.3; }

    /* ── Modals ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--surface); border-radius:var(--radius); box-shadow:0 8px 40px rgba(0,0,0,.2); width:100%; max-width:480px; max-height:90vh; overflow-y:auto; padding:24px; }
    .modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .modal-head h2 { font-size:1.05rem; font-weight:700; margin:0; }
    .modal-close { background:var(--bg); border:none; border-radius:8px; width:32px; height:32px; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; color:var(--text-muted); }
    .modal-close:hover { color:var(--text); background:var(--border); }
    .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:16px; }

    .share-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
    .share-row:last-child { border-bottom:none; }
    .share-avatar { width:28px; height:28px; border-radius:50%; object-fit:cover; background:var(--border); }
    .share-info { flex:1; min-width:0; }
    .share-name { font-size:.85rem; font-weight:600; }
    .share-email { font-size:.72rem; color:var(--text-muted); }

    .context-menu { position:fixed; background:var(--surface); border:1px solid var(--border); border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.15); z-index:600; min-width:160px; padding:4px 0; display:none; }
    .context-menu.open { display:block; }
    .context-menu button { display:flex; align-items:center; gap:8px; width:100%; padding:8px 14px; border:none; background:none; cursor:pointer; font-size:.82rem; color:var(--text); text-align:left; }
    .context-menu button:hover { background:var(--brand-light); }
    .context-menu button.danger { color:#dc2626; }

    @media(max-width:768px) {
      .drive-layout { flex-direction:column; }
      .drive-nav { width:100%; border-right:none; border-bottom:1px solid var(--border); padding:8px 0; display:flex; flex-wrap:wrap; gap:0; }
      .drive-nav-btn { width:auto; padding:8px 14px; font-size:.8rem; }
      .drive-nav-sep, .drive-nav-label { display:none; }
      .drive-new-btn { margin:4px 8px; }
      .drive-main { padding:0 12px; }
      .drive-grid { grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); }
      .drive-list-header, .drive-list-row { grid-template-columns:auto 1fr 80px; }
      .drive-list-header > :nth-child(3), .drive-list-header > :nth-child(4),
      .drive-list-row > :nth-child(3), .drive-list-row > :nth-child(4) { display:none; }
    }
  </style>
</head>

<script>
let currentFolder = null;
let currentView = 'my-drive'; // 'my-drive','shared-drive','shared-with-me','recent','starred'
let currentDriveType = 'personal';
let viewMode = localStorage.getItem('drive_view_mode') || 'grid';
let folders = [], files = [], usersCache = [];
let shareTarget = null, renameTarget = null;

const VIEW_CONFIG = {
  'my-drive':       { driveType: 'personal', label: 'My Drive' },
  'shared-drive':   { driveType: 'shared',   label: 'Shared Drive' },
  'shared-with-me': { driveType: null,       label: 'Shared with me' },
  'recent':         { driveType: null,       label: 'Recent' },
  'starred':        { driveType: null,       label: 'Starred' },
};

function navTo(view) {
  currentView = view;
  currentFolder = null;
  currentDriveType = VIEW_CONFIG[view]?.driveType || 'shared';
  document.querySelectorAll('.drive-nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  loadFolder(null);
}

function setView(mode) {
  viewMode = mode;
  localStorage.setItem('drive_view_mode', mode);
  document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
  document.getElementById('btn-list').classList.toggle('active', mode === 'list');
  renderContent();
}

async function init() {
  const user = await requireAuth();
  if (!user) return;
  try { usersCache = await apiFetch('/api/users'); } catch {}
  setView(viewMode);
  navTo('my-drive');
}

async function loadFolder(folderId) {
  currentFolder = folderId;
  const cfg = VIEW_CONFIG[currentView];
  if (currentView === 'recent') {
    folders = [];
    try { files = await apiFetch('/api/drive/files?recent=1'); } catch { files = []; }
    renderBreadcrumb(null);
    renderContent();
    return;
  }
  if (currentView === 'starred' || currentView === 'shared-with-me') {
    folders = []; files = [];
    renderBreadcrumb(null);
    renderContent();
    return;
  }
  const dtParam = cfg.driveType ? `drive_type=${cfg.driveType}` : '';
  const qs = folderId ? `?parent_id=${folderId}` : (dtParam ? `?${dtParam}` : '');
  const fqs = folderId ? `?folder_id=${folderId}` : (dtParam ? `?${dtParam}` : '');
  try {
    [folders, files] = await Promise.all([
      apiFetch(`/api/drive/folders${qs}`),
      apiFetch(`/api/drive/files${fqs}`)
    ]);
    if (folderId) {
      const folder = await apiFetch(`/api/drive/folders/${folderId}`);
      renderBreadcrumb(folder.breadcrumb);
    } else {
      renderBreadcrumb(null);
    }
    renderContent();
  } catch (err) {
    document.getElementById('content').innerHTML = `<p class="text-muted">Error: ${esc(err.message)}</p>`;
  }
}

function renderBreadcrumb(crumbs) {
  const el = document.getElementById('breadcrumb');
  const rootLabel = VIEW_CONFIG[currentView]?.label || 'Files';
  if (!crumbs) {
    el.innerHTML = `<span class="current">${rootLabel}</span>`;
    return;
  }
  let html = `<a href="#" onclick="event.preventDefault();loadFolder(null)">${rootLabel}</a>`;
  crumbs.forEach((c, i) => {
    html += `<span class="sep">/</span>`;
    if (i === crumbs.length - 1) {
      html += `<span class="current">${esc(c.name)}</span>`;
    } else {
      html += `<a href="#" onclick="event.preventDefault();loadFolder('${c.id}')">${esc(c.name)}</a>`;
    }
  });
  el.innerHTML = html;
}

const FOLDER_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="var(--brand)" stroke="var(--brand)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
const FILE_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';

function renderContent() {
  const dropZone = document.getElementById('drop-zone');
  const isPlaceholder = currentView === 'starred' || currentView === 'shared-with-me';

  if (isPlaceholder && folders.length === 0 && files.length === 0) {
    dropZone.style.display = 'none';
    const msg = currentView === 'starred' ? 'Star files and folders to find them here quickly.' : 'Files that others share with you will appear here.';
    document.getElementById('content').innerHTML = `<div class="empty-drive"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">${currentView === 'starred' ? '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>' : '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 11l-3 3-3-3"/><path d="M19 14V8"/>'}</svg><p>${msg}</p></div>`;
    return;
  }

  if (folders.length === 0 && files.length === 0) {
    dropZone.style.display = '';
    const msg = currentDriveType === 'personal' ? 'Your personal drive is empty. Upload working files or create folders.' : 'The shared drive is empty. Upload company documents or create folders.';
    document.getElementById('content').innerHTML = `<div class="empty-drive"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><p>${msg}</p></div>`;
    return;
  }
  dropZone.style.display = 'none';

  if (viewMode === 'list') {
    renderListView();
  } else {
    renderGridView();
  }
}

function renderGridView() {
  let html = '<div class="drive-grid">';
  folders.forEach(f => {
    html += `
      <div class="drive-card" ondblclick="loadFolder('${f.id}')" onclick="selectCard(this)" oncontextmenu="event.preventDefault();showContextMenu(event,'folder','${f.id}','${esc(f.name)}')">
        ${!f.team_visible ? '<span class="card-badge restricted">Restricted</span>' : ''}
        <button class="card-menu" onclick="event.stopPropagation();showContextMenu(event,'folder','${f.id}','${esc(f.name)}')" title="More">&#8943;</button>
        <div class="card-icon">${FOLDER_SVG}</div>
        <div class="card-name" title="${esc(f.name)}">${esc(f.name)}</div>
        <div class="card-meta">${f.subfolder_count || 0} folders, ${f.file_count || 0} files</div>
      </div>`;
  });
  files.forEach(f => {
    const isImg = f.mime_type && f.mime_type.startsWith('image/');
    html += `
      <div class="drive-card" onclick="selectCard(this)" ondblclick="window.open('${f.url}','_blank')" oncontextmenu="event.preventDefault();showContextMenu(event,'file','${f.id}','${esc(f.filename)}')">
        <button class="card-menu" onclick="event.stopPropagation();showContextMenu(event,'file','${f.id}','${esc(f.filename)}')" title="More">&#8943;</button>
        ${isImg ? `<img class="card-thumb" src="${f.url}" alt="">` : `<div class="card-icon" style="opacity:.4;">${FILE_SVG}</div>`}
        <div class="card-name" title="${esc(f.filename)}">${esc(f.filename)}</div>
        <div class="card-meta">${f.uploaded_by_name || ''} &middot; ${formatSize(f.size_bytes)}</div>
      </div>`;
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function renderListView() {
  let html = '<div class="drive-list">';
  html += '<div class="drive-list-header"><span></span><span>Name</span><span>Owner</span><span>Modified</span><span>Size</span></div>';
  folders.forEach(f => {
    html += `
      <div class="drive-list-row" ondblclick="loadFolder('${f.id}')" onclick="selectCard(this)" oncontextmenu="event.preventDefault();showContextMenu(event,'folder','${f.id}','${esc(f.name)}')">
        <svg class="list-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="var(--brand)" stroke="var(--brand)" stroke-width="1"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span class="list-name">${esc(f.name)}${!f.team_visible ? ' <span style="font-size:.65rem;background:#f3e8ff;color:#7c3aed;padding:1px 6px;border-radius:100px;">Restricted</span>' : ''}</span>
        <span class="list-meta">${esc(f.created_by_name || '')}</span>
        <span class="list-meta">${formatDate(f.updated_at || f.created_at)}</span>
        <span class="list-meta">${f.file_count || 0} files</span>
      </div>`;
  });
  files.forEach(f => {
    html += `
      <div class="drive-list-row" onclick="selectCard(this)" ondblclick="window.open('${f.url}','_blank')" oncontextmenu="event.preventDefault();showContextMenu(event,'file','${f.id}','${esc(f.filename)}')">
        <svg class="list-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span class="list-name">${esc(f.filename)}</span>
        <span class="list-meta">${esc(f.uploaded_by_name || '')}</span>
        <span class="list-meta">${formatDate(f.created_at)}</span>
        <span class="list-meta">${formatSize(f.size_bytes)}</span>
      </div>`;
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function selectCard(el) {
  document.querySelectorAll('.drive-card,.drive-list-row').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

// ── + New menu
function openNewMenu(e) {
  const menu = document.getElementById('new-menu');
  menu.innerHTML = `
    <button onclick="hideNewMenu();openNewFolder()">New folder</button>
    <button onclick="hideNewMenu();document.getElementById('upload-input').click()">File upload</button>
  `;
  const rect = e.currentTarget.getBoundingClientRect();
  menu.style.top = (rect.bottom + 4) + 'px';
  menu.style.left = rect.left + 'px';
  menu.classList.add('open');
  e.stopPropagation();
}
function hideNewMenu() { document.getElementById('new-menu').classList.remove('open'); }

// ── Context menu
function showContextMenu(e, type, id, name) {
  const menu = document.getElementById('context-menu');
  let html = '';
  if (type === 'folder') {
    html += `<button onclick="loadFolder('${id}');hideContextMenu()">Open</button>`;
  } else {
    html += `<button onclick="window.open(getFileUrl('${id}'),'_blank');hideContextMenu()">Download</button>`;
  }
  html += `<button onclick="openRename('${type}','${id}','${name.replace(/'/g,"\\'")}');hideContextMenu()">Rename</button>`;
  html += `<button onclick="openShare('${type}','${id}');hideContextMenu()">Share</button>`;
  html += `<button class="danger" onclick="deleteItem('${type}','${id}');hideContextMenu()">Delete</button>`;
  menu.innerHTML = html;
  menu.style.top = e.clientY + 'px';
  menu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
  menu.classList.add('open');
}
function hideContextMenu() { document.getElementById('context-menu').classList.remove('open'); }
document.addEventListener('click', () => { hideContextMenu(); hideNewMenu(); });

function getFileUrl(id) {
  const f = files.find(f => f.id === id);
  return f ? f.url : '#';
}

// ── Upload
async function uploadFiles(fileList) {
  for (const file of fileList) {
    const form = new FormData();
    form.append('file', file);
    if (currentFolder) form.append('folder_id', currentFolder);
    form.append('drive_type', currentDriveType || 'personal');
    try { await apiFetch('/api/drive/files', { method: 'POST', body: form }); } catch {}
  }
  await loadFolder(currentFolder);
}

// ── New Folder
function openNewFolder() {
  document.getElementById('f-name').value = '';
  document.getElementById('f-visibility').value = currentDriveType === 'shared' ? 'true' : 'false';
  document.getElementById('folder-modal-title').textContent = 'New Folder';
  document.getElementById('f-save').textContent = 'Create';
  document.getElementById('modal-folder').classList.add('open');
  document.getElementById('f-name').focus();
}
function closeFolderModal() { document.getElementById('modal-folder').classList.remove('open'); }
document.getElementById('modal-folder').addEventListener('click', e => { if (e.target === e.currentTarget) closeFolderModal(); });

async function saveFolder() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return;
  const teamVisible = document.getElementById('f-visibility').value === 'true';
  try {
    await apiFetch('/api/drive/folders', { method: 'POST', body: JSON.stringify({
      name, parent_id: currentFolder, team_visible: teamVisible, drive_type: currentDriveType || 'personal'
    })});
    closeFolderModal();
    await loadFolder(currentFolder);
  } catch (err) { alert(err.message); }
}

// ── Rename
function openRename(type, id, name) {
  renameTarget = { type, id };
  document.getElementById('r-name').value = name;
  document.getElementById('modal-rename').classList.add('open');
  document.getElementById('r-name').focus();
  document.getElementById('r-name').select();
}
function closeRenameModal() { document.getElementById('modal-rename').classList.remove('open'); }
document.getElementById('modal-rename').addEventListener('click', e => { if (e.target === e.currentTarget) closeRenameModal(); });

async function saveRename() {
  const name = document.getElementById('r-name').value.trim();
  if (!name || !renameTarget) return;
  const endpoint = renameTarget.type === 'folder'
    ? `/api/drive/folders/${renameTarget.id}`
    : `/api/drive/files/${renameTarget.id}`;
  const body = renameTarget.type === 'folder' ? { name } : { filename: name };
  try {
    await apiFetch(endpoint, { method: 'PATCH', body: JSON.stringify(body) });
    closeRenameModal();
    await loadFolder(currentFolder);
  } catch (err) { alert(err.message); }
}

// ── Delete
async function deleteItem(type, id) {
  const label = type === 'folder' ? 'folder and all its contents' : 'file';
  if (!confirm(`Delete this ${label}?`)) return;
  try {
    await apiFetch(`/api/drive/${type === 'folder' ? 'folders' : 'files'}/${id}`, { method: 'DELETE' });
    await loadFolder(currentFolder);
  } catch (err) { alert(err.message); }
}

// ── Share
function openShare(type, id) {
  shareTarget = { type, id };
  const sel = document.getElementById('s-user');
  sel.innerHTML = usersCache.map(u => `<option value="${u.id}">${esc(u.full_name || u.email)}</option>`).join('');
  document.getElementById('s-role').value = 'viewer';
  document.getElementById('modal-share').classList.add('open');
  loadPermissions();
}
function closeShareModal() { document.getElementById('modal-share').classList.remove('open'); }
document.getElementById('modal-share').addEventListener('click', e => { if (e.target === e.currentTarget) closeShareModal(); });

async function loadPermissions() {
  if (!shareTarget) return;
  try {
    const perms = await apiFetch(`/api/drive/permissions/${shareTarget.type}/${shareTarget.id}`);
    document.getElementById('share-list').innerHTML = perms.length === 0
      ? '<p class="text-muted text-sm">No individual permissions set.</p>'
      : perms.map(p => `
        <div class="share-row">
          ${p.user_avatar ? `<img class="share-avatar" src="${p.user_avatar}">` : `<div class="share-avatar"></div>`}
          <div class="share-info">
            <div class="share-name">${esc(p.user_name || p.user_email)}</div>
            <div class="share-email">${esc(p.user_email || '')}</div>
          </div>
          <select class="form-input" style="width:auto;padding:3px 8px;font-size:.78rem;" onchange="updatePerm('${p.id}','${shareTarget.type}','${shareTarget.id}','${p.user_id}',this.value)">
            <option value="viewer" ${p.role==='viewer'?'selected':''}>Viewer</option>
            <option value="editor" ${p.role==='editor'?'selected':''}>Editor</option>
            <option value="owner" ${p.role==='owner'?'selected':''}>Owner</option>
          </select>
          <button style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:.9rem;" onclick="removePerm('${p.id}')" title="Remove">&#10005;</button>
        </div>
      `).join('');
  } catch {}
}

async function addShare() {
  if (!shareTarget) return;
  const body = { user_id: document.getElementById('s-user').value, role: document.getElementById('s-role').value };
  body[shareTarget.type === 'folder' ? 'folder_id' : 'file_id'] = shareTarget.id;
  try { await apiFetch('/api/drive/permissions', { method: 'POST', body: JSON.stringify(body) }); await loadPermissions(); } catch (err) { alert(err.message); }
}

async function updatePerm(permId, type, targetId, userId, newRole) {
  const body = { user_id: userId, role: newRole };
  body[type === 'folder' ? 'folder_id' : 'file_id'] = targetId;
  try { await apiFetch('/api/drive/permissions', { method: 'POST', body: JSON.stringify(body) }); await loadPermissions(); } catch (err) { alert(err.message); }
}

async function removePerm(permId) {
  try { await apiFetch(`/api/drive/permissions/${permId}`, { method: 'DELETE' }); await loadPermissions(); } catch (err) { alert(err.message); }
}

// ── Paste screenshots
document.addEventListener('paste', async (e) => {
  const pastedFiles = [];
  for (const item of e.clipboardData.items) {
    if (item.type.startsWith('image/')) {
      const blob = item.getAsFile();
      if (blob) pastedFiles.push(new File([blob], `screenshot-${Date.now()}.png`, { type: blob.type }));
    }
  }
  if (pastedFiles.length > 0) await uploadFiles(pastedFiles);
});

// ── Utilities
function esc(s) { return escHtml ? escHtml(String(s || '')) : String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(0) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}
function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

init();
</script>
</body>
