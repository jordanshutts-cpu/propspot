<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Acquisitions</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <script>try{if(localStorage.sidebar_collapsed==='1')document.documentElement.classList.add('sidebar-collapsed')}catch(e){}</script>
  <style>
    .prop-counts { display:flex; gap:4px; flex-wrap:wrap; }
    .pcount { font-size:.68rem; padding:2px 7px; border-radius:100px; background:var(--brand-light); color:var(--brand); font-weight:600; white-space:nowrap; }

    .prop-table-wrap { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); overflow-x:auto; }
    .prop-table { width:100%; border-collapse:collapse; font-size:.88rem; }
    .prop-table thead th {
      text-align:left; font-weight:700; font-size:.72rem; letter-spacing:.04em;
      text-transform:uppercase; color:var(--text-muted);
      padding:12px 14px; background:var(--bg); border-bottom:1px solid var(--border);
      position:sticky; top:0;
    }
    .prop-table tbody tr { border-bottom:1px solid var(--border); transition:background .12s; cursor:pointer; }
    .prop-table tbody tr:last-child { border-bottom:none; }
    .prop-table tbody tr:hover { background:var(--brand-light); }
    .prop-table td { padding:12px 14px; vertical-align:middle; }
    .prop-table td.addr     { font-weight:600; color:var(--text); }
    .prop-table td.location { color:var(--text-muted); font-size:.85rem; white-space:nowrap; }
    .prop-table td.pipeline { min-width:160px; }
  </style>
</head>
<body class="os-newlayout">

<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<main class="page">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="form-input" type="search" id="search-input" placeholder="Search by address…" oninput="filterProps(this.value)">
  </div>

  <div class="section-header">
    <span class="section-title" id="props-count">All Properties</span>
    <a href="/add-property.html" class="btn btn-primary" style="padding:8px 14px;font-size:.85rem;">+ Add</a>
  </div>

  <div id="props-list"><p class="text-muted text-sm">Loading…</p></div>
</main>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
  window.PAGE_TITLE     = 'Acquisitions';
  window.PAGE_STATUSES  = ['purchasing'];
  window.NAV_CURRENT    = 'acquisitions';

  let allProps = [];
  async function init(){
    if (!await requireAuth()) return;
    try {
      allProps = await getProperties();
      // Apply status filter (if set by the calling page)
      if (Array.isArray(window.PAGE_STATUSES) && window.PAGE_STATUSES.length) {
        allProps = allProps.filter(p => window.PAGE_STATUSES.includes(p.status));
      }
      // Pre-fill search box from ?q= and apply
      const q = new URLSearchParams(location.search).get('q');
      if (q) {
        document.getElementById('search-input').value = q;
        filterProps(q);
      } else {
        render(allProps);
      }
    } catch (err) {
      document.getElementById('props-list').innerHTML = `<p class="text-muted text-sm">Error: ${escHtml(err.message)}</p>`;
    }
  }

  function fullAddr(p){
    const u = p.unit ? ` #${p.unit}` : '';
    return `${p.address_line1}${u}, ${p.city}, ${p.state} ${p.zip}`;
  }

  function render(list){
    const countLabel = list.length === 1 ? '1 Property' : `${list.length} Properties`;
    document.getElementById('props-count').textContent =
      window.PAGE_TITLE === 'All Properties' ? countLabel : `${window.PAGE_TITLE} · ${countLabel}`;
    const el = document.getElementById('props-list');
    if (!list.length){
      el.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🏗️</div>
        <p>No properties yet.</p>
        <a href="/add-property.html" class="btn btn-primary">+ Add Property</a>
      </div>`;
      return;
    }
    el.innerHTML = `
      <div class="prop-table-wrap">
        <table class="prop-table">
          <thead>
            <tr>
              <th>Address</th>
              <th>Location</th>
              <th>Status</th>
              <th>Pipeline</th>
            </tr>
          </thead>
          <tbody>
            ${list.map(p => `
              <tr onclick="location.href='/property.html?id=${p.id}'">
                <td class="addr">${escHtml(p.address_line1)}${p.unit ? ` #${escHtml(p.unit)}` : ''}</td>
                <td class="location">${escHtml(p.city)}, ${escHtml(p.state)} ${escHtml(p.zip)}</td>
                <td>${propertyStatusBadge(p.status)}</td>
                <td class="pipeline">
                  <div class="prop-counts">
                    ${p.prospect_count    ? `<span class="pcount">📥 ${p.prospect_count}</span>` : ''}
                    ${p.lead_count        ? `<span class="pcount">🎯 ${p.lead_count}</span>` : ''}
                    ${p.opportunity_count ? `<span class="pcount">🤝 ${p.opportunity_count}</span>` : ''}
                    ${p.purchase_count    ? `<span class="pcount">📝 ${p.purchase_count}</span>` : ''}
                    ${p.project_count     ? `<span class="pcount">🔧 ${p.project_count}</span>` : ''}
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  function filterProps(q){
    q = (q || '').toLowerCase();
    const filtered = allProps.filter(p => fullAddr(p).toLowerCase().includes(q));
    render(filtered);
  }

  init();
</script>
</body>
</html>
