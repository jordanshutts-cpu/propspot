    out += `<div class="ps-msg${compact ? ' compact' : ''}" id="msg-${mid}">
      <div class="ps-msg-avatar" style="background:${avatarColor(m.sender_id)}">${escHtml(initial)}</div>
      <div class="ps-msg-body">
        <div class="ps-msg-meta">
          <span class="ps-msg-name">${escHtml(senderName)}</span>
          <span class="ps-msg-time">${time}</span>
        </div>
        ${replyQuote}
        <div class="ps-msg-text" id="msgt-${mid}">${textOut}${edited}</div>
        ${actionBar}
        <div class="ps-reactions" id="rxc-${mid}">${rxHtml}</div>
      </div>
    </div>`;
    lastSender = m.sender_id;
    return out;
  }

  // ── Reaction chips HTML ────────────────────────────────────────
  function reactionsHtml(reactions, msgId) {
    if (!reactions || !reactions.length) return '';
    return reactions.map(r => {
      const byMe  = r.users?.some(u => u.user_id === myId);
      const names = r.users?.map(u => u.name).join(', ') || '';
      const emojiSafe = escHtml(r.emoji);
      return `<button class="ps-rx-chip${byMe ? ' by-me' : ''}" title="${escHtml(names)}" onclick="reactMsg('${msgId}','${esc1(r.emoji)}',event)">
        <span class="ps-rx-emoji">${r.emoji}</span>
        <span class="ps-rx-count">${r.count}</span>
      </button>`;
    }).join('');
  }

  // ── Message body renderer with markdown + mentions ─────────────
  function renderBody(raw) {
    if (!raw) return '';

    // 1. Extract ``` code blocks
    const codeBlocks = [];
    let s = raw.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) => {
      codeBlocks.push(`<pre><code>${escHtml(code.trimEnd())}</code></pre>`);
      return `\x00CB${codeBlocks.length - 1}\x00`;
    });

    // 2. Extract `inline code`
    const inlineCodes = [];
    s = s.replace(/`([^`\n]+)`/g, (_, code) => {
      inlineCodes.push(`<code>${escHtml(code)}</code>`);
      return `\x00IC${inlineCodes.length - 1}\x00`;
    });

    // 3. Process mention spans + plain text
    const segs = [];
    if (s.includes('pulse-mention')) {
      let last = 0;
      const re = /<span[^>]*class="pulse-mention"[^>]*data-uid="([0-9a-f-]{36})"[^>]*>(.*?)<\/span>/gi;
      let m;
      while ((m = re.exec(s)) !== null) {
        if (m.index > last) segs.push(applyMarkdown(s.slice(last, m.index)));
        const uid = m[1], text = m[2].replace(/^@/, '');
        const cls = uid === myId ? 'ps-mention-me' : 'ps-mention';
        segs.push(`<span class="${cls}">@${escHtml(text)}</span>`);
        last = m.index + m[0].length;
      }
      if (last < s.length) segs.push(applyMarkdown(s.slice(last)));
    } else {
      segs.push(applyMarkdown(s));
    }

    let result = segs.join('');
    // 4. Restore placeholders
    result = result.replace(/\x00IC(\d+)\x00/g, (_, i) => inlineCodes[+i] || '');
    result = result.replace(/\x00CB(\d+)\x00/g, (_, i) => codeBlocks[+i] || '');
    return result;
  }

  function applyMarkdown(text) {
    let s = escHtml(text);
    s = s.replace(/\*\*(.+?)\*\*/gs, '<strong>$1</strong>');
    s = s.replace(/\*(.+?)\*/gs, '<em>$1</em>');
    s = s.replace(/\n/g, '<br>');
    return s;
  }

  // ── Append new message from SSE ────────────────────────────────
  function appendMsg(m) {
    const el = document.getElementById('ps-messages');
    if (!el) return;
    const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 80;
    // Remove empty-state placeholder if present
    const empty = el.querySelector('.ps-empty');
    if (empty) el.innerHTML = '';
    el.insertAdjacentHTML('beforeend', msgHtml(m));
    lastSender = m.sender_id;
    if (atBottom) el.scrollTop = el.scrollHeight;
  }

  // ── SSE real-time ──────────────────────────────────────────────
  function connectSSE(scope) {
    if (sseSource) { try { sseSource.close(); } catch (_) {} sseSource = null; }
    const token = getToken();
    if (!token) return;
    const qp = scope.channel_id ? `channel_id=${scope.channel_id}` : `dm_id=${scope.dm_id}`;
    sseSource = new EventSource(`/api/pulse/stream?token=${encodeURIComponent(token)}&${qp}`);
    const dot = () => document.getElementById('ps-conn');
    sseSource.onopen  = () => { dot()?.classList.add('on'); };
    sseSource.onerror = () => { dot()?.classList.remove('on'); };
    sseSource.onmessage = e => {
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'message' || data.type === 'new_message') {
          const msg = data.message || data;
          messages.push(msg);
          appendMsg(msg);
          if (msg.sender_id !== currentUser?.id) {
            const myName = currentUser?.full_name;
            const isMention = myName && (msg.body || '').includes('@' + myName);
            if (typeof __playNotifSound === 'function') __playNotifSound(isMention ? 'mention' : 'message');
          }
        } else if (data.type === 'message_updated') {
          const msg = data.message;
          if (!msg) return;
          const idx = messages.findIndex(m => m.id === msg.id);
          if (idx >= 0) messages[idx] = msg;
          // Patch in-place, but don't clobber an active edit
          if (editingMsgId !== msg.id) {
            const textEl = document.getElementById(`msgt-${msg.id}`);
            if (textEl) {
              const edited = msg.edited_at ? ` <span class="ps-msg-edited">(edited)</span>` : '';
              textEl.innerHTML = renderBody(msg.body || '') + edited;
            }
          }
        } else if (data.type === 'message_deleted') {
          messages = messages.filter(m => m.id !== data.message_id);
          document.getElementById(`msg-${data.message_id}`)?.remove();
          if (!messages.length) {
            const el = document.getElementById('ps-messages');
            if (el) el.innerHTML = `<div class="ps-empty" style="height:100%;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="40" height="40"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>No messages yet — say hello!</p></div>`;
          }
        } else if (data.type === 'reaction_update') {
          const idx = messages.findIndex(m => m.id === data.message_id);
          if (idx >= 0) messages[idx].reactions = data.reactions || [];
          const rxEl = document.getElementById(`rxc-${data.message_id}`);
          if (rxEl) rxEl.innerHTML = reactionsHtml(data.reactions || [], data.message_id);
        }
      } catch (_) {}
    };
  }

  // ── Inline edit ────────────────────────────────────────────────
  function editMsg(id) {
    if (editingMsgId && editingMsgId !== id) cancelEditMsg();
    const msg = messages.find(m => m.id === id);
    if (!msg || msg.sender_id !== myId) return;
    const textEl = document.getElementById(`msgt-${id}`);
    if (!textEl) return;
    editingMsgId = id;
    editOrigHtml = textEl.innerHTML;
    // Strip mention spans back to @Name for editing
    const editText = (msg.body || '').replace(/<span[^>]*class="pulse-mention"[^>]*>(@[^<]*)<\/span>/g, '$1');
    textEl.innerHTML = `<div class="ps-edit-wrap">
      <textarea class="ps-edit-ta" id="edit-ta-${id}" onkeydown="editKey(event,'${id}')">${escHtml(editText)}</textarea>
      <div class="ps-edit-actions">
        <button class="btn btn-primary ps-edit-save" onclick="saveEditMsg('${id}')">Save changes</button>
        <button class="ps-edit-cancel" onclick="cancelEditMsg()">Cancel</button>
        <span class="ps-edit-hint">Enter to save · Esc to cancel</span>
      </div>
    </div>`;
    const ta = document.getElementById(`edit-ta-${id}`);
    if (ta) {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 180) + 'px';
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
      ta.addEventListener('input', () => {
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 180) + 'px';
      });
    }
  }

  function editKey(e, id) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveEditMsg(id); }
    if (e.key === 'Escape') { e.preventDefault(); cancelEditMsg(); }
  }

  async function saveEditMsg(id) {
    const ta = document.getElementById(`edit-ta-${id}`);
    if (!ta) return;
    const body = ta.value.trim();
    if (!body) { showToast('Message cannot be empty', 'error'); return; }
    try {
      const updated = await satelliteApiFetch('pulse', `/api/pulse/messages/${id}`, {
        method: 'PATCH',
        body: JSON.stringify({ body })
      });
      editingMsgId = null; editOrigHtml = null;
      const idx = messages.findIndex(m => m.id === id);
      if (idx >= 0) messages[idx] = updated;
      const textEl = document.getElementById(`msgt-${id}`);
      if (textEl) {
        const edited = updated.edited_at ? ` <span class="ps-msg-edited">(edited)</span>` : '';
        textEl.innerHTML = renderBody(updated.body || '') + edited;
      }
    } catch (e) { showToast(e.message, 'error'); }
  }

  function cancelEditMsg() {
    if (!editingMsgId) return;
    const textEl = document.getElementById(`msgt-${editingMsgId}`);
    if (textEl && editOrigHtml !== null) textEl.innerHTML = editOrigHtml;
    editingMsgId = null; editOrigHtml = null;
  }

  // ── Delete message ─────────────────────────────────────────────
  async function deleteMsg(id) {
    if (!confirm('Delete this message? This cannot be undone.')) return;
    try {
      await satelliteApiFetch('pulse', `/api/pulse/messages/${id}`, { method: 'DELETE' });
      document.getElementById(`msg-${id}`)?.remove();
      messages = messages.filter(m => m.id !== id);
      if (!messages.length) {
        const el = document.getElementById('ps-messages');
        if (el) el.innerHTML = `<div class="ps-empty" style="height:100%;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="40" height="40"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>No messages yet — say hello!</p></div>`;
      }
    } catch (e) { showToast(e.message, 'error'); }
  }

  // ── Create Task from message ──────────────────────────────────
  async function createTaskFromMsg(msgId) {
    const m = messages.find(msg => msg.id === msgId);
    if (!m) return;
    const body = (m.body || m.content || '').replace(/<[^>]+>/g, '').substring(0, 300);
    const channel = activeScope?.name || 'Pulse';
    const sender = m.sender_name || m.sender_email || 'Unknown';
    try {
      await apiFetch('/api/tasks', { method: 'POST', body: JSON.stringify({
        title: `${channel}: ${body.substring(0, 60)}${body.length > 60 ? '...' : ''}`,
        description: `From ${sender} in ${channel}:\n\n${body}`,
        visibility: 'team'
      })});
      showToast('Task created');
    } catch (e) { showToast(e.message, 'error'); }
  }

  // ── Reactions ──────────────────────────────────────────────────
  async function reactMsg(id, emoji, e) {
    e?.stopPropagation();
    closeEmojiPicker();
    try {
      const { reactions } = await satelliteApiFetch('pulse', `/api/pulse/messages/${id}/react`, {
        method: 'POST',
        body: JSON.stringify({ emoji })
      });
      const idx = messages.findIndex(m => m.id === id);
      if (idx >= 0) messages[idx].reactions = reactions;
      const rxEl = document.getElementById(`rxc-${id}`);
      if (rxEl) rxEl.innerHTML = reactionsHtml(reactions, id);
    } catch (e) { showToast(e.message, 'error'); }
  }

  // ── Emoji picker ───────────────────────────────────────────────
  function openEmojiPicker(msgId, e, btn) {
    e?.stopPropagation();
    emojiPickerTarget = msgId;
    const picker = document.getElementById('ps-emoji-picker');
    if (!picker) return;

    picker.innerHTML = `<div class="ps-emoji-grid">${
      COMMON_EMOJIS.map(em =>
        `<button class="ps-emoji-btn" onclick="reactMsg('${msgId}','${esc1(em)}',event)">${em}</button>`
      ).join('')
    }</div>`;

    picker.classList.add('open');

    const ref   = (btn || e?.target || document.body);
    const rect  = ref.getBoundingClientRect();
    const pw    = 280;
    let left = Math.min(rect.left, window.innerWidth - pw - 8);
    if (left < 4) left = 4;
    picker.style.left = left + 'px';
    picker.style.top  = (rect.top - 8) + 'px'; // will adjust below

    requestAnimationFrame(() => {
      const ph   = picker.offsetHeight;
      let   top  = rect.top - ph - 8;
      if (top < 4) top = rect.bottom + 8;
      picker.style.top = top + 'px';
    });
  }

  function closeEmojiPicker() {
    document.getElementById('ps-emoji-picker')?.classList.remove('open');
    emojiPickerTarget = null;
  }

  // ── More options menu ──────────────────────────────────────────
  function toggleMoreMenu(msgId, btn) {
    const menu   = document.getElementById(`more-menu-${msgId}`);
    const actBar = document.getElementById(`act-${msgId}`);
    if (!menu) return;
    const isOpen = menu.classList.contains('open');
    closeAllMoreMenus();
    if (!isOpen) {
      menu.classList.add('open');
      btn.classList.add('active');
      if (actBar) actBar.classList.add('visible');
    }
    btn.closest('.ps-msg')?.addEventListener('mouseleave', () => {
      // keep visible while menu is open; let closeAllMoreMenus handle teardown
    }, { once: true });
  }

  function closeMoreMenu(msgId) {
    const menu   = document.getElementById(`more-menu-${msgId}`);
    const actBar = document.getElementById(`act-${msgId}`);
    if (menu) {
      menu.classList.remove('open');
      actBar?.classList.remove('visible');
      menu.closest('.ps-act-btn')?.classList.remove('active');
    }
  }

  function closeAllMoreMenus() {
    document.querySelectorAll('.ps-more-menu.open').forEach(m => {
      const msgId = m.id.replace('more-menu-', '');
      closeMoreMenu(msgId);
    });
  }

  async function copyMsgText(msgId) {
    closeAllMoreMenus();
    const msg = messages.find(m => m.id === msgId);
    if (!msg) return;
    try {
      await navigator.clipboard.writeText(msg.body || '');
      showToast('Message copied', 'success');
    } catch (_) { showToast('Could not copy', 'error'); }
  }

  // ── @mention picker ────────────────────────────────────────────
  function onComposerInput(ta) { autoH(ta); updateMentionPicker(ta); }

  function updateMentionPicker(ta) {
    const val = ta.value, pos = ta.selectionStart;
    let atPos = -1;
    for (let i = pos - 1; i >= 0; i--) {
      if (val[i] === '@') {
        if (i === 0 || /[\s\n]/.test(val[i - 1])) { atPos = i; }
        break;
      }
      if (/[\s\n]/.test(val[i])) break;
    }
    if (atPos < 0) { closeMentionPicker(); return; }
    const query = val.slice(atPos + 1, pos).toLowerCase();
    if (query.length > 30) { closeMentionPicker(); return; }
    const filtered = allOrgUsers.filter(u => {
      const n = (u.full_name || '').toLowerCase(), em = (u.email || '').toLowerCase();
      return n.startsWith(query) || n.includes(' ' + query) || em.startsWith(query);
    }).slice(0, 8);
    if (!filtered.length) { closeMentionPicker(); return; }
    mentionState = { start: atPos, filtered, focused: 0 };
    renderMentionPicker();
  }

  function renderMentionPicker() {
    const picker = document.getElementById('ps-mention-picker');
    if (!picker || !mentionState) return;
    picker.innerHTML = mentionState.filtered.map((u, i) => {
      const name = u.full_name || u.email;
      return `<div class="ps-mention-item${i === mentionState.focused ? ' focused' : ''}" onclick="selectMentionByIdx(${i})">
        <div class="ps-mention-item-avatar" style="background:${avatarColor(u.id)}">${escHtml((name[0]||'?').toUpperCase())}</div>
        <div>
          <div class="ps-mention-item-name">${escHtml(name)}</div>
          ${u.full_name ? `<div class="ps-mention-item-email">${escHtml(u.email)}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    picker.classList.add('open');
  }

  function closeMentionPicker() {
    document.getElementById('ps-mention-picker')?.classList.remove('open');
    mentionState = null;
  }

  function selectMentionByIdx(idx) {
    if (!mentionState) return;
    const user = mentionState.filtered[idx];
    if (user) selectMention(user);
  }

  function selectMention(user) {
    const ta = document.getElementById('ps-textarea');
    if (!ta || !mentionState) return;
    const name = user.full_name || user.email;
    const before = ta.value.slice(0, mentionState.start);
    const after  = ta.value.slice(ta.selectionStart);
    const insert = `@${name} `;
    ta.value = before + insert + after;
    const newPos = before.length + insert.length;
    ta.setSelectionRange(newPos, newPos);
    pendingMentions.set(name, user.id);
    closeMentionPicker();
    ta.focus();
  }

  // ── Reply ──────────────────────────────────────────────────────
  function startReply(msgId, senderName) {
    const msg = messages.find(m => m.id === msgId);
    if (!msg) return;
    replyingTo = { id: msgId, senderName, body: msg.body || '' };

    // Show the reply bar above the composer
    const bar = document.getElementById('ps-reply-bar');
    const toEl = document.getElementById('ps-reply-bar-to');
    const preEl = document.getElementById('ps-reply-bar-preview');
    if (bar && toEl && preEl) {
      // Strip HTML from body for preview
      const tmp = document.createElement('div');
      tmp.innerHTML = renderBody(msg.body || '');
      toEl.textContent  = 'Replying to ' + senderName;
      preEl.textContent = tmp.textContent.slice(0, 100);
      bar.classList.add('open');
    }
    document.getElementById('ps-textarea')?.focus();
  }

  function cancelReply() {
    replyingTo = null;
    document.getElementById('ps-reply-bar')?.classList.remove('open');
  }

  function scrollToMsg(msgId) {
    const el = document.getElementById(`msg-${msgId}`);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.style.transition = 'background .15s';
    el.style.background = 'rgba(97,183,70,.22)';
    setTimeout(() => { el.style.background = ''; }, 1200);
  }

  // ── Send message ───────────────────────────────────────────────
  async function sendMsg() {
    if (!activeScope) return;
    const ta = document.getElementById('ps-textarea');
    if (!ta) return;
    let text = ta.value.trim();
    if (!text) return;
    ta.value = ''; ta.style.height = '';
    closeMentionPicker();

    if (pendingMentions.size) {
      pendingMentions.forEach((uid, name) => {
        const safe = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        text = text.replace(
          new RegExp(`@${safe}(?=\\s|$|[^\\w])`, 'g'),
          `<span class="pulse-mention" data-uid="${uid}">@${name}</span>`
        );
      });
      pendingMentions.clear();
    }

    const payload = activeScope.type === 'channel'
      ? { channel_id: activeScope.id, body: text }
      : { dm_id:      activeScope.id, body: text };
    if (replyingTo) { payload.reply_to_id = replyingTo.id; cancelReply(); }
    try {
      await satelliteApiFetch('pulse', '/api/pulse/messages', {
        method: 'POST', body: JSON.stringify(payload)
      });
    } catch (e) { showToast(e.message, 'error'); ta.value = text; }
  }

  function handleKey(e) {
    if (mentionState) {
      if (e.key === 'ArrowDown') { e.preventDefault(); mentionState.focused = Math.min(mentionState.focused + 1, mentionState.filtered.length - 1); renderMentionPicker(); return; }
      if (e.key === 'ArrowUp')   { e.preventDefault(); mentionState.focused = Math.max(mentionState.focused - 1, 0); renderMentionPicker(); return; }
      if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); selectMentionByIdx(mentionState.focused); return; }
      if (e.key === 'Escape') { e.preventDefault(); closeMentionPicker(); return; }
    }
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  }

  function autoH(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

  // ── New DM ─────────────────────────────────────────────────────
  function openNewDmModal() {
    ndmSelected = null;
    ndmFiltered = allOrgUsers.filter(u => u.id !== myId);
    document.getElementById('ndm-search').value = '';
    document.getElementById('ndm-tags').innerHTML = '';
    renderNdmList(ndmFiltered);
    document.getElementById('new-dm-modal').classList.add('open');
    setTimeout(() => document.getElementById('ndm-search')?.focus(), 60);
  }

  function filterNdm(q) {
    const needle = q.toLowerCase();
    ndmFiltered = allOrgUsers.filter(u => u.id !== myId && (
      (u.full_name || '').toLowerCase().includes(needle) ||
      (u.email || '').toLowerCase().includes(needle)
    ));
    renderNdmList(ndmFiltered);
    document.getElementById('ndm-list')?.classList.add('open');
  }

  function openNdmList() {
    if (!ndmFiltered.length) ndmFiltered = allOrgUsers.filter(u => u.id !== myId);
    renderNdmList(ndmFiltered);
    document.getElementById('ndm-list')?.classList.add('open');
  }

  function renderNdmList(users) {
    const list = document.getElementById('ndm-list');
    if (!list) return;
    if (!users.length) {
      list.innerHTML = `<div style="padding:10px;text-align:center;font-size:.8rem;color:var(--text-muted);">No matching people</div>`;
      return;
    }
    list.innerHTML = users.slice(0, 10).map(u => {
      const name = u.full_name || u.email;
      return `<div class="ps-ndm-item" onmousedown="selectNdmUser('${u.id}','${esc1(name)}')">
        <div class="ps-ndm-item-av" style="background:${avatarColor(u.id)}">${escHtml((name[0]||'?').toUpperCase())}</div>
        <div>
          <div style="font-size:.85rem;font-weight:600;">${escHtml(name)}</div>
          ${u.full_name ? `<div style="font-size:.72rem;color:var(--text-muted);">${escHtml(u.email)}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function selectNdmUser(id, name) {
    ndmSelected = { id, name };
    document.getElementById('ndm-search').value = '';
    document.getElementById('ndm-list')?.classList.remove('open');
    const tags = document.getElementById('ndm-tags');
    if (tags) tags.innerHTML = `<div class="ps-ndm-tag">${escHtml(name)}<button onclick="ndmClearSelected()">×</button></div>`;
  }

  function ndmClearSelected() {
    ndmSelected = null;
    document.getElementById('ndm-tags').innerHTML = '';
  }

  async function createDm() {
    if (!ndmSelected) { showToast('Select a person first', 'error'); return; }
    try {
      const dm = await satelliteApiFetch('pulse', '/api/pulse/dms', {
        method: 'POST', body: JSON.stringify({ user_ids: [ndmSelected.id] })
      });
      closeModal('new-dm-modal');
      await loadSidebar();
      openDm(dm.id, ndmSelected.name);
    } catch (e) { showToast(e.message, 'error'); }
  }

  // ── Create channel ─────────────────────────────────────────────
  function openNewChannelModal() {
    document.getElementById('new-ch-name').value  = '';
    document.getElementById('new-ch-desc').value  = '';
    document.getElementById('new-ch-private').checked = false;
    document.getElementById('new-ch-modal').classList.add('open');
    setTimeout(() => document.getElementById('new-ch-name')?.focus(), 50);
  }
  function closeModal(id) { document.getElementById(id)?.classList.remove('open'); }

  async function createChannel() {
    const name        = document.getElementById('new-ch-name').value.trim();
    const description = document.getElementById('new-ch-desc').value.trim();
    const is_private  = document.getElementById('new-ch-private').checked;
    if (!name) { showToast('Channel name is required', 'error'); return; }
    try {
      const ch = await satelliteApiFetch('pulse', '/api/pulse/channels', {
        method: 'POST', body: JSON.stringify({ name, description: description || null, is_private })
      });
      closeModal('new-ch-modal');
      await loadSidebar();
      openCh(ch.id, ch.name || ch.slug, 'admin');
    } catch (e) { showToast(e.message, 'error'); }
  }

  // ── Channel settings panel ─────────────────────────────────────
  function closeSettings() {
    document.getElementById('ch-settings-panel')?.classList.remove('open');
    settingsChannelId = null;
  }

  async function openSettings(channelId) {
    settingsChannelId = channelId;
    const ch = allChannels.find(c => c.id === channelId);
    if (!ch) return;
    document.getElementById('sp-title').textContent = `#${ch.name || ch.slug}`;

    const [members, users] = await Promise.all([
      satelliteApiFetch('pulse', `/api/pulse/channels/${channelId}/members`).catch(() => []),
      apiFetch('/api/users').catch(() => [])
    ]);
    const orgUsers  = Array.isArray(users) ? users : [];
    const memberIds = new Set((Array.isArray(members) ? members : []).map(m => m.user_id));
    const nonMembers = orgUsers.filter(u => !memberIds.has(u.id));
    const isGen = ch.slug === 'general';

    document.getElementById('sp-body').innerHTML = `
      <div class="ps-sp-section">Channel settings</div>
      <div class="ps-sp-field">
        <label>Channel name</label>
        <input type="text" id="sp-name" value="${escHtml(ch.name || ch.slug)}">
      </div>
      <div class="ps-sp-field">
        <label>Description</label>
        <textarea id="sp-desc" rows="2">${escHtml(ch.description || '')}</textarea>
      </div>
      <div class="ps-toggle-row" style="margin-bottom:14px;">
        <input type="checkbox" id="sp-private" ${ch.is_private ? 'checked' : ''}>
        <label for="sp-private" style="margin:0;font-size:.88rem;font-weight:500;color:var(--text);">Private — only members can see</label>
      </div>
      <button class="btn btn-primary ps-sp-save" onclick="saveChannelSettings('${channelId}')">Save settings</button>

      <div class="ps-sp-section" style="margin-top:20px;">
        Members (${Array.isArray(members) ? members.length : 0})
        ${isGen ? '<span style="font-size:.7rem;color:var(--text-muted);font-weight:400;"> · #general is open to everyone</span>' : ''}
      </div>
      <div id="sp-members-list">
        ${(Array.isArray(members) ? members : []).map(m => {
          const name  = m.full_name || m.email || 'Unknown';
          const isSelf = m.user_id === myId;
          return `<div class="ps-member-row">
            <div class="ps-member-avatar" style="background:${avatarColor(m.user_id)}">${escHtml((name[0]||'?').toUpperCase())}</div>
            <div class="ps-member-info">
              <div class="ps-member-name">${escHtml(name)}</div>
              <div class="ps-member-role">${m.role === 'admin' ? '⭐ Admin' : 'Member'}</div>
            </div>
            <div class="ps-member-actions">
              ${!isSelf ? `<button class="ps-member-btn" onclick="toggleMemberRole('${channelId}','${m.user_id}','${m.role === 'admin' ? 'member' : 'admin'}')">${m.role === 'admin' ? 'Demote' : 'Make admin'}</button>` : ''}
              ${!isSelf && !isGen ? `<button class="ps-member-btn danger" onclick="removeMember('${channelId}','${m.user_id}')">Remove</button>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>

      ${nonMembers.length ? `
        <div class="ps-sp-section" style="margin-top:16px;">Add member</div>
        <div class="ps-add-member">
          <div class="ps-upick" id="sp-upick">
            <div class="ps-upick-input-wrap">
              <svg class="ps-upick-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input class="ps-upick-input" id="sp-upick-input" type="text" placeholder="Search people…" autocomplete="off"
                oninput="filterUpick(this.value)" onfocus="openUpick()" onkeydown="upickKey(event)">
            </div>
            <div class="ps-upick-list" id="sp-upick-list"></div>
          </div>
          <button class="btn btn-primary" onclick="addMember('${channelId}')" style="flex-shrink:0;">Add</button>
        </div>` : ''}

      ${!isGen ? `
        <div class="ps-sp-section" style="margin-top:20px;color:#ef4444;">Danger zone</div>
        <div class="ps-danger-zone">
          <button class="ps-danger-btn" onclick="archiveChannel('${channelId}')">Archive channel</button>
        </div>` : ''}
    `;
    document.getElementById('ch-settings-panel').classList.add('open');

    upickUsers = nonMembers; upickFiltered = nonMembers;
    upickSelected = null; upickFocused = -1;
    renderUpickList('');
  }

  // ── Custom user picker helpers ─────────────────────────────────
  function renderUpickList(q) {
    const list = document.getElementById('sp-upick-list');
    if (!list) return;
    const needle = q.toLowerCase();
    upickFiltered = needle
      ? upickUsers.filter(u => (u.full_name||'').toLowerCase().includes(needle) || (u.email||'').toLowerCase().includes(needle))
      : upickUsers;
    if (!upickFiltered.length) {
      list.innerHTML = `<div class="ps-upick-empty">No matching people</div>`;
    } else {
      list.innerHTML = upickFiltered.map((u, i) => {
        const name = u.full_name || u.email;
        return `<div class="ps-upick-item${i === upickFocused ? ' focused' : ''}" data-idx="${i}" onmousedown="selectUpickUser(${i})">
          <div class="ps-upick-avatar" style="background:${avatarColor(u.id)}">${escHtml((name[0]||'?').toUpperCase())}</div>
          <div class="ps-upick-info">
            <div class="ps-upick-name">${escHtml(name)}</div>
            ${u.full_name ? `<div class="ps-upick-email">${escHtml(u.email)}</div>` : ''}
          </div>
        </div>`;
      }).join('');
    }
  }

  function openUpick()  { document.getElementById('sp-upick-list')?.classList.add('open'); }
  function closeUpick() { document.getElementById('sp-upick-list')?.classList.remove('open'); }

  function filterUpick(q) {
    upickFocused = -1; renderUpickList(q);
    document.getElementById('sp-upick-list')?.classList.add('open');
  }

  function selectUpickUser(idx) {
    const u = upickFiltered[idx];
    if (!u) return;
    upickSelected = { id: u.id, name: u.full_name || u.email };
    const input = document.getElementById('sp-upick-input');
    if (input) { input.value = upickSelected.name; input.classList.add('has-value'); }
    closeUpick();
  }

  function upickKey(e) {
    const list = document.getElementById('sp-upick-list');
    const isOpen = list?.classList.contains('open');
    if (!isOpen && e.key !== 'Enter') { openUpick(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); upickFocused = Math.min(upickFocused + 1, upickFiltered.length - 1); renderUpickList(document.getElementById('sp-upick-input')?.value || ''); list?.classList.add('open'); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); upickFocused = Math.max(upickFocused - 1, 0); renderUpickList(document.getElementById('sp-upick-input')?.value || ''); }
    else if (e.key === 'Enter') { e.preventDefault(); if (upickFocused >= 0) selectUpickUser(upickFocused); }
    else if (e.key === 'Escape') { closeUpick(); }
  }

  async function saveChannelSettings(channelId) {
    const name        = document.getElementById('sp-name')?.value.trim();
    const description = document.getElementById('sp-desc')?.value.trim();
    const is_private  = document.getElementById('sp-private')?.checked;
    if (!name) { showToast('Channel name is required', 'error'); return; }
    try {
      await satelliteApiFetch('pulse', `/api/pulse/channels/${channelId}`, {
        method: 'PATCH', body: JSON.stringify({ name, description: description || null, is_private })
      });
      showToast('Settings saved', 'success');
      await loadSidebar();
      if (activeScope?.id === channelId) {
        activeScope.name = '#' + name;
        const el = document.querySelector('.ps-ch-name');
        if (el) el.textContent = activeScope.name;
      }
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function addMember(channelId) {
    const userId = upickSelected?.id;
    if (!userId) { showToast('Select a person first', 'error'); return; }
    try {
      await satelliteApiFetch('pulse', `/api/pulse/channels/${channelId}/members`, {
        method: 'POST', body: JSON.stringify({ user_id: userId })
      });
      upickSelected = null;
      showToast('Member added', 'success');
      openSettings(channelId);
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function removeMember(channelId, userId) {
    try {
      await satelliteApiFetch('pulse', `/api/pulse/channels/${channelId}/members/${userId}`, { method: 'DELETE' });
      showToast('Member removed', 'success');
      openSettings(channelId);
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function toggleMemberRole(channelId, userId, newRole) {
    try {
      await satelliteApiFetch('pulse', `/api/pulse/channels/${channelId}/members/${userId}`, {
        method: 'PATCH', body: JSON.stringify({ role: newRole })
      });
      openSettings(channelId);
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function archiveChannel(channelId) {
    if (!confirm('Archive this channel? History is kept, but it disappears from the sidebar.')) return;
    try {
      await satelliteApiFetch('pulse', `/api/pulse/channels/${channelId}/archive`, { method: 'POST' });
      closeSettings();
      await loadSidebar();
      if (activeScope?.id === channelId) {
        activeScope = null;
        document.getElementById('ps-main').innerHTML = `
          <div class="ps-empty" style="height:100%;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="48" height="48"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <p>Channel archived — select another</p>
          </div>`;
      }
    } catch (e) { showToast(e.message, 'error'); }
  }

  // ── Helpers ────────────────────────────────────────────────────
  function avatarColor(str) {
    const COLS = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#06b6d4','#ef4444','#6366f1'];
    let h = 0;
    for (let i = 0; i < (str || '').length; i++) h = ((h << 5) - h) + str.charCodeAt(i);
    return COLS[Math.abs(h) % COLS.length];
  }

  // ── Global click handlers ──────────────────────────────────────
  // Close settings panel on outside click
  document.addEventListener('click', e => {
    const panel = document.getElementById('ch-settings-panel');
    const btn   = e.target.closest('.ps-settings-btn');
    if (!panel?.classList.contains('open')) return;
    if (panel.contains(e.target) || btn) return;
    closeSettings();
  });

  // Close mention picker on outside click
  document.addEventListener('click', e => {
    if (!mentionState) return;
    const wrap = document.querySelector('.ps-composer-wrap');
    if (wrap && !wrap.contains(e.target)) closeMentionPicker();
  });

  // Close emoji picker on outside click
  document.addEventListener('click', e => {
    const picker = document.getElementById('ps-emoji-picker');
    if (picker?.classList.contains('open') && !picker.contains(e.target)) closeEmojiPicker();
  });

  // Close more-options menus on outside click
  document.addEventListener('click', e => {
    if (!document.querySelector('.ps-more-menu.open')) return;
    if (!e.target.closest('.ps-more-menu') && !e.target.closest('.ps-act-btn')) {
      closeAllMoreMenus();
    }
  });

  // Close upick on outside click
  document.addEventListener('mousedown', e => {
    const wrap = document.getElementById('sp-upick');
    if (wrap && !wrap.contains(e.target)) closeUpick();
  }, true);

  // Close ndm list on outside click
  document.addEventListener('mousedown', e => {
    const pick = document.querySelector('.ps-ndm-pick');
    if (pick && !pick.contains(e.target)) document.getElementById('ndm-list')?.classList.remove('open');
  }, true);

  init();
</script>
</body>
</html>
