<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#61B746">
  <title>FieldCam — Camera</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #000; }

    /* ── Full-screen camera layout ── */
    .cam-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: #000;
    }

    /* ── Video feed ── */
    #video-el {
      flex: 1;
      width: 100%;
      object-fit: cover;
      display: block;
      transition: transform .15s;
    }

    /* ── Top bar (flash / flip / close) ── */
    .cam-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,.6), transparent);
      z-index: 10;
    }
    .cam-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(4px);
      border: none; color: #fff;
      font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .15s;
    }
    .cam-btn:active { background: rgba(255,255,255,.3); }
    .cam-btn.active { background: #f5c518; color: #000; }
    .cam-btn.danger { background: rgba(239,68,68,.7); }

    /* ── Zoom bar ── */
    .zoom-bar {
      position: absolute;
      bottom: 260px; left: 0; right: 0;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }
    .zoom-label {
      color: #fff;
      font-size: .8rem;
      font-weight: 700;
      min-width: 36px;
      text-align: center;
      text-shadow: 0 1px 3px rgba(0,0,0,.8);
    }
    #zoom-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      border-radius: 3px;
      background: rgba(255,255,255,.3);
      outline: none;
    }
    #zoom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,.4);
    }

    /* ── Bottom controls ── */
    .cam-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,.85), transparent);
      padding: 12px 16px 32px;
      z-index: 10;
    }

    /* Thumbnail strip */
    .thumb-strip {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 0 0 10px;
      scrollbar-width: none;
      min-height: 64px;
      align-items: center;
    }
    .thumb-strip::-webkit-scrollbar { display: none; }

    .thumb-wrap {
      position: relative;
      flex-shrink: 0;
      width: 58px; height: 58px;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,.4);
    }
    .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .thumb-remove {
      position: absolute;
      top: 1px; right: 1px;
      width: 18px; height: 18px;
      background: rgba(0,0,0,.7);
      border: none; color: #fff;
      border-radius: 50%;
      font-size: .65rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    .thumb-count {
      color: rgba(255,255,255,.6);
      font-size: .75rem;
      white-space: nowrap;
    }

    /* Shutter row */
    .shutter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
    }

    .shutter-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #fff;
      border: 4px solid rgba(255,255,255,.4);
      box-shadow: 0 0 0 3px #61B746;
      cursor: pointer;
      transition: transform .08s;
      position: relative;
    }
    .shutter-btn:active { transform: scale(.92); }
    .shutter-btn .shutter-count {
      position: absolute;
      top: -8px; right: -8px;
      background: #61B746;
      color: #fff;
      border-radius: 100px;
      font-size: .7rem;
      font-weight: 700;
      padding: 2px 6px;
      display: none;
    }
    .shutter-btn.has-photos .shutter-count { display: block; }

    /* Upload all button */
    .upload-all-btn {
      background: #61B746;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      min-width: 100px;
      text-align: center;
      transition: background .15s;
    }
    .upload-all-btn:disabled { background: #888; }
    .upload-all-btn.empty { background: rgba(255,255,255,.15); color: rgba(255,255,255,.5); }

    /* Progress bar */
    .upload-progress {
      display: none;
      margin-top: 8px;
    }
    .progress-bar {
      height: 4px;
      background: rgba(255,255,255,.2);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #61B746;
      border-radius: 4px;
      transition: width .3s;
    }
    .progress-label {
      color: rgba(255,255,255,.8);
      font-size: .78rem;
      text-align: center;
      margin-top: 4px;
    }

    /* ── Upload mode overlay ── */
    .mode-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .mode-btn {
      flex: 1;
      padding: 7px;
      border-radius: 8px;
      border: none;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      background: rgba(255,255,255,.15);
      color: rgba(255,255,255,.7);
    }
    .mode-btn.active { background: #61B746; color: #fff; }

    /* Property + notes panel (slide-up sheet) */
    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #1a1a1a;
      border-radius: 20px 20px 0 0;
      padding: 16px 16px 40px;
      z-index: 200;
      transform: translateY(100%);
      transition: transform .3s ease;
      max-height: 75dvh;
      overflow-y: auto;
    }
    .sheet.open { transform: translateY(0); }
    .sheet-handle {
      width: 40px; height: 4px;
      background: rgba(255,255,255,.2);
      border-radius: 4px;
      margin: 0 auto 16px;
    }
    .sheet-title { color: #fff; font-weight: 700; font-size: 1rem; margin-bottom: 12px; }
    .sheet .form-input, .sheet .form-textarea, .sheet .form-select {
      background: #2a2a2a; color: #fff; border-color: #333;
    }
    .sheet .form-label { color: rgba(255,255,255,.7); }
    .prop-opt-dark {
      padding: 10px 12px;
      border: 1.5px solid #333;
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      color: #fff;
      transition: border-color .15s;
    }
    .prop-opt-dark.selected { border-color: #61B746; background: rgba(97,183,70,.15); }
    .prop-opt-dark .opt-name { font-weight: 600; font-size: .9rem; }
    .prop-opt-dark .opt-dist { font-size: .75rem; color: rgba(255,255,255,.5); }

    .sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 190;
      display: none;
    }
    .sheet-overlay.open { display: block; }

    /* Upload-mode file picker */
    #upload-mode-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      padding: 40px 24px;
    }
    #upload-mode-wrap.active { display: flex; }

    /* Torch not supported message */
    #torch-unsupported {
      display: none;
      position: absolute;
      top: 70px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.7);
      color: #fff;
      font-size: .78rem;
      padding: 6px 14px;
      border-radius: 100px;
      white-space: nowrap;
      z-index: 20;
    }
  </style>
</head>
<body>

<div class="cam-wrap">
  <!-- Video -->
  <video id="video-el" autoplay playsinline muted></video>

  <!-- Upload file mode background -->
  <div id="upload-mode-wrap">
    <div style="font-size:4rem;">🖼️</div>
    <p style="color:rgba(255,255,255,.7);font-size:.95rem;text-align:center;">
      Tap below to choose photos from your library
    </p>
    <input type="file" id="upload-input" accept="image/*" multiple
           onchange="handleFileSelect(this)" style="display:none">
    <button class="btn btn-primary" onclick="document.getElementById('upload-input').click()"
            style="padding:14px 32px;">
      📂 Choose Photos
    </button>
  </div>

  <!-- Torch unsupported tooltip -->
  <div id="torch-unsupported">⚠️ Flash not available on this device</div>

  <!-- Top controls -->
  <div class="cam-top">
    <button class="cam-btn" id="torch-btn" onclick="toggleTorch()" title="Flash">⚡</button>
    <div class="mode-toggle" style="flex:1;margin:0 12px;">
      <button class="mode-btn active" id="mode-cam" onclick="setMode('camera')">📷 Camera</button>
      <button class="mode-btn" id="mode-up"  onclick="setMode('upload')">🖼 Library</button>
    </div>
    <button class="cam-btn" id="flip-btn" onclick="flipCamera()" title="Flip">🔄</button>
  </div>

  <!-- Zoom bar -->
  <div class="zoom-bar" id="zoom-bar">
    <span style="font-size:.9rem;">🔍</span>
    <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1"
           oninput="handleZoom(this.value)">
    <span class="zoom-label" id="zoom-label">1×</span>
  </div>

  <!-- Bottom panel -->
  <div class="cam-bottom">
    <!-- Thumbnail strip -->
    <div class="thumb-strip" id="thumb-strip">
      <span class="thumb-count" id="thumb-empty-msg">Photos you take appear here</span>
    </div>

    <!-- Shutter row -->
    <div class="shutter-row">
      <!-- Left: settings -->
      <button class="cam-btn" onclick="openSheet()" title="Property & Notes" style="width:52px;height:52px;">⚙️</button>

      <!-- Shutter -->
      <button class="shutter-btn" id="shutter-btn" onclick="capturePhoto()">
        <span class="shutter-count" id="shutter-count">0</span>
      </button>

      <!-- Right: upload all -->
      <button class="upload-all-btn empty" id="upload-all-btn" onclick="uploadAll()">
        Upload<br><span id="upload-count">0</span> photos
      </button>
    </div>

    <!-- Progress bar -->
    <div class="upload-progress" id="upload-progress">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progress-label">Uploading…</div>
    </div>
  </div>
</div>

<!-- Property + Notes Sheet -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="sheet" id="settings-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">📍 Property & Notes</div>

  <div class="form-group">
    <label class="form-label">Assign to Property</label>
    <div id="sheet-props-list">
      <p style="color:rgba(255,255,255,.5);font-size:.85rem;">Loading properties…</p>
    </div>
    <a href="/add-property.html" style="color:#61B746;font-size:.82rem;display:block;margin-top:8px;">+ Add new property</a>
  </div>

  <div class="form-group">
    <label class="form-label">Notes (applied to all photos in this batch)</label>
    <textarea class="form-textarea" id="photo-notes" rows="2"
              placeholder="e.g. Kitchen demo complete, north wall…"></textarea>
  </div>

  <button class="btn btn-primary btn-full" onclick="closeSheet()">Done</button>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
  // ── State ─────────────────────────────────────────────────────
  const params        = new URLSearchParams(location.search);
  const PRESET_PROP   = params.get('property_id');

  let stream          = null;
  let facingMode      = 'environment';
  let currentMode     = 'camera';
  let torchOn         = false;
  let torchSupported  = false;
  let currentZoom     = 1;
  let zoomMax         = 5;
  let hardwareZoom    = false;

  let queue           = [];          // { file, url }
  let selectedPropId  = PRESET_PROP || null;
  let allProps        = [];
  let userLat = null, userLng = null;

  // ── Init ──────────────────────────────────────────────────────
  async function init() {
    const user = await requireAuth(); if (!user) return;
    await loadAllProperties();
    startGPS();
    startCamera();
  }

  // ── GPS ───────────────────────────────────────────────────────
  async function startGPS() {
    try {
      const pos = await getCurrentPosition();
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      await autoSelectNearby();
    } catch (_) {}
  }

  async function autoSelectNearby() {
    if (!userLat || selectedPropId) return;
    const nearby = await findNearbyProperties(userLat, userLng, 500);
    if (nearby.length > 0) selectProp(nearby[0].id);
  }

  // ── Camera ────────────────────────────────────────────────────
  async function startCamera() {
    stopCamera();
    const video = document.getElementById('video-el');
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 3840 }, height: { ideal: 2160 } },
        audio: false
      });
      video.srcObject = stream;

      // Probe zoom + torch capabilities
      const track = stream.getVideoTracks()[0];
      const caps   = track.getCapabilities?.() || {};

      // Zoom
      if (caps.zoom) {
        hardwareZoom = true;
        zoomMax = caps.zoom.max || 5;
        document.getElementById('zoom-slider').max = zoomMax;
      } else {
        hardwareZoom = false;
        zoomMax = 3; // CSS zoom cap
        document.getElementById('zoom-slider').max = zoomMax;
      }

      // Torch
      torchSupported = !!caps.torch;
      document.getElementById('torch-btn').style.opacity = torchSupported ? '1' : '0.4';

    } catch (err) {
      showToast('Camera access denied — switch to Library mode', 'error');
      setMode('upload');
    }
  }

  function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  }

  async function flipCamera() {
    torchOn = false;
    document.getElementById('torch-btn').classList.remove('active');
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    await startCamera();
  }

  // ── Torch ─────────────────────────────────────────────────────
  async function toggleTorch() {
    if (!torchSupported) {
      const el = document.getElementById('torch-unsupported');
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 2500);
      return;
    }
    torchOn = !torchOn;
    try {
      const track = stream?.getVideoTracks()[0];
      await track.applyConstraints({ advanced: [{ torch: torchOn }] });
      document.getElementById('torch-btn').classList.toggle('active', torchOn);
    } catch (e) {
      showToast('Could not toggle flash', 'error');
      torchOn = false;
    }
  }

  // ── Zoom ──────────────────────────────────────────────────────
  async function handleZoom(val) {
    currentZoom = parseFloat(val);
    document.getElementById('zoom-label').textContent = currentZoom.toFixed(1) + '×';

    if (hardwareZoom && stream) {
      try {
        const track = stream.getVideoTracks()[0];
        await track.applyConstraints({ advanced: [{ zoom: currentZoom }] });
        document.getElementById('video-el').style.transform = 'none';
        return;
      } catch (_) {}
    }
    // CSS zoom fallback
    document.getElementById('video-el').style.transform = `scale(${currentZoom})`;
  }

  // ── Capture ───────────────────────────────────────────────────
  function capturePhoto() {
    if (currentMode !== 'camera') return;
    const video = document.getElementById('video-el');
    if (!video.srcObject) return;

    // Flash effect
    flashEffect();

    const canvas = document.createElement('canvas');
    canvas.width  = video.videoWidth  || 1920;
    canvas.height = video.videoHeight || 1080;
    canvas.getContext('2d').drawImage(video, 0, 0);

    canvas.toBlob(blob => {
      const file = new File([blob], `photo_${Date.now()}.jpg`, { type: 'image/jpeg' });
      const url  = URL.createObjectURL(blob);
      queue.push({ file, url });
      renderThumbs();
    }, 'image/jpeg', 0.88);
  }

  function flashEffect() {
    const flash = document.createElement('div');
    flash.style.cssText = 'position:fixed;inset:0;background:#fff;opacity:0.6;z-index:999;pointer-events:none;transition:opacity .15s';
    document.body.appendChild(flash);
    setTimeout(() => { flash.style.opacity = '0'; setTimeout(() => flash.remove(), 150); }, 30);
  }

  // ── Library upload ────────────────────────────────────────────
  function handleFileSelect(input) {
    Array.from(input.files).forEach(file => {
      const url = URL.createObjectURL(file);
      queue.push({ file, url });
    });
    input.value = '';
    renderThumbs();
  }

  // ── Thumbnail strip ───────────────────────────────────────────
  function renderThumbs() {
    const strip  = document.getElementById('thumb-strip');
    const btn    = document.getElementById('upload-all-btn');
    const count  = document.getElementById('upload-count');
    const shutter = document.getElementById('shutter-btn');
    const sCount  = document.getElementById('shutter-count');
    const emptyMsg = document.getElementById('thumb-empty-msg');

    if (queue.length === 0) {
      strip.innerHTML = '';
      strip.appendChild(emptyMsg);
      emptyMsg.style.display = '';
      btn.classList.add('empty');
      btn.disabled = false;
      shutter.classList.remove('has-photos');
      count.textContent = '0';
      return;
    }

    emptyMsg.style.display = 'none';
    strip.innerHTML = queue.map((item, i) => `
      <div class="thumb-wrap">
        <img src="${item.url}" alt="Photo ${i+1}">
        <button class="thumb-remove" onclick="removeFromQueue(${i})">✕</button>
      </div>`).join('');

    btn.classList.remove('empty');
    btn.disabled = false;
    count.textContent = queue.length;
    sCount.textContent = queue.length;
    shutter.classList.add('has-photos');

    // Scroll strip to end
    strip.scrollLeft = strip.scrollWidth;
  }

  function removeFromQueue(idx) {
    URL.revokeObjectURL(queue[idx].url);
    queue.splice(idx, 1);
    renderThumbs();
  }

  // ── Upload all ────────────────────────────────────────────────
  async function uploadAll() {
    if (queue.length === 0) {
      showToast('Take some photos first!', 'error'); return;
    }
    if (!selectedPropId) {
      openSheet();
      showToast('Select a property first', 'error'); return;
    }

    const btn      = document.getElementById('upload-all-btn');
    const progress = document.getElementById('upload-progress');
    const fill     = document.getElementById('progress-fill');
    const label    = document.getElementById('progress-label');
    const notes    = document.getElementById('photo-notes').value;

    btn.disabled = true;
    progress.style.display = 'block';

    const total = queue.length;
    let done = 0, failed = 0;

    for (let i = 0; i < queue.length; i++) {
      label.textContent = `Uploading ${i + 1} of ${total}…`;
      fill.style.width  = `${((i) / total) * 100}%`;

      try {
        await uploadPhoto({
          file:       queue[i].file,
          propertyId: selectedPropId,
          lat:        userLat,
          lng:        userLng,
          notes
        });
        done++;
      } catch (e) {
        failed++;
        console.error('Upload failed for photo', i, e);
      }
    }

    fill.style.width = '100%';
    label.textContent = failed === 0
      ? `✅ All ${done} photos uploaded!`
      : `⚠️ ${done} uploaded, ${failed} failed`;

    // Clean up queue
    queue.forEach(item => URL.revokeObjectURL(item.url));
    queue = [];
    renderThumbs();

    setTimeout(() => {
      progress.style.display = 'none';
      fill.style.width = '0%';
      btn.disabled = false;
      if (failed === 0) window.location.href = `/property.html?id=${selectedPropId}`;
    }, 1200);
  }

  // ── Mode switch ───────────────────────────────────────────────
  function setMode(mode) {
    currentMode = mode;
    const video   = document.getElementById('video-el');
    const upWrap  = document.getElementById('upload-mode-wrap');
    const zoomBar = document.getElementById('zoom-bar');
    const torchBtn = document.getElementById('torch-btn');
    const flipBtn  = document.getElementById('flip-btn');
    document.getElementById('mode-cam').classList.toggle('active', mode === 'camera');
    document.getElementById('mode-up').classList.toggle('active', mode === 'upload');

    if (mode === 'camera') {
      upWrap.classList.remove('active');
      video.style.display = 'block';
      zoomBar.style.display = 'flex';
      torchBtn.style.display = 'flex';
      flipBtn.style.display  = 'flex';
      startCamera();
    } else {
      stopCamera();
      video.style.display = 'none';
      upWrap.classList.add('active');
      zoomBar.style.display = 'none';
      torchBtn.style.display = 'none';
      flipBtn.style.display  = 'none';
    }
  }

  // ── Property sheet ────────────────────────────────────────────
  async function loadAllProperties() {
    allProps = await getProperties();
    renderSheetProps(allProps);
  }

  function renderSheetProps(list) {
    const el = document.getElementById('sheet-props-list');
    if (!list.length) {
      el.innerHTML = `<p style="color:rgba(255,255,255,.5);font-size:.85rem;">No properties yet.</p>`;
      return;
    }
    el.innerHTML = list.map(p => `
      <div class="prop-opt-dark ${p.id === selectedPropId ? 'selected' : ''}"
           id="sheet-prop-${p.id}" onclick="selectProp('${p.id}')">
        <div class="opt-name">${escHtml(p.name)}</div>
        <div class="opt-dist">${escHtml(p.address || '')}</div>
      </div>`).join('');
  }

  function selectProp(id) {
    selectedPropId = id;
    document.querySelectorAll('.prop-opt-dark').forEach(el => el.classList.remove('selected'));
    const el = document.getElementById(`sheet-prop-${id}`);
    if (el) el.classList.add('selected');
  }

  function openSheet()  {
    document.getElementById('settings-sheet').classList.add('open');
    document.getElementById('sheet-overlay').classList.add('open');
  }
  function closeSheet() {
    document.getElementById('settings-sheet').classList.remove('open');
    document.getElementById('sheet-overlay').classList.remove('open');
  }

  // Stop camera on leave
  window.addEventListener('beforeunload', stopCamera);

  init();
</script>
</body>
</html>
