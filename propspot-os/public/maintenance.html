<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Maintenance</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <script>document.documentElement.classList.add('page-loading');try{var _c=document.documentElement.classList;if(localStorage.sidebar_collapsed==='1')_c.add('sidebar-collapsed');var _t=localStorage.getItem('propspot_theme');_c.add('theme-premium');if(_t==='dark')_c.add('theme-dark');}catch(e){}</script>
  <style>
    /* ── Stats ── */
    .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
    .stat-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px 12px; text-align:center; }
    .stat-num  { font-size:2rem; font-weight:800; color:var(--brand); line-height:1; margin-bottom:4px; }
    .stat-num.bad  { color:#dc2626; }
    .stat-num.warn { color:#d97706; }
    .stat-label { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); font-weight:600; }
    /* ── Filter pills ── */
    .pill-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
    .pill { padding:6px 14px; border-radius:100px; border:1.5px solid var(--border); background:var(--surface); font-size:.82rem; font-weight:500; cursor:pointer; color:var(--text-muted); transition:all .12s; }
    .pill:hover { border-color:var(--brand); color:var(--brand); }
    .pill.active { background:var(--brand); color:#fff; border-color:var(--brand); font-weight:600; }
    /* ── Work order rows ── */
    .wo-list { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
    .wo-row { display:flex; gap:14px; align-items:flex-start; padding:14px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
    .wo-row:last-child { border-bottom:none; }
    .wo-row:hover { background:var(--brand-light); }
    .wo-icon { font-size:1.5rem; flex-shrink:0; width:36px; text-align:center; margin-top:2px; }
    .wo-body { flex:1; min-width:0; }
    .wo-title { font-weight:700; font-size:.95rem; margin-bottom:3px; }
    .wo-sub { font-size:.78rem; color:var(--text-muted); margin-bottom:6px; }
    .wo-tags { display:flex; gap:5px; flex-wrap:wrap; }
    /* ── Priority accent on left border ── */
    .wo-row.pri-urgent { border-left:3px solid #dc2626; padding-left:13px; }
    .wo-row.pri-high   { border-left:3px solid #d97706; padding-left:13px; }
    /* ── Modal ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--surface); border-radius:var(--radius); box-shadow:0 8px 40px rgba(0,0,0,.2); width:100%; max-width:520px; max-height:90vh; overflow-y:auto; padding:24px; }
    .modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .modal-head h2 { font-size:1.1rem; font-weight:700; margin:0; }
    .modal-close { background:var(--bg); border:none; border-radius:8px; width:32px; height:32px; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; color:var(--text-muted); }
    .modal-close:hover { color:var(--text); background:var(--border); }
    .form-row { display:flex; gap:12px; }
    .form-row .form-group { flex:1; }
    .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }
    /* ── Priority/Status badge colours ── */
    .bdg-pri-urgent { background:#fee2e2; color:#b91c1c; }
    .bdg-pri-high   { background:#fef3c7; color:#92400e; }
    .bdg-pri-normal { background:#dcfce7; color:#15803d; }
    .bdg-pri-low    { background:var(--border); color:var(--text-muted); }
    .bdg-st-open        { background:#dbeafe; color:#1e40af; }
    .bdg-st-scheduled   { background:#ede9fe; color:#5b21b6; }
    .bdg-st-in_progress { background:#fef3c7; color:#92400e; }
    .bdg-st-completed   { background:#dcfce7; color:#15803d; }
    .bdg-st-cancelled   { background:var(--border); color:var(--text-muted); }
    .badge-xs { font-size:.68rem; padding:2px 8px; border-radius:100px; font-weight:600; display:inline-block; }
    /* ── Assignee picker ── */
    .picker-btn { display:flex; align-items:center; justify-content:space-between;
                  width:100%; padding:8px 12px; border:1px solid var(--border);
                  border-radius:6px; background:var(--surface); cursor:pointer;
                  font-size:.88rem; color:var(--text); }
    .picker-btn:hover { border-color:var(--brand); }
    .picker-caret { color:var(--text-muted); font-size:.7rem; margin-left:8px; }
    .picker-popup { position:fixed; inset:0; z-index:1000; }
    .picker-popup[hidden] { display:none; }
    .picker-overlay { position:absolute; inset:0; background:rgba(0,0,0,.4); }
    .picker-panel { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
                    width:420px; max-width:95vw; max-height:70vh; display:flex; flex-direction:column;
                    background:var(--surface); border-radius:10px; box-shadow:0 8px 40px rgba(0,0,0,.25);
                    overflow:hidden; }
    .picker-panel > input { margin:12px; padding:8px 12px; border:1px solid var(--border);
                            border-radius:6px; font-size:.9rem; }
    #assignee-results { flex:1; overflow-y:auto; padding:0 8px 8px; }
    .picker-row { display:flex; align-items:center; gap:10px; padding:8px 12px;
                  border-radius:6px; cursor:pointer; }
    .picker-row:hover { background:var(--brand-light); }
    .picker-avatar { width:28px; height:28px; border-radius:50%; background:var(--border);
                     display:flex; align-items:center; justify-content:center;
                     font-weight:600; font-size:.75rem; color:var(--text); object-fit:cover; }
    .picker-name { flex:1; min-width:0; }
    .picker-name .name-line { font-size:.88rem; }
    .picker-name .email-line { font-size:.72rem; color:var(--text-muted); }
    .picker-pending-pip { width:8px; height:8px; border-radius:50%; background:#f59e0b; }
    .picker-section-label { padding:10px 16px 4px; font-size:.7rem; text-transform:uppercase;
                            color:var(--text-muted); font-weight:600; letter-spacing:.05em; }
    .picker-action { margin:8px 12px 14px; padding:10px; background:var(--brand);
                     color:#fff; border:none; border-radius:6px; cursor:pointer;
                     font-weight:600; font-size:.85rem; }
    /* ── Assignee chip on WO row ── */
    .wo-assignee-chip { display:inline-flex; align-items:center; gap:5px;
                        padding:2px 8px 2px 2px; border-radius:100px;
                        background:var(--brand-light); font-size:.7rem; font-weight:600;
                        color:var(--text); }
    .wo-assignee-chip .wo-assignee-avatar { width:18px; height:18px; border-radius:50%;
                                            background:var(--border); display:inline-flex;
                                            align-items:center; justify-content:center;
                                            font-size:.62rem; font-weight:700; object-fit:cover; }
    @media(max-width:640px) { .stat-grid { grid-template-columns:repeat(2,1fr); } .form-row { flex-direction:column; } }
  </style>
</head>
<body class="os-newlayout">
<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<main class="page">
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num bad" id="s-urgent">–</div><div class="stat-label">Urgent</div></div>
    <div class="stat-card"><div class="stat-num warn" id="s-open">–</div><div class="stat-label">Open</div></div>
    <div class="stat-card"><div class="stat-num" id="s-sched">–</div><div class="stat-label">Scheduled</div></div>
    <div class="stat-card"><div class="stat-num" id="s-prog">–</div><div class="stat-label">In Progress</div></div>
  </div>

  <div class="pill-row" style="margin-bottom:16px;">
    <a class="pill active" href="/maintenance.html" style="text-decoration:none;">🛠️ Work Orders</a>
    <a class="pill" href="/lawn.html" style="text-decoration:none;">🌳 Lawn Mowing</a>
  </div>

  <div class="section-header">
    <span class="section-title">Work Orders</span>
    <button class="btn btn-primary" style="padding:8px 16px;font-size:.85rem;" onclick="openCreate()">+ New</button>
  </div>

  <div class="pill-row" id="pills">
    <button class="pill active" data-f="active">Active</button>
    <button class="pill" data-f="mine">Assigned to me</button>
    <button class="pill" data-f="open">Open</button>
    <button class="pill" data-f="scheduled">Scheduled</button>
    <button class="pill" data-f="in_progress">In Progress</button>
    <button class="pill" data-f="completed">Completed</button>
    <button class="pill" data-f="urgent">🚨 Urgent</button>
  </div>

  <div id="list"><p class="text-muted text-sm">Loading…</p></div>
</main>

<!-- Create modal -->
<div class="modal-overlay" id="modal-create">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h2>New Work Order</h2>
      <button class="modal-close" onclick="closeCreate()">✕</button>
    </div>
    <form id="create-form" onsubmit="submitCreate(event)">
      <div class="form-group">
        <label class="form-label">Property *</label>
        <input class="form-input" style="padding:8px 12px;font-size:.88rem;margin-bottom:6px;" type="search" id="c-search" placeholder="Search address, city…" oninput="filterProps(this.value)">
        <select class="form-input" id="c-prop" size="4" required style="height:auto;padding:4px 0;"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input class="form-input" id="c-title" placeholder="e.g. Kitchen sink leaking" required>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-input" id="c-desc" rows="2" style="min-height:0;resize:vertical;"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-input" id="c-cat">
            <option value="">— none —</option>
            <option value="plumbing">🚿 Plumbing</option>
            <option value="electrical">💡 Electrical</option>
            <option value="hvac">❄️ HVAC</option>
            <option value="roofing">🏠 Roofing</option>
            <option value="landscaping">🌳 Landscaping</option>
            <option value="cleaning">🧹 Cleaning</option>
            <option value="appliance">🔌 Appliance</option>
            <option value="pest">🐜 Pest Control</option>
            <option value="general">🛠️ General</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="form-input" id="c-priority">
            <option value="low">Low</option>
            <option value="normal" selected>Normal</option>
            <option value="high">High</option>
            <option value="urgent">🚨 Urgent</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Scheduled For</label>
        <input class="form-input" id="c-sched" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Assignee</label>
        <button type="button" id="c-assignee-btn" class="picker-btn" onclick="openAssigneePicker('c')">
          <span id="c-assignee-display" style="color:var(--text-muted);">Unassigned</span>
          <span class="picker-caret">▾</span>
        </button>
        <input type="hidden" id="c-assigned-user-id" value="">
      </div>
      <p id="c-err" class="text-sm mt-8" style="color:var(--danger);display:none;"></p>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" style="padding:10px 18px;font-size:.88rem;" onclick="closeCreate()">Cancel</button>
        <button type="submit" class="btn btn-primary" style="padding:10px 18px;font-size:.88rem;" id="c-save">Create</button>
      </div>
    </form>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h2>Edit Work Order</h2>
      <button class="modal-close" onclick="closeEdit()">✕</button>
    </div>
    <form id="edit-form" onsubmit="submitEdit(event)">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input class="form-input" id="e-title" required>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-input" id="e-desc" rows="2" style="min-height:0;resize:vertical;"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-input" id="e-cat">
            <option value="">— none —</option>
            <option value="plumbing">🚿 Plumbing</option>
            <option value="electrical">💡 Electrical</option>
            <option value="hvac">❄️ HVAC</option>
            <option value="roofing">🏠 Roofing</option>
            <option value="landscaping">🌳 Landscaping</option>
            <option value="cleaning">🧹 Cleaning</option>
            <option value="appliance">🔌 Appliance</option>
            <option value="pest">🐜 Pest Control</option>
            <option value="general">🛠️ General</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="form-input" id="e-priority">
            <option value="low">Low</option>
            <option value="normal">Normal</option>
            <option value="high">High</option>
            <option value="urgent">🚨 Urgent</option>
          </select>

      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Status</label>

            <option value="open">Open</option>
            <option value="scheduled">Scheduled</option>

        </div>
        <div class="form-group">

          <input class="form-input" id="e-sched" type="date">

      </div>
      <div class="form-group">
        <label class="form-label">Assignee</label>
        <button type="button" id="e-assignee-btn" class="picker-btn" onclick="openAssigneePicker('e')">

          <span class="picker-caret">▾</span>
        </button>
        <input type="hidden" id="e-assigned-user-id" value="">
      </div>
      <div class="form-group">
        <label class="form-label">Photos</label>
        <div class="text-xs text-muted" style="margin:-4px 0 6px;">Saved to FieldCam under the property's Maintenance folder.</div>
        <div id="e-photos" style="display:flex;flex-wrap:wrap;gap:6px;min-height:32px;"></div>
        <input type="file" accept="image/*,video/*" id="e-photo-input" multiple style="display:none;" onchange="uploadWoPhotos(this.files)">

      <div class="modal-footer">

        <button type="button" class="btn btn-secondary" style="padding:10px 18px;font-size:.88rem;" onclick="closeEdit()">Cancel</button>
        <button type="submit" class="btn btn-primary" style="padding:10px 18px;font-size:.88rem;" id="e-save">Save</button>

    </form>
  </div>
</div>

<!-- Invite external worker modal -->
<div id="invite-external-modal" class="picker-popup" hidden>
  <div class="picker-overlay" onclick="closeInviteExternalModal()"></div>
  <div class="picker-panel" style="width:380px;">
    <h3 style="margin:14px 16px 4px;font-size:1rem;">Invite external worker</h3>
    <p class="text-muted text-sm" style="margin:0 16px 12px;">

<!-- Assignee picker popup -->
<div id="assignee-picker" class="picker-popup" hidden>
  <div class="picker-overlay" onclick="closeAssigneePicker()"></div>
  <div class="picker-panel">
    <input id="assignee-search" type="text" placeholder="Search by name or email…">
    <div id="assignee-results"></div>
    <button type="button" class="picker-action" onclick="openInviteExternalModal()">
      ➕ Invite external worker…
    </button>
  </div>
</div>

<script>window.NAV_CURRENT = 'maintenance';</script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
  const CAT_ICONS = {plumbing:'🚿',electrical:'💡',hvac:'❄️',roofing:'🏠',landscaping:'🌳',cleaning:'🧹',appliance:'🔌',pest:'🐜',general:'🛠️',other:'📋'};
  const STATUS_LBL = {open:'Open',scheduled:'Scheduled',in_progress:'In Progress',completed:'Completed',cancelled:'Cancelled'};
  const PRI_LBL = {low:'Low',normal:'Normal',high:'High',urgent:'Urgent'};
  let allOrders = [], propsCache = [], currentFilter = 'active';
  let currentUser = null, assignableUsers = [], pickerTarget = null, editingWoId = null;

  async function init() {
    currentUser = await requireAuth(); if (!currentUser) return;
    await Promise.all([loadOrders(), loadProps(), loadAssignableUsers()]);
    consumePendingWO();
    // Only filter pills under #pills (the WO-status row) drive currentFilter —
    // the "Work Orders / Lawn Mowing" row above is plain links, not pills.
    document.getElementById('pills').addEventListener('click', e => {
      const pill = e.target.closest('.pill'); if (!pill) return;
      document.querySelectorAll('#pills .pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentFilter = pill.dataset.f;
      render();
    });
    document.getElementById('assignee-search').addEventListener('input',
      e => renderAssigneeResults(e.target.value));
  }

  async function loadAssignableUsers() {
    try { assignableUsers = await apiFetch('/api/maintenance/assignable-users'); }
    catch (e) { assignableUsers = []; }
  }

  async function loadOrders() {
    try {
      allOrders = await satelliteApiFetch('maintenance', '/api/work-orders');
      stats(); render();
    } catch(e) {
      document.getElementById('list').innerHTML = `<p class="text-muted text-sm">Could not load work orders: ${escHtml(e.message)}</p>`;
    }
  }

  async function loadProps() {
    try { propsCache = await getProperties(); renderPropOpts(propsCache); } catch(e) {}
  }

  function renderPropOpts(list) {
    const sel = document.getElementById('c-prop');
    sel.innerHTML = list.length
      ? list.map(p => `<option value="${p.id}">${escHtml(p.display_name||p.address_line1)}${p.unit?' #'+escHtml(p.unit):''}, ${escHtml(p.city||'')}</option>`).join('')
      : '<option disabled>No properties</option>';
  }
  function filterProps(q) {
    q = (q||'').toLowerCase();
    renderPropOpts(q ? propsCache.filter(p => [p.address_line1,p.unit,p.city,p.state,p.display_name].filter(Boolean).join(' ').toLowerCase().includes(q)) : propsCache);
  }

  function stats() {
    document.getElementById('s-urgent').textContent = allOrders.filter(o => o.priority==='urgent'&&['open','scheduled','in_progress'].includes(o.status)).length;
    document.getElementById('s-open').textContent   = allOrders.filter(o => o.status==='open').length;
    document.getElementById('s-sched').textContent  = allOrders.filter(o => o.status==='scheduled').length;
    document.getElementById('s-prog').textContent   = allOrders.filter(o => o.status==='in_progress').length;
  }

  function render() {
    let rows = allOrders;
    if (currentFilter==='active')      rows = rows.filter(o => ['open','scheduled','in_progress'].includes(o.status));
    else if (currentFilter==='mine')   rows = rows.filter(o => o.assigned_user_id === currentUser?.id);
    else if (currentFilter==='urgent') rows = rows.filter(o => o.priority==='urgent'&&!['completed','cancelled'].includes(o.status));
    else rows = rows.filter(o => o.status===currentFilter);

    const el = document.getElementById('list');
    if (!rows.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🎉</div><p>Nothing here — all clear!</p></div>`;
      return;
    }
    el.innerHTML = `<div class="wo-list">${rows.map(o => `
      <div class="wo-row pri-${o.priority}" onclick="openEdit('${o.id}')">
        <div class="wo-icon">${CAT_ICONS[o.category]||'🛠️'}</div>
        <div class="wo-body">
          <div class="wo-title">${escHtml(o.title)}</div>
          <div class="wo-sub">${escHtml(o.display_name||o.address_line1||'')}${o.city?' · '+escHtml(o.city)+', '+escHtml(o.state||''):''}</div>
          <div class="wo-tags">
            <span class="badge-xs bdg-st-${o.status}">${STATUS_LBL[o.status]||o.status}</span>
            <span class="badge-xs bdg-pri-${o.priority}">${PRI_LBL[o.priority]||o.priority}</span>
            ${assigneeChipHtml(o)}
            ${o.scheduled_for?`<span class="badge-xs" style="background:var(--bg);color:var(--text-muted);">📅 ${new Date(o.scheduled_for).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>`:''}
            ${o.update_count>0?`<span class="badge-xs" style="background:var(--bg);color:var(--text-muted);">💬 ${o.update_count}</span>`:''}
          </div>
        </div>
        <div style="color:var(--text-muted);font-size:1rem;flex-shrink:0;align-self:center;">›</div>
      </div>`).join('')}</div>`;
  }

  function assigneeChipHtml(o) {
    if (!o.assigned_user_id) {
      return `<span class="badge-xs" style="background:var(--bg);color:var(--text-muted);">Unassigned</span>`;
    }
    const u = assignableUsers.find(x => x.id === o.assigned_user_id);
    const name = u ? (u.full_name || u.email) : (o.assigned_user_name || 'Assigned');
    const first = name.split(' ')[0];
    const initial = (name[0] || '?').toUpperCase();
    const avatar = u?.avatar_url
      ? `<img class="wo-assignee-avatar" src="${escHtml(u.avatar_url)}">`
      : `<span class="wo-assignee-avatar">${escHtml(initial)}</span>`;
    return `<span class="wo-assignee-chip" title="${escHtml(name)}">${avatar}${escHtml(first)}</span>`;
  }

  // ── Edit modal ──
  async function openEdit(id) {
    const wo = allOrders.find(o => o.id === id);
    if (!wo) return;
    editingWoId = id;
    document.getElementById('e-title').value = wo.title || '';
    document.getElementById('e-desc').value  = wo.description || '';
    document.getElementById('e-cat').value   = wo.category || '';
    document.getElementById('e-priority').value = wo.priority || 'normal';
    document.getElementById('e-status').value   = wo.status || 'open';
    document.getElementById('e-sched').value    = wo.scheduled_for ? wo.scheduled_for.split('T')[0] : '';
    setAssigneeDisplay('e', wo.assigned_user_id);
    document.getElementById('e-err').style.display = 'none';
    document.getElementById('e-photo-status').textContent = '';
    document.getElementById('e-photos').innerHTML = '<span class="text-muted text-xs">Loading…</span>';
    document.getElementById('modal-edit').classList.add('open');
    loadWoPhotos(id);
  }

  // ── Work-order photos (FieldCam → property's "Maintenance" folder) ──
  async function loadWoPhotos(id) {
    const wrap = document.getElementById('e-photos');
    try {
      const photos = await apiFetch('/api/maintenance/work-orders/' + id + '/photos');
      if (!photos.length) {
        wrap.innerHTML = '<span class="text-muted text-xs">No photos yet.</span>';
        return;
      }
      wrap.innerHTML = photos.map(p => {
        const isVideo = (p.media_type || '').toLowerCase() === 'video';
        return `<a href="${escHtml(p.url)}" target="_blank" rel="noopener" title="${escHtml(p.notes || '')}" style="display:inline-block;width:72px;height:72px;border-radius:8px;overflow:hidden;background:var(--bg);border:1px solid var(--border);">
          ${isVideo
            ? `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;background:#000;color:#fff;">▶</div>`
            : `<img src="${escHtml(p.url)}" alt="" style="width:100%;height:100%;object-fit:cover;">`}
        </a>`;
      }).join('');
    } catch (e) {
      wrap.innerHTML = `<span class="text-muted text-xs">Could not load photos: ${escHtml(e.message)}</span>`;
    }
  }

  async function uploadWoPhotos(files) {
    if (!editingWoId || !files || !files.length) return;
    const status = document.getElementById('e-photo-status');
    const list = Array.from(files);
    let ok = 0, failed = 0;
    status.textContent = `Uploading 1 of ${list.length}…`;
    for (let i = 0; i < list.length; i++) {
      status.textContent = `Uploading ${i + 1} of ${list.length}…`;
      const fd = new FormData();
      fd.append('photo', list[i]);
      try {
        await apiFetch('/api/maintenance/work-orders/' + editingWoId + '/photos', { method: 'POST', body: fd });
        ok++;
      } catch (e) {
        failed++;
        console.error('photo upload failed:', e);
      }
    }
    status.textContent = failed
      ? `${ok} uploaded · ${failed} failed`
      : `${ok} uploaded ✓`;
    document.getElementById('e-photo-input').value = '';
    await loadWoPhotos(editingWoId);
  }
  function closeEdit() { document.getElementById('modal-edit').classList.remove('open'); editingWoId = null; }
  document.getElementById('modal-edit').addEventListener('click', e => { if (e.target===e.currentTarget) closeEdit(); });

  async function submitEdit(e) {
    e.preventDefault();
    const body = {
      title:       document.getElementById('e-title').value.trim(),
      description: document.getElementById('e-desc').value.trim(),
      category:    document.getElementById('e-cat').value || null,
      priority:    document.getElementById('e-priority').value,
      status:      document.getElementById('e-status').value,
      scheduled_for: document.getElementById('e-sched').value || null,
      assigned_user_id: document.getElementById('e-assigned-user-id').value || null
    };
    const errEl = document.getElementById('e-err'); errEl.style.display='none';
    const btn = document.getElementById('e-save'); btn.disabled=true; btn.textContent='Saving…';
    try {
      await apiFetch('/api/maintenance/work-orders/' + editingWoId,
        { method:'PATCH', body: JSON.stringify(body) });
      closeEdit();
      await loadOrders();
      showToast('Work order saved');
    } catch (err) { errEl.textContent = err.message; errEl.style.display='block'; }
    finally { btn.disabled=false; btn.textContent='Save'; }
  }

  async function confirmDeleteWo() {
    if (!confirm('Delete this work order? Updates will be deleted too.')) return;
    try {
      await apiFetch('/api/maintenance/work-orders/' + editingWoId, { method: 'DELETE' });
      closeEdit();
      await loadOrders();
      showToast('Work order deleted');
    } catch (e) { showToast(e.message, 'error'); }
  }

  // ── Assignee picker (shared between Create and Edit modals) ──
  function openAssigneePicker(target) {
    pickerTarget = target; // 'c' or 'e'
    document.getElementById('assignee-picker').hidden = false;
    document.getElementById('assignee-search').value = '';
    document.getElementById('assignee-search').focus();
    renderAssigneeResults('');
  }
  function closeAssigneePicker() {
    document.getElementById('assignee-picker').hidden = true;
    pickerTarget = null;
  }

  function renderAssigneeResults(needle) {
    const n = (needle || '').toLowerCase();
    const match = (u) => !n
      || (u.full_name || '').toLowerCase().includes(n)
      || (u.email || '').toLowerCase().includes(n);
    const team = assignableUsers.filter(u => u.user_type === 'team' && match(u));
    const ext  = assignableUsers.filter(u => u.user_type === 'external_worker' && match(u));
    const row = (u) => {
      const initial = ((u.full_name || u.email || '?')[0] || '?').toUpperCase();
      const avatar = u.avatar_url
        ? `<img class="picker-avatar" src="${escHtml(u.avatar_url)}">`
        : `<span class="picker-avatar">${escHtml(initial)}</span>`;
      const pending = !u.is_active ? '<span class="picker-pending-pip" title="Pending invite"></span>' : '';
      return `<div class="picker-row" data-uid="${escHtml(u.id)}" onclick="selectAssignee(this)">
        ${avatar}
        <div class="picker-name">
          <div class="name-line">${escHtml(u.full_name || u.email)}</div>
          <div class="email-line">${escHtml(u.email)}</div>
        </div>
        ${pending}
      </div>`;
    };
    const clearRow = `<div class="picker-row" data-uid="" onclick="selectAssignee(this)">
      <span class="picker-avatar" style="background:transparent;color:var(--text-muted);">∅</span>
      <div class="picker-name"><div class="name-line" style="color:var(--text-muted);">Unassigned</div></div>
    </div>`;
    const html = [
      clearRow,
      team.length ? `<div class="picker-section-label">Team</div>${team.map(row).join('')}` : '',
      ext.length  ? `<div class="picker-section-label">External workers</div>${ext.map(row).join('')}` : '',
      (!team.length && !ext.length && n) ? '<div class="text-muted text-sm" style="padding:14px;">No matches.</div>' : ''
    ].join('');
    document.getElementById('assignee-results').innerHTML = html;
  }

  function selectAssignee(rowEl) {
    const uid = rowEl.dataset.uid;
    setAssigneeDisplay(pickerTarget, uid);
    closeAssigneePicker();
  }

  function setAssigneeDisplay(target, uid) {
    const idInput   = document.getElementById(target + '-assigned-user-id');
    const displayEl = document.getElementById(target + '-assignee-display');
    if (!uid) {
      idInput.value = '';
      displayEl.textContent = 'Unassigned';
      displayEl.style.color = 'var(--text-muted)';
      return;
    }
    const u = assignableUsers.find(x => x.id === uid);
    idInput.value = uid;
    displayEl.textContent = u ? (u.full_name || u.email) : 'Assigned';
    displayEl.style.color = '';
  }

  function openInviteExternalModal() {
    // Inviting auto-assigns the new user to the WO, which requires an
    // existing WO id. If we're in the Create modal (no WO yet), tell the
    // user to save first.
    if (pickerTarget === 'c' || !editingWoId) {
      closeAssigneePicker();
      showToast('Save the work order first, then invite from Edit.', 'error');
      return;
    }
    closeAssigneePicker();
    document.getElementById('invite-external-modal').hidden = false;
    document.getElementById('invite-ext-name').value = '';
    document.getElementById('invite-ext-email').value = '';
    document.getElementById('invite-ext-error').style.display = 'none';
    setTimeout(() => document.getElementById('invite-ext-name').focus(), 0);
  }
  function closeInviteExternalModal() {
    document.getElementById('invite-external-modal').hidden = true;
  }

  async function submitInviteExternal() {
    const name  = document.getElementById('invite-ext-name').value.trim();
    const email = document.getElementById('invite-ext-email').value.trim();
    const errEl = document.getElementById('invite-ext-error');
    errEl.style.display = 'none';
    if (!name || !email) {
      errEl.textContent = 'Name and email required.';
      errEl.style.display = 'block'; return;
    }
    if (!editingWoId) {
      errEl.textContent = 'Save the work order first.';
      errEl.style.display = 'block'; return;
    }
    const btn = document.getElementById('invite-ext-submit');
    btn.disabled = true; btn.textContent = 'Sending…';
    try {
      const r = await apiFetch(
        `/api/maintenance/work-orders/${editingWoId}/invite-external-worker`,
        { method: 'POST', body: JSON.stringify({ full_name: name, email }) }
      );
      closeInviteExternalModal();
      await loadAssignableUsers();
      setAssigneeDisplay('e', r.user.id);
      await loadOrders();
      showToast('Invite sent to ' + email);
    } catch (e) {
      const msg = (e.message || '').toLowerCase();
      if (msg.includes('team_member_exists') || msg.includes('team member')) {
        errEl.textContent = 'This email already belongs to a team member.';
      } else {
        errEl.textContent = e.message || 'Failed to send invite.';
      }
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false; btn.textContent = 'Send invite';
    }
  }

  function openCreate(prefill) {
    ['c-search','c-title','c-desc','c-sched'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
    document.getElementById('c-cat').value = '';
    document.getElementById('c-priority').value = 'normal';
    document.getElementById('c-err').style.display = 'none';
    setAssigneeDisplay('c', '');
    renderPropOpts(propsCache);
    // Accept an optional { property_id, title, description } prefill so
    // upstream apps (Inbox, Pulse) can hand off "Create work order" without
    // duplicating the form.
    if (prefill) {
      if (prefill.title)       document.getElementById('c-title').value = prefill.title;
      if (prefill.description) document.getElementById('c-desc').value  = prefill.description;
      if (prefill.property_id) document.getElementById('c-prop').value  = prefill.property_id;
    }
    document.getElementById('modal-create').classList.add('open');
  }

  // If we landed here with a pending work-order prefill from another app
  // (Inbox "Create work order", Pulse "+"), open the modal pre-populated.
  function consumePendingWO() {
    let pending = null;
    try { pending = sessionStorage.getItem('propspot_pending_wo'); } catch (e) {}
    if (!pending) return;
    try { sessionStorage.removeItem('propspot_pending_wo'); } catch (e) {}
    let parsed;
    try { parsed = JSON.parse(pending); } catch (e) { return; }
    // Defer until propsCache populates so the property select can match.
    const tryOpen = () => {
      if (!propsCache || !propsCache.length) return setTimeout(tryOpen, 100);
      openCreate(parsed);
    };
    tryOpen();
  }
  function closeCreate() { document.getElementById('modal-create').classList.remove('open'); }
  document.getElementById('modal-create').addEventListener('click', e => { if(e.target===e.currentTarget) closeCreate(); });

  async function submitCreate(e) {
    e.preventDefault();
    const body = {
      property_id: document.getElementById('c-prop').value,
      title:       document.getElementById('c-title').value.trim(),
      description: document.getElementById('c-desc').value.trim(),
      category:    document.getElementById('c-cat').value||null,
      priority:    document.getElementById('c-priority').value,
      scheduled_for: document.getElementById('c-sched').value||null,
      assigned_user_id: document.getElementById('c-assigned-user-id').value || null
    };
    const errEl = document.getElementById('c-err'); errEl.style.display='none';
    const btn = document.getElementById('c-save'); btn.disabled=true; btn.textContent='Creating…';
    try {
      await satelliteApiFetch('maintenance', '/api/work-orders', {method:'POST',body:JSON.stringify(body)});
      closeCreate(); await loadOrders(); showToast('Work order created');
    } catch(err) { errEl.textContent=err.message; errEl.style.display='block'; }
    finally { btn.disabled=false; btn.textContent='Create'; }
  }

  init();
</script>
</body>
</html>
