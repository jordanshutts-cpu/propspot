<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Holdings Desk</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="style.css">
  <script>document.documentElement.classList.add('page-loading');try{var _c=document.documentElement.classList;if(localStorage.sidebar_collapsed==='1')_c.add('sidebar-collapsed');var _t=localStorage.getItem('propspot_theme');_c.add('theme-premium');if(_t==='dark')_c.add('theme-dark');}catch(e){}</script>
  <style>
    .chip-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
    .chip { font-size:.78rem; padding:5px 12px; border-radius:100px; background:var(--surface); color:var(--text-muted); border:1.5px solid var(--border); cursor:pointer; font-weight:500; transition:all .12s; }
    .chip:hover { border-color:var(--brand); color:var(--brand); }
    .chip.active { background:var(--brand); color:#fff; border-color:var(--brand); font-weight:600; }
    /* ── Holding list ── */
    .hd-list { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
    .hd-row { display:flex; gap:14px; align-items:center; padding:14px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
    .hd-row:last-child { border-bottom:none; }
    .hd-row:hover { background:var(--brand-light); }
    .hd-icon { font-size:1.6rem; flex-shrink:0; width:38px; text-align:center; }
    .hd-body { flex:1; min-width:0; }
    .hd-name { font-weight:700; font-size:.95rem; margin-bottom:2px; }
    .hd-prop { font-size:.78rem; color:var(--text-muted); }
    .hd-right { text-align:right; flex-shrink:0; }
    .hd-amount { font-weight:700; font-size:.95rem; color:var(--text); }
    .hd-freq { font-size:.72rem; color:var(--text-muted); }
    .due-badge { display:inline-block; font-size:.68rem; padding:2px 8px; border-radius:100px; font-weight:600; margin-top:4px; }
    .due-overdue { background:#fee2e2; color:#b91c1c; }
    .due-soon7   { background:#fef3c7; color:#92400e; }
    .due-soon30  { background:#ede9fe; color:#5b21b6; }
    .due-ok      { background:var(--brand-light); color:var(--brand); }
    .due-none    { background:var(--border); color:var(--text-muted); }
    /* ── Modal ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500; align-items:flex-end; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--surface); border-radius:var(--radius) var(--radius) 0 0; box-shadow:0 -4px 40px rgba(0,0,0,.18); width:100%; max-width:540px; max-height:90vh; overflow-y:auto; padding:24px; }
    .modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .modal-head h2 { font-size:1.1rem; font-weight:700; margin:0; }
    .modal-close { background:var(--bg); border:none; border-radius:8px; width:32px; height:32px; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; color:var(--text-muted); }
    .modal-close:hover { color:var(--text); background:var(--border); }
    .form-row { display:flex; gap:12px; }
    .form-row .form-group { flex:1; }
    .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }
    @media(max-width:480px) { .form-row { flex-direction:column; } }
  </style>
</head>
<body class="os-newlayout">
<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<main class="page">
  <div id="hd-hero-root"></div>

  <div class="chip-row" id="cat-chips"></div>
  <div class="chip-row" id="due-chips"></div>

  <div class="os-section-head">
    <div class="os-section-title" id="count-lbl">Holdings</div>
    <div class="os-section-line"></div>
  </div>

  <div id="list"><p class="text-muted text-sm">Loading…</p></div>
</main>

<!-- Add holding modal -->
<div class="modal-overlay" id="modal-add">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h2>Add Holding</h2>
      <button class="modal-close" onclick="closeAdd()">✕</button>
    </div>
    <form id="add-form" onsubmit="submitAdd(event)">
      <div class="form-group">
        <label class="form-label">Property *</label>
        <select class="form-input" id="a-prop" required></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category *</label>
          <select class="form-input" id="a-cat" required></select>
        </div>
        <div class="form-group">
          <label class="form-label">Frequency</label>
          <select class="form-input" id="a-freq">
            <option value="monthly" selected>Monthly</option>
            <option value="quarterly">Quarterly</option>
            <option value="semi_annual">Semi-Annual</option>
            <option value="annual">Annual</option>
            <option value="one_time">One Time</option>
            <option value="as_needed">As Needed</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Name / Label *</label>
        <input class="form-input" id="a-name" placeholder="e.g. City Power & Water" required>
      </div>
      <div class="form-group">
        <label class="form-label">Vendor / Provider</label>
        <input class="form-input" id="a-vendor" placeholder="e.g. Duke Energy">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Amount ($)</label>
          <input class="form-input" id="a-amount" type="number" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label class="form-label">Next Due Date</label>
          <input class="form-input" id="a-due" type="date">
        </div>
      </div>
      <p id="a-err" class="text-sm mt-8" style="color:var(--danger);display:none;"></p>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" style="padding:10px 18px;font-size:.88rem;" onclick="closeAdd()">Cancel</button>
        <button type="submit" class="btn btn-primary" style="padding:10px 18px;font-size:.88rem;" id="a-save">Add Holding</button>
      </div>
    </form>
  </div>
</div>

<script>window.NAV_CURRENT = 'holdings-desk';</script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
  const CATS = [
    ['mortgage','Mortgage','🏦'],['insurance','Insurance','🛡️'],['utility','Utilities','💡'],
    ['tax','Taxes','🏛️'],['hoa','HOA','🏘️'],['subscription','Subscription','📋'],
    ['loan','Loan','💰'],['license','License','📄'],['other','Other','📦'],
  ];
  const FREQ_LBL = {monthly:'/ mo',quarterly:'/ qtr',semi_annual:'/ 6mo',annual:'/ yr',one_time:'one time',as_needed:'as needed'};
  const CAT_MAP  = Object.fromEntries(CATS.map(([k,l,i]) => [k, {label:l, icon:i}]));
  let allItems = [], allProps = [], catF = 'all', dueF = 'all';

  function dueBadge(d) {
    if (!d) return {cls:'due-none', lbl:'No due date'};
    const diff = Math.round((new Date(d).setHours(0,0,0,0) - new Date().setHours(0,0,0,0)) / 86400000);
    if (diff < 0)   return {cls:'due-overdue', lbl:`${Math.abs(diff)}d overdue`};
    if (diff <= 7)  return {cls:'due-soon7',   lbl:`Due in ${diff}d`};
    if (diff <= 30) return {cls:'due-soon30',  lbl:`Due ${new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'})}`};
    return {cls:'due-ok', lbl: new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'})};
  }

  async function init() {
    const me = await requireAuth(); if (!me) return;
    document.getElementById('a-cat').innerHTML = CATS.map(([k,l,i]) => `<option value="${k}">${i} ${l}</option>`).join('');
    try {
      [allItems, allProps] = await Promise.all([
        satelliteApiFetch('holdings', '/api/holdings/items'),
        getProperties(),
      ]);
    } catch(e) {
      document.getElementById('list').innerHTML = `<p class="text-muted text-sm">Error: ${escHtml(e.message)}</p>`; return;
    }
    document.getElementById('a-prop').innerHTML = allProps.map(p =>
      `<option value="${p.id}">${escHtml(p.display_name||p.address_line1)}, ${escHtml(p.city||'')}</option>`).join('');
    renderChips(); render();
  }

  function renderChips() {
    document.getElementById('cat-chips').innerHTML =
      [['all','All','📋'], ...CATS].map(([k,l,i]) =>
        `<span class="chip ${catF===k?'active':''}" onclick="setCat('${k}')">${i} ${l}</span>`).join('');
    document.getElementById('due-chips').innerHTML =
      [['all','All'],['overdue','⚠️ Overdue'],['due-7d','Due ≤ 7d'],['due-30d','Due ≤ 30d']].map(([k,l]) =>
        `<span class="chip ${dueF===k?'active':''}" onclick="setDue('${k}')">${l}</span>`).join('');
  }

  function setCat(c) { catF=c; renderChips(); render(); }
  function setDue(d) { dueF=d; renderChips(); render(); }

  function passesDue(item) {
    if (dueF==='all') return true;
    if (!item.next_due_date) return false;
    const diff = Math.round((new Date(item.next_due_date).setHours(0,0,0,0) - new Date().setHours(0,0,0,0)) / 86400000);
    return dueF==='overdue' ? diff<0 : dueF==='due-7d' ? diff>=0&&diff<=7 : diff>=0&&diff<=30;
  }

  function renderHero() {
    // Roll up portfolio carry across all items (not just filtered)
    let monthlyTotal = 0, overdueCount = 0, dueSoonCount = 0, dueAmt = 0;
    const today = new Date().setHours(0,0,0,0);
    for (const i of allItems) {
      const a = Number(i.amount || 0);
      const f = (i.frequency || '').toLowerCase();
      if (a) {
        if      (f === 'monthly')      monthlyTotal += a;
        else if (f === 'quarterly')    monthlyTotal += a / 3;
        else if (f === 'semi_annual')  monthlyTotal += a / 6;
        else if (f === 'annual')       monthlyTotal += a / 12;
      }
      if (i.next_due_date) {
        const diff = Math.round((new Date(i.next_due_date).setHours(0,0,0,0) - today) / 86400000);
        if (diff < 0)        { overdueCount++; dueAmt += a; }
        else if (diff <= 7)  { dueSoonCount++; dueAmt += a; }
      }
    }
    const fmtCarry = n => n > 0 ? '$' + Math.round(n).toLocaleString() : '—';
    const fmtDueAmt = n => n > 0 ? '$' + Math.round(n).toLocaleString() : '—';

    document.getElementById('hd-hero-root').innerHTML = `
      <section class="os-hero">
        <div class="os-hero-eyebrow">Holdings Desk</div>
        <h1 class="os-hero-title">Carry &amp; Recurring Costs</h1>
        <div class="os-hero-subtitle">${allItems.length} ${allItems.length === 1 ? 'holding' : 'holdings'} tracked across the portfolio · ${overdueCount} overdue · ${dueSoonCount} due in 7 days</div>
        <div class="os-hero-actions" style="margin: 0 0 16px;">
          <button class="btn btn-primary" style="padding:8px 16px;font-size:.85rem;" onclick="openAdd()">+ Add Holding</button>
        </div>
        <div class="os-kpi-row">
          <div class="os-kpi">
            <div class="os-kpi-label">Monthly Carry</div>
            <div class="os-kpi-value brand">${fmtCarry(monthlyTotal)}</div>
            <div class="os-kpi-sub">all recurring rolled up</div>
          </div>
          <div class="os-kpi">
            <div class="os-kpi-label">Annual Carry</div>
            <div class="os-kpi-value">${fmtCarry(monthlyTotal * 12)}</div>
            <div class="os-kpi-sub">projected 12-month</div>
          </div>
          <div class="os-kpi">
            <div class="os-kpi-label">Overdue</div>
            <div class="os-kpi-value ${overdueCount > 0 ? 'danger' : ''}">${overdueCount}</div>
            <div class="os-kpi-sub">${overdueCount > 0 ? 'need attention' : 'all clear'}</div>
          </div>
          <div class="os-kpi">
            <div class="os-kpi-label">Due ≤ 7 days</div>
            <div class="os-kpi-value ${dueSoonCount > 0 ? 'warn' : ''}">${dueSoonCount}</div>
            <div class="os-kpi-sub">${fmtDueAmt(dueAmt)} owed</div>
          </div>
        </div>
      </section>
    `;
  }

  function render() {
    renderHero();
    const filtered = allItems.filter(i => (catF==='all'||i.category===catF) && passesDue(i));
    document.getElementById('count-lbl').textContent = `${filtered.length} ${filtered.length === 1 ? 'holding' : 'holdings'} matching filters`;
    const el = document.getElementById('list');
    if (!filtered.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">💼</div><p>No holdings match.</p><button class="btn btn-primary" onclick="openAdd()">+ Add Holding</button></div>`;
      return;
    }
    el.innerHTML = `<div class="hd-list">${filtered.map(item => {
      const badge = dueBadge(item.next_due_date);
      const icon  = (CAT_MAP[item.category]||{icon:'📦'}).icon;
      return `<div class="hd-row" onclick="openDetail('${item.id}')">
        <div class="hd-icon">${icon}</div>
        <div class="hd-body">
          <div class="hd-name">${escHtml(item.name)}</div>
          <div class="hd-prop">${escHtml(item.property_display_name||item.property_address||'—')}${item.property_city?' · '+escHtml(item.property_city):''}</div>
          ${item.vendor?`<div class="hd-prop">${escHtml(item.vendor)}</div>`:''}
        </div>
        <div class="hd-right">
          ${item.amount!=null?`<div class="hd-amount">$${Number(item.amount).toLocaleString()}</div><div class="hd-freq">${FREQ_LBL[item.frequency]||item.frequency}</div>`:`<div class="hd-freq">${FREQ_LBL[item.frequency]||item.frequency||'—'}</div>`}
          <span class="due-badge ${badge.cls}">${badge.lbl}</span>
        </div>
        <div style="color:var(--text-muted);flex-shrink:0;">›</div>
      </div>`;
    }).join('')}</div>`;
  }

  async function openDetail(id) {
    window.location.href = await satellitePageUrl('holdings', '/item.html?id='+id);
  }

  function openAdd() {
    ['a-name','a-vendor','a-amount','a-due'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
    document.getElementById('a-freq').value = 'monthly';
    document.getElementById('a-err').style.display = 'none';
    document.getElementById('modal-add').classList.add('open');
  }
  function closeAdd() { document.getElementById('modal-add').classList.remove('open'); }
  document.getElementById('modal-add').addEventListener('click', e => { if(e.target===e.currentTarget) closeAdd(); });

  async function submitAdd(e) {
    e.preventDefault();
    const body = {
      property_id:   document.getElementById('a-prop').value,
      category:      document.getElementById('a-cat').value,
      name:          document.getElementById('a-name').value.trim(),
      vendor:        document.getElementById('a-vendor').value.trim()||null,
      frequency:     document.getElementById('a-freq').value,
      amount:        document.getElementById('a-amount').value ? Number(document.getElementById('a-amount').value) : null,
      next_due_date: document.getElementById('a-due').value||null,
    };
    const errEl=document.getElementById('a-err'); errEl.style.display='none';
    const btn=document.getElementById('a-save'); btn.disabled=true; btn.textContent='Saving…';
    try {
      await satelliteApiFetch('holdings', '/api/holdings/items', {method:'POST',body:JSON.stringify(body)});
      closeAdd(); allItems = await satelliteApiFetch('holdings', '/api/holdings/items');
      render(); showToast('Holding added');
    } catch(err) { errEl.textContent=err.message; errEl.style.display='block'; }
    finally { btn.disabled=false; btn.textContent='Add Holding'; }
  }

  init();
</script>
</body>
</html>
