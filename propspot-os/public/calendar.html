<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Calendar</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <script>document.documentElement.classList.add('page-loading');try{var _c=document.documentElement.classList;if(localStorage.sidebar_collapsed==='1')_c.add('sidebar-collapsed');var _t=localStorage.getItem('propspot_theme');_c.add('theme-premium');if(_t==='dark')_c.add('theme-dark');}catch(e){}</script>
  <style>
    .cal-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
    .cal-header h2 { font-size:1.2rem; font-weight:800; margin:0; min-width:200px; }
    .cal-nav-btn { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:6px 12px; cursor:pointer; font-size:.85rem; font-weight:600; color:var(--text-muted); transition:all .1s; }
    .cal-nav-btn:hover { border-color:var(--brand); color:var(--brand); }
    .cal-tabs { display:flex; gap:0; border:1.5px solid var(--border); border-radius:8px; overflow:hidden; margin-left:auto; }
    .cal-tab { padding:6px 14px; border:none; background:var(--surface); cursor:pointer; font-size:.78rem; font-weight:600; color:var(--text-muted); transition:all .1s; }
    .cal-tab:not(:last-child) { border-right:1.5px solid var(--border); }
    .cal-tab.active { background:var(--brand); color:#fff; }

    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border); overflow:hidden; }
    .cal-day-header { padding:8px; text-align:center; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--text-muted); background:var(--bg); border-bottom:1px solid var(--border); }
    .cal-day { min-height:100px; padding:4px 6px; border-bottom:1px solid var(--border); border-right:1px solid var(--border); cursor:pointer; transition:background .1s; position:relative; }
    .cal-day:nth-child(7n) { border-right:none; }
    .cal-day:hover { background:var(--brand-light); }
    .cal-day.other-month { background:var(--bg); opacity:.5; }
    .cal-day.today { background:rgba(97,183,70,.06); }
    .cal-day.today .cal-day-num { background:var(--brand); color:#fff; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; }
    .cal-day-num { font-size:.8rem; font-weight:700; margin-bottom:4px; color:var(--text); }
    .cal-event { font-size:.68rem; padding:2px 5px; border-radius:4px; margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; font-weight:500; color:#fff; }
    .cal-event:hover { opacity:.85; }
    .cal-event.type-closing { background:#dc2626; }
    .cal-event.type-purchase { background:#2563eb; }
    .cal-event.type-inspection { background:#d97706; }
    .cal-event.type-meeting { background:#7c3aed; }
    .cal-event.type-deadline { background:#0891b2; }
    .cal-event.type-general { background:#6b7280; }
    .cal-more { font-size:.65rem; color:var(--text-muted); padding:1px 4px; cursor:pointer; }

    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--surface); border-radius:var(--radius); box-shadow:0 8px 40px rgba(0,0,0,.2); width:100%; max-width:480px; max-height:90vh; overflow-y:auto; padding:24px; }
    .modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .modal-head h2 { font-size:1.05rem; font-weight:700; margin:0; }
    .modal-close { background:var(--bg); border:none; border-radius:8px; width:32px; height:32px; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; color:var(--text-muted); }
    .modal-close:hover { color:var(--text); background:var(--border); }
    .form-row { display:flex; gap:12px; }
    .form-row .form-group { flex:1; min-width:0; }
    /* datetime-local inputs need ~280px to render "MM/DD/YYYY, HH:MM AM"
       without truncation — stack them always so the modal never has to
       horizontally scroll. */
    .form-row.form-row-dates { flex-direction: column; gap: 10px; }
    .form-row .form-input { width: 100%; min-width: 0; }
    .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:16px; }

    .event-detail { padding:16px; background:var(--bg); border-radius:8px; margin-bottom:12px; }
    .event-detail-title { font-size:1rem; font-weight:700; margin-bottom:4px; }
    .event-detail-meta { font-size:.8rem; color:var(--text-muted); }

    .personal-soon { text-align:center; padding:20px; background:var(--bg); border-radius:8px; color:var(--text-muted); font-size:.85rem; margin-top:12px; }

    .cal-nav-btn svg { display:block; width:14px; height:14px; }

    /* ── Range picker (Month / Week segmented) ── */
    .cal-range-seg { display:flex; gap:0; border:1.5px solid var(--border); border-radius:8px; overflow:hidden; }
    .cal-range-btn { padding:6px 12px; border:none; background:var(--surface); cursor:pointer;
                     font-size:.78rem; font-weight:600; color:var(--text-muted); transition:all .1s;
                     min-width:64px; text-align:center; }
    .cal-range-btn:not(:last-child) { border-right:1.5px solid var(--border); }
    .cal-range-btn.active { background:var(--text); color:var(--surface); }

    /* ── Week view ── */
    .cal-week { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow);
                border:1px solid var(--border); overflow:hidden; display:flex; flex-direction:column; }
    .cal-week-head { display:grid; grid-template-columns:56px repeat(7,1fr);
                     border-bottom:1px solid var(--border); background:var(--bg); }
    .cal-week-head-cell { padding:8px 6px; text-align:center; font-size:.7rem;
                          font-weight:700; text-transform:uppercase; letter-spacing:.04em;
                          color:var(--text-muted); border-left:1px solid var(--border); }
    .cal-week-head-cell .week-head-dow { display:block; }
    .cal-week-head-cell .week-head-date { display:block; font-size:1.1rem; font-weight:700;
                                          color:var(--text); margin-top:2px; text-transform:none; letter-spacing:0; }
    .cal-week-head-cell.today .week-head-date { background:var(--brand); color:#fff;
                                                border-radius:50%; width:28px; height:28px;
                                                display:inline-flex; align-items:center;
                                                justify-content:center; margin:2px auto 0; }
    .cal-week-allday { display:grid; grid-template-columns:56px repeat(7,1fr);
                       border-bottom:1px solid var(--border); min-height:28px; }
    .cal-week-allday-label { padding:6px 8px; font-size:.65rem; text-transform:uppercase;
                             letter-spacing:.04em; color:var(--text-muted); align-self:center;
                             border-right:1px solid var(--border); }
    .cal-week-allday-cell { border-left:1px solid var(--border); padding:3px 4px;
                            min-height:28px; cursor:pointer; }
    .cal-week-allday-cell:hover { background:var(--brand-light); }
    .cal-week-allday-event { font-size:.7rem; padding:2px 6px; border-radius:4px;
                             color:#fff; margin-bottom:2px; cursor:pointer; overflow:hidden;
                             text-overflow:ellipsis; white-space:nowrap; }
    .cal-week-body { display:grid; grid-template-columns:56px repeat(7,1fr);
                     position:relative; overflow-y:auto; max-height:calc(100vh - 320px); }
    .cal-week-times { display:flex; flex-direction:column; border-right:1px solid var(--border); }
    .cal-week-time { height:48px; font-size:.65rem; color:var(--text-muted);
                     padding:1px 6px 0 6px; text-align:right; border-bottom:1px solid var(--border);
                     position:relative; top:-7px; }
    .cal-week-col { display:flex; flex-direction:column; border-left:1px solid var(--border);
                    position:relative; cursor:pointer; }
    .cal-week-col.today { background:rgba(97,183,70,.04); }
    .cal-week-slot { height:48px; border-bottom:1px solid var(--border); }
    .cal-week-slot:hover { background:var(--brand-light); }
    .cal-week-event { position:absolute; left:3px; right:3px; padding:3px 6px;
                      border-radius:4px; color:#fff; font-size:.7rem; cursor:pointer;
                      overflow:hidden; line-height:1.2; box-shadow:0 1px 2px rgba(0,0,0,.08); }
    .cal-week-event:hover { opacity:.9; }
    .cal-week-event .week-event-time { display:block; font-size:.62rem; opacity:.85; }

    @media(max-width:768px) {
      .cal-day { min-height:60px; }
      .cal-event { font-size:.6rem; padding:1px 3px; }
      .form-row { flex-direction:column; gap:10px; }
      .modal-overlay { padding:10px; }
      .modal-box { padding:16px; max-height:94vh; }
      .modal-head { margin-bottom:12px; }
      .form-input { font-size:16px; }  /* prevent iOS zoom on focus */
      .cal-week-head-cell { padding:6px 2px; }
      .cal-week-head-cell .week-head-date { font-size:.95rem; }
      .cal-week-head-cell.today .week-head-date { width:24px; height:24px; font-size:.8rem; }
      .cal-week-body, .cal-week-head, .cal-week-allday { grid-template-columns:38px repeat(7,1fr); }
      .cal-week-event { font-size:.6rem; padding:2px 4px; }
    }
  </style>
</head>
<body class="os-newlayout">
<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<main class="page">
  <div class="section-header" style="margin-bottom:4px;">
    <span class="section-title">Calendar</span>
    <button class="btn btn-primary" style="padding:8px 16px;font-size:.85rem;" onclick="openNewEvent()">+ New Event</button>
  </div>

  <div class="cal-header">
    <button class="cal-nav-btn" onclick="prevMonth()" aria-label="Previous month" title="Previous month">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h2 id="cal-month-label"></h2>
    <button class="cal-nav-btn" onclick="nextMonth()" aria-label="Next month" title="Next month">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="cal-nav-btn" onclick="goToday()">Today</button>
    <div class="cal-range-seg" role="group" aria-label="Calendar range">
      <button class="cal-range-btn active" id="range-month" onclick="setCalRange('month')">Month</button>
      <button class="cal-range-btn" id="range-week" onclick="setCalRange('week')">Week</button>
    </div>
    <div class="cal-tabs">
      <button class="cal-tab active" id="tab-company" onclick="setCalView('company')">Company</button>
      <button class="cal-tab" id="tab-personal" onclick="setCalView('personal')">Personal</button>
    </div>
  </div>

  <div id="cal-content"></div>

  <!-- Personal: Connect Google Calendar CTA. Shown when on Personal tab
       and the user hasn't granted calendar scope yet. -->
  <div id="personal-connect" style="display:none;text-align:center;padding:32px 20px;background:var(--surface);border:1.5px dashed var(--border);border-radius:var(--radius);margin-top:12px;">
    <div style="font-size:2rem;margin-bottom:8px;">📅</div>
    <div style="font-weight:700;margin-bottom:6px;">Connect your work calendar</div>
    <div style="font-size:.85rem;color:var(--text-muted);margin-bottom:14px;max-width:380px;margin-left:auto;margin-right:auto;">
      Pull events from your Google Workspace calendar and create new ones with optional Google Meet links — all without leaving Prop Spot.
    </div>
    <button class="btn btn-primary" onclick="connectPersonalCalendar()">Connect Google Calendar</button>
  </div>
</main>

<!-- New/Edit Event modal -->
<div class="modal-overlay" id="modal-event">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h2 id="event-modal-title">New Event</h2>
      <button class="modal-close" onclick="closeEventModal()">&#10005;</button>
    </div>
    <div class="form-group">
      <label class="form-label">Title *</label>
      <input class="form-input" id="e-title" placeholder="e.g. Closing at 123 Main St" required>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-input" id="e-desc" rows="2" style="min-height:0;resize:vertical;" placeholder="Details..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Type</label>
        <select class="form-input" id="e-type">
          <option value="closing">Closing</option>
          <option value="purchase">Purchase</option>
          <option value="inspection">Inspection</option>
          <option value="meeting">Meeting</option>
          <option value="deadline">Deadline</option>
          <option value="general" selected>General</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Property (optional)</label>
        <select class="form-input" id="e-property">
          <option value="">-- None --</option>
        </select>
      </div>
    </div>
    <div class="form-row form-row-dates">
      <div class="form-group">
        <label class="form-label">Start *</label>
        <input class="form-input" id="e-start" type="datetime-local" required>
      </div>
      <div class="form-group">
        <label class="form-label">End</label>
        <input class="form-input" id="e-end" type="datetime-local">
      </div>
    </div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:6px;font-size:.85rem;">
        <input type="checkbox" id="e-allday"> All day event
      </label>
    </div>
    <div class="form-group" id="e-meet-row" style="display:none;">
      <label style="display:flex;align-items:center;gap:6px;font-size:.85rem;">
        <input type="checkbox" id="e-meet"> Add Google Meet link
      </label>
      <div style="font-size:.72rem;color:var(--text-muted);margin-top:4px;margin-left:22px;">
        Saves this event to your Google Calendar and attaches a Meet link.
      </div>
    </div>
    <p id="e-err" style="color:var(--danger);font-size:.82rem;display:none;"></p>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" style="padding:10px 18px;font-size:.88rem;" onclick="closeEventModal()">Cancel</button>
      <button type="button" class="btn btn-primary" style="padding:10px 18px;font-size:.88rem;" id="e-save" onclick="saveEvent()">Create Event</button>
    </div>
  </div>
</div>

<!-- Event detail modal -->
<div class="modal-overlay" id="modal-event-detail">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h2>Event Details</h2>
      <button class="modal-close" onclick="closeDetailModal()">&#10005;</button>
    </div>
    <div id="event-detail-content"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" style="padding:8px 14px;font-size:.8rem;color:#dc2626;" id="ed-delete" onclick="deleteEvent()">Delete</button>
      <button class="btn btn-secondary" style="padding:8px 14px;font-size:.8rem;" onclick="closeDetailModal()">Close</button>
    </div>
  </div>
</div>

<script>window.NAV_CURRENT = 'calendar';</script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
var TYPE_LABELS = {closing:'Closing',purchase:'Purchase',inspection:'Inspection',meeting:'Meeting',deadline:'Deadline',general:'General'};
var DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

var currentYear, currentMonth;
// Anchor date for Week view — always a Sunday at 00:00 local. Reset in init()
// and on goToday(). Month view ignores it and uses currentYear/currentMonth.
var currentWeekStart = null;
var currentRange = 'month'; // 'month' | 'week'
// Week view hour bounds (24h). 6 AM → 10 PM gives a tall but useful grid.
var WEEK_START_HOUR = 6;
var WEEK_END_HOUR   = 22;
var WEEK_HOUR_PX    = 48; // matches .cal-week-slot height in the stylesheet
var events = [], propsCache = [];
var calView = 'company';
var editingEventId = null, viewingEventId = null;
var personalCalendarConnected = false;

async function init() {
  var user = await requireAuth();
  if (!user) return;
  var now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  currentWeekStart = startOfWeek(now);
  try {
    propsCache = await apiFetch('/api/properties');
    var EXCLUDED = { prospect: 1, dropped: 1 };
    var actionable = propsCache.filter(function(p) { return !EXCLUDED[p.status]; });
    var sel = document.getElementById('e-property');
    sel.innerHTML = '<option value="">-- None --</option>' +
      actionable.map(function(p) { return '<option value="' + p.id + '">' + esc(p.address_line1) + ', ' + esc(p.city) + '</option>'; }).join('');
  } catch(e) {}
  // Check whether the user has connected their Google Calendar so we
  // know which UI state to show on the Personal tab + whether to offer
  // the Meet checkbox.
  try {
    var status = await apiFetch('/api/calendar/google/status');
    personalCalendarConnected = !!status.connected;
  } catch(e) { personalCalendarConnected = false; }
  // If we bounced back from a fresh connect, flip to Personal automatically.
  if (new URLSearchParams(location.search).get('personal_calendar_connected')) {
    personalCalendarConnected = true;
    setCalView('personal');
    showToast('Google Calendar connected');
  } else {
    await loadMonth();
  }
}

function setCalView(view) {
  calView = view;
  document.getElementById('tab-company').classList.toggle('active', view === 'company');
  document.getElementById('tab-personal').classList.toggle('active', view === 'personal');
  var connectPanel = document.getElementById('personal-connect');
  var grid         = document.getElementById('cal-content');
  if (view === 'personal' && !personalCalendarConnected) {
    connectPanel.style.display = '';
    grid.style.display = 'none';
  } else {
    connectPanel.style.display = 'none';
    grid.style.display = '';
    loadMonth();
  }
}

async function connectPersonalCalendar() {
  try {
    var res = await apiFetch('/api/calendar/google/connect', { method: 'POST' });
    if (res && res.url) {
      window.location.href = res.url;
    } else {
      showToast('Could not start the calendar connect flow.', 'error');
    }
  } catch (e) {
    showToast(e.message || 'Could not start connect', 'error');
  }
}

// Nav buttons are range-aware: in Month view they advance by month,
// in Week view they advance by 7 days.
function prevMonth() {
  if (currentRange === 'week') {
    var d = new Date(currentWeekStart); d.setDate(d.getDate() - 7);
    currentWeekStart = d;
  } else {
    currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  }
  loadMonth();
}
function nextMonth() {
  if (currentRange === 'week') {
    var d = new Date(currentWeekStart); d.setDate(d.getDate() + 7);
    currentWeekStart = d;
  } else {
    currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  }
  loadMonth();
}
function goToday() {
  var n = new Date();
  currentYear = n.getFullYear();
  currentMonth = n.getMonth();
  currentWeekStart = startOfWeek(n);
  loadMonth();
}

// Sunday on or before the given date, at 00:00 local time.
function startOfWeek(d) {
  var s = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  s.setDate(s.getDate() - s.getDay());
  return s;
}

function setCalRange(range) {
  currentRange = range;
  document.getElementById('range-month').classList.toggle('active', range === 'month');
  document.getElementById('range-week').classList.toggle('active', range === 'week');
  if (range === 'week' && !currentWeekStart) {
    currentWeekStart = startOfWeek(new Date());
  }
  loadMonth();
}

// ISO date string (YYYY-MM-DD) for a Date in local time.
function ymd(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// First Sunday on or before the 1st of the month, and last Saturday on or
// after the last day — the visible grid bounds.
function gridBounds(year, month) {
  var first = new Date(year, month, 1);
  var last = new Date(year, month + 1, 0);
  var start = new Date(first);
  start.setDate(first.getDate() - first.getDay());
  var end = new Date(last);
  end.setDate(last.getDate() + (6 - last.getDay()));
  return { start: start, end: end };
}

async function loadMonth() {
  var fromDate, toExclusive, label;
  if (currentRange === 'week') {
    fromDate = new Date(currentWeekStart);
    toExclusive = new Date(currentWeekStart);
    toExclusive.setDate(toExclusive.getDate() + 7);
    var lastDay = new Date(toExclusive); lastDay.setDate(lastDay.getDate() - 1);
    if (fromDate.getMonth() === lastDay.getMonth()) {
      label = MONTHS[fromDate.getMonth()] + ' ' + fromDate.getDate() + ' – ' +
              lastDay.getDate() + ', ' + lastDay.getFullYear();
    } else {
      label = MONTHS[fromDate.getMonth()] + ' ' + fromDate.getDate() + ' – ' +
              MONTHS[lastDay.getMonth()].slice(0,3) + ' ' + lastDay.getDate() + ', ' +
              lastDay.getFullYear();
    }
  } else {
    var b = gridBounds(currentYear, currentMonth);
    fromDate = b.start;
    toExclusive = new Date(b.end);
    toExclusive.setDate(toExclusive.getDate() + 1);
    label = MONTHS[currentMonth] + ' ' + currentYear;
  }
  document.getElementById('cal-month-label').textContent = label;
  var qs = '?from=' + ymd(fromDate) + '&to=' + ymd(toExclusive);
  if (calView === 'personal') qs += '&visibility=personal';
  try {
    var resp = await apiFetch('/api/calendar' + qs);
    // API now returns { events, google_warning, google_event_count }.
    // Old shape (plain array) is still tolerated for back-compat.
    events = Array.isArray(resp) ? resp : (resp.events || []);
    renderGoogleBanner(Array.isArray(resp) ? null : resp);
    renderCalendar();
  } catch(e) {
    document.getElementById('cal-content').innerHTML = '<p class="text-muted">Error loading events</p>';
  }
}

function renderGoogleBanner(resp) {
  var existing = document.getElementById('cal-google-banner');
  if (existing) existing.remove();
  if (!resp || calView !== 'personal') return;
  var msg = null;
  var kind = 'info';
  if (resp.google_warning) {
    msg = 'Couldn\'t pull events from Google: ' + resp.google_warning +
          '. Try disconnecting + reconnecting your Google Calendar in Personal Settings.';
    kind = 'error';
  } else if (resp.google_event_count === 0 && personalCalendarConnected) {
    msg = 'Connected to Google Calendar — but Google returned 0 events for this month on your primary calendar. ' +
          'If your work events live on a different Google calendar, they won\'t show here.';
    kind = 'info';
  } else if (resp.google_event_count > 0) {
    // Optional positive feedback — helpful when debugging.
    msg = 'Loaded ' + resp.google_event_count + ' event' +
          (resp.google_event_count === 1 ? '' : 's') + ' from Google Calendar.';
    kind = 'success';
  }
  if (!msg) return;
  var banner = document.createElement('div');
  banner.id = 'cal-google-banner';
  banner.style.cssText = 'margin-bottom:12px;padding:10px 14px;border-radius:6px;font-size:.85rem;' +
    (kind === 'error'   ? 'background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;' :
     kind === 'success' ? 'background:#dcfce7;color:#166534;border:1px solid #86efac;' :
                          'background:#dbeafe;color:#1e40af;border:1px solid #93c5fd;');
  banner.textContent = msg;
  var content = document.getElementById('cal-content');
  content.parentNode.insertBefore(banner, content);
}

function renderCalendar() {
  if (currentRange === 'week') { renderWeek(); return; }
  var b = gridBounds(currentYear, currentMonth);
  var today = new Date();
  var todayStr = ymd(today);

  var html = '<div class="cal-grid">';
  DAYS.forEach(function(d) { html += '<div class="cal-day-header">' + d + '</div>'; });

  // Iterate every cell in the grid (Sun..Sat for each visible week)
  var cur = new Date(b.start);
  while (cur <= b.end) {
    var dateStr = ymd(cur);
    var isToday = dateStr === todayStr;
    var isThisMonth = cur.getMonth() === currentMonth;
    var dayEvents = events.filter(function(e) { return e.start_at.split('T')[0] === dateStr; });
    var classes = 'cal-day' + (isToday ? ' today' : '') + (isThisMonth ? '' : ' other-month');
    html += '<div class="' + classes + '" onclick="openNewEvent(\'' + dateStr + '\')">';
    html += '<div class="cal-day-num">' + cur.getDate() + '</div>';
    dayEvents.slice(0, 3).forEach(function(e) {
      html += '<div class="cal-event type-' + e.event_type + '" onclick="event.stopPropagation();viewEvent(\'' + e.id + '\')" title="' + esc(e.title) + '">' + esc(e.title) + '</div>';
    });
    if (dayEvents.length > 3) html += '<div class="cal-more">+' + (dayEvents.length - 3) + ' more</div>';
    html += '</div>';
    cur.setDate(cur.getDate() + 1);
  }

  html += '</div>';
  document.getElementById('cal-content').innerHTML = html;
}

// ── Week view ─────────────────────────────────────────────────────
// 7-column day grid with an all-day strip on top and an hour grid
// below. Events are positioned absolutely within their day column
// using start-time offset + duration.
function renderWeek() {
  var weekStart = currentWeekStart;
  var today = new Date();
  var todayStr = ymd(today);

  var days = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    days.push({ date: d, ymd: ymd(d), allDay: [], timed: [] });
  }
  events.forEach(function(ev) {
    if (!ev.start_at) return;
    var dt = new Date(ev.start_at);
    var key = ymd(dt);
    for (var j = 0; j < 7; j++) {
      if (days[j].ymd === key) {
        if (ev.all_day) days[j].allDay.push(ev);
        else            days[j].timed.push(ev);
        break;
      }
    }
  });

  // Header
  var headHtml = '<div class="cal-week-head"><div></div>' +
    days.map(function(d) {
      var todayCls = d.ymd === todayStr ? ' today' : '';
      return '<div class="cal-week-head-cell' + todayCls + '">' +
               '<span class="week-head-dow">' + DAYS[d.date.getDay()] + '</span>' +
               '<span class="week-head-date">' + d.date.getDate() + '</span>' +
             '</div>';
    }).join('') + '</div>';

  // All-day strip
  var alldayHtml = '<div class="cal-week-allday">' +
    '<div class="cal-week-allday-label">All-day</div>' +
    days.map(function(d) {
      var eventsHtml = d.allDay.map(function(e) {
        return '<div class="cal-week-allday-event type-' + e.event_type + '" ' +
               'style="background:' + eventColor(e) + ';" ' +
               'onclick="event.stopPropagation();viewEvent(\'' + e.id + '\')" ' +
               'title="' + esc(e.title) + '">' + esc(e.title) + '</div>';
      }).join('');
      return '<div class="cal-week-allday-cell" onclick="openNewEvent(\'' + d.ymd + '\')">' + eventsHtml + '</div>';
    }).join('') + '</div>';

  // Hour grid body
  var hoursHtml = '<div class="cal-week-times">';
  for (var h = WEEK_START_HOUR; h < WEEK_END_HOUR; h++) {
    hoursHtml += '<div class="cal-week-time">' + formatHour(h) + '</div>';
  }
  hoursHtml += '</div>';

  var colsHtml = days.map(function(d) {
    var todayCls = d.ymd === todayStr ? ' today' : '';
    var slotsHtml = '';
    for (var h = WEEK_START_HOUR; h < WEEK_END_HOUR; h++) {
      slotsHtml += '<div class="cal-week-slot" data-hour="' + h + '"></div>';
    }
    var eventsHtml = d.timed.map(function(e) {
      var s = new Date(e.start_at);
      var en = e.end_at ? new Date(e.end_at) : new Date(s.getTime() + 60*60*1000);
      var startHour = s.getHours() + s.getMinutes() / 60;
      var endHour   = en.getHours() + en.getMinutes() / 60;
      var vStart = Math.max(WEEK_START_HOUR, startHour);
      var vEnd   = Math.min(WEEK_END_HOUR,   endHour);
      if (vEnd <= vStart) return '';
      var top    = (vStart - WEEK_START_HOUR) * WEEK_HOUR_PX;
      var height = Math.max(20, (vEnd - vStart) * WEEK_HOUR_PX - 2);
      var timeLabel = formatTimeRange(s, en);
      return '<div class="cal-week-event type-' + e.event_type + '" ' +
             'style="top:' + top + 'px;height:' + height + 'px;background:' + eventColor(e) + ';" ' +
             'onclick="event.stopPropagation();viewEvent(\'' + e.id + '\')" ' +
             'title="' + esc(e.title) + ' (' + timeLabel + ')">' +
               '<span class="week-event-time">' + timeLabel + '</span>' +
               esc(e.title) +
             '</div>';
    }).join('');
    return '<div class="cal-week-col' + todayCls + '" onclick="openWeekSlot(\'' + d.ymd + '\', event)">' +
             slotsHtml + eventsHtml +
           '</div>';
  }).join('');

  var bodyHtml = '<div class="cal-week-body">' + hoursHtml + colsHtml + '</div>';

  document.getElementById('cal-content').innerHTML =
    '<div class="cal-week">' + headHtml + alldayHtml + bodyHtml + '</div>';

  var body = document.querySelector('.cal-week-body');
  if (body) body.scrollTop = Math.max(0, (8 - WEEK_START_HOUR) * WEEK_HOUR_PX);
}

function eventColor(e) {
  var palette = {
    closing: '#dc2626', purchase: '#2563eb', inspection: '#d97706',
    meeting: '#7c3aed', deadline: '#0891b2', general: '#6b7280'
  };
  return palette[e.event_type] || palette.general;
}
function formatHour(h) {
  if (h === 0) return '12 AM';
  if (h === 12) return '12 PM';
  return (h < 12 ? h + ' AM' : (h - 12) + ' PM');
}
function formatTime(d) {
  var h = d.getHours(), m = d.getMinutes();
  var ampm = h < 12 ? 'AM' : 'PM';
  var hh = (h % 12) || 12;
  return hh + (m ? ':' + String(m).padStart(2,'0') : '') + ' ' + ampm;
}
function formatTimeRange(s, e) { return formatTime(s) + ' – ' + formatTime(e); }

function openWeekSlot(dateStr, evt) {
  var col = evt.currentTarget;
  var rect = col.getBoundingClientRect();
  var y = evt.clientY - rect.top + col.scrollTop;
  var hour = Math.max(WEEK_START_HOUR, Math.min(WEEK_END_HOUR - 1,
    WEEK_START_HOUR + Math.floor(y / WEEK_HOUR_PX)));
  openNewEvent(dateStr, hour);
}

// ── New/Edit Event
function openNewEvent(dateStr, hour) {
  editingEventId = null;
  document.getElementById('e-title').value = '';
  document.getElementById('e-desc').value = '';
  document.getElementById('e-type').value = 'general';
  document.getElementById('e-property').value = '';
  document.getElementById('e-allday').checked = false;
  document.getElementById('e-end').value = '';
  document.getElementById('e-meet').checked = false;
  // Meet checkbox only available when creating personal events AND the
  // user has connected their Google Calendar.
  document.getElementById('e-meet-row').style.display =
    (calView === 'personal' && personalCalendarConnected) ? '' : 'none';
  document.getElementById('e-err').style.display = 'none';
  document.getElementById('event-modal-title').textContent =
    calView === 'personal' ? 'New Personal Event' : 'New Event';
  document.getElementById('e-save').textContent = 'Create Event';
  if (dateStr) {
    var hh = (hour != null ? hour : 9);
    document.getElementById('e-start').value = dateStr + 'T' + String(hh).padStart(2,'0') + ':00';
  } else {
    var now = new Date();
    now.setMinutes(0); now.setSeconds(0);
    document.getElementById('e-start').value = now.toISOString().slice(0, 16);
  }
  document.getElementById('modal-event').classList.add('open');
  document.getElementById('e-title').focus();
}
function closeEventModal() { document.getElementById('modal-event').classList.remove('open'); }
document.getElementById('modal-event').addEventListener('click', function(e) { if (e.target === e.currentTarget) closeEventModal(); });

// When user picks a start time, default end to +1 hour same day (unless
// they've already typed an end time themselves).
document.getElementById('e-start').addEventListener('change', function(e) {
  var endEl = document.getElementById('e-end');
  if (endEl.value) return;        // don't clobber a manual end
  if (!e.target.value) return;
  var d = new Date(e.target.value);
  if (isNaN(d)) return;
  d.setHours(d.getHours() + 1);
  var pad = function(n) { return String(n).padStart(2, '0'); };
  endEl.value = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate())
              + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
});

async function saveEvent() {
  var title = document.getElementById('e-title').value.trim();
  if (!title) return;
  var wantMeet = document.getElementById('e-meet').checked;
  var body = {
    title: title,
    description: document.getElementById('e-desc').value.trim() || null,
    event_type: document.getElementById('e-type').value,
    // Personal tab → personal visibility. Meet implies personal + write
    // to the user's Google Calendar.
    visibility: (calView === 'personal' || wantMeet) ? 'personal' : 'company',
    start_at: document.getElementById('e-start').value,
    end_at: document.getElementById('e-end').value || null,
    all_day: document.getElementById('e-allday').checked,
    property_id: document.getElementById('e-property').value || null,
    create_meet: wantMeet
  };
  try {
    document.getElementById('e-save').disabled = true;
    if (editingEventId) {
      await apiFetch('/api/calendar/' + editingEventId, { method: 'PATCH', body: JSON.stringify(body) });
    } else {
      await apiFetch('/api/calendar', { method: 'POST', body: JSON.stringify(body) });
    }
    closeEventModal();
    await loadMonth();
  } catch(err) {
    document.getElementById('e-err').textContent = err.message;
    document.getElementById('e-err').style.display = '';
  } finally {
    document.getElementById('e-save').disabled = false;
  }
}

// ── View Event
function viewEvent(id) {
  viewingEventId = id;
  var e = events.find(function(ev) { return ev.id === id; });
  if (!e) return;
  var startDate = new Date(e.start_at);
  var timeStr = e.all_day ? 'All day' : startDate.toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
  if (e.end_at) {
    var endDate = new Date(e.end_at);
    timeStr += ' - ' + endDate.toLocaleString('en-US', { hour:'numeric', minute:'2-digit' });
  }
  var meetLink = e.meet_url
    ? '<div style="margin-top:10px;"><a href="' + esc(e.meet_url) + '" target="_blank" rel="noopener" class="btn btn-primary" style="padding:8px 14px;font-size:.85rem;">📹 Join Google Meet</a></div>'
    : '';
  var googleLink = e.html_link
    ? '<div class="event-detail-meta" style="margin-top:8px;"><a href="' + esc(e.html_link) + '" target="_blank" rel="noopener">Open in Google Calendar →</a></div>'
    : '';
  var sourceTag = e.source === 'google'
    ? '<span class="event-detail-meta" style="margin-left:8px;">· from Google Calendar</span>'
    : '';
  document.getElementById('event-detail-content').innerHTML =
    '<div class="event-detail">' +
      '<div class="cal-event type-' + e.event_type + '" style="display:inline-block;margin-bottom:8px;">' + esc(TYPE_LABELS[e.event_type] || e.event_type) + '</div>' +
      '<div class="event-detail-title">' + esc(e.title) + '</div>' +
      '<div class="event-detail-meta">' + timeStr + sourceTag + '</div>' +
      (e.property_address ? '<div class="event-detail-meta" style="margin-top:4px;">Property: ' + esc(e.property_address) + '</div>' : '') +
      (e.description ? '<div style="margin-top:8px;font-size:.88rem;">' + esc(e.description) + '</div>' : '') +
      meetLink +
      googleLink +
      '<div class="event-detail-meta" style="margin-top:8px;">Created by ' + esc(e.created_by_name || 'Unknown') + '</div>' +
    '</div>';
  // Google-sourced events live in Google Calendar, not our DB — hide
  // the Delete button (we'd need a DELETE-to-Google flow for those).
  document.getElementById('ed-delete').style.display = (e.source === 'google') ? 'none' : '';
  document.getElementById('modal-event-detail').classList.add('open');
}
function closeDetailModal() { document.getElementById('modal-event-detail').classList.remove('open'); }
document.getElementById('modal-event-detail').addEventListener('click', function(e) { if (e.target === e.currentTarget) closeDetailModal(); });

async function deleteEvent() {
  if (!viewingEventId) return;
  if (!confirm('Delete this event?')) return;
  try {
    await apiFetch('/api/calendar/' + viewingEventId, { method: 'DELETE' });
    closeDetailModal();
    await loadMonth();
  } catch(err) { alert(err.message); }
}

function esc(s) { return escHtml ? escHtml(String(s || '')) : String(s || '').replace(/[&<>"']/g, function(c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

init();
</script>
