<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Ink'd Templates</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="/inkd.css">
  <script>document.documentElement.classList.add('page-loading');try{var _c=document.documentElement.classList;if(localStorage.sidebar_collapsed==='1')_c.add('sidebar-collapsed');var _t=localStorage.getItem('propspot_theme');_c.add('theme-premium');if(_t==='dark')_c.add('theme-dark');}catch(e){}</script>
  <style>
    .tpl-table { width: 100%; background: var(--surface); border-collapse: collapse; border-radius: var(--radius, 8px); overflow: hidden; box-shadow: var(--shadow, 0 1px 2px rgba(0,0,0,.06)); }
    .tpl-table thead tr { background: var(--surface-muted, #f3f4f6); }
    .tpl-table th { text-align: left; padding: 10px 14px; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; color: var(--text-muted); font-weight: 700; }
    .tpl-table td { padding: 12px 14px; border-top: 1px solid var(--border); font-size: .9rem; color: var(--text); }
    .tpl-table td a { color: var(--brand); text-decoration: none; font-weight: 500; }
    .tpl-table td a:hover { text-decoration: underline; }
    .tpl-table .archive-btn { font-size: .78rem; padding: 4px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }
    .tpl-table .archive-btn:hover { border-color: #ef4444; color: #ef4444; }
  </style>
</head>
<body class="os-newlayout">
<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<main class="page">
  <div class="inkd-dash-header">
    <h1>Templates</h1>
    <a class="primary" href="/inkd-template-editor.html">+ New template</a>
    <a class="secondary" href="/inkd.html">← Back to Ink'd</a>
  </div>

  <table id="tpl-table" class="tpl-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Pages</th>
        <th>Updated</th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</main>

<script>window.NAV_CURRENT = 'inkd';</script>
<script src="config.js"></script>
<script src="app.js"></script>
<script src="/inkd-templates.js"></script>
</body>
</html>
