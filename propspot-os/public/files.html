<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Files</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <script>document.documentElement.classList.add('page-loading');try{var _c=document.documentElement.classList;if(localStorage.sidebar_collapsed==='1')_c.add('sidebar-collapsed');var _t=localStorage.getItem('propspot_theme');_c.add('theme-premium');if(_t==='dark')_c.add('theme-dark');}catch(e){}</script>
  <style>
    .breadcrumb { display:flex; align-items:center; gap:4px; font-size:.85rem; margin-bottom:16px; flex-wrap:wrap; }
    .breadcrumb a { color:var(--brand); text-decoration:none; font-weight:500; }
    .breadcrumb a:hover { text-decoration:underline; }
    .breadcrumb .sep { color:var(--text-muted); }
    .breadcrumb .current { color:var(--text); font-weight:700; }

    .drive-toolbar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
    .drive-toolbar .spacer { flex:1; }

    .drive-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
    .drive-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px 12px; text-align:center; cursor:pointer; transition:all .12s; border:2px solid transparent; position:relative; }
    .drive-card:hover { border-color:var(--brand); transform:translateY(-1px); }
    .drive-card.selected { border-color:var(--brand); background:var(--brand-light); }
    .drive-card .card-icon { font-size:2.5rem; margin-bottom:8px; line-height:1; }
    .drive-card .card-icon svg { width:40px; height:40px; }
    .drive-card .card-name { font-size:.82rem; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .drive-card .card-meta { font-size:.68rem; color:var(--text-muted); margin-top:4px; }
    .drive-card img.card-thumb { width:100%; height:80px; object-fit:cover; border-radius:4px; margin-bottom:6px; }
    .drive-card .card-badge { position:absolute; top:6px; right:6px; font-size:.6rem; padding:1px 6px; border-radius:100px; }
    .drive-card .card-badge.restricted { background:#f3e8ff; color:#7c3aed; }
    .drive-card .card-menu { position:absolute; top:4px; right:4px; opacity:0; background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:1.1rem; padding:2px 6px; border-radius:4px; }
    .drive-card:hover .card-menu { opacity:1; }
    .drive-card .card-menu:hover { background:var(--border); }

    .drop-zone-drive { border:2px dashed var(--border); border-radius:var(--radius); padding:40px 20px; text-align:center; color:var(--text-muted); font-size:.88rem; cursor:pointer; transition:all .15s; margin-bottom:16px; }
    .drop-zone-drive:hover, .drop-zone-drive.dragover { border-color:var(--brand); color:var(--brand); background:var(--brand-light); }

    .empty-drive { text-align:center; padding:60px 20px; color:var(--text-muted); }
    .empty-drive svg { width:56px; height:56px; margin-bottom:12px; opacity:.3; }

    /* Modals */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--surface); border-radius:var(--radius); box-shadow:0 8px 40px rgba(0,0,0,.2); width:100%; max-width:480px; max-height:90vh; overflow-y:auto; padding:24px; }
    .modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .modal-head h2 { font-size:1.05rem; font-weight:700; margin:0; }
    .modal-close { background:var(--bg); border:none; border-radius:8px; width:32px; height:32px; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; color:var(--text-muted); }
    .modal-close:hover { color:var(--text); background:var(--border); }
    .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:16px; }

    .share-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
    .share-row:last-child { border-bottom:none; }
    .share-avatar { width:28px; height:28px; border-radius:50%; object-fit:cover; background:var(--border); }
    .share-info { flex:1; min-width:0; }
    .share-name { font-size:.85rem; font-weight:600; }
    .share-email { font-size:.72rem; color:var(--text-muted); }

    .context-menu { position:fixed; background:var(--surface); border:1px solid var(--border); border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.15); z-index:600; min-width:160px; padding:4px 0; display:none; }
    .context-menu.open { display:block; }
    .context-menu button { display:flex; align-items:center; gap:8px; width:100%; padding:8px 14px; border:none; background:none; cursor:pointer; font-size:.82rem; color:var(--text); text-align:left; }
    .context-menu button:hover { background:var(--brand-light); }
    .context-menu button.danger { color:#dc2626; }

    .drive-tabs { display:flex; gap:0; margin-bottom:16px; border-bottom:2px solid var(--border); }
    .drive-tab { padding:10px 20px; font-size:.88rem; font-weight:600; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; color:var(--text-muted); transition:all .12s; background:none; border-top:none; border-left:none; border-right:none; }
    .drive-tab:hover { color:var(--brand); }
    .drive-tab.active { color:var(--brand); border-bottom-color:var(--brand); }
    .drive-tab svg { width:16px; height:16px; vertical-align:-3px; margin-right:6px; }

    @media(max-width:640px) { .drive-grid { grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); } }
  </style>
</head>
<body class="os-newlayout">
<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<main class="page">
  <div class="section-header" style="margin-bottom:12px;">
    <span class="section-title">Files</span>
  </div>

  <div class="drive-tabs">
    <button class="drive-tab active" id="tab-shared" onclick="switchDrive('shared')">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Shared Drive
    </button>
    <button class="drive-tab" id="tab-personal" onclick="switchDrive('personal')">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      My Drive
    </button>
  </div>

  <div id="breadcrumb" class="breadcrumb">
    <span class="current">Shared Drive</span>
  </div>

  <div class="drive-toolbar">
    <button class="btn btn-primary" style="padding:8px 16px;font-size:.85rem;" onclick="openNewFolder()">+ New Folder</button>
    <button class="btn btn-secondary" style="padding:8px 16px;font-size:.85rem;" onclick="document.getElementById('upload-input').click()">Upload Files</button>
    <input type="file" id="upload-input" multiple style="display:none" onchange="uploadFiles(this.files)">
    <div class="spacer"></div>
  </div>

  <div class="drop-zone-drive" id="drop-zone"
       onclick="document.getElementById('upload-input').click()"
       ondragover="event.preventDefault();this.classList.add('dragover')"
       ondragleave="this.classList.remove('dragover')"
       ondrop="event.preventDefault();this.classList.remove('dragover');uploadFiles(event.dataTransfer.files)"
       style="display:none;">
    Drop files here to upload
  </div>

  <div id="content"><p class="text-muted text-sm">Loading...</p></div>
</main>

<!-- New Folder modal -->
<div class="modal-overlay" id="modal-folder">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h2 id="folder-modal-title">New Folder</h2>
      <button class="modal-close" onclick="closeFolderModal()">&#10005;</button>
    </div>
    <div class="form-group">
      <label class="form-label">Folder Name *</label>
      <input class="form-input" id="f-name" placeholder="e.g. Contracts, Inspections..." required>
    </div>
    <div class="form-group">
      <label class="form-label">Visibility</label>
      <select class="form-input" id="f-visibility">
        <option value="true">Team — everyone can see</option>
        <option value="false">Restricted — only shared users</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" style="padding:10px 18px;font-size:.88rem;" onclick="closeFolderModal()">Cancel</button>
      <button class="btn btn-primary" style="padding:10px 18px;font-size:.88rem;" id="f-save" onclick="saveFolder()">Create</button>
    </div>
  </div>
</div>

<!-- Share modal -->
<div class="modal-overlay" id="modal-share">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h2>Share</h2>
      <button class="modal-close" onclick="closeShareModal()">&#10005;</button>
    </div>
    <div class="form-group">
      <label class="form-label">Add people</label>
      <div style="display:flex;gap:6px;">
        <select class="form-input" id="s-user" style="flex:1;"></select>
        <select class="form-input" id="s-role" style="width:auto;">
          <option value="viewer">Viewer</option>
          <option value="editor">Editor</option>
          <option value="owner">Owner</option>
        </select>
        <button class="btn btn-primary" style="padding:8px 14px;font-size:.82rem;" onclick="addShare()">Add</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">People with access</label>
      <div id="share-list"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" style="padding:10px 18px;font-size:.88rem;" onclick="closeShareModal()">Done</button>
    </div>
  </div>
</div>

<!-- Rename modal -->
<div class="modal-overlay" id="modal-rename">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h2>Rename</h2>
      <button class="modal-close" onclick="closeRenameModal()">&#10005;</button>
    </div>
    <div class="form-group">
      <input class="form-input" id="r-name" placeholder="New name">
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" style="padding:10px 18px;font-size:.88rem;" onclick="closeRenameModal()">Cancel</button>
      <button class="btn btn-primary" style="padding:10px 18px;font-size:.88rem;" onclick="saveRename()">Save</button>
    </div>
  </div>
</div>

<!-- Context menu -->
<div class="context-menu" id="context-menu"></div>

<script>window.NAV_CURRENT = 'files';</script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
let currentFolder = null; // null = root
let currentDriveType = 'shared'; // 'shared' or 'personal'
let folders = [], files = [], usersCache = [];
let shareTarget = null; // { type: 'folder'|'file', id: '...' }
let renameTarget = null;
let editingFolderId = null;

function switchDrive(type) {
  currentDriveType = type;
  currentFolder = null;
  document.getElementById('tab-shared').classList.toggle('active', type === 'shared');
  document.getElementById('tab-personal').classList.toggle('active', type === 'personal');
  loadFolder(null);
}

async function init() {
  const user = await requireAuth();
  if (!user) return;
  try { usersCache = await apiFetch('/api/users'); } catch {}
  await loadFolder(null);
}

async function loadFolder(folderId) {
  currentFolder = folderId;
  const dtParam = `drive_type=${currentDriveType}`;
  const qs = folderId ? `?parent_id=${folderId}` : `?${dtParam}`;
  const fqs = folderId ? `?folder_id=${folderId}` : `?${dtParam}`;
  try {
    [folders, files] = await Promise.all([
      apiFetch(`/api/drive/folders${qs}`),
      apiFetch(`/api/drive/files${fqs}`)
    ]);
    if (folderId) {
      const folder = await apiFetch(`/api/drive/folders/${folderId}`);
      renderBreadcrumb(folder.breadcrumb);
    } else {
      renderBreadcrumb(null);
    }
    renderContent();
  } catch (err) {
    document.getElementById('content').innerHTML = `<p class="text-muted">Error: ${esc(err.message)}</p>`;
  }
}

function renderBreadcrumb(crumbs) {
  const el = document.getElementById('breadcrumb');
  const rootLabel = currentDriveType === 'personal' ? 'My Drive' : 'Shared Drive';
  if (!crumbs) {
    el.innerHTML = `<span class="current">${rootLabel}</span>`;
    return;
  }
  let html = `<a href="#" onclick="event.preventDefault();loadFolder(null)">${rootLabel}</a>`;
  crumbs.forEach((c, i) => {
    html += `<span class="sep">/</span>`;
    if (i === crumbs.length - 1) {
      html += `<span class="current">${esc(c.name)}</span>`;
    } else {
      html += `<a href="#" onclick="event.preventDefault();loadFolder('${c.id}')">${esc(c.name)}</a>`;
    }
  });
  el.innerHTML = html;
}

function renderContent() {
  const dropZone = document.getElementById('drop-zone');
  if (folders.length === 0 && files.length === 0) {
    dropZone.style.display = '';
    document.getElementById('content').innerHTML = `
      <div class="empty-drive">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <p>${currentDriveType === 'personal' ? 'Your personal drive is empty. Upload working files or create folders for your own use.' : 'The shared drive is empty. Upload company documents or create folders to get started.'}</p>
      </div>`;
    return;
  }
  dropZone.style.display = 'none';
  let html = '<div class="drive-grid">';

  folders.forEach(f => {
    html += `
      <div class="drive-card" ondblclick="loadFolder('${f.id}')" onclick="selectCard(this)" oncontextmenu="event.preventDefault();showContextMenu(event,'folder','${f.id}','${esc(f.name)}')">
        ${!f.team_visible ? '<span class="card-badge restricted">Restricted</span>' : ''}
        <button class="card-menu" onclick="event.stopPropagation();showContextMenu(event,'folder','${f.id}','${esc(f.name)}')" title="More">&#8943;</button>
        <div class="card-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="var(--brand)" stroke="var(--brand)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div>
        <div class="card-name" title="${esc(f.name)}">${esc(f.name)}</div>
        <div class="card-meta">${f.subfolder_count || 0} folders, ${f.file_count || 0} files</div>
      </div>`;
  });

  files.forEach(f => {
    const isImg = f.mime_type && f.mime_type.startsWith('image/');
    html += `
      <div class="drive-card" onclick="selectCard(this)" ondblclick="window.open('${f.url}','_blank')" oncontextmenu="event.preventDefault();showContextMenu(event,'file','${f.id}','${esc(f.filename)}')">
        <button class="card-menu" onclick="event.stopPropagation();showContextMenu(event,'file','${f.id}','${esc(f.filename)}')" title="More">&#8943;</button>
        ${isImg ? `<img class="card-thumb" src="${f.url}" alt="">` : `<div class="card-icon" style="opacity:.4;"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>`}
        <div class="card-name" title="${esc(f.filename)}">${esc(f.filename)}</div>
        <div class="card-meta">${f.uploaded_by_name || ''} &middot; ${formatSize(f.size_bytes)}</div>
      </div>`;
  });

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function selectCard(el) {
  document.querySelectorAll('.drive-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

// ── Context menu
function showContextMenu(e, type, id, name) {
  const menu = document.getElementById('context-menu');
  let html = '';
  if (type === 'folder') {
    html += `<button onclick="loadFolder('${id}');hideContextMenu()">Open</button>`;
  } else {
    html += `<button onclick="window.open(getFileUrl('${id}'),'_blank');hideContextMenu()">Download</button>`;
  }
  html += `<button onclick="openRename('${type}','${id}','${name.replace(/'/g,"\\'")}');hideContextMenu()">Rename</button>`;
  html += `<button onclick="openShare('${type}','${id}');hideContextMenu()">Share</button>`;
  html += `<button class="danger" onclick="deleteItem('${type}','${id}');hideContextMenu()">Delete</button>`;
  menu.innerHTML = html;
  menu.style.top = e.clientY + 'px';
  menu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
  menu.classList.add('open');
}
function hideContextMenu() { document.getElementById('context-menu').classList.remove('open'); }
document.addEventListener('click', hideContextMenu);

function getFileUrl(id) {
  const f = files.find(f => f.id === id);
  return f ? f.url : '#';
}

// ── Upload
async function uploadFiles(fileList) {
  for (const file of fileList) {
    const form = new FormData();
    form.append('file', file);
    if (currentFolder) form.append('folder_id', currentFolder);
    form.append('drive_type', currentDriveType);
    try { await apiFetch('/api/drive/files', { method: 'POST', body: form }); } catch {}
  }
  await loadFolder(currentFolder);
}

// ── New Folder
function openNewFolder() {
  editingFolderId = null;
  document.getElementById('f-name').value = '';
  document.getElementById('f-visibility').value = 'true';
  document.getElementById('folder-modal-title').textContent = 'New Folder';
  document.getElementById('f-save').textContent = 'Create';
  document.getElementById('modal-folder').classList.add('open');
  document.getElementById('f-name').focus();
}
function closeFolderModal() { document.getElementById('modal-folder').classList.remove('open'); }
document.getElementById('modal-folder').addEventListener('click', e => { if (e.target === e.currentTarget) closeFolderModal(); });

async function saveFolder() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return;
  const teamVisible = document.getElementById('f-visibility').value === 'true';
  try {
    await apiFetch('/api/drive/folders', { method: 'POST', body: JSON.stringify({
      name, parent_id: currentFolder, team_visible: teamVisible, drive_type: currentDriveType
    })});
    closeFolderModal();
    await loadFolder(currentFolder);
  } catch (err) {
    alert(err.message);
  }
}

// ── Rename
function openRename(type, id, name) {
  renameTarget = { type, id };
  document.getElementById('r-name').value = name;
  document.getElementById('modal-rename').classList.add('open');
  document.getElementById('r-name').focus();
  document.getElementById('r-name').select();
}
function closeRenameModal() { document.getElementById('modal-rename').classList.remove('open'); }
document.getElementById('modal-rename').addEventListener('click', e => { if (e.target === e.currentTarget) closeRenameModal(); });

async function saveRename() {
  const name = document.getElementById('r-name').value.trim();
  if (!name || !renameTarget) return;
  const endpoint = renameTarget.type === 'folder'
    ? `/api/drive/folders/${renameTarget.id}`
    : `/api/drive/files/${renameTarget.id}`;
  const body = renameTarget.type === 'folder' ? { name } : { filename: name };
  try {
    await apiFetch(endpoint, { method: 'PATCH', body: JSON.stringify(body) });
    closeRenameModal();
    await loadFolder(currentFolder);
  } catch (err) { alert(err.message); }
}

// ── Delete
async function deleteItem(type, id) {
  const label = type === 'folder' ? 'folder and all its contents' : 'file';
  if (!confirm(`Delete this ${label}?`)) return;
  const endpoint = type === 'folder' ? `/api/drive/folders/${id}` : `/api/drive/files/${id}`;
  try {
    await apiFetch(endpoint, { method: 'DELETE' });
    await loadFolder(currentFolder);
  } catch (err) { alert(err.message); }
}

// ── Share
function openShare(type, id) {
  shareTarget = { type, id };
  const sel = document.getElementById('s-user');
  sel.innerHTML = usersCache.map(u => `<option value="${u.id}">${esc(u.full_name || u.email)}</option>`).join('');
  document.getElementById('s-role').value = 'viewer';
  document.getElementById('modal-share').classList.add('open');
  loadPermissions();
}
function closeShareModal() { document.getElementById('modal-share').classList.remove('open'); }
document.getElementById('modal-share').addEventListener('click', e => { if (e.target === e.currentTarget) closeShareModal(); });

async function loadPermissions() {
  if (!shareTarget) return;
  try {
    const perms = await apiFetch(`/api/drive/permissions/${shareTarget.type}/${shareTarget.id}`);
    document.getElementById('share-list').innerHTML = perms.length === 0
      ? '<p class="text-muted text-sm">No individual permissions set.</p>'
      : perms.map(p => `
        <div class="share-row">
          ${p.user_avatar ? `<img class="share-avatar" src="${p.user_avatar}">` : `<div class="share-avatar"></div>`}
          <div class="share-info">
            <div class="share-name">${esc(p.user_name || p.user_email)}</div>
            <div class="share-email">${esc(p.user_email || '')}</div>
          </div>
          <select class="form-input" style="width:auto;padding:3px 8px;font-size:.78rem;" onchange="updatePerm('${p.id}','${shareTarget.type}','${shareTarget.id}','${p.user_id}',this.value)">
            <option value="viewer" ${p.role==='viewer'?'selected':''}>Viewer</option>
            <option value="editor" ${p.role==='editor'?'selected':''}>Editor</option>
            <option value="owner" ${p.role==='owner'?'selected':''}>Owner</option>
          </select>
          <button style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:.9rem;" onclick="removePerm('${p.id}')" title="Remove">&#10005;</button>
        </div>
      `).join('');
  } catch {}
}

async function addShare() {
  if (!shareTarget) return;
  const userId = document.getElementById('s-user').value;
  const role = document.getElementById('s-role').value;
  const body = { user_id: userId, role };
  body[shareTarget.type === 'folder' ? 'folder_id' : 'file_id'] = shareTarget.id;
  try {
    await apiFetch('/api/drive/permissions', { method: 'POST', body: JSON.stringify(body) });
    await loadPermissions();
  } catch (err) { alert(err.message); }
}

async function updatePerm(permId, type, targetId, userId, newRole) {
  const body = { user_id: userId, role: newRole };
  body[type === 'folder' ? 'folder_id' : 'file_id'] = targetId;
  try {
    await apiFetch('/api/drive/permissions', { method: 'POST', body: JSON.stringify(body) });
    await loadPermissions();
  } catch (err) { alert(err.message); }
}

async function removePerm(permId) {
  try {
    await apiFetch(`/api/drive/permissions/${permId}`, { method: 'DELETE' });
    await loadPermissions();
  } catch (err) { alert(err.message); }
}

// ── Paste screenshots
document.addEventListener('paste', async (e) => {
  const pastedFiles = [];
  for (const item of e.clipboardData.items) {
    if (item.type.startsWith('image/')) {
      const blob = item.getAsFile();
      if (blob) pastedFiles.push(new File([blob], `screenshot-${Date.now()}.png`, { type: blob.type }));
    }
  }
  if (pastedFiles.length > 0) await uploadFiles(pastedFiles);
});

// ── Utilities
function esc(s) { return escHtml ? escHtml(String(s || '')) : String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(0) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

init();
</script>
