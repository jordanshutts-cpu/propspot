<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Forgot Password</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <style>body{padding-bottom:0;background:linear-gradient(160deg,#edf7e9 0%,#ffffff 100%)}</style>
</head>
<body>
<div class="login-wrap">
  <img src="logo.png" class="login-logo-img" alt="PropSpot">
  <div class="login-logo">Prop Spot</div>
  <p class="login-tagline">Reset your password</p>
  <div class="login-card">
    <form id="forgot-form" onsubmit="handleSubmit(event)">
      <p class="text-sm text-muted mb-16">
        Enter your email and we'll send you a link to choose a new password.
      </p>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <p id="error"   class="text-sm mb-8" style="color:var(--danger);display:none;"></p>
      <p id="success" class="text-sm mb-8" style="color:var(--success);display:none;"></p>
      <button class="btn btn-primary btn-full" type="submit" id="submit-btn">Send reset link</button>
      <p class="text-sm text-center mt-12">
        <a href="/index.html" style="color:var(--brand);text-decoration:none;font-weight:500;">Back to sign in</a>
      </p>
    </form>
  </div>
  <p class="text-muted text-sm mt-16">Restoration Homes · Prop Spot</p>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
  async function handleSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('error');
    const okEl  = document.getElementById('success');
    errEl.style.display = 'none';
    okEl.style.display  = 'none';
    showSpinner(btn, 'Sending…');
    try {
      const res = await apiFetch('/api/auth/forgot-password', {
        method: 'POST',
        body: JSON.stringify({ email: document.getElementById('email').value })
      });
      okEl.textContent = res.message || 'If an account exists for that email, a reset link is on its way.';
      okEl.style.display = 'block';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    } finally {
      hideSpinner(btn);
    }
  }
</script>
</body>
</html>
