<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Photos</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <script>document.documentElement.classList.add('page-loading');try{var _c=document.documentElement.classList;if(localStorage.sidebar_collapsed==='1')_c.add('sidebar-collapsed');var _t=localStorage.getItem('propspot_theme');_c.add('theme-premium');if(_t==='dark')_c.add('theme-dark');}catch(e){}</script>
  <style>
    /* ── Hero card ─────────────────────────────────────────────── */
    .fc-hero {
      position: relative;
      background: var(--surface);
      border-radius: 14px;
      box-shadow: 0 1px 3px rgba(0,0,0,.05), 0 4px 16px rgba(0,0,0,.04);
      margin: 14px 20px 18px;
      overflow: hidden;
    }
    .fc-hero-cover {
      width: 100%; height: 160px;
      background: linear-gradient(135deg, rgba(97,183,70,0.12) 0%, rgba(59,130,246,0.08) 100%);
      background-size: cover; background-position: center;
      position: relative;
    }
    .fc-hero-cover::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.85) 100%);
    }
    .fc-hero-cover.has-photo { filter: saturate(0.92); }
    .fc-hero-body { padding: 14px 22px 20px; position: relative; }
    .fc-hero-back {
      position: absolute; top: -132px; left: 14px; z-index: 2;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(4px);
      border: 1px solid rgba(0,0,0,0.05);
      padding: 6px 12px; border-radius: 8px;
      font-size: .82rem; font-weight: 600; color: var(--text);
      cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.08);
      display: inline-flex; align-items: center; gap: 4px;
    }
    .fc-hero-back:hover { background: #fff; transform: translateY(-1px); transition: all .12s; }
    .fc-hero-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text); margin: 0 0 4px; }
    .fc-hero-addr  { font-size: .9rem; color: var(--text-muted); margin-bottom: 16px; }
    .fc-hero-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 14px;
      padding: 14px 16px;
      background: var(--bg);
      border-radius: 10px;
      margin-bottom: 4px;
    }
    .fc-stat { text-align: center; }
    .fc-stat-num   { font-size: 1.25rem; font-weight: 800; color: var(--text); letter-spacing: -0.02em; line-height: 1.1; }
    .fc-stat-label { font-size: .68rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 3px; }
    .fc-hero-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .fc-hero-actions .btn { padding: 7px 14px; font-size: .82rem; font-weight: 600; }

    /* ── Folder tabs ───────────────────────────────────────────── */
    .fc-tabs-wrap { overflow-x: auto; scrollbar-width: none; padding: 0 20px 12px; }
    .fc-tabs-wrap::-webkit-scrollbar { display: none; }
    .fc-tabs { display: flex; gap: 6px; flex-wrap: nowrap; width: max-content; }
    .fc-tab {
      flex-shrink: 0; padding: 6px 14px; border-radius: 100px;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--text-muted); font-size: .8rem; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: all .12s;
    }
    .fc-tab:hover { border-color: var(--brand); color: var(--brand); }
    .fc-tab.active { background: var(--brand); border-color: var(--brand); color: #fff; }
    .fc-tab .fc-tab-count {
      display: inline-block; margin-left: 4px;
      font-size: .68rem; opacity: .75;
    }

    /* ── Date sections ─────────────────────────────────────────── */
    .fc-content { padding: 0 20px 24px; }
    .fc-date-section { margin-bottom: 22px; }
    .fc-date-head {
      display: flex; align-items: baseline; gap: 10px;
      margin-bottom: 10px;
    }
    .fc-date-label {
      font-size: .72rem; font-weight: 800; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .08em;
    }
    .fc-date-count { font-size: .72rem; color: var(--text-muted); font-weight: 500; }

    /* ── Photo grid ────────────────────────────────────────────── */
    .fc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .fc-thumb {
      position: relative; aspect-ratio: 1; border-radius: 12px; overflow: hidden;
      cursor: pointer; background: var(--bg);
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
      transition: transform .15s, box-shadow .15s;
    }
    .fc-thumb:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,.12);
    }
    .fc-thumb img, .fc-thumb video {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform .25s;
    }
    .fc-thumb:hover img, .fc-thumb:hover video { transform: scale(1.04); }
    .fc-thumb-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 8px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,.78));
      color: #fff; font-size: .7rem; line-height: 1.3;
      opacity: 0; transition: opacity .15s;
    }
    .fc-thumb:hover .fc-thumb-overlay { opacity: 1; }
    .fc-thumb-uploader { font-weight: 600; margin-top: 1px; opacity: .85; }
    .fc-video-badge {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,.55); color: #fff;
      border-radius: 6px; font-size: .65rem; padding: 2px 7px; font-weight: 600;
      backdrop-filter: blur(4px);
    }

    /* ── Lightbox ──────────────────────────────────────────────── */
    .fc-lb { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.88); flex-direction: column; align-items: center; justify-content: center; }
    .fc-lb.open { display: flex; }
    .fc-lb-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.22); color: #fff; font-size: 1.25rem; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); transition: background .12s, transform .1s; }
    .fc-lb-close:hover { background: rgba(255,255,255,.28); transform: scale(1.08); }
    .fc-lb-img   { max-width: calc(100vw - 140px); max-height: calc(100vh - 160px); border-radius: 10px; object-fit: contain; box-shadow: 0 24px 64px rgba(0,0,0,.6); }
    .fc-lb-video { max-width: calc(100vw - 140px); max-height: calc(100vh - 160px); border-radius: 10px; }
    .fc-lb-meta  { display: flex; align-items: center; justify-content: center; gap: 10px; color: rgba(255,255,255,.8); font-size: .82rem; margin-top: 14px; text-align: center; }
    .fc-lb-counter { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2); color: #fff; font-size: .72rem; font-weight: 600; letter-spacing: .06em; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
    .fc-lb-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.22); color: #fff; width: 46px; height: 46px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); transition: background .12s, transform .14s; }
    .fc-lb-nav:hover { background: rgba(255,255,255,.28); transform: translateY(-50%) scale(1.1); }
    .fc-lb-prev { left: 18px; }
    .fc-lb-next { right: 18px; }
    .fc-lb-nav.hidden { display: none; }

    .fc-empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .fc-empty-icon { font-size: 3rem; opacity: .35; margin-bottom: 10px; }

    /* ── Select / Share mode ───────────────────────────────────── */
    .fc-select-btn {
      padding: 6px 14px; border-radius: 100px;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--text-muted); font-size: .8rem; font-weight: 600;
      cursor: pointer; transition: all .12s;
    }
    .fc-select-btn:hover { border-color: var(--brand); color: var(--brand); }
    .fc-select-btn.active { background: var(--brand); border-color: var(--brand); color: #fff; }

    .fc-thumb.selectable { cursor: pointer; }
    .fc-thumb.selectable::after {
      content: ''; position: absolute; inset: 0;
      border: 3px solid transparent; border-radius: 12px;
      pointer-events: none; transition: border-color .1s;
    }
    .fc-thumb.selectable:hover::after { border-color: rgba(97,183,70,.4); }
    .fc-thumb.selected::after { border-color: var(--brand); }
    .fc-thumb-check {
      position: absolute; top: 8px; left: 8px; z-index: 2;
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(255,255,255,.85); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: transparent; font-size: .8rem; font-weight: 800;
      transition: all .12s;
    }
    .fc-thumb.selected .fc-thumb-check {
      background: var(--brand); border-color: var(--brand); color: #fff;
    }

    .fc-bulk-bar {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: none; align-items: center; gap: 10px;
      background: var(--text); color: var(--surface);
      padding: 10px 16px; border-radius: 100px;
      box-shadow: 0 10px 32px rgba(0,0,0,.25); z-index: 150;
      font-size: .88rem; font-weight: 600;
    }
    .fc-bulk-bar.open { display: inline-flex; }
    .fc-bulk-count { padding: 0 8px; }
    .fc-bulk-bar .btn { padding: 6px 14px; font-size: .82rem; font-weight: 600; }

    /* Share-link result modal */
    .fc-share-modal {
      display: none; position: fixed; inset: 0; z-index: 250;
      background: rgba(0,0,0,.5); align-items: center; justify-content: center; padding: 20px;
    }
    .fc-share-modal.open { display: flex; }
    .fc-share-modal-box {
      background: var(--surface); border-radius: 12px; padding: 20px;
      width: 100%; max-width: 460px; box-shadow: 0 12px 40px rgba(0,0,0,.25);
    }
    .fc-share-url {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: .85rem; font-family: monospace;
      background: var(--bg); color: var(--text); margin: 12px 0;
      box-sizing: border-box;
    }
  </style>
</head>
<body class="os-newlayout" data-page="fieldcam-property">
<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<!-- Mobile-only quick-launch camera FAB — opens camera for THIS property -->
<a class="fc-mobile-camera-fab" id="fc-fab" href="#" title="Open camera" aria-label="Open camera">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
</a>
<script>
  // FAB on a property page should pre-select that property in the camera.
  (function () {
    const id = new URLSearchParams(location.search).get('id');
    const cameraHref = id
      ? `/fieldcam-camera.html?property_id=${encodeURIComponent(id)}&return=${encodeURIComponent(location.pathname + location.search)}`
      : '/fieldcam-camera.html';
    const fab = document.getElementById('fc-fab');
    if (fab) fab.href = cameraHref;
    const takeBtn = document.getElementById('fc-take-photo');
    if (takeBtn) takeBtn.href = cameraHref;
  })();
</script>

<main class="page" style="flex-direction:column;overflow-y:auto;">

  <!-- Hero -->
  <section class="fc-hero">
    <div class="fc-hero-cover" id="fc-hero-cover"></div>
    <div class="fc-hero-body">
      <button class="os-back-btn fc-hero-back" onclick="goBack()"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Back</button>
      <h1 class="fc-hero-title" id="fc-prop-name">Loading…</h1>
      <div class="fc-hero-addr" id="fc-prop-addr"></div>
      <div class="fc-hero-stats" id="fc-stats">
        <div class="fc-stat"><div class="fc-stat-num" id="stat-photos">—</div><div class="fc-stat-label">Photos</div></div>
        <div class="fc-stat"><div class="fc-stat-num" id="stat-videos">—</div><div class="fc-stat-label">Videos</div></div>
        <div class="fc-stat"><div class="fc-stat-num" id="stat-uploaders">—</div><div class="fc-stat-label">Contributors</div></div>
        <div class="fc-stat"><div class="fc-stat-num" id="stat-last">—</div><div class="fc-stat-label">Last upload</div></div>

<!-- Bulk action bar (Select mode) -->

<!-- Share link result modal -->
<div class="fc-share-modal" id="fc-share-modal" onclick="if(event.target===this)closeShareModal()">

<!-- Lightbox -->
<div class="fc-lb" id="fc-lb">
  <button class="fc-lb-close" onclick="closeLb()">✕</button>
  <button class="fc-lb-nav fc-lb-prev hidden" id="fc-lb-prev" onclick="navLb(-1)">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <img class="fc-lb-img" id="fc-lb-img" src="" alt="" style="display:none;">
  <video class="fc-lb-video" id="fc-lb-video" controls playsinline style="display:none;"></video>
  <div class="fc-lb-meta" id="fc-lb-meta"></div>
</div>

<script>window.NAV_CURRENT = 'fieldcam';</script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
  const params  = new URLSearchParams(location.search);
  const PROP_ID = params.get('id');
  let allPhotos = [], folders = [], currentFolder = null, lbIdx = -1, lbPhotos = [];
  let selectMode = false, selectedPhotoIds = new Set();

  function goBack() {
    // Prefer the FieldCam map page if it's the referrer; else use history.
    if (document.referrer && document.referrer.includes('/fieldcam.html')) history.back();
    else location.href = '/fieldcam.html';
  }

  async function init() {
    const me = await requireAuth(); if (!me) return;
    if (!PROP_ID) { location.href = '/fieldcam.html'; return; }
    await Promise.all([loadProp(), loadFolders()]);
    await loadPhotos();
  }

  async function loadProp() {
    try {
      const p = await satelliteApiFetch('fieldcam', '/api/properties/' + PROP_ID);
      const name = p.display_name || p.name || p.address_line1 || 'Property';
      const addr = p.address || [p.address_line1, p.city, p.state].filter(Boolean).join(', ');
      document.getElementById('fc-prop-name').textContent = name;
      document.getElementById('fc-prop-addr').textContent = addr;
      document.title = 'Prop Spot — ' + name;
      if (p.latest_photo_url) {
        const cover = document.getElementById('fc-hero-cover');
        cover.style.backgroundImage = `url('${p.latest_photo_url.replace(/'/g, '%27')}')`;
        cover.classList.add('has-photo');
      }
      // Link to the full property page (in the OS, not FieldCam)
      const link = document.getElementById('fc-link-property');
      link.href = '/property.html?id=' + encodeURIComponent(PROP_ID);
      link.style.display = '';
    } catch(e) {
      document.getElementById('fc-prop-name').textContent = 'Property';
    }
  }

  async function loadFolders() {
    try { folders = await satelliteApiFetch('fieldcam', '/api/folders/' + PROP_ID); }
    catch { folders = []; }
  }

  async function loadPhotos() {
    try {
      const qs = currentFolder ? '?folder_id=' + currentFolder : '';
      allPhotos = await satelliteApiFetch('fieldcam', '/api/photos/' + PROP_ID + qs);
    } catch(e) {
      document.getElementById('fc-content').innerHTML = `<p class="text-muted text-sm">Error: ${escHtml(e.message)}</p>`;
      return;
    }
    renderStats();
    renderTabs();
    renderGroupedGrid();
  }

  function renderStats() {
    const photos = allPhotos.filter(p => p.media_type !== 'video');
    const videos = allPhotos.filter(p => p.media_type === 'video');
    const uploaders = new Set(allPhotos.map(p => p.uploader_name).filter(Boolean));
    document.getElementById('stat-photos').textContent    = photos.length;
    document.getElementById('stat-videos').textContent    = videos.length;
    document.getElementById('stat-uploaders').textContent = uploaders.size;
    // Last upload
    const dates = allPhotos.map(p => p.taken_at).filter(Boolean).map(d => new Date(d).getTime());
    if (dates.length) {
      const max = new Date(Math.max(...dates));
      document.getElementById('stat-last').textContent = max.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    } else {
      document.getElementById('stat-last').textContent = '—';
    }
  }

  function renderTabs() {
    const allCount = allPhotos.length;
    let html = `<button class="fc-tab ${currentFolder===null?'active':''}" onclick="selectFolder(null)">All<span class="fc-tab-count">${allCount}</span></button>`;
    folders.forEach(f => {
      const c = f.photo_count != null ? `<span class="fc-tab-count">${f.photo_count}</span>` : '';
      html += `<button class="fc-tab ${currentFolder===f.id?'active':''}" onclick="selectFolder('${f.id}')">${escHtml(f.name)}${c}</button>`;
    });
    document.getElementById('fc-tabs').innerHTML = html;
  }

  async function selectFolder(id) {
    currentFolder = id;
    await loadPhotos();
  }

  function dayLabel(iso) {
    if (!iso) return 'No date';
    const d = new Date(iso);
    const today = new Date(); today.setHours(0,0,0,0);
    const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
    const target = new Date(d); target.setHours(0,0,0,0);
    if (target.getTime() === today.getTime())     return 'Today';
    if (target.getTime() === yesterday.getTime()) return 'Yesterday';
    const diffDays = (today - target) / (86400 * 1000);
    if (diffDays < 7)  return d.toLocaleDateString('en-US', { weekday: 'long' });
    if (diffDays < 365) return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }
  function dayKey(iso) {
    if (!iso) return 'none';
    const d = new Date(iso);
    return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
  }

  function renderGroupedGrid() {
    const el = document.getElementById('fc-content');
    lbPhotos = [...allPhotos];

    if (!allPhotos.length) {
      el.innerHTML = `<div class="fc-empty"><div class="fc-empty-icon">📷</div><p>No photos yet${currentFolder ? ' in this folder' : ''}.</p></div>`;
      return;
    }

    // Group by day (sorted: most recent first). Preserves per-day ordering
    // from the server (typically newest first within each day).
    const groups = new Map();
    allPhotos.forEach((p, i) => {
      const k = dayKey(p.taken_at);
      if (!groups.has(k)) groups.set(k, { label: dayLabel(p.taken_at), iso: p.taken_at, items: [] });
      groups.get(k).items.push({ p, i });
    });
    // Sort groups by date desc (newest first; 'No date' goes last)
    const sortedGroups = [...groups.values()].sort((a, b) => {
      if (!a.iso) return 1;
      if (!b.iso) return -1;
      return new Date(b.iso) - new Date(a.iso);
    });

    el.innerHTML = sortedGroups.map(g => `
      <div class="fc-date-section">
        <div class="fc-date-head">
          <span class="fc-date-label">${escHtml(g.label)}</span>
          <span class="fc-date-count">${g.items.length} ${g.items.length === 1 ? 'item' : 'items'}</span>
        </div>
        <div class="fc-grid">${g.items.map(({ p, i }) => thumbHtml(p, i)).join('')}</div>
      </div>
    `).join('');
  }

  function thumbHtml(p, i) {
    const time     = p.taken_at ? new Date(p.taken_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
    const uploader = p.uploader_name || '';
    const isVideo  = p.media_type === 'video';
    const media    = isVideo
      ? `<video src="${escHtml(p.url)}" muted playsinline></video><span class="fc-video-badge">▶ Video</span>`
      : `<img src="${escHtml(p.url)}" alt="" loading="lazy">`;
    const selectableCls = selectMode ? ' selectable' : '';
    const selectedCls   = selectedPhotoIds.has(p.id) ? ' selected' : '';
    const clickHandler  = selectMode
      ? `toggleSelectPhoto('${p.id}', this)`
      : `openLb(${i})`;
    const check = selectMode ? `<div class="fc-thumb-check">✓</div>` : '';
    return `<div class="fc-thumb${selectableCls}${selectedCls}" onclick="${clickHandler}">
      ${check}
      ${media}
      <div class="fc-thumb-overlay">
        ${time ? escHtml(time) : ''}
        ${uploader ? `<div class="fc-thumb-uploader">${escHtml(uploader)}</div>` : ''}
      </div>
    </div>`;
  }

  // ── Select / Share mode ──────────────────────────────────────────
  function toggleSelect() {
    selectMode ? exitSelect() : enterSelect();
  }
  function enterSelect() {
    selectMode = true;
    selectedPhotoIds.clear();
    document.getElementById('fc-select-btn').classList.add('active');
    document.getElementById('fc-select-btn').textContent = 'Selecting…';
    document.getElementById('fc-bulk-bar').classList.add('open');
    updateBulkBar();
    renderGroupedGrid();
  }
  function exitSelect() {
    selectMode = false;
    selectedPhotoIds.clear();
    document.getElementById('fc-select-btn').classList.remove('active');
    document.getElementById('fc-select-btn').textContent = 'Select';
    document.getElementById('fc-bulk-bar').classList.remove('open');
    renderGroupedGrid();
  }
  function toggleSelectPhoto(id, el) {
    if (selectedPhotoIds.has(id)) {
      selectedPhotoIds.delete(id);
      el.classList.remove('selected');
    } else {
      selectedPhotoIds.add(id);
      el.classList.add('selected');
    }
    updateBulkBar();
  }
  function updateBulkBar() {
    const n = selectedPhotoIds.size;
    document.getElementById('fc-bulk-count').textContent =
      n === 0 ? 'Tap photos to select' : `${n} selected`;
    document.getElementById('fc-bulk-share').disabled    = n === 0;
    document.getElementById('fc-bulk-download').disabled = n === 0;
  }

  // ── Upload photos / videos from a file picker ───────────────────
  async function uploadPhotos(fileList) {
    const files = [...(fileList || [])];
    if (!files.length) return;
    const btnUpload = document.querySelector('.fc-hero-actions .btn-secondary');
    const origLabel = btnUpload?.textContent;
    let ok = 0, fail = 0;
    for (let i = 0; i < files.length; i++) {
      if (btnUpload) btnUpload.textContent = `Uploading ${i + 1}/${files.length}…`;
      const form = new FormData();
      form.append('photo', files[i]);
      if (currentFolder) form.append('folder_id', currentFolder);
      try {
        await satelliteApiFetch('fieldcam', `/api/photos/${PROP_ID}`,
          { method: 'POST', body: form });
        ok++;
      } catch (e) { fail++; console.error('upload failed', files[i].name, e); }
    }
    if (btnUpload) btnUpload.textContent = origLabel || '⬆ Upload';
    document.getElementById('fc-upload-input').value = '';
    showToast?.(
      fail === 0 ? `Uploaded ${ok} ${ok === 1 ? 'file' : 'files'}` :
                   `Uploaded ${ok}, ${fail} failed`,
      fail === 0 ? 'success' : 'error'
    );
    await loadPhotos();
  }

  // ── Download selected photos (one save dialog per file) ─────────
  // Inserts Cloudinary's fl_attachment flag so the browser saves
  // instead of navigating. For larger batches, the user will see N
  // download prompts — server-side zip is its own follow-up.
  function downloadSelected() {
    if (!selectedPhotoIds.size) return;
    const picks = allPhotos.filter(p => selectedPhotoIds.has(p.id));
    picks.forEach((p, i) => {
      const url = p.url.includes('/upload/')
        ? p.url.replace('/upload/', '/upload/fl_attachment/')
        : p.url;
      // Stagger slightly so Chrome doesn't block as "multiple downloads".
      setTimeout(() => {
        const a = document.createElement('a');
        a.href = url;
        a.download = '';
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        a.remove();
      }, i * 250);
    });
    showToast?.(`Downloading ${picks.length} ${picks.length === 1 ? 'file' : 'files'}…`);
  }
  async function shareSelected() {
    if (!selectedPhotoIds.size) return;
    try {
      const r = await satelliteApiFetch('fieldcam', '/api/share', {
        method: 'POST',
        body: JSON.stringify({
          propertyId: PROP_ID,
          photoIds: [...selectedPhotoIds],
          label: `${selectedPhotoIds.size} photos`
        })
      });
      const url = location.origin + '/share.html?token=' + encodeURIComponent(r.token);
      document.getElementById('fc-share-url').value = url;
      document.getElementById('fc-share-modal').classList.add('open');
      exitSelect();
    } catch (e) {
      showToast?.(e.message || 'Failed to create share link', 'error');
      alert('Failed to create share link: ' + (e.message || e));
    }
  }
  function closeShareModal() {
    document.getElementById('fc-share-modal').classList.remove('open');
  }
  async function copyShareUrl() {
    const url = document.getElementById('fc-share-url').value;
    try {
      await navigator.clipboard.writeText(url);
      const btn = document.querySelector('#fc-share-modal .btn-primary');
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = orig; }, 1400);
    } catch (_) {
      document.getElementById('fc-share-url').select();
      document.execCommand?.('copy');
    }
  }

  // ── Lightbox ────────────────────────────────────────────────────
  function openLb(idx) {
    lbIdx = idx;
    showLbPhoto(idx);
    document.getElementById('fc-lb').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function showLbPhoto(idx) {
    const p = lbPhotos[idx];
    const isVideo = p?.media_type === 'video';
    const img = document.getElementById('fc-lb-img');
    const vid = document.getElementById('fc-lb-video');
    if (isVideo) {
      img.style.display = 'none';
      vid.style.display = '';
      vid.src = p.url;
    } else {
      vid.pause?.(); vid.style.display = 'none'; vid.src = '';
      img.style.display = '';
      img.src = p?.url || '';
    }
    const time = p?.taken_at ? new Date(p.taken_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '';
    const metaText = [p?.uploader_name, time, p?.folder_name ? '📁 '+p.folder_name : ''].filter(Boolean).join(' · ');
    const total = lbPhotos.length;
    const metaEl = document.getElementById('fc-lb-meta');
    metaEl.innerHTML = (metaText ? `<span>${metaText}</span>` : '') +
      (total > 1 ? `<span class="fc-lb-counter">${idx + 1} / ${total}</span>` : '');
    document.getElementById('fc-lb-prev').classList.toggle('hidden', idx <= 0);
    document.getElementById('fc-lb-next').classList.toggle('hidden', idx >= total - 1);
  }

  function closeLb() {
    const vid = document.getElementById('fc-lb-video');
    vid.pause?.(); vid.src = '';
    document.getElementById('fc-lb').classList.remove('open');
    document.body.style.overflow = '';
    lbIdx = -1;
  }

  function navLb(dir) {
    const next = lbIdx + dir;
    if (next >= 0 && next < lbPhotos.length) { lbIdx = next; showLbPhoto(lbIdx); }
  }

  // Keyboard nav
  document.addEventListener('keydown', e => {
    if (!document.getElementById('fc-lb').classList.contains('open')) return;
    if (e.key === 'Escape')     closeLb();
    if (e.key === 'ArrowLeft')  navLb(-1);
    if (e.key === 'ArrowRight') navLb(1);
  });

  // Touch swipe on lightbox
  let _sx = null;
  document.getElementById('fc-lb').addEventListener('touchstart', e => { _sx = e.touches[0].clientX; }, { passive: true });
  document.getElementById('fc-lb').addEventListener('touchend', e => {
    if (_sx === null) return;
    const dx = e.changedTouches[0].clientX - _sx; _sx = null;
    if (Math.abs(dx) > 40) navLb(dx < 0 ? 1 : -1);
  }, { passive: true });

  init();
</script>
</body>
</html>
