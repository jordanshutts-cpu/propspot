<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Tasks</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="style.css">
  <script>document.documentElement.classList.add('page-loading');try{var _c=document.documentElement.classList;if(localStorage.sidebar_collapsed==='1')_c.add('sidebar-collapsed');var _t=localStorage.getItem('propspot_theme');_c.add('theme-premium');if(_t==='dark')_c.add('theme-dark');}catch(e){}</script>
  <style>
    /* ── Premium KPI cards in the hero ─────────────────────────────
       Replaces the flat stat-grid. Each card has its own accent color,
       a subtle gradient backplate, and an icon glyph in the corner so
       the page reads as a dashboard summary at-a-glance. */
    .tk-kpi-row {
      display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px;
    }
    .tk-kpi {
      position:relative; overflow:hidden;
      background:var(--surface); border:1px solid var(--border);
      border-radius:14px; padding:18px 18px 16px;
      box-shadow:0 1px 2px rgba(0,0,0,.03), 0 4px 12px -8px rgba(0,0,0,.08);
      transition: transform .15s, box-shadow .15s, border-color .15s;
    }
    .tk-kpi:hover { transform: translateY(-1px); box-shadow:0 2px 4px rgba(0,0,0,.04), 0 10px 24px -12px rgba(0,0,0,.18); border-color: var(--border-strong, var(--border)); }
    .tk-kpi::before {
      content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
      background:var(--tk-accent, var(--brand));
    }
    .tk-kpi-label { font-size:.7rem; text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); font-weight:600; }
    .tk-kpi-value { font-size:2rem; font-weight:800; color:var(--tk-accent, var(--text)); line-height:1; margin:6px 0 2px; letter-spacing:-.02em; }
    .tk-kpi-sub { font-size:.72rem; color:var(--text-muted); font-weight:500; }
    .tk-kpi-icon {
      position:absolute; top:14px; right:14px;
      width:32px; height:32px; border-radius:9px;
      display:flex; align-items:center; justify-content:center;
      background:var(--tk-accent-bg, var(--brand-light));
      color:var(--tk-accent, var(--brand));
    }
    .tk-kpi-icon svg { width:16px; height:16px; }
    .tk-kpi.open     { --tk-accent:#d97706; --tk-accent-bg:rgba(217,119,6,.10); }
    .tk-kpi.progress { --tk-accent:#2563eb; --tk-accent-bg:rgba(37,99,235,.10); }
    .tk-kpi.overdue  { --tk-accent:#dc2626; --tk-accent-bg:rgba(220,38,38,.10); }
    .tk-kpi.done     { --tk-accent:#16a34a; --tk-accent-bg:rgba(22,163,74,.12); }

    /* ── Segmented filter control ─────────────────────────────────
       Replaces the loose pill row with a single rounded "tabs" element
       — modern enterprise pattern (think Linear / Notion). */
    .tk-filters {
      display:inline-flex; gap:2px;
      background:var(--bg); border:1px solid var(--border);
      border-radius:10px; padding:3px; margin-bottom:16px;
      flex-wrap:wrap;
    }
    .tk-filters .pill {
      padding:6px 14px; border-radius:7px; border:none;
      background:transparent; font-size:.82rem; font-weight:600;
      cursor:pointer; color:var(--text-muted); transition: all .12s;
    }
    .tk-filters .pill:hover { color:var(--text); background:var(--surface); }
    .tk-filters .pill.active {
      background:var(--surface); color:var(--brand);
      box-shadow:0 1px 2px rgba(0,0,0,.06);
    }

    /* legacy classes left in case anything still references them */
    .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
    .stat-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px 12px; text-align:center; }
    .stat-num  { font-size:2rem; font-weight:800; color:var(--brand); line-height:1; margin-bottom:4px; }
    .stat-num.bad  { color:#dc2626; }
    .stat-num.warn { color:#d97706; }
    .stat-label { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); font-weight:600; }
    .pill-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
    .pill { padding:6px 14px; border-radius:100px; border:1.5px solid var(--border); background:var(--surface); font-size:.82rem; font-weight:500; cursor:pointer; color:var(--text-muted); transition:all .12s; }
    .pill:hover { border-color:var(--brand); color:var(--brand); }
    .pill.active { background:var(--brand); color:#fff; border-color:var(--brand); font-weight:600; }

    /* ── Premium task rows ───────────────────────────────────────── */
    .task-list {
      background:var(--surface);
      border:1px solid var(--border); border-radius:14px;
      box-shadow:0 1px 2px rgba(0,0,0,.03), 0 4px 12px -8px rgba(0,0,0,.06);
      overflow:hidden;
    }
    .task-row {
      display:flex; gap:14px; align-items:flex-start;
      padding:14px 18px 14px 22px;
      border-bottom:1px solid var(--border); cursor:pointer;
      transition: background .12s, transform .12s;
      position:relative;
    }
    .task-row:last-child { border-bottom:none; }
    .task-row::before {
      content:''; position:absolute; left:0; top:8px; bottom:8px;
      width:3px; border-radius:0 3px 3px 0;
      background:transparent; transition: background .15s;
    }
    .task-row:hover {
      background: linear-gradient(90deg, var(--brand-light) 0%, transparent 70%);
    }
    .task-row:hover::before { background: var(--brand); }
    .task-row.pri-urgent::before { background:#dc2626; }
    .task-row.pri-high::before   { background:#d97706; }
    .task-check { flex-shrink:0; width:22px; height:22px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s; margin-top:2px; }
    .task-check:hover { border-color:var(--brand); }
    .task-check.done { background:var(--brand); border-color:var(--brand); }
    .task-check.done::after { content:'\\2713'; color:#fff; font-size:12px; font-weight:700; }
    .task-body { flex:1; min-width:0; }
    .task-title { font-weight:700; font-size:.95rem; margin-bottom:3px; }
    .task-title.done { text-decoration:line-through; opacity:.6; }
    .task-sub { font-size:.78rem; color:var(--text-muted); margin-bottom:4px; }
    .task-tags { display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
    .badge-xs { font-size:.68rem; padding:2px 8px; border-radius:100px; font-weight:600; display:inline-block; }
    .bdg-pri-urgent { background:#fee2e2; color:#b91c1c; }
    .bdg-pri-high   { background:#fef3c7; color:#92400e; }
    .bdg-pri-normal { background:#dcfce7; color:#15803d; }
    .bdg-pri-low    { background:var(--border); color:var(--text-muted); }
    .bdg-st-open        { background:#dbeafe; color:#1e40af; }
    .bdg-st-in_progress { background:#fef3c7; color:#92400e; }
    .bdg-st-done        { background:#dcfce7; color:#15803d; }
    .bdg-st-cancelled   { background:var(--border); color:var(--text-muted); }
    .bdg-vis-team    { background:#dbeafe; color:#1e40af; }
    .bdg-vis-private { background:#f3e8ff; color:#7c3aed; }
    .due-badge { font-size:.72rem; color:var(--text-muted); }
    .due-badge.overdue { color:#dc2626; font-weight:600; }
    .avatar-xs { width:20px; height:20px; border-radius:50%; object-fit:cover; }
    .assignee-chip { display:inline-flex; align-items:center; gap:4px; font-size:.72rem; color:var(--text-muted); }

    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--surface); border-radius:var(--radius); box-shadow:0 8px 40px rgba(0,0,0,.2); width:100%; max-width:560px; max-height:90vh; overflow-y:auto; padding:24px; }
    .modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .modal-head h2 { font-size:1.1rem; font-weight:700; margin:0; }
    .modal-close { background:var(--bg); border:none; border-radius:8px; width:32px; height:32px; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; color:var(--text-muted); }
    .modal-close:hover { color:var(--text); background:var(--border); }
    .form-row { display:flex; gap:12px; }
    .form-row .form-group { flex:1; }
    .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }

    /* Detail panel */
    .detail-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500; align-items:flex-start; justify-content:flex-end; }
    .detail-overlay.open { display:flex; }
    .detail-panel { background:var(--surface); width:100%; max-width:640px; height:100vh; overflow-y:auto; padding:28px; box-shadow:-4px 0 30px rgba(0,0,0,.15); }
    .detail-section { margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }
    .detail-section h3 { font-size:.85rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--text-muted); margin-bottom:10px; }
    .checklist-item-wrap { border-bottom:1px solid var(--border); padding-bottom:4px; margin-bottom:4px; }
    .checklist-item-wrap:last-child { border-bottom:none; }
    .checklist-item { display:flex; align-items:center; gap:8px; padding:6px 0; }
    .checklist-item input[type=checkbox] { width:16px; height:16px; accent-color:var(--brand); }
    .checklist-item .item-text { flex:1; font-size:.88rem; }
    .checklist-item .item-text.done { text-decoration:line-through; opacity:.6; }
    .checklist-item .item-actions { display:flex; gap:4px; opacity:0; transition:opacity .1s; }
    .checklist-item:hover .item-actions { opacity:1; }
    .item-action-btn { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:.75rem; padding:2px 4px; border-radius:4px; }
    .item-action-btn:hover { color:var(--brand); background:var(--brand-light); }
    .item-att-list { margin-left:28px; margin-bottom:4px; }
    .item-att { display:inline-flex; align-items:center; gap:4px; font-size:.72rem; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:3px 8px; margin:2px 4px 2px 0; }
    .item-att img { width:24px; height:24px; object-fit:cover; border-radius:3px; cursor:pointer; }
    .item-att .item-att-del { color:var(--text-muted); cursor:pointer; font-size:.7rem; margin-left:2px; }
    .item-att .item-att-del:hover { color:#dc2626; }
    .add-item-row { display:flex; gap:6px; margin-top:6px; }
    .add-item-row input { flex:1; }
    .att-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px; }
    .att-card { background:var(--bg); border-radius:8px; padding:10px; font-size:.78rem; text-align:center; position:relative; border:1px solid var(--border); }
    .att-card img { width:100%; height:80px; object-fit:cover; border-radius:4px; margin-bottom:6px; }
    .att-card .att-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .att-card .att-del { position:absolute; top:4px; right:6px; background:rgba(0,0,0,.6); color:#fff; border:none; border-radius:50%; width:20px; height:20px; font-size:.7rem; cursor:pointer; display:none; align-items:center; justify-content:center; }
    .att-card:hover .att-del { display:flex; }
    .comment-item { display:flex; gap:10px; margin-bottom:12px; }
    .comment-avatar { width:28px; height:28px; border-radius:50%; background:var(--border); flex-shrink:0; object-fit:cover; }
    .comment-body { flex:1; }
    .comment-meta { font-size:.72rem; color:var(--text-muted); margin-bottom:2px; }
    .comment-text { font-size:.88rem; line-height:1.4; }
    .comment-form { display:flex; gap:8px; margin-top:10px; position:relative; }
    .comment-form input { flex:1; }
    .mention-dropdown { position:absolute; bottom:100%; left:0; right:60px; background:var(--surface); border:1px solid var(--border); border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.15); max-height:160px; overflow-y:auto; display:none; z-index:10; }
    .mention-dropdown.open { display:block; }
    .mention-option { display:flex; align-items:center; gap:8px; padding:8px 12px; cursor:pointer; font-size:.85rem; }
    .mention-option:hover, .mention-option.active { background:var(--brand-light); }
    .mention-option img { width:24px; height:24px; border-radius:50%; object-fit:cover; }
    .mention-option .mention-avatar-placeholder { width:24px; height:24px; border-radius:50%; background:var(--border); }

    .drop-zone { border:2px dashed var(--border); border-radius:8px; padding:20px; text-align:center; color:var(--text-muted); font-size:.82rem; cursor:pointer; transition:all .15s; margin-bottom:8px; }
    .drop-zone:hover, .drop-zone.dragover { border-color:var(--brand); color:var(--brand); background:var(--brand-light); }

    .task-section-header { display:flex; align-items:center; gap:8px; margin-top:24px; margin-bottom:10px; }
    .task-section-header:first-child { margin-top:0; }
    .task-section-header h3 { font-size:.88rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--text-muted); margin:0; }
    .task-section-header .section-count { font-size:.75rem; background:var(--border); color:var(--text-muted); padding:1px 8px; border-radius:100px; font-weight:600; }
    .task-section-header .spacer { flex:1; }
    .task-section-header .section-add { font-size:.75rem; padding:4px 12px; border-radius:100px; cursor:pointer; font-weight:600; border:1.5px solid var(--border); background:var(--surface); color:var(--text-muted); transition:all .12s; }
    .task-section-header .section-add:hover { border-color:var(--brand); color:var(--brand); }
    .empty-state { text-align:center; padding:40px 20px; color:var(--text-muted); }
    .empty-state svg { width:48px; height:48px; margin-bottom:12px; opacity:.4; }
    .empty-state p { font-size:.9rem; }

    /* View toggle — segmented to match the filter bar */
    .view-toggle {
      display:inline-flex; gap:2px; margin-left:auto;
      background:var(--bg); border:1px solid var(--border);
      border-radius:9px; padding:3px;
    }
    .view-toggle button {
      padding:6px 12px; border:none; border-radius:6px;
      background:transparent; cursor:pointer; color:var(--text-muted);
      transition:all .1s; font-size:.78rem; font-weight:600;
      display:inline-flex; align-items:center; gap:5px;
    }
    .view-toggle button:hover { color:var(--text); background:var(--surface); }
    .view-toggle button.active {
      background:var(--surface); color:var(--brand);
      box-shadow:0 1px 2px rgba(0,0,0,.06);
    }
    .view-toggle button svg { width:14px; height:14px; }

    /* Section headers (Team Tasks / Private Tasks) — premium typography */
    .task-section-header h3 { color:var(--text); letter-spacing:.08em; }
    .task-section-header .section-count {
      background: var(--brand-light); color: var(--brand);
      border:1px solid color-mix(in srgb, var(--brand) 30%, transparent);
    }
    .task-section-header .section-add {
      border-radius:8px; padding:5px 12px;
      box-shadow:0 1px 1px rgba(0,0,0,.04);
    }

    /* "+ New Task" hero CTA */
    .tk-new-task-btn {
      padding:8px 16px; font-size:.85rem;
      box-shadow:0 1px 2px rgba(0,0,0,.06), 0 4px 12px -6px var(--brand);
    }
    .tk-new-task-btn:hover { transform: translateY(-1px); }

    /* Dark-mode polish for KPI / filters / view toggle */
    html.theme-dark .tk-kpi {
      background: var(--d-surface);
      border-color: var(--d-border);
      box-shadow: 0 1px 2px rgba(0,0,0,.4), 0 4px 12px -8px rgba(0,0,0,.6);
    }
    html.theme-dark .tk-kpi:hover { border-color: var(--d-border-strong); }
    html.theme-dark .tk-kpi-label,
    html.theme-dark .tk-kpi-sub { color: var(--d-text-muted); }
    html.theme-dark .tk-filters,
    html.theme-dark .view-toggle {
      background: var(--d-surface-2); border-color: var(--d-border);
    }
    html.theme-dark .tk-filters .pill,
    html.theme-dark .view-toggle button { color: var(--d-text-muted); }
    html.theme-dark .tk-filters .pill:hover,
    html.theme-dark .view-toggle button:hover {
      background: var(--d-surface); color: var(--d-text);
    }
    html.theme-dark .tk-filters .pill.active,
    html.theme-dark .view-toggle button.active {
      background: var(--d-surface); color: var(--d-brand);
      box-shadow: 0 1px 2px rgba(0,0,0,.4);
    }
    html.theme-dark .task-list {
      background: var(--d-surface); border-color: var(--d-border);
    }
    html.theme-dark .task-row { border-bottom-color: var(--d-border); }
    html.theme-dark .task-row:hover {
      background: linear-gradient(90deg, var(--d-brand-glow) 0%, transparent 70%);
    }

    /* Kanban board */
    .kanban-board { display:flex; gap:16px; overflow-x:auto; padding-bottom:16px; align-items:flex-start; }
    .kanban-col { min-width:280px; max-width:320px; flex-shrink:0; background:var(--bg); border-radius:var(--radius); border:1px solid var(--border); }
    .kanban-col-head { display:flex; align-items:center; gap:8px; padding:12px 14px; border-bottom:1px solid var(--border); }
    .kanban-col-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .kanban-col-name { font-weight:700; font-size:.85rem; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .kanban-col-count { font-size:.7rem; background:var(--border); color:var(--text-muted); padding:1px 7px; border-radius:100px; font-weight:600; }
    .kanban-col-menu { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:1rem; padding:2px 4px; border-radius:4px; }
    .kanban-col-menu:hover { background:var(--border); }
    .kanban-col-body { padding:8px; min-height:60px; transition:background .15s; }
    .kanban-col-body.drag-over { background:var(--brand-light); border-radius:0 0 var(--radius) var(--radius); }
    .kanban-card { background:var(--surface); border-radius:8px; padding:10px 12px; margin-bottom:8px; cursor:grab; border:1px solid var(--border); transition:all .1s; box-shadow:0 1px 3px rgba(0,0,0,.04); }
    .kanban-card:active { cursor:grabbing; }
    .kanban-card.dragging { opacity:.4; transform:scale(.95); }
    .kanban-card:hover { border-color:var(--brand); box-shadow:0 2px 8px rgba(0,0,0,.08); }
    .kanban-card:last-child { margin-bottom:0; }
    .kanban-card .kc-title { font-size:.82rem; font-weight:600; margin-bottom:4px; }
    .kanban-card .kc-meta { display:flex; gap:4px; flex-wrap:wrap; align-items:center; }
    .kanban-col-add { display:flex; align-items:center; justify-content:center; padding:8px; cursor:pointer; color:var(--text-muted); font-size:.8rem; font-weight:500; border-top:1px solid var(--border); transition:color .1s; }
    .kanban-col-add:hover { color:var(--brand); }
    .kanban-add-col { min-width:280px; max-width:320px; flex-shrink:0; background:var(--bg); border-radius:var(--radius); border:2px dashed var(--border); display:flex; align-items:center; justify-content:center; padding:20px; cursor:pointer; color:var(--text-muted); font-size:.85rem; font-weight:600; transition:all .12s; min-height:100px; }
    .kanban-add-col:hover { border-color:var(--brand); color:var(--brand); }

    @media(max-width:640px) { .stat-grid { grid-template-columns:repeat(2,1fr); } .form-row { flex-direction:column; } .detail-panel { max-width:100%; } .kanban-col { min-width:260px; } }
  </style>
</head>
<body class="os-newlayout">
<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<main class="page">
  <!-- Premium KPI cards — colored accent + corner icon -->
  <div class="tk-kpi-row">
    <div class="tk-kpi open">
      <div class="tk-kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <div class="tk-kpi-label">Open</div>
      <div class="tk-kpi-value" id="s-open">—</div>
      <div class="tk-kpi-sub">awaiting action</div>
    </div>
    <div class="tk-kpi progress">
      <div class="tk-kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg></div>
      <div class="tk-kpi-label">In Progress</div>
      <div class="tk-kpi-value" id="s-progress">—</div>
      <div class="tk-kpi-sub">in flight</div>
    </div>
    <div class="tk-kpi overdue">
      <div class="tk-kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
      <div class="tk-kpi-label">Overdue</div>
      <div class="tk-kpi-value" id="s-overdue">—</div>
      <div class="tk-kpi-sub">past due date</div>
    </div>
    <div class="tk-kpi done">
      <div class="tk-kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="tk-kpi-label">Completed</div>
      <div class="tk-kpi-value" id="s-done">—</div>
      <div class="tk-kpi-sub">all-time</div>
    </div>
  </div>

  <div class="section-header">
    <span class="section-title">Tasks</span>
    <div class="view-toggle">
      <button id="btn-list-view" class="active" onclick="setViewMode('list')">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        List
      </button>
      <button id="btn-board-view" onclick="setViewMode('board')">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Board
      </button>
    </div>
    <button class="btn btn-primary tk-new-task-btn" onclick="openCreate()">+ New Task</button>
  </div>

  <div class="tk-filters" id="pills">
    <button class="pill active" data-f="active">Active</button>
    <button class="pill" data-f="open">Open</button>
    <button class="pill" data-f="in_progress">In Progress</button>
    <button class="pill" data-f="done">Done</button>
    <button class="pill" data-f="mine">Assigned to Me</button>
    <button class="pill" data-f="created">Created by Me</button>
  </div>

  <div id="list"><p class="text-muted text-sm">Loading...</p></div>
</main>

<!-- Create/Edit modal -->
<div class="modal-overlay" id="modal-create">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h2 id="modal-title">New Task</h2>
      <button class="modal-close" onclick="closeCreate()">&#10005;</button>
    </div>
    <form id="create-form" onsubmit="submitCreate(event)">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input class="form-input" id="c-title" placeholder="e.g. Build the login page redesign" required>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-input" id="c-desc" rows="3" style="min-height:0;resize:vertical;" placeholder="What needs to be done and why..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="form-input" id="c-priority">
            <option value="low">Low</option>
            <option value="normal" selected>Normal</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Due Date</label>
          <input class="form-input" id="c-due" type="date">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Assign To</label>
          <select class="form-input" id="c-assign">
            <option value="">-- Unassigned --</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Property (optional)</label>
          <select class="form-input" id="c-property">
            <option value="">-- None --</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Project</label>
          <select class="form-input" id="c-project">
            <option value="">-- No Project --</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Visibility</label>
          <select class="form-input" id="c-visibility">
            <option value="team">Team</option>
            <option value="private">Private</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Requirements / Sub-tasks</label>
        <div id="c-items"></div>
        <button type="button" class="btn btn-secondary" style="padding:6px 12px;font-size:.8rem;margin-top:6px;" onclick="addCreateItem()">+ Add item</button>
      </div>
      <div class="form-group">
        <label class="form-label">Attachments</label>
        <div class="drop-zone" id="c-drop-zone" onclick="document.getElementById('c-file-input').click()"
             ondragover="event.preventDefault();this.classList.add('dragover')"
             ondragleave="this.classList.remove('dragover')"
             ondrop="event.preventDefault();this.classList.remove('dragover');queueFiles(event.dataTransfer.files)">
          Drop files here, click to upload, or paste screenshots
        </div>
        <input type="file" id="c-file-input" multiple style="display:none" onchange="queueFiles(this.files);this.value=''">
        <div id="c-file-list"></div>
      </div>
      <p id="c-err" class="text-sm mt-8" style="color:var(--danger);display:none;"></p>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" style="padding:10px 18px;font-size:.88rem;" onclick="closeCreate()">Cancel</button>
        <button type="submit" class="btn btn-primary" style="padding:10px 18px;font-size:.88rem;" id="c-save">Create Task</button>
      </div>
    </form>
  </div>
</div>

<!-- New Project modal -->
<div class="modal-overlay" id="modal-project">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h2 id="project-modal-title">New Project</h2>
      <button class="modal-close" onclick="closeProjectModal()">&#10005;</button>
    </div>
    <div class="form-group">
      <label class="form-label">Project Name *</label>
      <input class="form-input" id="p-name" placeholder="e.g. Website Redesign, Q3 Maintenance..." required>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-input" id="p-desc" rows="2" style="min-height:0;resize:vertical;" placeholder="What is this project about?"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Color</label>
        <input class="form-input" id="p-color" type="color" value="#2563eb" style="height:38px;padding:4px;">
      </div>
      <div class="form-group">
        <label class="form-label">Visibility</label>
        <select class="form-input" id="p-visibility">
          <option value="team">Team</option>
          <option value="private">Private</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" style="padding:10px 18px;font-size:.88rem;" onclick="closeProjectModal()">Cancel</button>
      <button type="button" class="btn btn-primary" style="padding:10px 18px;font-size:.88rem;" onclick="saveProject()">Create</button>
    </div>
  </div>
</div>

<!-- Detail side panel -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail()">
  <div class="detail-panel" onclick="event.stopPropagation()">
    <div id="detail-content">Loading...</div>
  </div>
</div>

<script>window.NAV_CURRENT = 'tasks';</script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
const STATUS_LBL = {open:'Open',in_progress:'In Progress',done:'Done',cancelled:'Cancelled'};
const PRI_LBL = {low:'Low',normal:'Normal',high:'High',urgent:'Urgent'};
let allTasks = [], usersCache = [], propsCache = [], projectsCache = [], currentFilter = 'active', currentUser = null, openTaskId = null;
let viewMode = localStorage.getItem('tasks_view_mode') || 'list';
let editingProjectId = null;

function setViewMode(mode) {
  viewMode = mode;
  localStorage.setItem('tasks_view_mode', mode);
  document.getElementById('btn-list-view').classList.toggle('active', mode === 'list');
  document.getElementById('btn-board-view').classList.toggle('active', mode === 'board');
  document.getElementById('pills').style.display = mode === 'board' ? 'none' : '';
  renderView();
}

function renderView() {
  if (viewMode === 'board') renderBoard();
  else renderList();
}

async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;
  await Promise.all([loadUsers(), loadProperties(), loadProjects()]);
  setViewMode(viewMode);
  await loadTasks();
}

async function loadUsers() {
  try {
    usersCache = await apiFetch('/api/users');
    const sel = document.getElementById('c-assign');
    sel.innerHTML = '<option value="">-- Unassigned --</option>' +
      usersCache.map(u => `<option value="${u.id}">${esc(u.full_name || u.email)}</option>`).join('');
  } catch {}
}

async function loadProperties() {
  try {
    propsCache = await apiFetch('/api/properties');
    const sel = document.getElementById('c-property');
    sel.innerHTML = '<option value="">-- None --</option>' +
      propsCache.map(p => `<option value="${p.id}">${esc(p.address_line1)}, ${esc(p.city)}</option>`).join('');
  } catch {}
}

async function loadProjects() {
  try {
    projectsCache = await apiFetch('/api/task-projects');
    const sel = document.getElementById('c-project');
    sel.innerHTML = '<option value="">-- No Project --</option>' +
      projectsCache.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('');
  } catch {}
}

async function loadTasks() {
  try {
    allTasks = await apiFetch('/api/tasks');
    renderStats();
    renderView();
  } catch (err) {
    document.getElementById('list').innerHTML = `<p class="text-muted text-sm">Error: ${esc(err.message)}</p>`;
  }
}

function renderStats() {
  const today = new Date().toISOString().split('T')[0];
  const open = allTasks.filter(t => t.status === 'open').length;
  const prog = allTasks.filter(t => t.status === 'in_progress').length;
  const overdue = allTasks.filter(t => t.due_date && t.due_date < today && t.status !== 'done' && t.status !== 'cancelled').length;
  const done = allTasks.filter(t => t.status === 'done').length;
  document.getElementById('s-open').textContent = open;
  document.getElementById('s-progress').textContent = prog;
  document.getElementById('s-overdue').textContent = overdue;
  document.getElementById('s-done').textContent = done;
}

function filterTasks() {
  const today = new Date().toISOString().split('T')[0];
  switch(currentFilter) {
    case 'active': return allTasks.filter(t => t.status === 'open' || t.status === 'in_progress');
    case 'open': return allTasks.filter(t => t.status === 'open');
    case 'in_progress': return allTasks.filter(t => t.status === 'in_progress');
    case 'done': return allTasks.filter(t => t.status === 'done');
    case 'mine': return allTasks.filter(t => t.assigned_to === currentUser.id && t.status !== 'done' && t.status !== 'cancelled');
    case 'created': return allTasks.filter(t => t.created_by === currentUser.id);
    default: return allTasks;
  }
}

function renderTaskRow(t) {
  const today = new Date().toISOString().split('T')[0];
  const isDone = t.status === 'done';
  const isOverdue = t.due_date && t.due_date < today && !isDone;
  const priClass = (t.priority === 'urgent' || t.priority === 'high') ? ` pri-${t.priority}` : '';
  return `
    <div class="task-row${priClass}" onclick="openDetail('${t.id}')">
      <div class="task-check ${isDone ? 'done' : ''}" onclick="event.stopPropagation();toggleDone('${t.id}',${isDone})"></div>
      <div class="task-body">
        <div class="task-title ${isDone ? 'done' : ''}">${esc(t.title)}</div>
        <div class="task-sub">${t.description ? esc(t.description.substring(0, 80)) + (t.description.length > 80 ? '...' : '') : ''}</div>
        <div class="task-tags">
          <span class="badge-xs bdg-pri-${t.priority}">${PRI_LBL[t.priority]}</span>
          <span class="badge-xs bdg-st-${t.status}">${STATUS_LBL[t.status]}</span>
          ${t.due_date ? `<span class="due-badge ${isOverdue ? 'overdue' : ''}">Due ${formatDate(t.due_date)}</span>` : ''}
          ${t.property_address ? `<span class="assignee-chip" style="color:var(--brand);">${esc(t.property_address)}</span>` : ''}
          ${t.assigned_to_name ? `<span class="assignee-chip">${t.assigned_to_avatar ? `<img class="avatar-xs" src="${t.assigned_to_avatar}">` : ''} ${esc(t.assigned_to_name)}</span>` : ''}
        </div>
      </div>
    </div>`;
}

function renderList() {
  const tasks = filterTasks();
  const teamTasks = tasks.filter(t => (t.visibility || 'team') === 'team');
  const privateTasks = tasks.filter(t => t.visibility === 'private');

  if (teamTasks.length === 0 && privateTasks.length === 0) {
    document.getElementById('list').innerHTML = `
      <div class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <p>No tasks here yet.</p>
      </div>`;
    return;
  }

  let html = '';

  // Team tasks table
  html += `<div class="task-section-header"><h3>Team Tasks</h3><span class="section-count">${teamTasks.length}</span><div class="spacer"></div><button class="section-add" onclick="openCreateWithVisibility('team')">+ New Team Task</button></div>`;
  if (teamTasks.length > 0) {
    html += `<div class="task-list">${teamTasks.map(renderTaskRow).join('')}</div>`;
  } else {
    html += `<div class="task-list" style="padding:20px;text-align:center;color:var(--text-muted);font-size:.85rem;">No team tasks</div>`;
  }

  // Private tasks table
  html += `<div class="task-section-header" style="margin-top:28px;"><h3>Private Tasks</h3><span class="section-count">${privateTasks.length}</span><div class="spacer"></div><button class="section-add" onclick="openCreateWithVisibility('private')">+ New Private Task</button></div>`;
  if (privateTasks.length > 0) {
    html += `<div class="task-list">${privateTasks.map(renderTaskRow).join('')}</div>`;
  } else {
    html += `<div class="task-list" style="padding:20px;text-align:center;color:var(--text-muted);font-size:.85rem;">No private tasks</div>`;
  }

  document.getElementById('list').innerHTML = html;
}

function renderBoard() {
  const activeTasks = allTasks.filter(t => t.status !== 'cancelled');
  let html = '<div class="kanban-board">';

  // Backlog column (tasks with no project)
  const backlog = activeTasks.filter(t => !t.project_id);
  html += renderKanbanCol(null, 'Backlog', '#94a3b8', backlog);

  // Project columns
  projectsCache.forEach(p => {
    const projTasks = activeTasks.filter(t => t.project_id === p.id);
    html += renderKanbanCol(p.id, p.name, p.color, projTasks, p.visibility);
  });

  // Add project column
  html += `<div class="kanban-add-col" onclick="openProjectModal()">+ New Project</div>`;
  html += '</div>';
  document.getElementById('list').innerHTML = html;
}

function renderKanbanCol(projectId, name, color, tasks, visibility) {
  const done = tasks.filter(t => t.status === 'done').length;
  const active = tasks.filter(t => t.status !== 'done');
  const doneList = tasks.filter(t => t.status === 'done');
  return `
    <div class="kanban-col">
      <div class="kanban-col-head">
        <div class="kanban-col-dot" style="background:${color}"></div>
        <span class="kanban-col-name">${esc(name)}</span>
        ${visibility === 'private' ? '<span style="font-size:.6rem;background:#f3e8ff;color:#7c3aed;padding:1px 6px;border-radius:100px;">Private</span>' : ''}
        <span class="kanban-col-count">${tasks.length}</span>
        ${projectId ? `<button class="kanban-col-menu" onclick="event.stopPropagation();editProject('${projectId}')" title="Edit project">&#9881;</button>` : ''}
      </div>
      <div class="kanban-col-body" data-project-id="${projectId || ''}"
           ondragover="event.preventDefault();this.classList.add('drag-over')"
           ondragleave="this.classList.remove('drag-over')"
           ondrop="this.classList.remove('drag-over');dropTask(event,'${projectId || ''}')">
        ${active.map(t => renderKanbanCard(t)).join('')}
        ${doneList.length > 0 ? `<div style="font-size:.7rem;color:var(--text-muted);text-transform:uppercase;font-weight:700;letter-spacing:.04em;padding:8px 4px 4px;">Done (${doneList.length})</div>` : ''}
        ${doneList.map(t => renderKanbanCard(t)).join('')}
        ${tasks.length === 0 ? '<div style="padding:12px;text-align:center;color:var(--text-muted);font-size:.8rem;">No tasks</div>' : ''}
      </div>
      <div class="kanban-col-add" onclick="openCreateInProject('${projectId || ''}')">+ Add task</div>
    </div>`;
}

function renderKanbanCard(t) {
  const isDone = t.status === 'done';
  const today = new Date().toISOString().split('T')[0];
  const isOverdue = t.due_date && t.due_date < today && !isDone;
  return `
    <div class="kanban-card" draggable="true" ondragstart="dragTask(event,'${t.id}')" ondragend="dragEnd(event)" onclick="openDetail('${t.id}')">
      <div class="kc-title" style="${isDone ? 'text-decoration:line-through;opacity:.6;' : ''}">${esc(t.title)}</div>
      <div class="kc-meta">
        <span class="badge-xs bdg-pri-${t.priority}" style="font-size:.62rem;">${PRI_LBL[t.priority]}</span>
        <span class="badge-xs bdg-st-${t.status}" style="font-size:.62rem;">${STATUS_LBL[t.status]}</span>
        ${isOverdue ? '<span class="badge-xs" style="background:#fee2e2;color:#b91c1c;font-size:.62rem;">Overdue</span>' : ''}
        ${t.due_date ? `<span style="font-size:.65rem;color:var(--text-muted);">Due ${formatDate(t.due_date)}</span>` : ''}
      </div>
      ${t.assigned_to_name ? `<div style="font-size:.7rem;color:var(--text-muted);margin-top:4px;">${esc(t.assigned_to_name)}</div>` : ''}
    </div>`;
}

function openCreateInProject(projectId) {
  openCreate();
  if (projectId) document.getElementById('c-project').value = projectId;
}

// ── Drag and drop
function dragTask(e, taskId) {
  e.dataTransfer.setData('text/plain', taskId);
  e.dataTransfer.effectAllowed = 'move';
  requestAnimationFrame(() => e.target.classList.add('dragging'));
}
function dragEnd(e) {
  e.target.classList.remove('dragging');
}
async function dropTask(e, projectId) {
  const taskId = e.dataTransfer.getData('text/plain');
  if (!taskId) return;
  try {
    await apiFetch(`/api/tasks/${taskId}`, { method: 'PATCH', body: JSON.stringify({ project_id: projectId || null }) });
    await loadTasks();
  } catch {}
}

// ── Project CRUD
function openProjectModal() {
  editingProjectId = null;
  document.getElementById('p-name').value = '';
  document.getElementById('p-desc').value = '';
  document.getElementById('p-color').value = '#2563eb';
  document.getElementById('p-visibility').value = 'team';
  document.getElementById('project-modal-title').textContent = 'New Project';
  document.getElementById('modal-project').classList.add('open');
  document.getElementById('p-name').focus();
}
function closeProjectModal() { document.getElementById('modal-project').classList.remove('open'); }
document.getElementById('modal-project').addEventListener('click', e => { if (e.target === e.currentTarget) closeProjectModal(); });

async function saveProject() {
  const name = document.getElementById('p-name').value.trim();
  if (!name) return;
  const body = {
    name,
    description: document.getElementById('p-desc').value.trim() || null,
    color: document.getElementById('p-color').value,
    visibility: document.getElementById('p-visibility').value,
  };
  try {
    if (editingProjectId) {
      await apiFetch(`/api/task-projects/${editingProjectId}`, { method: 'PATCH', body: JSON.stringify(body) });
    } else {
      await apiFetch('/api/task-projects', { method: 'POST', body: JSON.stringify(body) });
    }
    closeProjectModal();
    await loadProjects();
    await loadTasks();
  } catch (err) { alert(err.message); }
}

async function editProject(id) {
  const p = projectsCache.find(p => p.id === id);
  if (!p) return;
  editingProjectId = id;
  document.getElementById('p-name').value = p.name;
  document.getElementById('p-desc').value = p.description || '';
  document.getElementById('p-color').value = p.color || '#2563eb';
  document.getElementById('p-visibility').value = p.visibility || 'team';
  document.getElementById('project-modal-title').textContent = 'Edit Project';
  document.getElementById('modal-project').classList.add('open');
}

async function deleteProject(id) {
  if (!confirm('Delete this project? Tasks will be moved to Backlog.')) return;
  try {
    await apiFetch(`/api/task-projects/${id}`, { method: 'DELETE' });
    await loadProjects();
    await loadTasks();
  } catch (err) { alert(err.message); }
}

// ── Filter pills
document.getElementById('pills').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  document.querySelectorAll('#pills .pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  currentFilter = pill.dataset.f;
  renderView();
});

// ── Create / Edit task
let editingTaskId = null;
let queuedFiles = [];
function openCreateWithVisibility(vis) {
  openCreate();
  document.getElementById('c-visibility').value = vis;
}

function openCreate() {
  editingTaskId = null;
  queuedFiles = [];
  document.getElementById('c-items').innerHTML = '';
  document.getElementById('c-file-list').innerHTML = '';
  document.getElementById('create-form').reset();
  document.getElementById('c-err').style.display = 'none';
  document.getElementById('modal-title').textContent = 'New Task';
  document.getElementById('c-save').textContent = 'Create Task';
  document.getElementById('modal-create').classList.add('open');
}
function openEdit(task) {
  editingTaskId = task.id;
  queuedFiles = [];
  document.getElementById('c-file-list').innerHTML = '';
  document.getElementById('c-err').style.display = 'none';
  document.getElementById('modal-title').textContent = 'Edit Task';
  document.getElementById('c-save').textContent = 'Save Changes';
  document.getElementById('c-title').value = task.title || '';
  document.getElementById('c-desc').value = task.description || '';
  document.getElementById('c-priority').value = task.priority || 'normal';
  document.getElementById('c-due').value = task.due_date || '';
  document.getElementById('c-assign').value = task.assigned_to || '';
  document.getElementById('c-property').value = task.property_id || '';
  document.getElementById('c-visibility').value = task.visibility || 'team';
  document.getElementById('c-project').value = task.project_id || '';
  document.getElementById('c-items').innerHTML = '';
  if (task.items) {
    task.items.forEach((item, i) => {
      const div = document.getElementById('c-items');
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;gap:6px;margin-bottom:4px;align-items:center;';
      row.innerHTML = `<input class="form-input" style="flex:1;padding:6px 10px;font-size:.85rem;" placeholder="Requirement ${i+1}" value="${esc(item.text)}" data-item-id="${item.id}">
        <button type="button" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;" onclick="this.parentElement.remove()">&#10005;</button>`;
      div.appendChild(row);
    });
  }
  document.getElementById('modal-create').classList.add('open');
}
function formHasData() {
  return document.getElementById('c-title').value.trim() ||
    document.getElementById('c-desc').value.trim() ||
    document.getElementById('c-due').value ||
    document.getElementById('c-assign').value ||
    document.getElementById('c-property').value ||
    document.getElementById('c-priority').value !== 'normal' ||
    document.getElementById('c-visibility').value !== 'team' ||
    document.querySelectorAll('#c-items input').length > 0 ||
    queuedFiles.length > 0;
}
function closeCreate(force) {
  if (!force && !editingTaskId && formHasData()) {
    if (!confirm('You have unsaved work. Discard this task?')) return;
  }
  editingTaskId = null;
  queuedFiles = [];
  document.getElementById('modal-create').classList.remove('open');
}
document.getElementById('modal-create').addEventListener('click', e => { if (e.target === e.currentTarget) closeCreate(); });

// ── File queuing for create/edit modal
function queueFiles(fileList) {
  for (const f of fileList) queuedFiles.push(f);
  renderQueuedFiles();
}
function removeQueuedFile(idx) {
  queuedFiles.splice(idx, 1);
  renderQueuedFiles();
}
function renderQueuedFiles() {
  const el = document.getElementById('c-file-list');
  if (queuedFiles.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = queuedFiles.map((f, i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.82rem;">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(f.name)}</span>
      <span style="color:var(--text-muted);font-size:.72rem;">${(f.size/1024).toFixed(0)} KB</span>
      <button type="button" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.9rem;" onclick="removeQueuedFile(${i})">&#10005;</button>
    </div>
  `).join('');
}

// Paste screenshots into the create/edit modal
document.getElementById('modal-create').addEventListener('paste', (e) => {
  const files = [];
  for (const item of e.clipboardData.items) {
    if (item.type.startsWith('image/')) {
      const blob = item.getAsFile();
      if (blob) files.push(new File([blob], `screenshot-${Date.now()}.png`, { type: blob.type }));
    }
  }
  if (files.length > 0) queueFiles(files);
});

function addCreateItem() {
  const div = document.getElementById('c-items');
  const idx = div.children.length;
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:6px;margin-bottom:4px;align-items:center;';
  row.innerHTML = `<input class="form-input" style="flex:1;padding:6px 10px;font-size:.85rem;" placeholder="Requirement ${idx+1}" data-item-idx="${idx}">
    <button type="button" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;" onclick="this.parentElement.remove()">&#10005;</button>`;
  div.appendChild(row);
  row.querySelector('input').focus();
}

async function submitCreate(e) {
  e.preventDefault();
  const title = document.getElementById('c-title').value.trim();
  if (!title) return;
  const items = Array.from(document.querySelectorAll('#c-items input')).map(i => ({text: i.value, id: i.dataset.itemId})).filter(i => i.text.trim());

  try {
    document.getElementById('c-save').disabled = true;

    if (editingTaskId) {
      // ── Edit mode
      await apiFetch(`/api/tasks/${editingTaskId}`, { method: 'PATCH', body: JSON.stringify({
        title,
        description: document.getElementById('c-desc').value.trim() || null,
        priority: document.getElementById('c-priority').value,
        due_date: document.getElementById('c-due').value || null,
        assigned_to: document.getElementById('c-assign').value || null,
        property_id: document.getElementById('c-property').value || null,
        visibility: document.getElementById('c-visibility').value,
        project_id: document.getElementById('c-project').value || null,
      })});
      // Sync items: delete removed, update existing, add new
      const existing = await apiFetch(`/api/tasks/${editingTaskId}`);
      const oldIds = existing.items.map(i => i.id);
      const newIds = items.filter(i => i.id).map(i => i.id);
      for (const oldId of oldIds) {
        if (!newIds.includes(oldId)) await apiFetch(`/api/tasks/${editingTaskId}/items/${oldId}`, { method: 'DELETE' });
      }
      for (const item of items) {
        if (item.id) {
          const old = existing.items.find(i => i.id === item.id);
          if (old && old.text !== item.text) await apiFetch(`/api/tasks/${editingTaskId}/items/${item.id}`, { method: 'PATCH', body: JSON.stringify({ text: item.text }) });
        } else {
          await apiFetch(`/api/tasks/${editingTaskId}/items`, { method: 'POST', body: JSON.stringify({ text: item.text }) });
        }
      }
      // Upload queued files
      for (const file of queuedFiles) {
        const form = new FormData();
        form.append('file', file);
        await apiFetch(`/api/tasks/${editingTaskId}/attachments`, { method: 'POST', body: form });
      }
      const savedId = editingTaskId;
      closeCreate(true);
      await loadTasks();
      await openDetail(savedId);
    } else {
      // ── Create mode
      const task = await apiFetch('/api/tasks', { method: 'POST', body: JSON.stringify({
        title,
        description: document.getElementById('c-desc').value.trim() || null,
        priority: document.getElementById('c-priority').value,
        due_date: document.getElementById('c-due').value || null,
        assigned_to: document.getElementById('c-assign').value || null,
        property_id: document.getElementById('c-property').value || null,
        project_id: document.getElementById('c-project').value || null,
        visibility: document.getElementById('c-visibility').value,
        items: items.map(i => ({ text: i.text }))
      })});
      // Upload queued files
      for (const file of queuedFiles) {
        const form = new FormData();
        form.append('file', file);
        await apiFetch(`/api/tasks/${task.id}/attachments`, { method: 'POST', body: form });
      }
      closeCreate(true);
      await loadTasks();
      if (queuedFiles.length > 0) await openDetail(task.id);
    }
  } catch (err) {
    document.getElementById('c-err').textContent = err.message;
    document.getElementById('c-err').style.display = '';
  } finally {
    document.getElementById('c-save').disabled = false;
  }
}

// ── Toggle done
async function toggleDone(id, wasDone) {
  try {
    await apiFetch(`/api/tasks/${id}`, { method: 'PATCH', body: JSON.stringify({ status: wasDone ? 'open' : 'done' }) });
    await loadTasks();
  } catch {}
}

// ── Detail panel
async function openDetail(id) {
  openTaskId = id;
  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-content').innerHTML = '<p class="text-muted">Loading...</p>';
  try {
    const task = await apiFetch(`/api/tasks/${id}`);
    renderDetail(task);
  } catch (err) {
    document.getElementById('detail-content').innerHTML = `<p class="text-muted">Error: ${esc(err.message)}</p>`;
  }
}
function closeDetail() { openTaskId = null; document.getElementById('detail-overlay').classList.remove('open'); }

    ${isOverdue ? `<div style="background:#fee2e2;color:#b91c1c;padding:8px 12px;border-radius:6px;font-size:.82rem;font-weight:600;margin-bottom:16px;">Overdue - was due ${formatDate(task.due_date)}</div>` : ''}

    <div class="detail-section">
      <h3>Requirements / Checklist (${task.items.filter(i=>i.is_done).length}/${task.items.length})</h3>
      <div id="checklist-items">
        ${task.items.map(item => {
          const itemAtts = task.attachments.filter(a => a.task_item_id === item.id);
          return `

              <input type="checkbox" ${item.is_done?'checked':''} onchange="toggleItem('${task.id}','${item.id}',this.checked)">
              <span class="item-text ${item.is_done?'done':''}">${esc(item.text)}</span>
              <span class="item-actions">

                </button>

// ── Edit from detail panel
async function editFromDetail(id) {
  try {
    const task = await apiFetch(`/api/tasks/${id}`);
    closeDetail();
    openEdit(task);
  } catch {}
}

// ── Task CRUD helpers
async function updateTask(id, field, value) {
  try {
    await apiFetch(`/api/tasks/${id}`, { method: 'PATCH', body: JSON.stringify({ [field]: value || null }) });
    await loadTasks();
    await openDetail(id);
  } catch {}
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await apiFetch(`/api/tasks/${id}`, { method: 'DELETE' });
    closeDetail();
    await loadTasks();
  } catch {}
}

// ── Checklist items
async function toggleItem(taskId, itemId, checked) {
  try {
    await apiFetch(`/api/tasks/${taskId}/items/${itemId}`, { method: 'PATCH', body: JSON.stringify({ is_done: checked }) });
    await openDetail(taskId);
  } catch {}
}

async function addItem(taskId) {
  const input = document.getElementById('new-item-input');
  const text = input.value.trim();
  if (!text) return;
  try {
    await apiFetch(`/api/tasks/${taskId}/items`, { method: 'POST', body: JSON.stringify({ text }) });
    input.value = '';
    await openDetail(taskId);
  } catch {}
}

async function deleteItem(taskId, itemId) {
  try {
    await apiFetch(`/api/tasks/${taskId}/items/${itemId}`, { method: 'DELETE' });
    await openDetail(taskId);
  } catch {}
}

// ── Attachments
function triggerItemUpload(taskId, itemId) {
  const input = document.getElementById('item-file-input');
  input.onchange = () => { uploadItemFiles(taskId, itemId, input.files); input.value = ''; };
  input.click();
}
async function uploadItemFiles(taskId, itemId, files) {
  for (const file of files) {
    const form = new FormData();
    form.append('file', file);
    form.append('task_item_id', itemId);
    try { await apiFetch(`/api/tasks/${taskId}/attachments`, { method: 'POST', body: form }); } catch {}
  }
  await openDetail(taskId);
}
async function uploadFiles(taskId, files) {
  for (const file of files) {
    const form = new FormData();
    form.append('file', file);
    try {
      await apiFetch(`/api/tasks/${taskId}/attachments`, { method: 'POST', body: form });
    } catch {}
  }
  await openDetail(taskId);
}

async function deleteAtt(taskId, attId) {
  try {
    await apiFetch(`/api/tasks/${taskId}/attachments/${attId}`, { method: 'DELETE' });
    await openDetail(taskId);
  } catch {}
}

// ── @Mention autocomplete
let mentionActive = false, mentionStart = -1, mentionIdx = 0, mentionMatches = [];

function handleMentionInput(input) {
  const val = input.value;
  const cursor = input.selectionStart;
  const before = val.substring(0, cursor);
  const atPos = before.lastIndexOf('@');
  if (atPos === -1 || (atPos > 0 && before[atPos - 1] !== ' ' && before[atPos - 1] !== '\n')) {
    closeMentionDropdown();
    return;
  }
  const query = before.substring(atPos + 1).toLowerCase();
  mentionStart = atPos;
  mentionMatches = usersCache.filter(u => {
    const name = (u.full_name || u.email || '').toLowerCase();
    const first = name.split(' ')[0];
    return name.includes(query) || first.startsWith(query);
  }).slice(0, 6);
  if (mentionMatches.length === 0) { closeMentionDropdown(); return; }
  mentionIdx = 0;
  mentionActive = true;
  renderMentionDropdown();
}

function renderMentionDropdown() {
  const dd = document.getElementById('mention-dropdown');
  dd.innerHTML = mentionMatches.map((u, i) => `
    <div class="mention-option ${i === mentionIdx ? 'active' : ''}" onmousedown="event.preventDefault();selectMention(${i})">
      ${u.avatar_url ? `<img src="${u.avatar_url}">` : `<div class="mention-avatar-placeholder"></div>`}
      <span>${esc(u.full_name || u.email)}</span>
    </div>
  `).join('');
  dd.classList.add('open');
}

function closeMentionDropdown() {
  mentionActive = false;
  mentionMatches = [];
  const dd = document.getElementById('mention-dropdown');
  if (dd) dd.classList.remove('open');
}

function selectMention(idx) {
  const user = mentionMatches[idx];
  if (!user) return;
  const input = document.getElementById('comment-input');
  const val = input.value;
  const cursor = input.selectionStart;
  const before = val.substring(0, mentionStart);
  const after = val.substring(cursor);
  const name = user.full_name || user.email;
  input.value = before + '@' + name + ' ' + after;
  const newPos = before.length + 1 + name.length + 1;
  input.setSelectionRange(newPos, newPos);
  input.focus();
  closeMentionDropdown();
}

function handleMentionKeydown(e, taskId) {
  if (mentionActive) {
    if (e.key === 'ArrowDown') { e.preventDefault(); mentionIdx = Math.min(mentionIdx + 1, mentionMatches.length - 1); renderMentionDropdown(); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); mentionIdx = Math.max(mentionIdx - 1, 0); renderMentionDropdown(); return; }
    if (e.key === 'Tab' || e.key === 'Enter') { e.preventDefault(); selectMention(mentionIdx); return; }
    if (e.key === 'Escape') { e.preventDefault(); closeMentionDropdown(); return; }
  } else if (e.key === 'Enter') {
    e.preventDefault();
    addComment(taskId);
  }
}

// ── Comments
async function addComment(taskId) {
  const input = document.getElementById('comment-input');
  const body = input.value.trim();
  if (!body) return;
  try {
    await apiFetch(`/api/tasks/${taskId}/comments`, { method: 'POST', body: JSON.stringify({ body }) });
    input.value = '';
    await openDetail(taskId);
  } catch {}
}

// ── Clipboard paste for screenshots
document.addEventListener('paste', async (e) => {
  if (!openTaskId) return;
  const items = e.clipboardData.items;
  const files = [];
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const blob = item.getAsFile();
      if (blob) files.push(new File([blob], `screenshot-${Date.now()}.png`, { type: blob.type }));
    }
  }
  if (files.length === 0) return;
  for (const file of files) {
    const form = new FormData();
    form.append('file', file);
    try { await apiFetch(`/api/tasks/${openTaskId}/attachments`, { method: 'POST', body: form }); } catch {}
  }
  await openDetail(openTaskId);
});

// ── Utilities
function esc(s) { return escHtml ? escHtml(String(s || '')) : String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function formatDate(d) {
  if (!d) return '';
  const date = new Date(d);
  return date.toLocaleDateString('en-US', { month:'short', day:'numeric', year: date.getFullYear() !== new Date().getFullYear() ? 'numeric' : undefined });
}

init();
