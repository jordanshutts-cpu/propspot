<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Restoration OS — Contacts</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .filter-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom: 12px; }
    .filter-chip { padding: 6px 12px; border-radius: 100px; background: var(--surface); color: var(--text); font-size: .8rem; border: 1.5px solid var(--border); cursor: pointer; }
    .filter-chip.active { background: var(--brand); color: #fff; border-color: var(--brand); }
    .has-account { background:#dcfce7; color:#15803d; }
  </style>
</head>
<body>

<header class="app-header">
  <span class="logo">📇 Contacts</span>
  <div class="header-actions">
    <button class="icon-btn" onclick="document.getElementById('add-modal').classList.remove('hidden')">+</button>
    <button class="icon-btn" onclick="signOut()" title="Sign out">🚪</button>
  </div>
</header>

<main class="page">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="form-input" type="search" id="search-input" placeholder="Search contacts…" oninput="onSearch(this.value)">
  </div>

  <div class="filter-row" id="filter-row"></div>

  <div class="card"><div class="card-body" id="list"><p class="text-muted text-sm">Loading…</p></div></div>
</main>

<!-- Add modal -->
<div id="add-modal" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:14px;max-width:420px;width:100%;padding:20px;">
    <div class="section-header">
      <span class="section-title">Add Contact</span>
      <button class="icon-btn" style="background:#eee;color:#000;" onclick="document.getElementById('add-modal').classList.add('hidden')">×</button>
    </div>
    <form onsubmit="submitAdd(event)">
      <div class="form-group">
        <label class="form-label">Type</label>
        <select class="form-select" id="add-type"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input class="form-input" id="add-name" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="add-email">
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" id="add-phone">
      </div>
      <div class="form-group">
        <label class="form-label">Company</label>
        <input class="form-input" id="add-company">
      </div>
      <button class="btn btn-primary btn-full" type="submit" id="add-btn">Add Contact</button>
    </form>
  </div>
</div>

<nav class="bottom-nav">
  <a class="nav-link" href="/dashboard.html"><span class="nav-icon">🏠</span>Home</a>
  <a class="nav-link" href="/properties.html"><span class="nav-icon">🏘️</span>Properties</a>
  <a class="nav-link active" href="/contacts.html"><span class="nav-icon">📇</span>Contacts</a>
  <a class="nav-link" href="/team.html"><span class="nav-icon">👥</span>Team</a>
  <a class="nav-link" href="/apps.html"><span class="nav-icon">🧩</span>Apps</a>
</nav>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
  let allContacts = [], filterType = 'all', searchQ = '';

  async function init(){
    if (!await requireAuth()) return;
    renderFilters();
    renderTypeOptions();
    await load();
  }

  function renderFilters(){
    const row = document.getElementById('filter-row');
    const items = [['all','All'], ...CONTACT_TYPES];
    row.innerHTML = items.map(([k, label]) =>
      `<button class="filter-chip ${k === filterType ? 'active' : ''}" onclick="setFilter('${k}')">${label}</button>`
    ).join('');
  }

  function renderTypeOptions(){
    const sel = document.getElementById('add-type');
    sel.innerHTML = CONTACT_TYPES.map(([k, label]) => `<option value="${k}">${label}</option>`).join('');
  }

  async function load(){
    try{
      allContacts = await getContacts();
      renderList();
    }catch(err){
      document.getElementById('list').innerHTML = `<p class="text-muted text-sm">Error: ${escHtml(err.message)}</p>`;
    }
  }

  function renderList(){
    const filtered = allContacts.filter(c => {
      if (filterType !== 'all' && c.type !== filterType) return false;
      if (searchQ){
        const s = searchQ.toLowerCase();
        if (!(c.full_name?.toLowerCase().includes(s) ||
              c.email?.toLowerCase().includes(s) ||
              c.company?.toLowerCase().includes(s))) return false;
      }
      return true;
    });

    const el = document.getElementById('list');
    if (!filtered.length){
      el.innerHTML = '<p class="text-muted text-sm">No contacts. Tap + to add one.</p>'; return;
    }
    el.innerHTML = filtered.map(c => `
      <a class="team-row" href="/contact.html?id=${c.id}" style="text-decoration:none;color:inherit;">
        <div class="avatar">${escHtml(c.full_name.charAt(0).toUpperCase())}</div>
        <div class="team-info">
          <div class="team-name">${escHtml(c.full_name)}</div>
          <div class="team-email">${escHtml(contactTypeLabel(c.type))}${c.company ? ' · ' + escHtml(c.company) : ''}${c.email ? ' · ' + escHtml(c.email) : ''}</div>
        </div>
        ${c.has_account ? '<span class="badge has-account">Has account</span>' : ''}
        ${c.property_count ? `<span class="badge">${c.property_count} props</span>` : ''}
      </a>
    `).join('');
  }

  function setFilter(t){ filterType = t; renderFilters(); renderList(); }
  function onSearch(v){ searchQ = v; renderList(); }

  async function submitAdd(e){
    e.preventDefault();
    const btn = document.getElementById('add-btn');
    showSpinner(btn, 'Saving…');
    try{
      const c = await createContact({
        type:      document.getElementById('add-type').value,
        full_name: document.getElementById('add-name').value,
        email:     document.getElementById('add-email').value || undefined,
        phone:     document.getElementById('add-phone').value || undefined,
        company:   document.getElementById('add-company').value || undefined
      });
      window.location.href = `/contact.html?id=${c.id}`;
    }catch(err){
      showToast(err.message, 'error');
      hideSpinner(btn);
    }
  }

  init();
</script>
</body>
</html>
