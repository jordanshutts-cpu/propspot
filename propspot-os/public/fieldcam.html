<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — FieldCam</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <script>document.documentElement.classList.add('page-loading');try{var _c=document.documentElement.classList;if(localStorage.sidebar_collapsed==='1')_c.add('sidebar-collapsed');var _t=localStorage.getItem('propspot_theme');_c.add('theme-premium');if(_t==='dark')_c.add('theme-dark');}catch(e){}</script>
  <style>
    /* ── Project map ── */
    .fc-map-section { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px 16px 16px; margin-bottom:18px; }
    .fc-map-head    { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .fc-map-title   { font-weight:700; font-size:.95rem; color:var(--text); }
    .fc-map-count   { font-size:.72rem; color:var(--text-muted); font-weight:600; }
    #fc-project-map { width:100%; height:320px; border-radius:10px; background:var(--bg); }
    /* Leaflet popup tuned for our brand */
    .leaflet-popup-content-wrapper { border-radius:10px; box-shadow:0 6px 22px rgba(0,0,0,.18); }
    .leaflet-popup-content         { margin:10px 12px; font-size:.82rem; line-height:1.4; min-width:180px; }
    .fc-popup-thumb { width:100%; height:80px; object-fit:cover; border-radius:6px; margin-bottom:6px; background:var(--bg); display:block; }
    .fc-popup-name  { font-weight:700; color:var(--text); margin-bottom:2px; }
    .fc-popup-addr  { font-size:.72rem; color:var(--text-muted); }
    .fc-popup-link  { display:inline-block; margin-top:6px; font-size:.72rem; font-weight:600; color:var(--brand); text-decoration:none; }
    .fc-popup-link:hover { text-decoration:underline; }

    /* ── Tab bar ── */
    .tab-bar { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:20px; }
    .tab-btn { padding:10px 18px; font-size:.88rem; font-weight:600; cursor:pointer; color:var(--text-muted); border:none; background:none; border-bottom:2px solid transparent; transition:all .12s; }
    .tab-btn:hover  { color:var(--brand); }
    .tab-btn.active { color:var(--brand); border-bottom-color:var(--brand); }
    /* ── Search ── */
    .search-wrap { position:relative; margin-bottom:16px; }
    .search-wrap .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); }
    .search-wrap input { width:100%; padding:10px 12px 10px 36px; border:1.5px solid var(--border); border-radius:10px; font-size:.9rem; background:var(--surface); }
    .search-wrap input:focus { outline:none; border-color:var(--brand); }
    /* ── Property grid ── */
    .prop-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
    .prop-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; cursor:pointer; transition:transform .12s,box-shadow .12s; }
    .prop-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.12); }
    .prop-thumb { width:100%; height:140px; object-fit:cover; background:var(--bg); display:block; }
    .prop-no-photo { width:100%; height:140px; background:linear-gradient(135deg,var(--bg),var(--border)); display:flex; align-items:center; justify-content:center; font-size:2.5rem; color:var(--border); }
    .prop-info { padding:12px; }
    .prop-name { font-weight:700; font-size:.9rem; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .prop-addr { font-size:.75rem; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .prop-count { font-size:.72rem; color:var(--brand); font-weight:600; margin-top:6px; }
    /* ── Recent photos ── */
    .photo-mosaic { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px; }
    .photo-tile { position:relative; border-radius:10px; overflow:hidden; cursor:pointer; background:var(--bg); aspect-ratio:4/3; }
    .photo-tile img,.photo-tile video { width:100%; height:100%; object-fit:cover; display:block; transition:transform .2s; }
    .photo-tile:hover img,.photo-tile:hover video { transform:scale(1.05); }
    .photo-overlay { position:absolute; bottom:0; left:0; right:0; padding:6px 8px; background:linear-gradient(transparent,rgba(0,0,0,.7)); color:#fff; font-size:.7rem; line-height:1.3; }
  </style>
</head>
<body class="os-newlayout">
<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<main class="page">

  <div id="fc-hero-root"></div>

  <!-- Project map — pins every property with GPS + popups linking to the property detail -->
  <div class="os-section-head" id="fc-map-section-head" style="display:none;">
    <div class="os-section-title">📍 Project Map</div>
    <div class="os-section-line"></div>
    <div class="text-muted text-xs" id="fc-map-count" style="font-weight:600;"></div>
  </div>
  <div class="fc-map-section" id="fc-map-section" style="display:none;">
    <div id="fc-project-map"></div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="props" onclick="switchTab('props')">🏘️ Properties</button>
    <button class="tab-btn" data-tab="recent" onclick="switchTab('recent')">🕐 Recent Photos</button>
  </div>

  <div id="tab-props">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" placeholder="Search properties…" oninput="filterProps(this.value)" id="prop-search">
    </div>
    <div class="prop-grid" id="prop-grid"><p class="text-muted text-sm">Loading…</p></div>
  </div>

  <div id="tab-recent" style="display:none;">
    <div class="photo-mosaic" id="photo-grid"><p class="text-muted text-sm">Loading…</p></div>
  </div>
</main>

<script>window.NAV_CURRENT = 'fieldcam';</script>
<script src="config.js"></script>
<script src="app.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
  let allProps = [], recentLoaded = false, projectMap = null;

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
    document.getElementById('tab-props').style.display  = tab==='props'  ? '' : 'none';
    document.getElementById('tab-recent').style.display = tab==='recent' ? '' : 'none';
    if (tab==='recent' && !recentLoaded) loadRecent();
  }

  async function init() {
    const me = await requireAuth(); if (!me) return;
    try {
      allProps = await satelliteApiFetch('fieldcam', '/api/properties');
      renderHero(allProps);
      renderProps(allProps);
      renderProjectMap(allProps);
    } catch(e) {
      document.getElementById('prop-grid').innerHTML = `<p class="text-muted text-sm">Error: ${escHtml(e.message)}</p>`;
    }
  }

  function renderHero(props) {
    const total = props.length;
    const totalPhotos = props.reduce((s, p) => s + (Number(p.photo_count) || 0), 0);
    const withPhotos = props.filter(p => Number(p.photo_count) > 0).length;
    const withGps = props.filter(p =>
      pickCoord(p, ['latitude','lat','gps_lat'], ['longitude','lng','lon','gps_lng'])
    ).length;

    document.getElementById('fc-hero-root').innerHTML = `
      <section class="os-hero">
        <div class="os-hero-eyebrow">FieldCam</div>
        <h1 class="os-hero-title">Site Documentation</h1>
        <div class="os-hero-subtitle">${total} ${total === 1 ? 'property' : 'properties'} tracked · ${totalPhotos} ${totalPhotos === 1 ? 'photo' : 'photos'} captured · ${withGps} geo-tagged</div>
        <div class="os-kpi-row">
          <div class="os-kpi">
            <div class="os-kpi-label">Properties</div>
            <div class="os-kpi-value">${total}</div>
            <div class="os-kpi-sub">in the field</div>
          </div>
          <div class="os-kpi">
            <div class="os-kpi-label">Total Photos</div>
            <div class="os-kpi-value brand">${totalPhotos}</div>
            <div class="os-kpi-sub">across all sites</div>
          </div>
          <div class="os-kpi">
            <div class="os-kpi-label">Documented</div>
            <div class="os-kpi-value">${withPhotos}</div>
            <div class="os-kpi-sub">${total > 0 ? Math.round((withPhotos / total) * 100) : 0}% have photos</div>
          </div>
          <div class="os-kpi">
            <div class="os-kpi-label">Mapped</div>
            <div class="os-kpi-value">${withGps}</div>
            <div class="os-kpi-sub">GPS-pinned</div>
          </div>
        </div>
      </section>
    `;
  }

  // ── Project map ─────────────────────────────────────────────────
  // Pins every property with GPS coordinates and links each popup to
  // the property detail page. Uses Leaflet + OpenStreetMap tiles so
  // no API key is needed.
  function pickCoord(p, latKeys, lngKeys) {
    for (const k of latKeys) if (p[k] != null && !isNaN(parseFloat(p[k]))) {
      for (const k2 of lngKeys) if (p[k2] != null && !isNaN(parseFloat(p[k2]))) {
        return [parseFloat(p[k]), parseFloat(p[k2])];
      }
    }
    return null;
  }
  function renderProjectMap(props) {
    if (typeof L === 'undefined') return;   // Leaflet failed to load
    const withGps = [];
    for (const p of props) {
      const c = pickCoord(p, ['latitude','lat','gps_lat'], ['longitude','lng','lon','gps_lng']);
      if (c) withGps.push({ prop: p, coord: c });
    }
    const section = document.getElementById('fc-map-section');
    const sectionHead = document.getElementById('fc-map-section-head');
    const count   = document.getElementById('fc-map-count');
    if (!withGps.length) { section.style.display = 'none'; if (sectionHead) sectionHead.style.display = 'none'; return; }
    section.style.display = '';
    if (sectionHead) sectionHead.style.display = '';
    count.textContent = withGps.length + ' / ' + props.length + ' properties pinned';

    // Init once
    if (!projectMap) {
      projectMap = L.map('fc-project-map', { zoomControl: true, scrollWheelZoom: true })
        .setView([34.0, -81.0], 7); // sane SC default; we fit bounds below
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19
      }).addTo(projectMap);
    } else {
      projectMap.eachLayer(l => { if (l instanceof L.Marker) projectMap.removeLayer(l); });
    }

    const bounds = [];
    for (const { prop, coord } of withGps) {
      bounds.push(coord);
      const name  = prop.display_name || prop.name || prop.address_line1 || 'Property';
      const addr  = prop.address || [prop.address_line1, prop.city, prop.state].filter(Boolean).join(', ');
      const thumb = prop.latest_photo_url
        ? `<img class="fc-popup-thumb" src="${escHtml(prop.latest_photo_url)}" alt="">`
        : '';
      const html = `
        ${thumb}
        <div class="fc-popup-name">${escHtml(name)}</div>
        <div class="fc-popup-addr">${escHtml(addr)}</div>
        <a class="fc-popup-link" href="/fieldcam-property.html?id=${encodeURIComponent(prop.id)}">Open property →</a>`;
      L.marker(coord).addTo(projectMap).bindPopup(html, { maxWidth: 240 });
    }
    if (bounds.length) projectMap.fitBounds(bounds, { padding: [40, 40], maxZoom: 13 });
    // Leaflet needs a size refresh once the container is visible
    setTimeout(() => projectMap.invalidateSize(), 100);
  }

  function renderProps(list) {
    const el = document.getElementById('prop-grid');
    if (!list.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🏘️</div><p>No properties yet.</p></div>`;
      return;
    }
    el.innerHTML = list.map(p => {
      const name = p.display_name || p.name || p.address_line1 || 'Property';
      const addr = p.address || [p.address_line1, p.city, p.state].filter(Boolean).join(', ');
      const thumb = p.latest_photo_url
        ? `<img class="prop-thumb" src="${escHtml(p.latest_photo_url)}" alt="" loading="lazy">`
        : `<div class="prop-no-photo">📷</div>`;
      return `<div class="prop-card" onclick="openProp('${p.id}')">
        ${thumb}
        <div class="prop-info">
          <div class="prop-name" title="${escHtml(name)}">${escHtml(name)}</div>
          <div class="prop-addr">${escHtml(addr)}</div>
          ${p.photo_count!=null?`<div class="prop-count">📷 ${p.photo_count} photo${p.photo_count!==1?'s':''}</div>`:''}
        </div>
      </div>`;
    }).join('');
  }

  function filterProps(q) {
    q = (q||'').toLowerCase();
    renderProps(q ? allProps.filter(p =>
      [p.display_name,p.name,p.address_line1,p.address,p.city,p.state]
        .filter(Boolean).join(' ').toLowerCase().includes(q)
    ) : allProps);
  }

  async function loadRecent() {
    recentLoaded = true;
    const el = document.getElementById('photo-grid');
    try {
      const photos = await satelliteApiFetch('fieldcam', '/api/photos/recent?limit=40');
      if (!photos.length) { el.innerHTML = `<div class="empty-state"><div class="empty-icon">📷</div><p>No photos yet.</p></div>`; return; }
      el.innerHTML = photos.map(ph => {
        const propLabel = ph.display_name || ph.address_line1 || '';
        const taken = ph.taken_at ? new Date(ph.taken_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
        const media = ph.media_type==='video'
          ? `<video src="${escHtml(ph.url)}" muted playsinline></video>`
          : `<img src="${escHtml(ph.url)}" alt="" loading="lazy">`;
        return `<div class="photo-tile" onclick="openProp('${ph.property_id}')">
          ${media}
          <div class="photo-overlay">${escHtml(propLabel)}${taken?' · '+taken:''}</div>
        </div>`;
      }).join('');
    } catch(e) { el.innerHTML = `<p class="text-muted text-sm">Error: ${escHtml(e.message)}</p>`; }
  }

  function openProp(id) {
    window.location.href = '/fieldcam-property.html?id=' + encodeURIComponent(id);
  }

  init();
</script>
</body>
</html>
