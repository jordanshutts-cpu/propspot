<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Property</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <script>document.documentElement.classList.add('page-loading');try{if(localStorage.sidebar_collapsed==='1')document.documentElement.classList.add('sidebar-collapsed')}catch(e){}</script>
  <style>
    .stage-section { margin-bottom: 20px; }
    .stage-section h3 { font-size: .9rem; font-weight: 700; margin-bottom: 8px; display:flex; align-items:center; gap:8px; }
    .pipe-row { background: var(--surface); border-radius: 10px; box-shadow: var(--shadow); padding: 10px 12px; margin-bottom: 6px; display:flex; align-items:center; justify-content:space-between; gap: 8px; }
    .pipe-row .meta { font-size: .8rem; color: var(--text-muted); }
    .status-pill { font-size: .7rem; padding:2px 8px; border-radius:100px; background:var(--brand-light); color:var(--brand); font-weight:600; }
    .contact-row { display:flex; gap:10px; align-items:center; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .contact-row:last-child { border-bottom:none; }
    .role-tag { font-size: .7rem; color: var(--text-muted); }
    .photo-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; }
    .photo-tile { position:relative; aspect-ratio: 1/1; border-radius: 8px; overflow:hidden; background: var(--surface); cursor:pointer; }
    .photo-tile img { width:100%; height:100%; object-fit: cover; display:block; }
    .photo-tile .photo-meta { position:absolute; bottom:0; left:0; right:0; padding: 4px 6px; font-size:.65rem; color:#fff; background: linear-gradient(transparent, rgba(0,0,0,.65)); }
    .photo-lightbox { position:fixed; inset:0; background: rgba(0,0,0,.85); z-index: 1000; display:flex; align-items:center; justify-content:center; padding: 20px; }
    .photo-lightbox img { max-width:100%; max-height:90vh; border-radius: 8px; }
    .photo-lightbox .close-x { position:absolute; top:16px; right:20px; color:#fff; font-size:2rem; cursor:pointer; background:none; border:none; }
    .photo-lightbox .lb-notes { position:absolute; bottom:20px; left:20px; right:20px; color:#fff; font-size:.85rem; text-align:center; }

    /* ── Custom dropdown (replaces native <select>) ─────────────── */
    .pp-select-wrap { position: relative; display: inline-block; vertical-align: middle; }
    .pp-select-trigger {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 12px 6px 14px;
      min-width: 160px;
      font-size: 0.86rem; font-weight: 500;
      background: #fff;
      border: 1.5px solid var(--border, #e5e7eb);
      border-radius: 8px;
      cursor: pointer; color: var(--text, #111827);
      line-height: 1.3;
      transition: border-color 0.12s, box-shadow 0.12s;
      text-align: left;
    }
    .pp-select-trigger:hover { border-color: #cbd5e1; }
    .pp-select-trigger:focus,
    .pp-select-wrap.open .pp-select-trigger {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(97,183,70,0.10);
    }
    .pp-select-value {
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .pp-select-chev {
      width: 14px; height: 14px;
      color: var(--text-muted, #6b7280);
      transition: transform 0.18s;
      flex-shrink: 0;
    }
    .pp-select-wrap.open .pp-select-chev { transform: rotate(180deg); color: var(--brand); }
    .pp-select-menu {
      position: absolute; top: calc(100% + 6px); left: 0;
      min-width: 100%;
      background: #fff;
      border: 1px solid #e8eaed;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(15,23,42,0.12), 0 2px 6px rgba(15,23,42,0.04);
      padding: 4px;
      z-index: 100;
      display: none;
      max-height: 320px;
      overflow-y: auto;
      animation: pp-select-in 0.12s ease-out;
    }
    @keyframes pp-select-in {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .pp-select-wrap.open .pp-select-menu { display: block; }
    .pp-select-item {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.86rem;
      cursor: pointer;
      color: var(--text, #111827);
      white-space: nowrap;
      transition: background 0.08s, color 0.08s;
    }
    .pp-select-item:hover {
      background: rgba(97,183,70,0.08);
      color: var(--brand-dark, #15803d);
    }
    .pp-select-item.active {
      background: rgba(97,183,70,0.12);
      color: var(--brand-dark, #15803d);
      font-weight: 600;
    }
    .pp-select-item.active::before {
      content: '✓';
      margin-right: 6px;
      color: var(--brand, #61B746);
      font-weight: 700;
    }

    /* ── Pipeline row action buttons ── */
    .pipe-row-actions { display:flex; gap:6px; align-items:center; flex-shrink:0; }
    .pipe-row-del {
      background: none;
      border: 1px solid var(--border, #e5e7eb);
      padding: 5px 9px;
      border-radius: 7px;
      cursor: pointer;
      color: var(--text-muted, #6b7280);
      font-size: 0.76rem;
      font-weight: 600;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all 0.12s;
    }
    .pipe-row-del:hover {
      background: #fee2e2;
      color: #b91c1c;
      border-color: #fecaca;
    }
    .pipe-row-del svg { width: 13px; height: 13px; display: block; }

    /* ── Add-record modal ── */
    .pp-modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(15,23,42,0.45); z-index: 1100;
      align-items: center; justify-content: center; padding: 20px;
      animation: pp-fade-in 0.16s ease-out;
    }
    .pp-modal-backdrop.open { display: flex; }
    @keyframes pp-fade-in { from { opacity: 0; } to { opacity: 1; } }
    .pp-modal {
      background: #fff; width: min(440px, 100%); border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      animation: pp-card-in 0.18s cubic-bezier(0.2, 0.8, 0.2, 1);
      overflow: hidden;
    }
    @keyframes pp-card-in {
      from { transform: translateY(8px) scale(0.985); opacity: 0; }
      to   { transform: translateY(0)   scale(1);     opacity: 1; }
    }
    .pp-modal-head {
      padding: 18px 22px; border-bottom: 1px solid #e8eaed;
      display: flex; align-items: center;
    }
    .pp-modal-head h3 { margin: 0; flex: 1; font-size: 1.02rem; font-weight: 700; color: #111827; }
    .pp-modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; color: #6b7280; padding: 4px 10px; border-radius: 6px;
    }
    .pp-modal-close:hover { background: #f1f5f9; color: #111827; }
    .pp-modal-body { padding: 16px 22px 4px; }
    .pp-modal-row { margin-bottom: 14px; }
    .pp-modal-row label {
      display: block; font-size: 0.78rem; font-weight: 600; color: #374151;
      margin-bottom: 4px; letter-spacing: 0.01em;
    }
    .pp-modal-row .req { color: #ef4444; }
    .pp-modal-row input,
    .pp-modal-row select,
    .pp-modal-row textarea {
      width: 100%; box-sizing: border-box;
      padding: 8px 10px; font-size: 0.88rem; line-height: 1.4;
      border: 1.5px solid #e2e8f0; border-radius: 8px;
      background: #fff; color: #111827;
    }
    .pp-modal-row input:focus,
    .pp-modal-row select:focus,
    .pp-modal-row textarea:focus {
      outline: none; border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(97,183,70,0.10);
    }
    .pp-modal-actions {
      display: flex; gap: 8px; justify-content: flex-end;
      padding: 14px 22px 18px;
      border-top: 1px solid #f1f5f9;
      background: #fafbfc;
    }
    .pp-modal-actions .btn { padding: 8px 16px; font-size: 0.85rem; }

    /* ── Confirm modal (for delete) ── */
    .pp-confirm-body { padding: 22px 22px 4px; }
    .pp-confirm-body p { font-size: 0.92rem; color: #374151; margin: 0 0 6px; line-height: 1.5; }
    .pp-confirm-body .pp-confirm-sub { font-size: 0.8rem; color: #6b7280; }
  </style>
</head>
<body class="os-newlayout">

<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<main class="page" id="page">
  <a href="javascript:history.back()" class="text-sm" style="text-decoration:none;color:var(--text-muted);">‹ Back</a>
  <p class="text-muted text-sm mt-12">Loading…</p>
</main>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
  const id = new URLSearchParams(location.search).get('id');
  let property = null;

  async function init(){
    if (!await requireAuth()) return;
    if (!id) { document.getElementById('page').innerHTML = '<p>Missing property id.</p>'; return; }
    await load();
  }

  async function load(){
    try{
      property = await getProperty(id);
      document.title = (property.display_name || property.address_line1) + ' — Prop Spot';
      render();
    }catch(err){
      document.getElementById('page').innerHTML = `<p class="text-muted text-sm">Error: ${escHtml(err.message)}</p>`;
    }
  }

  function pipeRow(stage, r){
    const desc = {
      prospects:    `${escHtml(r.source)} · ${escHtml(r.raw_name || '')} ${r.raw_phone ? '· ' + escHtml(r.raw_phone) : ''}`,
      leads:        `${escHtml(r.source)} ${r.motivation_notes ? '· ' + escHtml(r.motivation_notes.slice(0,80)) : ''}`,
      opportunities:`offer ${formatMoney(r.our_offer)} ${r.appointment_at ? '· apt ' + formatDate(r.appointment_at) : ''}`,
      purchases:    `purchase ${formatMoney(r.purchase_price)} ${r.contract_date ? '· contract ' + formatDate(r.contract_date) : ''}`,
      projects:     `${escHtml(r.kind)} · ${escHtml(r.status)}`
    }[stage];
    const canPromote = stage !== 'projects' && r.status !== 'promoted';
    return `<div class="pipe-row">
      <div>
        <div>${desc || ''}</div>
        <div class="meta">${formatDate(r.created_at)} · <span class="status-pill">${escHtml(r.status)}</span></div>
      </div>
      <div class="pipe-row-actions">
        ${canPromote ? `<button class="btn btn-secondary" style="padding:6px 10px;font-size:.78rem;" onclick="promote('${stage}','${r.id}')">Promote ›</button>` : ''}
        <button class="pipe-row-del" title="Delete this entry" aria-label="Delete"
                onclick="confirmDeleteRecord('${stage}','${r.id}', this)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          Delete
        </button>
      </div>
    </div>`;
  }

  function render(){
    const sections = [
      ['📥 Prospects',     'prospects',     property.prospects],
      ['🎯 Leads',         'leads',         property.leads],
      ['🤝 Opportunities', 'opportunities', property.opportunities],
      ['📝 Purchases',     'purchases',     property.purchases],
      ['🔧 Projects',      'projects',      property.projects]
    ];

    const dateFmt = d => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
    const fields = [
      ['Owner',                     property.owner],
      ['County',                    property.county],
      ['TMS',                       property.tms],
      ['Parcel ID',                 property.parcel_id],
      ['Lockbox code',              property.lockbox_code],
      ['Status',                    propertyStatusLabel(property.status)],
      ['Anticipated purchase date', dateFmt(property.anticipated_close_date)],
      ['Purchase date',             dateFmt(property.purchase_date)],
      ['Purchase price',            property.purchase_price != null ? formatMoney(property.purchase_price) : '—'],
      ['Sold date',                 dateFmt(property.sold_date)],
      ['Sold price',                property.sold_price != null ? formatMoney(property.sold_price) : '—'],
      ['Lender',                    property.lender_name || '—'],
      ['Seller',                    property.seller_name || '—'],
    ];
    let html = `
      <div id="lifecycle-stepper"></div>
      <div class="card mb-16">
        <div class="card-body">
          <div class="flex-between" style="gap:12px;flex-wrap:wrap;">
            <div>
              ${property.display_name ? `<div class="property-name">${escHtml(property.display_name)}</div>` : ''}
              <div class="${property.display_name ? 'property-address' : 'property-name'}">${escHtml(property.address_line1)}${property.unit ? ' #' + escHtml(property.unit) : ''}</div>
              <div class="property-address">${escHtml(property.city)}, ${escHtml(property.state)} ${escHtml(property.zip)}</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              ${propertyStatusBadge(property.status)}
              <button class="btn btn-secondary" style="padding:6px 12px;font-size:.82rem;" onclick="openEditDetails()">✏️ Edit</button>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px 18px;margin-top:14px;font-size:.85rem;">
            ${fields.map(([label, value]) => `
              <div>
                <div class="text-muted text-xs" style="font-weight:600;letter-spacing:.02em;">${escHtml(label)}</div>
                <div style="margin-top:2px;">${value && value !== '—' ? escHtml(value) : '<span class="text-muted">—</span>'}</div>
              </div>
            `).join('')}
          </div>

          <div style="display:flex;align-items:center;gap:8px;margin-top:14px;flex-wrap:wrap;">
            <label class="text-muted text-xs" for="status-select" style="font-weight:600;">Change status:</label>
            <select id="status-select" class="form-select" style="width:auto;padding:6px 10px;font-size:.85rem;" onchange="changeStatus(this.value)">
              ${PROPERTY_STATUSES.map(([k, label]) => `<option value="${k}"${property.status === k ? ' selected' : ''}>${label}</option>`).join('')}
            </select>
          </div>

          ${property.status === 'purchasing' ? `
          <div style="display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;">
            <label class="text-muted text-xs" for="acq-status-select" style="font-weight:600;">Acquisition stage:</label>
            <select id="acq-status-select" class="form-select" style="width:auto;padding:6px 10px;font-size:.85rem;" onchange="changeAcquisitionStatus(this.value)">
              ${ACQUISITION_STATUSES.map(([k, label]) => `<option value="${k}"${(property.acquisition_status || 'under_contract') === k ? ' selected' : ''}>${label}</option>`).join('')}
            </select>
            ${acquisitionStatusBadge(property.acquisition_status || 'under_contract')}
          </div>
          ` : ''}

          ${property.notes ? `<div class="property-notes mt-12" style="white-space:pre-wrap;font-size:.85rem;color:var(--text);background:var(--brand-light);padding:10px 12px;border-radius:8px;">${escHtml(property.notes)}</div>` : ''}
        </div>
      </div>
    `;

    for (const [label, stage, rows] of sections){
      html += `<div class="stage-section">
        <h3>${label}<button class="btn btn-secondary" style="padding:4px 10px;font-size:.7rem;margin-left:auto;" onclick="addRecord('${stage}')">+ Add</button></h3>
        ${rows.length ? rows.map(r => pipeRow(stage, r)).join('') : '<div class="text-muted text-xs">None yet.</div>'}
      </div>`;
    }

    const holdings = property.holdings_items || [];
    html += `<div class="stage-section">
      <h3>💼 Holdings <span class="text-muted text-xs" style="font-weight:400;">(${holdings.length})</span>
        <a class="btn btn-secondary" data-app="holdings" data-app-path="/" href="#" style="padding:4px 10px;font-size:.7rem;margin-left:auto;text-decoration:none;">Manage ↗</a>
      </h3>
      ${holdings.length
        ? holdings.map(h => {
            const badge = holdingDueBadge(h.next_due_date, h.reminder_days_before);
            const amt = h.amount != null ? `${formatMoney(h.amount)} / ${escHtml(holdingFrequencyLabel(h.frequency))}` : escHtml(holdingFrequencyLabel(h.frequency));
            return `<a class="pipe-row" data-app="holdings" data-app-path="/item.html?id=${h.id}" href="#" style="text-decoration:none;color:inherit;">
              <div style="display:flex;align-items:center;gap:10px;flex:1;">
                <div style="font-size:1.2rem;">${escHtml(holdingCategoryIcon(h.category))}</div>
                <div style="flex:1;">
                  <div>${escHtml(h.name)}</div>
                  <div class="meta">${amt}${h.vendor ? ' · ' + escHtml(h.vendor) : ''}${h.contact_name ? ' · 👤 ' + escHtml(h.contact_name) : ''}</div>
                </div>
              </div>
              <span class="status-pill" style="background:${badge.cls === 'badge-danger' ? '#fee2e2' : badge.cls === 'badge-warn' ? '#fef3c7' : 'var(--brand-light)'}; color:${badge.cls === 'badge-danger' ? '#b91c1c' : badge.cls === 'badge-warn' ? '#92400e' : 'var(--brand)'};">${escHtml(badge.label)}</span>
            </a>`;
          }).join('')
        : '<div class="text-muted text-xs">None yet. <a data-app="holdings" data-app-path="/" href="#">Add one in Holdings Desk ↗</a></div>'
      }
    </div>`;

    html += `<div class="stage-section">
      <h3>📧 Email <span class="text-muted text-xs" style="font-weight:400;" id="email-threads-count"></span>
        <a class="btn btn-secondary" data-app="inbox" data-app-path="/" href="#" style="padding:4px 10px;font-size:.7rem;margin-left:auto;text-decoration:none;">Open Inbox ↗</a>
      </h3>
      <div id="email-threads-list" class="text-muted text-xs">Loading…</div>
    </div>`;

    html += `<div class="stage-section">
      <h3>📇 Contacts<button class="btn btn-secondary" style="padding:4px 10px;font-size:.7rem;margin-left:auto;" onclick="addContactLink()">+ Link</button></h3>
      ${property.contacts.length
        ? property.contacts.map(c => `<div class="contact-row">
            <div class="avatar">${escHtml(c.full_name.charAt(0).toUpperCase())}</div>
            <div style="flex:1;">
              <div><a href="/contact.html?id=${c.id}">${escHtml(c.full_name)}</a></div>
              <div class="role-tag">${escHtml(c.role)}${c.is_primary ? ' · primary' : ''}</div>
            </div>
            <button class="icon-btn" style="background:rgba(239,68,68,.15);color:var(--danger);" onclick="unlink('${c.id}','${c.role}')" title="Unlink">×</button>
          </div>`).join('')
        : '<div class="text-muted text-xs">No contacts linked.</div>'}
    </div>`;

    html += `<div class="stage-section">
      <h3>📷 Photos <span class="text-muted text-xs" style="font-weight:400;">(${property.photos.length})</span></h3>
      ${property.photos.length
        ? `<div class="photo-grid">${property.photos.map((ph, i) => `
            <div class="photo-tile" onclick="openLightbox(${i})">
              <img src="${escHtml(ph.url)}" alt="">
              ${ph.uploader_name ? `<div class="photo-meta">${escHtml(ph.uploader_name)}</div>` : ''}
            </div>`).join('')}</div>`
        : '<div class="text-muted text-xs">No photos yet. Upload via the FieldCam app.</div>'}
    </div>`;

    html += `<div class="stage-section">
      <h3>📎 Files <span class="text-muted text-xs" style="font-weight:400;" id="files-count"></span>
        <label class="btn btn-secondary" style="padding:4px 10px;font-size:.7rem;margin-left:auto;cursor:pointer;">
          + Upload<input type="file" id="file-input" style="display:none;" onchange="handleFileUpload(event)">
        </label>
      </h3>
      <div id="files-list" class="text-muted text-xs">Loading…</div>
      <div id="files-progress" class="text-muted text-xs" style="display:none;margin-top:8px;"></div>
    </div>`;

    html += `<div class="stage-section" style="margin-top:32px;border-top:1px solid var(--border);padding-top:20px;display:flex;flex-direction:column;align-items:center;gap:8px;">
      <button class="btn btn-danger" style="padding:6px 14px;font-size:.8rem;" onclick="deleteThisProperty()">🗑️ Delete Property</button>
      <p class="text-muted text-xs" style="text-align:center;margin:0;max-width:560px;">Owner-only. Permanently removes the property and everything attached to it (prospects, leads, opps, purchases, projects, photos, contact links).</p>
    </div>`;

    document.getElementById('page').innerHTML = html;
    wireUnifiedNav();   // re-wire the freshly-rendered data-app links
    // Premium theme rescan — replaces inline emoji prefixes ('💼 Holdings'
    // etc.) with masked SVGs. No-op when premium is off or theme.js
    // isn't loaded.
    if (typeof window.__replaceEmojisIn === 'function') window.__replaceEmojisIn(document);
    // Replace every native <select.form-select> with a themed dropdown.
    document.querySelectorAll('select.form-select').forEach(enhanceSelect);
    // New-chrome lifecycle stepper (no-op when the new chrome flag is off).
    if (window.LifecycleStepper) window.LifecycleStepper.mount('lifecycle-stepper', property);
    loadFiles();
    loadEmailThreads();
  }

  // ── Email threads (Inbox app) ────────────────────────────────
  async function loadEmailThreads() {
    const el  = document.getElementById('email-threads-list');
    const cnt = document.getElementById('email-threads-count');
    let rows = [];
    try {
      rows = await apiFetch(`/api/properties/${id}/email-threads`);
    } catch (err) {
      el.textContent = err.message;
      return;
    }
    if (cnt) cnt.textContent = `(${rows.length})`;
    if (!rows.length) {
      el.innerHTML = `No emails linked yet. <a data-app="inbox" data-app-path="/" href="#">Open Inbox ↗</a> to tag a thread.`;
      wireUnifiedNav();
      return;
    }
    const relTime = iso => {
      const t = new Date(iso).getTime();
      const diff = (Date.now() - t) / 1000;
      if (diff < 3600)      return Math.floor(diff / 60) + 'm';
      if (diff < 86400)     return Math.floor(diff / 3600) + 'h';
      if (diff < 86400 * 7) return Math.floor(diff / 86400) + 'd';
      return new Date(iso).toLocaleDateString();
    };
    el.innerHTML = rows.map(t => `
      <a class="pipe-row" data-app="inbox" data-app-path="/thread.html?id=${t.id}" href="#" style="text-decoration:none;color:inherit;">
        <div style="flex:1;">

  // ── Files (PDFs, deeds, inspection reports) ──────────────────
  async function loadFiles(){
    try {
      const files = await getPropertyFiles(id);
      const el = document.getElementById('files-list');
      const cnt = document.getElementById('files-count');
      if (cnt) cnt.textContent = `(${files.length})`;
      if (!files.length) {
        el.innerHTML = 'No files yet. Click <strong>Upload</strong> to add one (max 20MB).';
        return;
      }
      el.innerHTML = files.map(f => {
        const sizeKb = f.size_bytes ? Math.round(f.size_bytes / 1024) : null;
        const ext = (f.filename.split('.').pop() || '').toLowerCase();
        const icon = ['pdf'].includes(ext) ? '📄'
                   : ['doc','docx','txt','rtf'].includes(ext) ? '📝'
                   : ['xls','xlsx','csv'].includes(ext) ? '📊'
                   : ['png','jpg','jpeg','gif','webp','heic'].includes(ext) ? '🖼️'
                   : '📎';
        return `
          <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:1.2rem;">${icon}</span>
            <div style="flex:1;min-width:0;">
              <div><a href="${escHtml(f.url)}" target="_blank" rel="noopener" style="font-weight:600;color:var(--text);text-decoration:none;">${escHtml(f.filename)}</a></div>
              <div class="meta">${sizeKb != null ? sizeKb + ' KB · ' : ''}${formatDate(f.created_at)}${f.uploaded_by_name ? ' · ' + escHtml(f.uploaded_by_name) : ''}</div>
            </div>
            <button class="icon-btn" style="background:rgba(239,68,68,.15);color:var(--danger);" onclick="confirmDeleteFile('${f.id}','${escHtml(f.filename).replace(/'/g, '&#39;')}')" title="Delete">×</button>
          </div>`;
      }).join('');
    } catch (e) {
      document.getElementById('files-list').innerHTML = `<span style="color:var(--danger);">Error: ${escHtml(e.message)}</span>`;
    }
  }

  async function handleFileUpload(e){
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 20 * 1024 * 1024) { showToast('File is over 20MB limit', 'error'); e.target.value = ''; return; }
    const prog = document.getElementById('files-progress');
    prog.style.display = 'block';
    prog.textContent = `Uploading ${file.name}…`;
    try {
      await uploadPropertyFile(id, file);
      prog.style.display = 'none';
      e.target.value = '';
      showToast('Uploaded');
      await loadFiles();
    } catch (err) {
      prog.style.display = 'none';
      showToast(err.message, 'error');
    }
  }

  // ── Themed dropdown — wraps a <select> with a custom UI ─────────
  // Hides the native <select>, builds a styled trigger + menu, and on
  // pick: writes the value back to the original select and dispatches
  // a 'change' event so existing onchange handlers fire unmodified.
  function enhanceSelect(selectEl) {
    if (selectEl.dataset.ppEnhanced === '1') return;
    selectEl.dataset.ppEnhanced = '1';

    const wrap = document.createElement('div');
    wrap.className = 'pp-select-wrap';
    // Pass through any inline width/min-width style from the original
    if (selectEl.style.width)     wrap.style.width     = selectEl.style.width;
    if (selectEl.style.minWidth)  wrap.style.minWidth  = selectEl.style.minWidth;

    const trigger = document.createElement('button');
    trigger.type = 'button';
    trigger.className = 'pp-select-trigger';
    if (selectEl.disabled) trigger.disabled = true;

    const valueEl = document.createElement('span');
    valueEl.className = 'pp-select-value';

    const chev = document.createElementNS('http://www.w3.org/2000/svg','svg');
    chev.setAttribute('class','pp-select-chev');
    chev.setAttribute('viewBox','0 0 24 24');
    chev.setAttribute('fill','none');
    chev.setAttribute('stroke','currentColor');
    chev.setAttribute('stroke-width','2.5');
    chev.setAttribute('stroke-linecap','round');
    chev.setAttribute('stroke-linejoin','round');
    chev.innerHTML = '<polyline points="6 9 12 15 18 9"/>';
    trigger.appendChild(valueEl);
    trigger.appendChild(chev);

    const menu = document.createElement('div');
    menu.className = 'pp-select-menu';

    function syncValueLabel() {
      const opt = selectEl.options[selectEl.selectedIndex];
      valueEl.textContent = opt ? opt.textContent : '';
    }
    function buildItems() {
      menu.innerHTML = '';
      Array.from(selectEl.options).forEach(opt => {
        const item = document.createElement('div');
        item.className = 'pp-select-item' + (opt.value === selectEl.value ? ' active' : '');
        item.textContent = opt.textContent;
        item.dataset.value = opt.value;
        item.addEventListener('click', () => {
          if (opt.value === selectEl.value) {
            wrap.classList.remove('open');
            return;
          }
          selectEl.value = opt.value;
          syncValueLabel();
          buildItems();
          wrap.classList.remove('open');
          // Fire the same event the original onchange="..." listener expects
          selectEl.dispatchEvent(new Event('change', { bubbles: true }));
        });
        menu.appendChild(item);
      });
    }

    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      if (trigger.disabled) return;
      // Close any other open dropdowns
      document.querySelectorAll('.pp-select-wrap.open').forEach(w => { if (w !== wrap) w.classList.remove('open'); });
      const opening = !wrap.classList.contains('open');
      wrap.classList.toggle('open');
      if (opening) buildItems();   // rebuild in case options changed
    });

    // Keyboard nav on the trigger
    trigger.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowDown') {
        e.preventDefault(); trigger.click();
      }
    });

    // Insert before the original select, then move the select inside
    // so form submission still picks it up; hide the native UI.
    selectEl.parentNode.insertBefore(wrap, selectEl);
    selectEl.style.display = 'none';
    wrap.appendChild(trigger);
    wrap.appendChild(menu);
    wrap.appendChild(selectEl);

    syncValueLabel();
    buildItems();
  }

  // Single doc-wide outside-click handler closes any open dropdown.
  document.addEventListener('click', (e) => {
    document.querySelectorAll('.pp-select-wrap.open').forEach(w => {
      if (!w.contains(e.target)) w.classList.remove('open');
    });
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.pp-select-wrap.open').forEach(w => w.classList.remove('open'));
    }
  });

  init();

  // ── Esc closes modals ────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    if (document.getElementById('pp-add-modal')?.classList.contains('open')) closeAddRecord();
    if (document.getElementById('pp-del-modal')?.classList.contains('open')) closeDeleteRecord();
  });
</script>

<!-- ── Add-record modal ─────────────────────────────────────────── -->
<div class="pp-modal-backdrop" id="pp-add-modal" onclick="if(event.target===this)closeAddRecord()">
  <div class="pp-modal">
    <div class="pp-modal-head">
      <h3 id="pp-add-title">Add</h3>
      <button type="button" class="pp-modal-close" onclick="closeAddRecord()" aria-label="Close">✕</button>
    </div>
    <form id="pp-add-form" onsubmit="submitAddRecord(event)">
      <div class="pp-modal-body" id="pp-add-body"></div>
      <div class="pp-modal-actions">
        <button type="button" class="btn btn-secondary" onclick="closeAddRecord()">Cancel</button>
        <button type="submit" class="btn btn-primary">Add</button>
      </div>
    </form>
  </div>
</div>

<!-- ── Delete-confirm modal ─────────────────────────────────────── -->
<div class="pp-modal-backdrop" id="pp-del-modal" onclick="if(event.target===this)closeDeleteRecord()">
  <div class="pp-modal" style="max-width:380px;">
    <div class="pp-modal-head">
      <h3>Confirm delete</h3>
      <button type="button" class="pp-modal-close" onclick="closeDeleteRecord()" aria-label="Close">✕</button>
    </div>
    <div class="pp-confirm-body">
      <p id="pp-del-text">Delete this item?</p>
      <p class="pp-confirm-sub">Related promotions and history will not be removed.</p>
    </div>
    <div class="pp-modal-actions">
      <button type="button" class="btn btn-secondary" onclick="closeDeleteRecord()">Cancel</button>
      <button type="button" class="btn btn-danger" onclick="doDeleteRecord()">Delete</button>
    </div>
  </div>
</div>

</body>
</html>
