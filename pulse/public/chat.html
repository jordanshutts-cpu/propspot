<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Pulse</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="chat.css?v=6">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css">
  <link rel="icon" type="image/png" href="/logo.png">
</head>
<body class="pulse-body-2col">

<nav class="bottom-nav" id="nav"></nav>
<script>window.NAV_CURRENT = 'pulse';</script>

<header class="pulse-topbar">
  <div class="pulse-topbar-left">
    <button class="pulse-sidebar-toggle" id="sidebar-toggle" title="Open channels">☰</button>
    <a href="#" id="os-back" class="pulse-back" title="Back to Prop Spot">‹</a>
    <span class="pulse-app-name">💬 Pulse</span>
  </div>
  <div class="pulse-topbar-center">
    <span id="channel-name">#general</span>
    <span class="pulse-conn-dot connecting" id="conn-dot" title="Connecting…"></span>
  </div>
  <div class="pulse-topbar-right header-actions">
    <span class="pulse-user" id="me-name">…</span>
  </div>
</header>

<aside class="pulse-sidebar" id="sidebar">
  <!-- Sections render here first (user-organized groups) -->
  <div id="sidebar-sections"></div>

  <div class="pulse-sidebar-section">
    <div class="pulse-sidebar-heading">
      Channels
      <button class="pulse-sidebar-add" id="new-channel-btn" title="New channel">+</button>
    </div>
    <div id="channel-list"></div>
    <button type="button" class="pulse-archive-trigger" id="show-archived-btn">Show archived channels</button>
  </div>

  <div class="pulse-sidebar-section">
    <div class="pulse-sidebar-heading">
      Direct Messages
      <button class="pulse-sidebar-add" id="new-dm-btn" title="New direct message">+</button>
    </div>
    <div id="dm-list"></div>
  </div>

  <div class="pulse-sidebar-section">
    <div class="pulse-sidebar-heading" style="cursor:pointer" id="new-section-trigger" title="Create a section">
      + New Section
    </div>
  </div>
</aside>

<main class="pulse-main">
  <div class="pulse-messages" id="messages">
    <div class="pulse-history-loader hidden" id="history-loader">Loading older messages…</div>
    <div class="pulse-empty">Loading…</div>
  </div>

  <!-- Composer: Quill toolbar + editor + attachment tray + send. -->
  <form class="pulse-composer-wrap" id="composer" autocomplete="off">
    <div id="quill-host" class="pulse-quill-host">
      <div id="quill-editor"></div>
    </div>
    <div id="attach-tray" class="pulse-attach-tray"></div>
    <div class="pulse-composer-row">
      <input type="file" id="attach-input" multiple hidden
        accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.zip">
      <button type="button" class="pulse-composer-btn" id="attach-btn" title="Attach files">📎</button>
      <div style="flex:1"></div>
      <button type="submit" class="pulse-send" id="send-btn">Send</button>
    </div>
  </form>
</main>

<!-- Mention popover (positioned absolutely in JS, anchored to caret) -->
<div id="mention-popup" class="pulse-mention-popup hidden"></div>

<!-- Lightbox for image attachments -->
<div id="lightbox" class="pulse-lightbox hidden"><img id="lightbox-img" src="" alt=""></div>

<!-- New channel modal -->
<div class="pulse-modal-backdrop hidden" id="new-channel-modal">
  <div class="pulse-modal">
    <h2>New channel</h2>
    <form id="new-channel-form">
      <label for="nc-name">Name</label>
      <input type="text" id="nc-name" placeholder="e.g. acquisitions" maxlength="80" required>
      <label for="nc-desc">Description (optional)</label>
      <input type="text" id="nc-desc" placeholder="What's this channel for?" maxlength="200">
      <label class="pulse-modal-check">
        <input type="checkbox" id="nc-private">
        Make this channel private (invite-only)
      </label>
      <div class="pulse-modal-error hidden" id="nc-error"></div>
      <div class="pulse-modal-actions">
        <button type="button" class="pulse-modal-cancel" id="nc-cancel">Cancel</button>
        <button type="submit" class="pulse-modal-submit" id="nc-submit">Create</button>
      </div>
    </form>
  </div>
</div>

<!-- New DM modal — user picker (multi-select for groups) -->
<div class="pulse-modal-backdrop hidden" id="new-dm-modal">
  <div class="pulse-modal">
    <h2>New direct message</h2>
    <div class="pulse-user-picker">
      <input type="text" class="search" id="dm-search" placeholder="Search by name or email…" autocomplete="off">
      <div class="list" id="dm-user-list"></div>
    </div>
    <div class="pulse-modal-error hidden" id="dm-error"></div>
    <div class="pulse-modal-actions">
      <button type="button" class="pulse-modal-cancel" id="dm-cancel">Cancel</button>
      <button type="button" class="pulse-modal-submit" id="dm-submit" disabled>Start</button>
    </div>
  </div>
</div>

<!-- New section modal -->
<div class="pulse-modal-backdrop hidden" id="new-section-modal">
  <div class="pulse-modal">
    <h2>New section</h2>
    <form id="new-section-form">
      <label for="ns-name">Name</label>
      <input type="text" id="ns-name" placeholder="e.g. Acquisitions" maxlength="80" required>
      <div class="pulse-modal-error hidden" id="ns-error"></div>
      <div class="pulse-modal-actions">
        <button type="button" class="pulse-modal-cancel" id="ns-cancel">Cancel</button>
        <button type="submit" class="pulse-modal-submit" id="ns-submit">Create</button>
      </div>
    </form>
  </div>
</div>

<!-- Delete-message confirmation modal -->
<div class="pulse-modal-backdrop hidden" id="delete-msg-modal">
  <div class="pulse-modal">
    <h2>Delete message?</h2>
    <p>This can't be undone.</p>
    <div class="pulse-modal-actions">
      <button type="button" class="pulse-modal-cancel" id="del-cancel">Cancel</button>
      <button type="button" class="pulse-modal-submit" id="del-confirm" style="background:#dc2626;border-color:#dc2626">Delete</button>
    </div>
  </div>
</div>

<!-- Archived channels modal -->
<div class="pulse-modal-backdrop hidden" id="archived-modal">
  <div class="pulse-modal" style="max-width:520px">
    <h2>Archived channels</h2>
    <div class="pulse-archived-list" id="archived-list">
      <div class="pulse-channel-empty">Loading…</div>
    </div>
    <div class="pulse-modal-actions">
      <button type="button" class="pulse-modal-cancel" id="archived-close">Close</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<script src="chat-helpers.js?v=6"></script>
<script>
  /* ── State ──────────────────────────────────────────────────── */
  let CURRENT_USER  = null;
  let CHANNELS      = [];
  let DMS           = [];
  let SECTIONS      = [];
  let ACTIVE_SCOPE  = null;   // { kind: 'channel'|'dm', id, name, members?, is_private? }
  let SSE           = null;
  let RENDERED_IDS  = new Set();
  let LAST_DATE     = null;   // YYYY-MM-DD of last rendered message — drives dividers
  let OLDEST_TIME   = null;
  let HAS_MORE      = false;
  let LOADING_HIST  = false;
  let AT_BOTTOM     = true;
  let UNREAD        = new Map(); // key 'channel:<id>' | 'dm:<id>' -> {unread, mentions}
  let DELETE_TARGET = null;      // message id pending delete confirm
  let QUILL         = null;
  let TRAY          = null;      // attachment tray controller
  let MENTION_PV    = null;
  let PENDING_DM_USERS = new Set();
  let ALL_USERS     = null;      // cached for DM picker

  const SCROLL_LOAD_THRESHOLD = 60;

  const $ = (id) => document.getElementById(id);
  const show = (el) => el.classList.remove('hidden');
  const hide = (el) => el.classList.add('hidden');

  function setConnDot(state) {
    const el = $('conn-dot');
    el.classList.remove('connected','connecting','disconnected');
    el.classList.add(state);
    el.title = state === 'connected' ? 'Connected'
      : state === 'connecting' ? 'Connecting…' : 'Disconnected — retrying';
  }

  function scopeKey(scope) {
    if (!scope) return null;
    return scope.kind + ':' + scope.id;
  }

  function isActive(kind, id) {
    return ACTIVE_SCOPE && ACTIVE_SCOPE.kind === kind && ACTIVE_SCOPE.id === id;
  }

  /* ── Sidebar rendering ─────────────────────────────────────── */
  function unreadFor(kind, id) {
    return UNREAD.get(kind + ':' + id) || { unread: 0, mentions: 0 };
  }

  function canArchiveChannel(c) {
    if (!c || c.slug === 'general') return false;
    if (CURRENT_USER && CURRENT_USER.is_owner) return true;
    return c.my_role === 'admin';
  }

  function buildChannelLink(c) {
    const u = unreadFor('channel', c.id);
    const isActiveItem = isActive('channel', c.id);
    const lock = c.is_private ? '🔒' : '#';
    const dots = (u.mentions > 0
        ? `<span class="pulse-mention-dot">${u.mentions}</span>`
        : (u.unread > 0 ? '<span class="pulse-unread-dot"></span>' : ''));
    const archiveBtn = canArchiveChannel(c)
      ? `<button type="button" class="pulse-channel-archive-btn" data-archive="${c.id}" title="Archive channel">🗄</button>`
      : '';
    return `<a class="pulse-channel-item ${isActiveItem ? 'active' : ''} ${u.unread > 0 ? 'has-unread' : ''}"
              data-kind="channel" data-id="${c.id}" draggable="true" href="#"
              title="${escHtml(c.description || '')}">
        <span class="pulse-channel-hash">${lock}</span>
        <span>${escHtml(c.name)}</span>
        ${dots}
        ${archiveBtn}
      </a>`;
  }

  function buildDmLink(d) {
    const u = unreadFor('dm', d.id);
    const isActiveItem = isActive('dm', d.id);
    const title = d.title || 'Direct message';
    const dots = (u.mentions > 0
        ? `<span class="pulse-mention-dot">${u.mentions}</span>`
        : (u.unread > 0 ? '<span class="pulse-unread-dot"></span>' : ''));
    const initial = avatarInitial(title);
    return `<a class="pulse-dm-item ${isActiveItem ? 'active' : ''} ${u.unread > 0 ? 'has-unread' : ''}"
              data-kind="dm" data-id="${d.id}" draggable="true" href="#">
        <span class="pulse-dm-avatar">${escHtml(initial)}</span>
        <span>${escHtml(title)}</span>
        ${dots}
      </a>`;
  }

  // Which channels/DMs live outside of any section
  function unsectionedItems() {
    const inSection = new Set();
    for (const s of SECTIONS) for (const it of s.items) {
      inSection.add((it.channel_id ? 'channel:' : 'dm:') + (it.channel_id || it.dm_id));
    }
    return {
      channels: CHANNELS.filter(c => !inSection.has('channel:' + c.id)),
      dms: DMS.filter(d => !inSection.has('dm:' + d.id))
    };
  }

  function renderSidebar() {
    const secWrap = $('sidebar-sections');
    secWrap.innerHTML = '';
    for (const s of SECTIONS) {
      const sec = document.createElement('div');
      sec.className = 'pulse-sidebar-section';
      sec.dataset.sectionId = s.id;

      const items = (s.items || []).map(it => {
        if (it.channel_id) {
          const c = CHANNELS.find(x => x.id === it.channel_id);
          return c ? buildChannelLink(c) : '';
        }
        const d = DMS.find(x => x.id === it.dm_id);
        return d ? buildDmLink(d) : '';
      }).join('');

      sec.innerHTML = `
        <div class="pulse-section-header ${s.collapsed ? 'collapsed' : ''}" data-id="${s.id}">
          <span class="chevron">▾</span>
          <span class="name">${escHtml(s.name)}</span>
          <span class="actions">
            <button class="pulse-msg-action-btn" data-act="rename" title="Rename">✎</button>
            <button class="pulse-msg-action-btn danger" data-act="delete" title="Delete section">🗑</button>
          </span>
        </div>
        <div class="pulse-section-body pulse-section-drop" data-section-drop="${s.id}">${items || ''}</div>
      `;
      secWrap.appendChild(sec);
    }

    const { channels, dms } = unsectionedItems();
    const chList = $('channel-list');
    chList.dataset.sectionDrop = ''; // empty marker => "unsectioned"
    chList.classList.add('pulse-section-drop');
    chList.innerHTML = channels.length
      ? channels.map(buildChannelLink).join('')
      : '<div class="pulse-channel-empty">No channels yet.</div>';

    const dmList = $('dm-list');
    dmList.dataset.sectionDrop = '';
    dmList.classList.add('pulse-section-drop');
    dmList.innerHTML = dms.length
      ? dms.map(buildDmLink).join('')
      : '<div class="pulse-channel-empty">No direct messages yet.</div>';

    wireSidebarInteractions();
  }

  function wireSidebarInteractions() {
    document.querySelectorAll('[data-kind][data-id]').forEach(el => {
      el.addEventListener('click', (e) => {
        // Inline archive button: swallow the parent-link click.
        if (e.target.closest('[data-archive]')) return;
        e.preventDefault();
        const kind = el.dataset.kind, id = el.dataset.id;
        if (kind === 'channel') {
          const c = CHANNELS.find(x => x.id === id);
          if (c) switchScope({ kind: 'channel', id: c.id, name: c.name, is_private: c.is_private });
        } else if (kind === 'dm') {
          const d = DMS.find(x => x.id === id);
          if (d) switchScope({ kind: 'dm', id: d.id, name: d.title, members: d.members });
        }
        if (window.innerWidth <= 720) $('sidebar').classList.remove('open');
      });

      // Drag/drop (desktop)
      el.addEventListener('dragstart', (e) => {
        el.classList.add('dragging');
        e.dataTransfer.setData('application/x-pulse-item',
          JSON.stringify({ kind: el.dataset.kind, id: el.dataset.id }));
        e.dataTransfer.effectAllowed = 'move';
      });
      el.addEventListener('dragend', () => el.classList.remove('dragging'));
    });

    document.querySelectorAll('.pulse-section-drop').forEach(zone => {
      zone.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        zone.classList.add('drag-over');
      });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
      zone.addEventListener('drop', async (e) => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        let payload;
        try { payload = JSON.parse(e.dataTransfer.getData('application/x-pulse-item')); } catch { return; }
        const targetSection = zone.dataset.sectionDrop || ''; // '' = unsectioned
        await moveItemToSection(payload, targetSection);
      });
    });

    document.querySelectorAll('.pulse-section-header').forEach(h => {
      h.addEventListener('click', async (e) => {
        // Skip if the click was on an action button
        if (e.target.closest('[data-act]')) return;
        const id = h.dataset.id;
        const sec = SECTIONS.find(s => s.id === id);
        if (!sec) return;
        sec.collapsed = !sec.collapsed;
        renderSidebar();
        try { await apiFetch(`/api/pulse/sections/${id}`, { method: 'PATCH',
          body: JSON.stringify({ collapsed: sec.collapsed }) }); }
        catch (err) { showToast(err.message || 'Could not save section state', 'error'); }
      });
    });

    document.querySelectorAll('[data-act="rename"]').forEach(b => {
      b.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = b.closest('.pulse-section-header').dataset.id;
        const sec = SECTIONS.find(s => s.id === id);
        const name = prompt('Rename section', sec ? sec.name : '');
        if (!name || !name.trim()) return;
        try {
          const upd = await apiFetch(`/api/pulse/sections/${id}`, { method: 'PATCH',
            body: JSON.stringify({ name: name.trim() }) });
          sec.name = upd.name;
          renderSidebar();
        } catch (err) { showToast(err.message || 'Rename failed', 'error'); }
      });
    });

    document.querySelectorAll('[data-act="delete"]').forEach(b => {
      b.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = b.closest('.pulse-section-header').dataset.id;
        if (!confirm('Delete this section? Channels and DMs in it will move back to the default group.')) return;
        try {
          await apiFetch(`/api/pulse/sections/${id}`, { method: 'DELETE' });
          await refreshSections();
        } catch (err) { showToast(err.message || 'Delete failed', 'error'); }
      });
    });

    // Per-channel archive button (admins / account owners only)
    document.querySelectorAll('[data-archive]').forEach(b => {
      b.addEventListener('click', async (e) => {
        e.preventDefault();
        e.stopPropagation();
        const id = b.dataset.archive;
        const c = CHANNELS.find(x => x.id === id);
        if (!c) return;
        if (!confirm(`Archive #${c.name}? It will disappear from the sidebar but messages and members are preserved — you can unarchive from "Show archived channels".`)) return;
        try {
          await apiFetch(`/api/pulse/channels/${id}/archive`, { method: 'POST' });
          // Remove from CHANNELS in-memory so the sidebar updates without a full reload
          CHANNELS = CHANNELS.filter(x => x.id !== id);
          // If the archived channel was active, fall back to #general
          if (ACTIVE_SCOPE && ACTIVE_SCOPE.kind === 'channel' && ACTIVE_SCOPE.id === id) {
            const next = CHANNELS.find(x => x.slug === 'general') || CHANNELS[0];
            if (next) await switchScope({ kind: 'channel', id: next.id, name: next.name, is_private: next.is_private });
          }
          renderSidebar();
          showToast(`Archived #${c.name}`, 'info');
        } catch (err) { showToast(err.message || 'Archive failed', 'error'); }
      });
    });
  }

  async function moveItemToSection({ kind, id }, sectionId) {
    try {
      if (!sectionId) {
        // Drop on unsectioned: find and remove any existing item
        for (const s of SECTIONS) {
          const item = (s.items || []).find(it =>
            (kind === 'channel' && it.channel_id === id) ||
            (kind === 'dm'      && it.dm_id      === id));
          if (item) {
            await apiFetch(`/api/pulse/sections/${s.id}/items/${item.id}`, { method: 'DELETE' });
          }
        }
      } else {
        const body = kind === 'channel' ? { channel_id: id } : { dm_id: id };
        await apiFetch(`/api/pulse/sections/${sectionId}/items`, {
          method: 'POST', body: JSON.stringify(body)
        });
      }
      await refreshSections();
    } catch (err) { showToast(err.message || 'Move failed', 'error'); }
  }

  async function refreshSections() {
    try { SECTIONS = await apiFetch('/api/pulse/sections'); }
    catch (err) { SECTIONS = []; }
    renderSidebar();
  }

  /* ── Message rendering ───────────────────────────────────────── */
  function buildDateDividerEl(iso) {
    const div = document.createElement('div');
    div.className = 'pulse-date-divider';
    div.innerHTML = `<span>${escHtml(PulseChat.formatDateDivider(iso))}</span>`;
    return div;
  }

  function dayKey(iso) {
    const d = new Date(iso);
    return d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
  }

  function renderAttachments(attachments) {
    if (!attachments || !attachments.length) return '';
    return '<div class="pulse-msg-attachments">' + attachments.map(a => {
      if (a.mime_type && a.mime_type.startsWith('image/')) {
        return `<img class="pulse-msg-image" src="${escHtml(a.url)}"
                 alt="${escHtml(a.filename || '')}" data-full="${escHtml(a.url)}">`;
      }
      const size = a.size_bytes ? `<span class="size">${escHtml(PulseChat.bytesHuman(a.size_bytes))}</span>` : '';
      return `<a class="pulse-msg-file" href="${escHtml(a.url)}" target="_blank" rel="noopener" download>
          <span class="icon">${PulseChat.fileIcon(a.mime_type)}</span>
          <span class="meta">
            <span class="name">${escHtml(a.filename || 'file')}</span>
            ${size}
          </span>
        </a>`;
    }).join('') + '</div>';
  }

  function buildMessageEl(msg) {
    const initial = avatarInitial(msg.sender_name || msg.sender_email);
    const time = formatTime(msg.created_at);
    const row = document.createElement('div');
    row.className = 'pulse-msg';
    row.dataset.id = msg.id;
    row.dataset.senderId = msg.sender_id || '';
    row.dataset.createdAt = msg.created_at;

    const isMine = CURRENT_USER && msg.sender_id === CURRENT_USER.id;
    const editedTag = msg.edited_at ? '<span class="pulse-msg-edited">(edited)</span>' : '';

    const safeBody = PulseChat.highlightSelfMentions(
      PulseChat.sanitizeHtml(msg.body || ''),
      CURRENT_USER && CURRENT_USER.id
    );

    const avatar = (msg.sender_avatar_url)
      ? `<img class="avatar-img" src="${escHtml(msg.sender_avatar_url)}" alt="">`
      : escHtml(initial);

    row.innerHTML = `
      <div class="pulse-avatar">${avatar}</div>
      <div class="pulse-msg-body">
        <div class="pulse-msg-head">
          <span class="pulse-msg-author">${escHtml(msg.sender_name || msg.sender_email || 'Unknown')}</span>
          <span class="pulse-msg-time">${escHtml(time)}</span>
          ${editedTag}
        </div>
        <div class="pulse-msg-text" data-role="body">${safeBody}</div>
        ${renderAttachments(msg.attachments)}
      </div>
      ${isMine ? `
        <div class="pulse-msg-actions">
          <button class="pulse-msg-action-btn" data-act="edit" title="Edit">✏️</button>
          <button class="pulse-msg-action-btn danger" data-act="delete" title="Delete">🗑</button>
        </div>
      ` : ''}
    `;

    if (isMine) {
      row.querySelector('[data-act="edit"]').addEventListener('click', () => startEditMessage(row, msg));
      row.querySelector('[data-act="delete"]').addEventListener('click', () => promptDelete(msg.id));
    }
    row.querySelectorAll('.pulse-msg-image').forEach(img => {
      img.addEventListener('click', () => openLightbox(img.dataset.full));
    });
    return row;
  }

  function appendMessage(msg, opts = {}) {
    if (RENDERED_IDS.has(msg.id)) return;
    RENDERED_IDS.add(msg.id);
    const wrap = $('messages');
    const emptyMarker = wrap.querySelector('.pulse-empty');
    if (emptyMarker) emptyMarker.remove();

    // Day divider: if this message's day differs from the last one rendered
    const k = dayKey(msg.created_at);
    if (k !== LAST_DATE) {
      wrap.appendChild(buildDateDividerEl(msg.created_at));
      LAST_DATE = k;
    }
    wrap.appendChild(buildMessageEl(msg));
    if (opts.scroll !== false && AT_BOTTOM) wrap.scrollTop = wrap.scrollHeight;
  }

  function rebuildMessageList(msgs) {
    // Used on initial load + after switching scope. Always rebuilds dividers from scratch.
    const wrap = $('messages');
    wrap.innerHTML = `<div class="pulse-history-loader hidden" id="history-loader">Loading older messages…</div>`;
    RENDERED_IDS = new Set();
    LAST_DATE = null;
    if (!msgs.length) {
      const empty = document.createElement('div');
      empty.className = 'pulse-empty';
      const title = ACTIVE_SCOPE
        ? (ACTIVE_SCOPE.kind === 'channel' ? `#${ACTIVE_SCOPE.name}` : ACTIVE_SCOPE.name)
        : '';
      empty.textContent = `No messages in ${title} yet. Be the first to say hi.`;
      wrap.appendChild(empty);
      return;
    }
    for (const m of msgs) appendMessage(m, { scroll: false });
  }

  function prependMessages(msgs) {
    const wrap = $('messages');
    const loader = $('history-loader');
    const prevHeight = wrap.scrollHeight;
    const prevTop = wrap.scrollTop;
    const frag = document.createDocumentFragment();

    // Track day boundaries in the prepended block. We DON'T re-track LAST_DATE
    // for these because they're older — the boundary between this block and
    // the existing-rendered messages will get one divider below.
    let blockLastDay = null;
    for (const m of msgs) {
      if (RENDERED_IDS.has(m.id)) continue;
      RENDERED_IDS.add(m.id);
      const k = dayKey(m.created_at);
      if (k !== blockLastDay) {
        frag.appendChild(buildDateDividerEl(m.created_at));
        blockLastDay = k;
      }
      frag.appendChild(buildMessageEl(m));
    }
    // Insert the older block right after the loader.
    if (loader.nextSibling) wrap.insertBefore(frag, loader.nextSibling);
    else wrap.appendChild(frag);

    const heightDelta = wrap.scrollHeight - prevHeight;
    wrap.scrollTop = prevTop + heightDelta;
  }

  /* ── Edit / delete handlers ──────────────────────────────────── */
  function startEditMessage(row, msg) {
    const bodyEl = row.querySelector('[data-role="body"]');
    if (!bodyEl) return;
    const original = bodyEl.innerHTML;
    // Convert sanitized HTML back into plain text for editing. Quill in the
    // composer handles rich edits at compose-time; for inline edit we keep it
    // simple with a textarea on the raw body.
    const draft = msg.body || '';
    bodyEl.innerHTML = `
      <div class="pulse-msg-edit">
        <textarea class="pulse-msg-edit-input">${escHtml(draft.replace(/<[^>]+>/g, ''))}</textarea>
        <div class="pulse-msg-edit-actions">
          <button class="cancel" type="button">Cancel</button>
          <button class="save" type="button">Save</button>
        </div>
      </div>`;
    const ta = bodyEl.querySelector('textarea');
    ta.focus();
    ta.style.height = ta.scrollHeight + 'px';
    bodyEl.querySelector('.cancel').addEventListener('click', () => {
      bodyEl.innerHTML = original;
    });
    bodyEl.querySelector('.save').addEventListener('click', async () => {
      const newText = ta.value.trim();
      if (!newText) {
        bodyEl.innerHTML = original;
        return;
      }
      try {
        // Plain-text edit becomes a <p>-wrapped body so it renders consistently.
        const newBody = '<p>' + escHtml(newText) + '</p>';
        await apiFetch('/api/pulse/messages/' + msg.id, {
          method: 'PATCH', body: JSON.stringify({ body: newBody })
        });
        // The SSE message_updated will repaint the row.
      } catch (err) {
        showToast(err.message || 'Edit failed', 'error');
        bodyEl.innerHTML = original;
      }
    });
  }

  /* ── History loading ─────────────────────────────────────────── */
  async function loadInitialHistory() {
    const wrap = $('messages');
    wrap.innerHTML = '<div class="pulse-empty">Loading…</div>';
    RENDERED_IDS = new Set();
    LAST_DATE = null;
    OLDEST_TIME = null;
    HAS_MORE = false;

    const param = ACTIVE_SCOPE.kind === 'channel'
      ? 'channel_id=' + encodeURIComponent(ACTIVE_SCOPE.id)
      : 'dm_id='      + encodeURIComponent(ACTIVE_SCOPE.id);
    try {
      const data = await apiFetch(`/api/pulse/messages?${param}&limit=50`);
      HAS_MORE = !!data.has_more;
      rebuildMessageList(data.messages || []);
      if (data.messages && data.messages.length) {
        OLDEST_TIME = data.messages[0].created_at;
      }
      AT_BOTTOM = true;
      wrap.scrollTop = wrap.scrollHeight;
      // Mark read on the server side.
      markScopeRead();
    } catch (err) {
      showToast('Could not load messages: ' + err.message, 'error');
    }
  }

  async function loadOlderHistory() {
    if (LOADING_HIST || !HAS_MORE || !OLDEST_TIME || !ACTIVE_SCOPE) return;
    LOADING_HIST = true;
    const loader = $('history-loader');
    if (loader) show(loader);
    const param = ACTIVE_SCOPE.kind === 'channel'
      ? 'channel_id=' + encodeURIComponent(ACTIVE_SCOPE.id)
      : 'dm_id='      + encodeURIComponent(ACTIVE_SCOPE.id);
    try {
      const data = await apiFetch(
        `/api/pulse/messages?${param}&before=${encodeURIComponent(OLDEST_TIME)}&limit=50`
      );
      const msgs = data.messages || [];
      HAS_MORE = !!data.has_more;
      if (msgs.length) {
        prependMessages(msgs);
        OLDEST_TIME = msgs[0].created_at;
      }
    } catch (err) {
      showToast('Could not load older messages: ' + err.message, 'error');
    } finally {
      if (loader) hide(loader);
      LOADING_HIST = false;
    }
  }

  /* ── Read tracking + unread fanout ──────────────────────────── */
  async function markScopeRead() {
    if (!ACTIVE_SCOPE) return;
    const path = ACTIVE_SCOPE.kind === 'channel'
      ? `/api/pulse/channels/${ACTIVE_SCOPE.id}/read`
      : `/api/pulse/dms/${ACTIVE_SCOPE.id}/read`;
    try { await apiFetch(path, { method: 'POST' }); } catch {}
    // Local clear (server will also broadcast unread_update via SSE)
    UNREAD.set(scopeKey(ACTIVE_SCOPE), { unread: 0, mentions: 0 });
    renderSidebar();
  }

  async function refreshUnread() {
    try {
      const u = await apiFetch('/api/pulse/unread');
      UNREAD = new Map();
      for (const c of (u.channels || [])) UNREAD.set('channel:' + c.channel_id, { unread: c.unread, mentions: c.mentions });
      for (const d of (u.dms || []))      UNREAD.set('dm:' + d.dm_id,           { unread: d.unread, mentions: d.mentions });
    } catch {}
  }

  /* ── SSE ─────────────────────────────────────────────────────── */
  function connectSse() {
    setConnDot('connecting');
    if (SSE) { SSE.close(); SSE = null; }
    if (!ACTIVE_SCOPE) return;
    const param = ACTIVE_SCOPE.kind === 'channel'
      ? 'channel_id=' + encodeURIComponent(ACTIVE_SCOPE.id)
      : 'dm_id='      + encodeURIComponent(ACTIVE_SCOPE.id);
    const url = `/api/pulse/stream?${param}&token=${encodeURIComponent(getToken())}`;
    SSE = new EventSource(url);
    SSE.onopen = () => setConnDot('connected');
    SSE.onerror = () => setConnDot('disconnected');
    SSE.onmessage = (e) => {
      let event;
      try { event = JSON.parse(e.data); } catch { return; }
      handleSseEvent(event);
    };
  }

  function handleSseEvent(event) {
    if (!event || !event.type) return;
    if (event.type === 'message' && event.message
        && ((ACTIVE_SCOPE.kind === 'channel' && event.message.channel_id === ACTIVE_SCOPE.id)
         || (ACTIVE_SCOPE.kind === 'dm'      && event.message.dm_id      === ACTIVE_SCOPE.id))) {
      appendMessage(event.message);
      if (document.visibilityState === 'visible') markScopeRead();
    } else if (event.type === 'message_updated' && event.message) {
      replaceMessageInPlace(event.message);
    } else if (event.type === 'message_deleted') {
      removeMessageFromView(event.message_id);
    } else if (event.type === 'unread_update') {
      // The server signals "something changed in scope X"; we just re-fetch
      // counts. Cheap relative to SSE volume on a small team.
      refreshUnread().then(renderSidebar);
    } else if (event.type === 'mention' && event.message) {
      const from = event.message.sender_name || 'Someone';
      const text = (event.message.body || '').replace(/<[^>]+>/g, '').slice(0, 120);
      PulseChat.notify(from + ' mentioned you', text);
    }
  }

  function replaceMessageInPlace(msg) {
    const row = document.querySelector(`.pulse-msg[data-id="${msg.id}"]`);
    if (!row) return;
    const newRow = buildMessageEl(msg);
    row.replaceWith(newRow);
  }

  function removeMessageFromView(id) {
    const row = document.querySelector(`.pulse-msg[data-id="${id}"]`);
    if (!row) return;
    row.remove();
  }

  /* ── Scope switching ─────────────────────────────────────────── */
  async function switchScope(scope) {
    if (ACTIVE_SCOPE && scopeKey(ACTIVE_SCOPE) === scopeKey(scope)) return;
    ACTIVE_SCOPE = scope;

    if (scope.kind === 'channel') {
      const c = CHANNELS.find(x => x.id === scope.id);
      $('channel-name').textContent = (c && c.is_private ? '🔒 ' : '#') + scope.name;
      $('quill-editor').dataset.placeholder = 'Message ' + (c && c.is_private ? '🔒' : '#') + scope.name;
      // Auto-join public channels (matches v1 behavior)
      if (c && !c.is_member && !c.is_private) {
        try { await apiFetch(`/api/pulse/channels/${c.id}/join`, { method: 'POST' }); c.is_member = true; } catch {}
      }
    } else {
      $('channel-name').textContent = '🗨 ' + scope.name;
      $('quill-editor').dataset.placeholder = 'Message ' + scope.name;
    }
    renderSidebar();
    await loadInitialHistory();
    connectSse();
  }

  /* ── Sending ─────────────────────────────────────────────────── */
  async function send() {
    if (!ACTIVE_SCOPE) return;
    const html = QUILL.root.innerHTML;
    const plain = QUILL.getText().trim();
    const attachments = TRAY.getAttachments();
    if (!plain && !attachments.length) return;
    if (TRAY && !TRAY.isReady()) {
      showToast('Wait for uploads to finish', 'error');
      return;
    }
    const btn = $('send-btn');
    btn.disabled = true;
    try {
      const body = { client_message_id: crypto.randomUUID() };
      if (ACTIVE_SCOPE.kind === 'channel') body.channel_id = ACTIVE_SCOPE.id;
      else                                 body.dm_id      = ACTIVE_SCOPE.id;
      body.body = PulseChat.sanitizeHtml(html);
      if (attachments.length) body.attachments = attachments;
      await apiFetch('/api/pulse/messages', { method: 'POST', body: JSON.stringify(body) });
      QUILL.setContents([{ insert: '\n' }]);
      TRAY.clear();
      AT_BOTTOM = true;
    } catch (err) {
      showToast('Send failed: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      QUILL.focus();
    }
  }

  /* ── New DM modal ────────────────────────────────────────────── */
  async function openNewDmModal() {
    PENDING_DM_USERS = new Set();
    $('dm-search').value = '';
    $('dm-submit').disabled = true;
    hide($('dm-error'));
    if (!ALL_USERS) {
      try { ALL_USERS = await apiFetch('/api/pulse/users'); }
      catch (err) { showToast('Could not load users: ' + err.message, 'error'); ALL_USERS = []; }
    }
    renderDmUserList('');
    show($('new-dm-modal'));
    setTimeout(() => $('dm-search').focus(), 50);
  }
  function closeNewDmModal() { hide($('new-dm-modal')); }

  function renderDmUserList(q) {
    const list = $('dm-user-list');
    const needle = (q || '').toLowerCase();
    const rows = (ALL_USERS || []).filter(u => {
      const name  = (u.full_name || '').toLowerCase();
      const email = (u.email || '').toLowerCase();
      return !needle || name.includes(needle) || email.includes(needle);
    });
    if (!rows.length) {
      list.innerHTML = '<div class="pulse-channel-empty">No matches.</div>';
      return;
    }
    // Render as a real <table>. <tr>/<td> are the most reliable horizontal
    // layout primitive in HTML — no CSS injection or parent context can make
    // a table-row stack its cells vertically. Inline styles on each <td> give
    // specificity 1000 so external CSS can't disturb the layout either.
    const rowsHtml = rows.map(u => {
      const sel = PENDING_DM_USERS.has(u.id);
      const ava = u.avatar_url
        ? `<img src="${escHtml(u.avatar_url)}" alt="" style="width:32px;height:32px;border-radius:50%;object-fit:cover;display:block;">`
        : `<span style="display:inline-block;width:32px;height:32px;border-radius:50%;background:#e5e7eb;color:#374151;text-align:center;line-height:32px;font-weight:600;font-size:.85rem;vertical-align:middle;">${escHtml(avatarInitial(u.full_name || u.email))}</span>`;
      const rowBg = sel ? '#ecfdf5' : 'transparent';
      const checkBg = sel ? 'background:#61B746;border-color:#61B746;color:#fff;' : 'color:transparent;';
      return `
        <tr class="pulse-user-row${sel ? ' selected' : ''}" data-uid="${u.id}" style="cursor:pointer;background:${rowBg};">
          <td style="width:52px;vertical-align:middle;padding:8px 0 8px 10px;text-align:left;">${ava}</td>
          <td style="vertical-align:middle;padding:8px 12px;text-align:left;">
            <div style="font-weight:500;font-size:.92rem;color:#111;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(u.full_name || u.email || '')}</div>
            <div style="color:#6b7280;font-size:.75rem;line-height:1.2;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(u.email || '')}</div>
          </td>
          <td style="width:36px;vertical-align:middle;padding:8px 10px 8px 0;text-align:right;">
            <span style="display:inline-block;width:20px;height:20px;border:1px solid #d1d5db;border-radius:4px;text-align:center;line-height:18px;font-size:.8rem;vertical-align:middle;${checkBg}">${sel ? '✓' : ''}</span>
          </td>
        </tr>
      `;
    }).join('');
    list.innerHTML = `
      <table style="width:100%;border-collapse:separate;border-spacing:0 2px;table-layout:auto;">
        <tbody>${rowsHtml}</tbody>
      </table>
    `;
    list.querySelectorAll('.pulse-user-row').forEach(el => {
      el.addEventListener('click', () => {
        const uid = el.dataset.uid;
        if (PENDING_DM_USERS.has(uid)) PENDING_DM_USERS.delete(uid);
        else PENDING_DM_USERS.add(uid);
        $('dm-submit').disabled = PENDING_DM_USERS.size === 0;
        renderDmUserList($('dm-search').value);
      });
    });
  }

  async function submitNewDm() {
    const uids = Array.from(PENDING_DM_USERS);
    if (!uids.length) return;
    try {
      const created = await apiFetch('/api/pulse/dms', {

      switchScope({ kind: 'dm', id: dm.id, name: dm.title || 'Direct message' });
    } catch (err) {
      $('dm-error').textContent = err.message || 'Failed to start DM';
      show($('dm-error'));
    }
  }

  function renderArchivedList(items) {
    const listEl = $('archived-list');
    if (!items.length) {
      listEl.innerHTML = '<div class="pulse-channel-empty">No archived channels.</div>';
      return;
    }
    listEl.innerHTML = items.map(c => {
      const lock = c.is_private ? '🔒' : '#';
      const canUnarchive = (CURRENT_USER && CURRENT_USER.is_owner) || c.my_role === 'admin';
      return `
        <div class="pulse-archived-row" data-id="${c.id}">
          <div class="meta">
            <div class="name">${lock}${escHtml(c.name)}</div>
            <div class="sub">${escHtml(c.description || '')}</div>

            ? `<button type="button" class="pulse-modal-submit" data-unarchive="${c.id}">Unarchive</button>`

  /* ── Scroll tracking ─────────────────────────────────────────── */
  function onMessagesScroll() {
    const wrap = $('messages');
    const nearBottom = wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 24;
    AT_BOTTOM = nearBottom;
    if (wrap.scrollTop < SCROLL_LOAD_THRESHOLD) loadOlderHistory();

  /* ── Quill + composer setup ──────────────────────────────────── */
  function setupQuill() {
    PulseChat.registerMentionBlot(Quill);
    QUILL = new Quill('#quill-editor', {
      theme: 'snow',
      placeholder: 'Message',
      modules: {
        toolbar: [
          ['bold','italic','strike','code'],
          [{ list: 'ordered' }, { list: 'bullet' }, 'blockquote'],
          ['link','clean']
        ],
        keyboard: {
          bindings: {
            send: {
              key: 'Enter',
              shiftKey: false,
              handler: () => { send(); return false; }
            }
          }
        }
      }
    });

    // Sync placeholder updates (we mutate data-placeholder on scope switch)
    const editorEl = $('quill-editor');
    const obs = new MutationObserver(() => {
      const ph = editorEl.dataset.placeholder;
      if (ph) QUILL.root.dataset.placeholder = ph;
    });
    obs.observe(editorEl, { attributes: true });

    TRAY = PulseChat.setupAttachmentTray({
      trayEl: $('attach-tray'),
      dropEl: $('composer'),
      onError: (m) => showToast(m, 'error')
    });
    $('attach-btn').addEventListener('click', () => $('attach-input').click());
    $('attach-input').addEventListener('change', (e) => {
      TRAY.addFiles(e.target.files);
      e.target.value = '';
    });

    MENTION_PV = PulseChat.setupMentionPopover({
      quill: QUILL,
      popupEl: $('mention-popup'),
      getCandidates: async () => {
        if (!ACTIVE_SCOPE) return [];
        const path = ACTIVE_SCOPE.kind === 'channel'
          ? `/api/pulse/channels/${ACTIVE_SCOPE.id}/members`
          : `/api/pulse/dms/${ACTIVE_SCOPE.id}/members`;
        const list = await apiFetch(path);
        return (list || [])
          .filter(m => m.user_id !== (CURRENT_USER && CURRENT_USER.id))
          .map(m => ({ id: m.user_id, full_name: m.full_name, email: m.email, avatar_url: m.avatar_url }));
      },
      onError: (m) => showToast(m, 'error')
    });
  }

  /* ── Init ────────────────────────────────────────────────────── */
  async function init() {
    const me = await requireAuth();
    if (!me) return;
    CURRENT_USER = me.user || me;
    $('me-name').textContent = CURRENT_USER.full_name || CURRENT_USER.email || '';

    // OS back link
    try {
      const cfg = await (await fetch('/api/config')).json();
      const osUrl = cfg.osUrl || '';
      if (osUrl) {
        const tok = getToken();
        const sep = osUrl.includes('?') ? '&' : '?';
        $('os-back').href = osUrl + '/dashboard.html' + (tok ? sep + 'token=' + encodeURIComponent(tok) : '');
      }
    } catch {}

    // Load channels + DMs + sections + unread in parallel
    try {
      const [ch, dm, secs] = await Promise.all([
        apiFetch('/api/pulse/channels'),
        apiFetch('/api/pulse/dms').catch(() => []),
        apiFetch('/api/pulse/sections').catch(() => [])
      ]);
      CHANNELS = ch;
      DMS = dm || [];
      SECTIONS = secs || [];
    } catch (err) {
      showToast('Could not load channels: ' + err.message, 'error');
      return;
    }
    await refreshUnread();

    // Wire global controls
    setupQuill();
    $('composer').addEventListener('submit', (e) => { e.preventDefault(); send(); });
    $('messages').addEventListener('scroll', onMessagesScroll);

    $('new-channel-btn').addEventListener('click', openNewChannelModal);
    $('nc-cancel').addEventListener('click', closeNewChannelModal);
    $('new-channel-form').addEventListener('submit', submitNewChannel);
    $('new-channel-modal').addEventListener('click', (e) => {
      if (e.target.id === 'new-channel-modal') closeNewChannelModal();
    });

    $('new-dm-btn').addEventListener('click', openNewDmModal);
    $('dm-cancel').addEventListener('click', closeNewDmModal);
    $('dm-submit').addEventListener('click', submitNewDm);
    $('dm-search').addEventListener('input', () => renderDmUserList($('dm-search').value));
    $('new-dm-modal').addEventListener('click', (e) => {
      if (e.target.id === 'new-dm-modal') closeNewDmModal();
    });

    $('new-section-trigger').addEventListener('click', openNewSectionModal);
    $('ns-cancel').addEventListener('click', closeNewSectionModal);
    $('new-section-form').addEventListener('submit', submitNewSection);
    $('new-section-modal').addEventListener('click', (e) => {
      if (e.target.id === 'new-section-modal') closeNewSectionModal();
    });

    // Archived channels modal
    $('show-archived-btn').addEventListener('click', openArchivedModal);
    $('archived-close').addEventListener('click', closeArchivedModal);
    $('archived-modal').addEventListener('click', (e) => {
      if (e.target.id === 'archived-modal') closeArchivedModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (!$('new-channel-modal').classList.contains('hidden'))   closeNewChannelModal();
      else if (!$('new-dm-modal').classList.contains('hidden'))   closeNewDmModal();
      else if (!$('new-section-modal').classList.contains('hidden')) closeNewSectionModal();
      else if (!$('archived-modal').classList.contains('hidden')) closeArchivedModal();
      else if (!$('delete-msg-modal').classList.contains('hidden')) { hide($('delete-msg-modal')); DELETE_TARGET = null; }
      else if (!$('lightbox').classList.contains('hidden'))        hide($('lightbox'));
    });
    $('sidebar-toggle').addEventListener('click', () => {
      $('sidebar').classList.toggle('open');
    });

    // Re-mark read whenever the tab regains focus while we're viewing a scope
    window.addEventListener('focus', () => { if (ACTIVE_SCOPE) markScopeRead(); });

    // One-time browser-notification permission prompt — only after first interaction.
    document.addEventListener('click', () => {
      PulseChat.requestNotificationPermission();
    }, { once: true });

    if (!CHANNELS.length && !DMS.length) {
      $('messages').innerHTML = '<div class="pulse-empty">No channels yet. Click + to create one.</div>';
      renderSidebar();
      return;
    }
    renderSidebar();

    // Pick #general or first channel
    const initial = CHANNELS.find(c => c.slug === 'general') || CHANNELS[0];
    if (initial) {
      await switchScope({ kind: 'channel', id: initial.id, name: initial.name, is_private: initial.is_private });
    } else if (DMS[0]) {
      await switchScope({ kind: 'dm', id: DMS[0].id, name: DMS[0].title });
    }
  }

  init();
</script>
</body>
</html>
