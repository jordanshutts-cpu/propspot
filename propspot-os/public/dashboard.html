<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Dashboard</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <script>document.documentElement.classList.add('page-loading');try{if(localStorage.sidebar_collapsed==='1')document.documentElement.classList.add('sidebar-collapsed')}catch(e){}</script>
  <style>
    .pipeline-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
    .stage-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px; text-decoration: none; color: var(--text); transition: transform .15s; }
    .stage-card:active { transform: scale(.98); }
    .stage-icon { font-size: 1.4rem; margin-bottom: 6px; }
    .stage-count { font-size: 1.6rem; font-weight: 800; color: var(--brand); }
    .stage-label { font-size: .8rem; color: var(--text-muted); margin-top: 2px; }
    .apps-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .app-tile { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 14px; text-align: center; text-decoration: none; color: var(--text); }
    .app-icon { font-size: 2rem; margin-bottom: 6px; }
    .app-name { font-weight: 700; font-size: .95rem; }
    .app-role { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }
    .activity-row { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: .85rem; align-items: flex-start; }
    .activity-row:last-child { border-bottom: none; }
    .activity-dot { width: 6px; height: 6px; background: var(--brand); border-radius: 50%; margin-top: 8px; flex-shrink: 0; }
    .activity-time { color: var(--text-muted); font-size: .72rem; margin-top: 2px; }
    .activity-text { display: flex; flex-wrap: wrap; align-items: baseline; gap: 4px 6px; }
    .activity-prop {
      display: inline-flex; align-items: baseline; gap: 4px;
      padding: 2px 8px; margin-left: 2px;
      background: rgba(97,183,70,0.08);
      color: var(--brand-dark);
      border-radius: 6px;
      font-weight: 600;
      text-decoration: none;
      font-size: .82rem;
      transition: background .12s, transform .1s;
    }
    .activity-prop:hover { background: rgba(97,183,70,0.16); transform: translateY(-1px); }
    .activity-prop-arrow { color: var(--brand); font-weight: 700; }
    .activity-prop-city { color: var(--text-muted); font-weight: 500; font-size: .76rem; }
  </style>
</head>
<body class="os-newlayout">

<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<main class="page">
  <div class="section-header"><span class="section-title">Pipeline</span></div>
  <div class="pipeline-grid" id="pipeline-grid">
    <div class="stage-card"><div class="stage-icon">📥</div><div class="stage-count" id="c-prospects">–</div><div class="stage-label">Prospects</div></div>
    <div class="stage-card"><div class="stage-icon">🎯</div><div class="stage-count" id="c-leads">–</div><div class="stage-label">Leads</div></div>
    <div class="stage-card"><div class="stage-icon">🤝</div><div class="stage-count" id="c-opps">–</div><div class="stage-label">Opportunities</div></div>
    <div class="stage-card"><div class="stage-icon">📝</div><div class="stage-count" id="c-purchases">–</div><div class="stage-label">Under Contract</div></div>
    <div class="stage-card"><div class="stage-icon">🔧</div><div class="stage-count" id="c-renovating">–</div><div class="stage-label">Renovating</div></div>
    <div class="stage-card"><div class="stage-icon">🏷️</div><div class="stage-count" id="c-listed">–</div><div class="stage-label">Listed / Rented</div></div>
  </div>

  <div class="section-header" style="margin-top:24px;"><span class="section-title">Holdings Desk</span></div>
  <div class="pipeline-grid" id="holdings-grid">
    <a class="stage-card" data-app="holdings" data-app-path="/" href="#"><div class="stage-icon">💵</div><div class="stage-count" id="h-monthly">–</div><div class="stage-label">Monthly Carry</div></a>
    <a class="stage-card" data-app="holdings" data-app-path="/?filter=due-7d" href="#"><div class="stage-icon">📅</div><div class="stage-count" id="h-due-week">–</div><div class="stage-label">Due ≤ 7 days</div></a>
    <a class="stage-card" data-app="holdings" data-app-path="/?filter=overdue" href="#"><div class="stage-icon">⚠️</div><div class="stage-count" id="h-overdue">–</div><div class="stage-label">Overdue</div></a>
    <a class="stage-card" data-app="holdings" data-app-path="/" href="#"><div class="stage-icon">📂</div><div class="stage-count" id="h-active">–</div><div class="stage-label">Active Items</div></a>
  </div>

  <div class="section-header" style="margin-top:24px;"><span class="section-title">Your Apps</span></div>
  <div class="apps-grid" id="apps-grid"><p class="text-muted text-sm">Loading…</p></div>

  <div class="section-header" style="margin-top:24px;"><span class="section-title">Recent Activity</span></div>
  <div class="card"><div class="card-body" id="activity-list"><p class="text-muted text-sm">Loading…</p></div></div>
</main>

<script>window.NAV_CURRENT = 'dashboard';</script>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
  async function init(){
    const me = await requireAuth(); if (!me) return;
    await Promise.all([loadPipeline(), loadHoldings(), loadApps(me), loadActivity()]);
  }

  async function loadHoldings(){
    try{
      const s = await getHoldingsSummary();
      document.getElementById('h-monthly').textContent  = '$' + Math.round(s.monthly_carry || 0).toLocaleString('en-US');
      document.getElementById('h-due-week').textContent = s.due_this_week ?? 0;
      document.getElementById('h-overdue').textContent  = s.overdue ?? 0;
      document.getElementById('h-active').textContent   = s.active_count ?? 0;
    }catch(e){ console.error(e); }
  }

  async function loadPipeline(){
    try{
      const props = await getProperties();
      let pros=0, leads=0, opps=0, pur=0, ren=0, listed=0;
      for (const p of props){
        pros   += p.prospect_count    || 0;
        leads  += p.lead_count        || 0;
        opps   += p.opportunity_count || 0;
        pur    += p.purchase_count    || 0;
      }
      // Count from properties.status (authoritative top-level state) rather than
      // projects.status, so the dashboard matches the lifecycle pages exactly.
      ren    = props.filter(p => p.status === 'renovating').length;
      listed = props.filter(p => ['listed_for_sale','listed_for_rent','rented','renting'].includes(p.status)).length;
      document.getElementById('c-prospects').textContent  = pros;
      document.getElementById('c-leads').textContent      = leads;
      document.getElementById('c-opps').textContent       = opps;
      document.getElementById('c-purchases').textContent  = pur;
      document.getElementById('c-renovating').textContent = ren;
      document.getElementById('c-listed').textContent     = listed;
    }catch(e){ console.error(e); }
  }

  function loadApps(me){
    const grid = document.getElementById('apps-grid');
    if (!me.grants?.length){
      grid.innerHTML = '<p class="text-muted text-sm">No apps granted yet.</p>';
      return;
    }
    // Apps with an OS-native page — always route here, never to the
    // satellite base_url (which loads the old chrome/theme). Mirrors
    // the OS_NATIVE_PAGES map in app.js's wireUnifiedNav and sidebar.js.
    const OS_NATIVE_PAGES = {
      holdings:     '/holdings-desk.html',
      maintenance:  '/maintenance.html',
      fieldcam:     '/fieldcam.html',
      pulse:        '/pulse.html',
      inbox:        '/inbox.html',
      underwriting: '/underwriting.html'
    };
    // Display labels match the sidebar exactly. Overrides whatever the
    // DB's apps.name column happens to say so the dashboard tiles and
    // the sidebar rows stay in sync.
    const APP_LABELS = {
      holdings:     'Holdings',
      maintenance:  'Work Orders',
      fieldcam:     'FieldCam',
      pulse:        'Pulse',
      inbox:        'Inbox',
      underwriting: 'Underwriting'
    };
    const token = getToken();
    grid.innerHTML = me.grants.map(g => {
      let url = '#';
      if (OS_NATIVE_PAGES[g.slug]) {
        // Native OS page — same origin, no token append needed.
        url = OS_NATIVE_PAGES[g.slug];
      } else if (g.base_url) {
        const sep = g.base_url.includes('?') ? '&' : '?';
        url = g.base_url + sep + 'token=' + encodeURIComponent(token);
      }
      const label = APP_LABELS[g.slug] || g.name;
      return `<a class="app-tile" href="${escHtml(url)}">
        <div class="app-icon">${escHtml(g.icon || '🧩')}</div>
        <div class="app-name">${escHtml(label)}</div>
        <div class="app-role">${escHtml(g.role)}</div>
      </a>`;
    }).join('');
  }

  async function loadActivity(){
    try{
      const rows = await getActivity({ limit: 8 });
      const el = document.getElementById('activity-list');
      if (!rows.length){ el.innerHTML = '<p class="text-muted text-sm">No activity yet.</p>'; return; }
      el.innerHTML = rows.map(r => {
        const propLabel = r.prop_display_name || r.prop_address_line1 || '';
        const propLink = (propLabel && r.prop_id)
          ? `<a class="activity-prop" href="/property.html?id=${escHtml(r.prop_id)}" title="Open ${escHtml(propLabel)}">
               <span class="activity-prop-arrow">→</span> ${escHtml(propLabel)}${r.prop_city ? `<span class="activity-prop-city"> · ${escHtml(r.prop_city)}${r.prop_state ? ', ' + escHtml(r.prop_state) : ''}</span>` : ''}
             </a>`
          : '';
        return `
          <div class="activity-row">
            <div class="activity-dot"></div>
            <div style="flex:1;min-width:0;">
              <div class="activity-text">
                <strong>${escHtml(r.actor_name || 'System')}</strong>
                ${escHtml(r.action)}
                <em>${escHtml(r.entity_type)}</em>
                ${propLink}
              </div>
              <div class="activity-time">${formatDate(r.created_at)}</div>
            </div>
          </div>`;
      }).join('');
    }catch(e){
      document.getElementById('activity-list').innerHTML = '<p class="text-muted text-sm">Could not load activity.</p>';
    }
  }

  init();

  // Satellite apps deep-link here with ?action=edit_profile to open the
  // shared profile editor on the OS (the modal lives here, not on every app).
  if (new URLSearchParams(location.search).get('action') === 'edit_profile') {
    setTimeout(() => { try { openEditProfile(); } catch {} }, 250);
  }
</script>
</body>
</html>
