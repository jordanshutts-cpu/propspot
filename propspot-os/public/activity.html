<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Activity Monitor</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <script>document.documentElement.classList.add('page-loading');try{var _c=document.documentElement.classList;if(localStorage.sidebar_collapsed==='1')_c.add('sidebar-collapsed');var _t=localStorage.getItem('propspot_theme');_c.add('theme-premium');if(_t==='dark')_c.add('theme-dark');}catch(e){}</script>
  <style>
    /* ── Activity Monitor styles ───────────────────────────────── */
    .am-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
      margin-bottom: 16px;
      align-items: center;
    }
    .am-controls input[type="search"] {
      padding: 7px 10px;
      font-size: .82rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      min-width: 220px;
      flex: 1;
    }
    .am-controls input[type="search"]:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(97,183,70,0.10);
    }
    .am-control-label {
      font-size: .64rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-right: 2px;
    }

    /* ── Custom themed select ─────────────────────────────────── */
    /* Replaces native <select> so the trigger AND the menu both
       match the rest of the premium UI. Menu is body-anchored so
       overflow on the controls strip can't clip it. */
    .am-select {
      position: relative;
      display: inline-block;
      min-width: 140px;
    }
    .am-select-trigger {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 10px 7px 12px;
      font-size: .82rem;
      font-weight: 600;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: border-color 0.12s, box-shadow 0.12s;
      font-family: inherit;
    }
    .am-select-trigger:hover { border-color: #cbd5e1; }
    .am-select.open .am-select-trigger,
    .am-select-trigger:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(97,183,70,0.10);
    }
    .am-select-value {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .am-select-chev {
      width: 12px;
      height: 12px;
      color: var(--text-muted);
      transition: transform 0.16s, color 0.12s;
      flex-shrink: 0;
    }
    .am-select.open .am-select-chev {
      transform: rotate(180deg);
      color: var(--brand);
    }
    .am-select-menu {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 12px 32px -8px rgba(15,23,42,0.20),
                  0 2px 6px rgba(15,23,42,0.06);
      padding: 4px;
      z-index: 1200;
      display: none;
      max-height: 360px;
      overflow-y: auto;
      animation: am-select-in 0.12s ease-out;
      min-width: 160px;
    }
    @keyframes am-select-in {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .am-select-menu.open { display: block; }
    .am-select-item {
      padding: 7px 10px 7px 28px;
      border-radius: 6px;
      font-size: .82rem;
      cursor: pointer;
      color: var(--text);
      white-space: nowrap;
      transition: background 0.08s, color 0.08s;
      position: relative;
      font-weight: 500;
    }
    .am-select-item:hover {
      background: rgba(97,183,70,0.08);
      color: var(--brand-dark, #15803d);
    }
    .am-select-item.active {
      background: rgba(97,183,70,0.12);
      color: var(--brand-dark, #15803d);
      font-weight: 700;
    }
    .am-select-item.active::before {
      content: '';
      position: absolute;
      left: 11px;
      top: 50%;
      width: 9px; height: 5px;
      border-left: 2px solid var(--brand);
      border-bottom: 2px solid var(--brand);
      transform: translateY(-72%) rotate(-45deg);
    }
    .am-select-section {
      padding: 8px 10px 4px 10px;
      font-size: .62rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .am-select-section:first-child { padding-top: 4px; }

    /* Insights row: 2-column grid of mini-panels with bars/lists */
    .am-insights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }
    .am-insight-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .am-insight-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .am-insight-title {
      font-size: .78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .am-insight-meta {
      font-size: .7rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    /* Horizontal bar list rows */
    .am-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 7px;
      font-size: .82rem;
    }
    .am-bar-row:last-child { margin-bottom: 0; }
    .am-bar-label {
      flex: 0 0 110px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      font-weight: 500;
    }
    .am-bar-track {
      flex: 1;
      height: 8px;
      background: var(--bg);
      border-radius: 100px;
      overflow: hidden;
    }
    .am-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--brand-dark, #15803d), var(--brand));
      border-radius: 100px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .am-bar-fill.action-created { background: linear-gradient(90deg, #15803d, #4ade80); }
    .am-bar-fill.action-deleted { background: linear-gradient(90deg, #b91c1c, #ef4444); }
    .am-bar-fill.action-status_changed { background: linear-gradient(90deg, #6b21a8, #c084fc); }
    .am-bar-fill.action-updated { background: linear-gradient(90deg, #1d4ed8, #60a5fa); }
    .am-bar-count {
      flex: 0 0 36px;
      text-align: right;
      font-weight: 700;
      color: var(--text);
      font-size: .8rem;
      font-variant-numeric: tabular-nums;
    }

    /* Day chart — sparkline-style columns */
    .am-day-chart {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 70px;
      padding-bottom: 4px;
    }
    .am-day-bar {
      flex: 1;
      min-width: 4px;
      background: linear-gradient(180deg, var(--brand) 0%, var(--brand-dark, #15803d) 100%);
      border-radius: 3px 3px 0 0;
      position: relative;
      transition: transform 0.12s, filter 0.12s;
      cursor: pointer;
      opacity: 0.85;
    }
    .am-day-bar:hover { opacity: 1; filter: brightness(1.15); transform: scaleY(1.04); transform-origin: bottom; }
    .am-day-bar[data-empty="1"] {
      background: var(--border);
      opacity: 0.45;
    }
    .am-day-bar-tip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(-4px);
      background: var(--text);
      color: var(--surface);
      padding: 3px 7px;
      border-radius: 5px;
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 5;
    }
    .am-day-bar:hover .am-day-bar-tip { opacity: 1; }
    .am-day-chart-x {
      display: flex;
      justify-content: space-between;
      font-size: .62rem;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: 0.02em;
    }

    /* Property row in "Top properties" */
    .am-prop-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px dashed var(--border);
      font-size: .82rem;
      text-decoration: none;
      color: inherit;
      transition: padding-left 0.12s;
    }
    .am-prop-row:last-child { border-bottom: none; }
    .am-prop-row:hover { padding-left: 4px; color: var(--brand-dark); }
    .am-prop-row-title { flex: 1; min-width: 0; }
    .am-prop-row-name {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .am-prop-row-loc {
      font-size: .7rem;
      color: var(--text-muted);
    }
    .am-prop-row-count {
      font-weight: 700;
      font-size: .82rem;
      color: var(--brand-dark, #15803d);
      font-variant-numeric: tabular-nums;
      background: rgba(97,183,70,0.10);
      padding: 2px 8px;
      border-radius: 100px;
    }

    /* Timeline list */
    .am-timeline {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
      overflow: hidden;
    }
    .am-timeline-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }
    .am-timeline-title {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text);
    }
    .am-timeline-meta {
      font-size: .72rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    .am-row {
      display: flex;
      gap: 14px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      font-size: .85rem;
      align-items: flex-start;
      transition: background 0.10s;
    }
    .am-row:last-child { border-bottom: none; }
    .am-row:hover { background: var(--bg); }
    .am-row-dot {
      width: 8px; height: 8px;
      background: var(--brand);
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(97,183,70,0.12);
    }
    .am-row-dot[data-action="created"] { background: #15803d; box-shadow: 0 0 0 3px rgba(21,128,61,0.15); }
    .am-row-dot[data-action="deleted"] { background: #b91c1c; box-shadow: 0 0 0 3px rgba(185,28,28,0.15); }
    .am-row-dot[data-action="status_changed"] { background: #a855f7; box-shadow: 0 0 0 3px rgba(168,85,247,0.15); }
    .am-row-body { flex: 1; min-width: 0; }
    .am-row-text {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 4px 6px;
    }
    .am-row-when {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 3px;
      font-variant-numeric: tabular-nums;
    }
    /* Reuse the .act-* classes for verb/value styling — defined here so
       the activity page is self-contained even if dashboard.html's styles
       aren't loaded. */
    .am-row-text .act-verb   { color: var(--text-muted); font-weight: 500; }
    .am-row-text .act-create { color: #15803d; font-weight: 600; }
    .am-row-text .act-delete { color: #b91c1c; font-weight: 600; }
    .am-row-text .act-field  { color: var(--text); font-weight: 600; }
    .am-row-text .act-value  { color: var(--brand-dark, #15803d); font-weight: 600; }

    .am-row-prop {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      padding: 2px 8px;
      margin-left: 2px;
      background: rgba(97,183,70,0.10);
      color: var(--brand-dark);
      border-radius: 6px;
      font-weight: 600;
      text-decoration: none;
      font-size: 0.78rem;
    }
    .am-row-prop:hover { background: rgba(97,183,70,0.18); }
    .am-row-prop-arrow { color: var(--brand); font-weight: 700; }
    .am-row-prop-city { color: var(--text-muted); font-weight: 500; font-size: 0.74rem; }

    .am-empty {
      padding: 40px 18px;
      text-align: center;
      color: var(--text-muted);
      font-size: .85rem;
    }
    .am-skel {
      height: 60px;
      background: linear-gradient(90deg, var(--bg) 0%, var(--surface) 50%, var(--bg) 100%);
      background-size: 200% 100%;
      animation: am-skel 1.4s ease-in-out infinite;
      border-bottom: 1px solid var(--border);
    }
    @keyframes am-skel {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body class="os-newlayout">

<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<main class="page">
  <div id="am-hero"></div>
  <div id="am-insights"></div>
  <div id="am-controls"></div>
  <div id="am-timeline">
    <div class="am-skel"></div><div class="am-skel"></div><div class="am-skel"></div>
  </div>
</main>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
  window.NAV_CURRENT = 'activity';

  // ── State ────────────────────────────────────────────────────────
  let allUsers = [];   // for the actor filter dropdown
  let insights = null;
  let activityRows = [];
  let filters = {
    actor: 'all',
    action: 'all',
    entity: 'all',
    days: 30,
    q: ''
  };

  function relativeTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const diff = Date.now() - d.getTime();
    const mins = Math.round(diff / 60000);
    if (mins < 1)    return 'just now';
    if (mins < 60)   return mins + 'm ago';
    if (mins < 60 * 24) return Math.round(mins / 60) + 'h ago';
    const days = Math.round(mins / (60 * 24));
    if (days < 30)   return days + 'd ago';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  function fullTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
           ' · ' +
           d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  // ── Hero (KPIs from insights) ────────────────────────────────────
  function renderHero() {
    if (!insights) {
      document.getElementById('am-hero').innerHTML = '';
      return;
    }
    const total = insights.total || 0;
    const topUser = insights.by_user[0];
    const topAction = insights.by_action[0];
    const propsTouched = (insights.top_properties || []).length;
    const days = insights.window?.days || 30;

    document.getElementById('am-hero').innerHTML = `
      <section class="os-hero" style="margin-bottom:14px;">
        <div class="os-hero-eyebrow">Activity Monitor</div>
        <h1 class="os-hero-title">What's happening across the workspace</h1>
        <div class="os-hero-subtitle">Bird's-eye view of every action users take — last ${days} days. Every CRUD operation on properties, pipeline records, contacts, holdings, photos and files is captured here.</div>
        <div class="os-kpi-row" style="margin-top: 14px;">
          <div class="os-kpi">
            <div class="os-kpi-label">Total Actions</div>
            <div class="os-kpi-value brand">${total.toLocaleString()}</div>
            <div class="os-kpi-sub">last ${days} days</div>
          </div>
          <div class="os-kpi">
            <div class="os-kpi-label">Most Active User</div>
            <div class="os-kpi-value" style="font-size:1.1rem;line-height:1.2;">${topUser ? escHtml(topUser.name) : '—'}</div>
            <div class="os-kpi-sub">${topUser ? topUser.n + ' actions' : 'no activity'}</div>
          </div>
          <div class="os-kpi">
            <div class="os-kpi-label">Top Action</div>
            <div class="os-kpi-value" style="font-size:1.1rem;line-height:1.2;text-transform:capitalize;">${topAction ? escHtml(topAction.action.replace(/_/g, ' ')) : '—'}</div>
            <div class="os-kpi-sub">${topAction ? topAction.n + ' times' : 'no activity'}</div>
          </div>
          <div class="os-kpi">
            <div class="os-kpi-label">Properties Touched</div>
            <div class="os-kpi-value">${propsTouched}</div>
            <div class="os-kpi-sub">unique properties</div>
          </div>
        </div>
      </section>
    `;
  }

  // ── Insights panel ───────────────────────────────────────────────
  function renderInsights() {
    if (!insights) return;
    const maxUser   = Math.max(1, ...insights.by_user.map(u => u.n));
    const maxAction = Math.max(1, ...insights.by_action.map(a => a.n));

    const userRows = insights.by_user.slice(0, 8).map(u => `
      <div class="am-bar-row">
        <div class="am-bar-label" title="${escHtml(u.name)}">${escHtml(u.name)}</div>
        <div class="am-bar-track">
          <div class="am-bar-fill" style="width:${Math.max(2, (u.n / maxUser) * 100)}%"></div>
        </div>
        <div class="am-bar-count">${u.n}</div>
      </div>
    `).join('');

    const actionRows = insights.by_action.map(a => `
      <div class="am-bar-row">
        <div class="am-bar-label" title="${escHtml(a.action)}" style="text-transform:capitalize;">${escHtml(a.action.replace(/_/g, ' '))}</div>
        <div class="am-bar-track">
          <div class="am-bar-fill action-${escHtml(a.action)}" style="width:${Math.max(2, (a.n / maxAction) * 100)}%"></div>
        </div>
        <div class="am-bar-count">${a.n}</div>
      </div>
    `).join('');

    // Day chart: build full date range so empty days show as faint bars
    const byDay = new Map(insights.by_day.map(d => [d.day, d.n]));
    const days  = insights.window?.days || 30;
    const today = new Date(); today.setUTCHours(0, 0, 0, 0);
    const dayBars = [];
    let maxDay = 0;
    for (let i = days - 1; i >= 0; i--) {
      const d = new Date(today.getTime() - i * 86400000);
      const key = d.toISOString().slice(0, 10);
      const n = byDay.get(key) || 0;
      maxDay = Math.max(maxDay, n);
      dayBars.push({ key, date: d, n });
    }
    const dayBarsHtml = dayBars.map(b => {
      const h = maxDay ? Math.max(3, (b.n / maxDay) * 100) : 3;
      const dateLabel = b.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      return `<div class="am-day-bar" style="height:${h}%;" data-empty="${b.n === 0 ? 1 : 0}">
                <div class="am-day-bar-tip">${b.n} on ${dateLabel}</div>
              </div>`;
    }).join('');
    const firstLabel = dayBars[0]?.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) || '';
    const lastLabel  = dayBars[dayBars.length - 1]?.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) || '';

    const propRows = insights.top_properties.map(p => `
      <a class="am-prop-row" href="/property.html?id=${escHtml(p.id)}">
        <div class="am-prop-row-title">
          <div class="am-prop-row-name">${escHtml(p.display_name || p.address_line1 || '—')}</div>
          <div class="am-prop-row-loc">${escHtml([p.city, p.state].filter(Boolean).join(', '))}</div>
        </div>
        <span class="am-prop-row-count">${p.n}</span>
      </a>
    `).join('');

    document.getElementById('am-insights').innerHTML = `
      <div class="am-insights-grid">
        <div class="am-insight-panel">
          <div class="am-insight-head">
            <div class="am-insight-title">Activity per day</div>
            <div class="am-insight-meta">last ${days} days</div>
          </div>
          <div class="am-day-chart">${dayBarsHtml}</div>
          <div class="am-day-chart-x"><span>${firstLabel}</span><span>${lastLabel}</span></div>
        </div>
        <div class="am-insight-panel">
          <div class="am-insight-head">
            <div class="am-insight-title">Top users</div>
            <div class="am-insight-meta">${insights.by_user.length} active</div>
          </div>
          ${userRows || '<div class="am-empty" style="padding:10px 0;">No activity yet.</div>'}
        </div>
        <div class="am-insight-panel">
          <div class="am-insight-head">
            <div class="am-insight-title">By action type</div>
            <div class="am-insight-meta">${insights.by_action.length} types</div>
          </div>
          ${actionRows || '<div class="am-empty" style="padding:10px 0;">No activity yet.</div>'}
        </div>
        <div class="am-insight-panel">
          <div class="am-insight-head">
            <div class="am-insight-title">Most-touched properties</div>
            <div class="am-insight-meta">top ${insights.top_properties.length}</div>
          </div>
          ${propRows || '<div class="am-empty" style="padding:10px 0;">No property activity yet.</div>'}
        </div>
      </div>
    `;
  }

  // ── Custom themed dropdown component ─────────────────────────────
  // Trigger looks like the rest of the UI's inputs; menu is body-
  // anchored fixed-position so it can't be clipped by ancestor
  // overflow. One menu open at a time, click-outside closes.
  let _amOpenSelect = null;

  function buildSelect({ key, value, options, minWidth }) {
    const current = options.find(o => String(o.v) === String(value)) || options[0];
    const menuItems = options.map(o => {
      const isActive = String(o.v) === String(value);
      return `<div class="am-select-item${isActive ? ' active' : ''}"
                   data-value="${escHtml(String(o.v))}"
                   onclick="window.__amSelect('${escHtml(key)}','${escHtml(String(o.v).replace(/'/g, '\\\''))}')">
                ${escHtml(o.l)}
              </div>`;
    }).join('');
    return `<div class="am-select" data-key="${escHtml(key)}" ${minWidth ? `style="min-width:${minWidth}px;"` : ''}>
              <button type="button" class="am-select-trigger"
                      onclick="window.__amToggleSelect(event, '${escHtml(key)}')">
                <span class="am-select-value">${escHtml(current.l)}</span>
                <svg class="am-select-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="am-select-menu" data-menu="${escHtml(key)}">${menuItems}</div>
            </div>`;
  }

  window.__amToggleSelect = function(event, key) {
    if (event) event.stopPropagation();
    const wrap = document.querySelector(`.am-select[data-key="${key}"]`);
    const menu = document.querySelector(`.am-select-menu[data-menu="${key}"]`);
    if (!wrap || !menu) return;
    // Close any other open select
    if (_amOpenSelect && _amOpenSelect !== key) {
      const prev     = document.querySelector(`.am-select[data-key="${_amOpenSelect}"]`);
      const prevMenu = document.querySelector(`.am-select-menu[data-menu="${_amOpenSelect}"]`);
      if (prev)     prev.classList.remove('open');
      if (prevMenu) prevMenu.classList.remove('open');
    }
    const isOpen = wrap.classList.toggle('open');
    if (isOpen) {
      // Position the body-anchored menu relative to the trigger.
      const r = wrap.getBoundingClientRect();
      menu.style.top   = (r.bottom + 6) + 'px';
      menu.style.left  = r.left + 'px';
      menu.style.minWidth = Math.max(r.width, 160) + 'px';
      menu.classList.add('open');
      _amOpenSelect = key;
    } else {
      menu.classList.remove('open');
      _amOpenSelect = null;
    }
  };

  function closeAmSelect() {
    if (!_amOpenSelect) return;
    const wrap = document.querySelector(`.am-select[data-key="${_amOpenSelect}"]`);
    const menu = document.querySelector(`.am-select-menu[data-menu="${_amOpenSelect}"]`);
    if (wrap) wrap.classList.remove('open');
    if (menu) menu.classList.remove('open');
    _amOpenSelect = null;
  }
  document.addEventListener('click', (e) => {
    if (!_amOpenSelect) return;
    const inWrap = e.target.closest('.am-select');
    const inMenu = e.target.closest('.am-select-menu');
    if (!inWrap && !inMenu) closeAmSelect();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeAmSelect();
  });
  window.addEventListener('scroll', closeAmSelect, true);
  window.addEventListener('resize', closeAmSelect);

  window.__amSelect = function(key, value) {
    closeAmSelect();
    window.__amSetFilter(key, value);
  };

  // ── Controls (filters) ───────────────────────────────────────────
  function renderControls() {
    const userOpts = [
      { v: 'all', l: 'Everyone' },
      ...allUsers.map(u => ({ v: u.id, l: u.full_name || u.email }))
    ];
    const actionOpts = [
      { v: 'all',            l: 'All actions' },
      { v: 'created',        l: 'Created' },
      { v: 'updated',        l: 'Updated' },
      { v: 'status_changed', l: 'Status changed' },
      { v: 'deleted',        l: 'Deleted' }
    ];
    const entityOpts = [
      { v: 'all',         l: 'All entities' },
      { v: 'property',    l: 'Property' },
      { v: 'prospect',    l: 'Prospect' },
      { v: 'lead',        l: 'Lead' },
      { v: 'opportunity', l: 'Opportunity' },
      { v: 'purchase',    l: 'Purchase' },
      { v: 'project',     l: 'Project' },
      { v: 'holding',     l: 'Holding' },
      { v: 'contact',     l: 'Contact' },
      { v: 'photo',       l: 'Photo' },
      { v: 'file',        l: 'File' }
    ];
    const windowOpts = [
      { v: 1,   l: 'Today' },
      { v: 7,   l: 'Last 7 days' },
      { v: 30,  l: 'Last 30 days' },
      { v: 90,  l: 'Last 90 days' },
      { v: 365, l: 'Last year' }
    ];

    document.getElementById('am-controls').innerHTML = `
      <div class="am-controls">
        <span class="am-control-label">User</span>
        ${buildSelect({ key: 'actor',  value: filters.actor,  options: userOpts,   minWidth: 160 })}

        <span class="am-control-label">Action</span>
        ${buildSelect({ key: 'action', value: filters.action, options: actionOpts, minWidth: 150 })}

        <span class="am-control-label">Type</span>
        ${buildSelect({ key: 'entity', value: filters.entity, options: entityOpts, minWidth: 140 })}

        <span class="am-control-label">Window</span>
        ${buildSelect({ key: 'days',   value: filters.days,   options: windowOpts, minWidth: 140 })}

        <input type="search" placeholder="Search descriptions, properties…"
               value="${escHtml(filters.q)}"
               oninput="window.__amSearch(this.value)">
      </div>
    `;
  }

  // ── Timeline ─────────────────────────────────────────────────────
  function renderTimeline() {
    const el = document.getElementById('am-timeline');
    // Client-side text filter on top of server-filtered rows.
    const q = (filters.q || '').toLowerCase().trim();
    const visible = q
      ? activityRows.filter(r => {
          const desc = describeActivity(r).replace(/<[^>]*>/g, '').toLowerCase();
          const hay = [
            desc, r.action, r.entity_type, r.actor_name, r.actor_email,
            r.prop_display_name, r.prop_address_line1, r.prop_city, r.prop_state
          ].filter(Boolean).join(' ').toLowerCase();
          return hay.includes(q);
        })
      : activityRows;

    if (!visible.length) {
      el.innerHTML = `
        <div class="am-timeline">
          <div class="am-timeline-head">
            <div class="am-timeline-title">Timeline</div>
            <div class="am-timeline-meta">No activity matches the current filters</div>
          </div>
          <div class="am-empty">📭 Nothing to show here.</div>
        </div>`;
      return;
    }

    const rows = visible.map(r => {
      const propLabel = r.prop_display_name || r.prop_address_line1 || '';
      const propLink = (propLabel && r.prop_id)
        ? `<a class="am-row-prop" href="/property.html?id=${escHtml(r.prop_id)}" title="Open ${escHtml(propLabel)}">
             <span class="am-row-prop-arrow">→</span> ${escHtml(propLabel)}${r.prop_city ? `<span class="am-row-prop-city"> · ${escHtml(r.prop_city)}${r.prop_state ? ', ' + escHtml(r.prop_state) : ''}</span>` : ''}
           </a>`
        : '';
      return `
        <div class="am-row">
          <div class="am-row-dot" data-action="${escHtml(r.action || '')}"></div>
          <div class="am-row-body">
            <div class="am-row-text">
              <strong>${escHtml(r.actor_name || r.actor_email || 'System')}</strong>
              <span>${describeActivity(r)}</span>
              ${propLink}
            </div>
            <div class="am-row-when" title="${escHtml(fullTime(r.created_at))}">${relativeTime(r.created_at)}</div>
          </div>
        </div>`;
    }).join('');

    el.innerHTML = `
      <div class="am-timeline">
        <div class="am-timeline-head">
          <div class="am-timeline-title">Timeline</div>
          <div class="am-timeline-meta">${visible.length.toLocaleString()} ${visible.length === 1 ? 'action' : 'actions'}${q ? ` matching "${escHtml(q)}"` : ''}</div>
        </div>
        ${rows}
      </div>`;
  }

  // ── Fetch + orchestrate ──────────────────────────────────────────
  async function loadInsights() {
    try {
      insights = await apiFetch(`/api/activity/insights?days=${filters.days}`);
    } catch (e) {
      insights = { total: 0, by_user: [], by_action: [], by_entity: [],
                   by_day: [], top_properties: [], window: { days: filters.days } };
    }
  }

  async function loadActivity() {
    const since = new Date(Date.now() - filters.days * 86400000).toISOString();
    const params = { limit: 500, since };
    if (filters.actor  !== 'all') params.actor       = filters.actor;
    if (filters.action !== 'all') params.action      = filters.action;
    if (filters.entity !== 'all') params.entity_type = filters.entity;
    try {
      activityRows = await getActivity(params);
      if (!Array.isArray(activityRows)) activityRows = [];
    } catch (e) {
      activityRows = [];
    }
  }

  async function loadUsers() {
    try {
      const u = await apiFetch('/api/users');
      allUsers = Array.isArray(u) ? u : [];
    } catch (e) { allUsers = []; }
  }

  async function refreshAll() {
    document.getElementById('am-timeline').innerHTML =
      `<div class="am-skel"></div><div class="am-skel"></div><div class="am-skel"></div>`;
    await Promise.all([loadInsights(), loadActivity()]);
    renderHero();
    renderInsights();
    renderControls();
    renderTimeline();
  }

  async function refreshTimelineOnly() {
    await loadActivity();
    renderTimeline();
  }

  // ── Event handlers ───────────────────────────────────────────────
  window.__amSetFilter = function(key, value) {
    filters[key] = (key === 'days') ? parseInt(value, 10) : value;
    if (key === 'days') {
      refreshAll();
    } else {
      refreshTimelineOnly();
    }
  };
  let _searchTimer = null;
  window.__amSearch = function(v) {
    filters.q = v || '';
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(renderTimeline, 150);
  };

  async function init() {
    if (!await requireAuth()) return;
    await loadUsers();
    await refreshAll();
  }
  init();
</script>
</body>
</html>
