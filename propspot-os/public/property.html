<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Property</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <script>document.documentElement.classList.add('page-loading');try{var _c=document.documentElement.classList;if(localStorage.sidebar_collapsed==='1')_c.add('sidebar-collapsed');var _t=localStorage.getItem('propspot_theme');_c.add('theme-premium');if(_t==='dark')_c.add('theme-dark');}catch(e){}</script>
  <style>
    .stage-section { margin-bottom: 20px; }
    .stage-section h3 { font-size: .9rem; font-weight: 700; margin-bottom: 8px; display:flex; align-items:center; gap:8px; }
    .pipe-row { background: var(--surface); border-radius: 10px; box-shadow: var(--shadow); padding: 10px 12px; margin-bottom: 6px; display:flex; align-items:center; justify-content:space-between; gap: 8px; }
    .pipe-row .meta { font-size: .8rem; color: var(--text-muted); }
    .status-pill { font-size: .7rem; padding:2px 8px; border-radius:100px; background:var(--brand-light); color:var(--brand); font-weight:600; }
    .contact-row { display:flex; gap:10px; align-items:center; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .contact-row:last-child { border-bottom:none; }
    .role-tag { font-size: .7rem; color: var(--text-muted); }
    .photo-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; }
    .photo-tile {
      position:relative; aspect-ratio: 1/1; border-radius: 8px;
      overflow:hidden; background: var(--surface); cursor:pointer;
      /* Off-screen tiles aren't laid out / painted — keeps large galleries
         snappy (51+ photos, 6 MB+ each, would otherwise hammer the GPU). */
      content-visibility: auto;
      contain-intrinsic-size: auto 110px;
    }
    .photo-tile img {
      width:100%; height:100%; object-fit: cover; display:block;
      /* Soft fade-in once the lazy-loaded bytes decode. */
      background: linear-gradient(135deg, var(--bg) 0%, var(--surface) 100%);
    }
    .photo-tile .photo-meta { position:absolute; bottom:0; left:0; right:0; padding: 4px 6px; font-size:.65rem; color:#fff; background: linear-gradient(transparent, rgba(0,0,0,.65)); }
    .photo-lightbox { position:fixed; inset:0; background: rgba(0,0,0,.88); z-index: 1000; display:flex; align-items:center; justify-content:center; padding: 60px 80px; }
    .photo-lightbox img { max-width:100%; max-height:88vh; border-radius: 10px; box-shadow: 0 24px 64px rgba(0,0,0,.6); }
    /* Close button */
    .photo-lightbox .lb-close { position:absolute; top:16px; right:16px; width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,.13); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.22); color:#fff; font-size:1.25rem; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .12s,transform .1s; }
    .photo-lightbox .lb-close:hover { background:rgba(255,255,255,.28); transform:scale(1.08); }
    /* Prev / Next nav buttons */
    .photo-lightbox .lb-nav { position:absolute; top:50%; transform:translateY(-50%); width:46px; height:46px; border-radius:50%; background:rgba(255,255,255,.13); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.22); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .12s, transform .14s; }
    .photo-lightbox .lb-nav:hover { background:rgba(255,255,255,.28); transform:translateY(-50%) scale(1.1); }
    .photo-lightbox .lb-nav:disabled { opacity:.25; cursor:default; pointer-events:none; }
    .photo-lightbox .lb-prev { left:18px; }
    .photo-lightbox .lb-next { right:18px; }
    /* Bottom bar: notes + counter */
    .photo-lightbox .lb-bar { position:absolute; bottom:0; left:0; right:0; padding:14px 20px; display:flex; align-items:center; justify-content:center; gap:12px; background:linear-gradient(transparent, rgba(0,0,0,.55)); border-radius:0 0 4px 4px; pointer-events:none; }
    .photo-lightbox .lb-notes { color:rgba(255,255,255,.88); font-size:.82rem; text-align:center; }
    .photo-lightbox .lb-counter { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.2); color:#fff; font-size:.72rem; font-weight:600; letter-spacing:.06em; padding:3px 9px; border-radius:20px; white-space:nowrap; }

    /* ── Custom dropdown (replaces native <select>) ─────────────── */
    .pp-select-wrap { position: relative; display: inline-block; vertical-align: middle; }
    .pp-select-trigger {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 12px 6px 14px;
      min-width: 160px;
      font-size: 0.86rem; font-weight: 500;
      background: #fff;
      border: 1.5px solid var(--border, #e5e7eb);
      border-radius: 8px;
      cursor: pointer; color: var(--text, #111827);
      line-height: 1.3;
      transition: border-color 0.12s, box-shadow 0.12s;
      text-align: left;
    }
    .pp-select-trigger:hover { border-color: #cbd5e1; }
    .pp-select-trigger:focus,
    .pp-select-wrap.open .pp-select-trigger {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(97,183,70,0.10);
    }
    .pp-select-value {
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .pp-select-chev {
      width: 14px; height: 14px;
      color: var(--text-muted, #6b7280);
      transition: transform 0.18s;
      flex-shrink: 0;
    }
    .pp-select-wrap.open .pp-select-chev { transform: rotate(180deg); color: var(--brand); }
    .pp-select-menu {
      /* position:fixed so the menu can escape any ancestor with
         overflow:hidden (the property data card clips overflow:auto).
         JS sets top/left based on the trigger's bounding rect. */
      position: fixed;
      background: #fff;
      border: 1px solid #e8eaed;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(15,23,42,0.12), 0 2px 6px rgba(15,23,42,0.04);
      padding: 4px;
      z-index: 1200;
      display: none;
      max-height: 360px;
      overflow-y: auto;
      animation: pp-select-in 0.12s ease-out;
    }
    @keyframes pp-select-in {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .pp-select-wrap.open .pp-select-menu { display: block; }
    .pp-select-item {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.86rem;
      cursor: pointer;
      color: var(--text, #111827);
      white-space: nowrap;
      transition: background 0.08s, color 0.08s;
    }
    .pp-select-item:hover {
      background: rgba(97,183,70,0.08);
      color: var(--brand-dark, #15803d);
    }
    .pp-select-item.active {
      background: rgba(97,183,70,0.12);
      color: var(--brand-dark, #15803d);
      font-weight: 600;
    }
    .pp-select-item.active::before {
      content: '✓';
      margin-right: 6px;
      color: var(--brand, #61B746);
      font-weight: 700;
    }

    /* ── Pipeline row action buttons ── */
    .pipe-row-actions { display:flex; gap:6px; align-items:center; flex-shrink:0; }
    .pipe-row-del {
      background: none;
      border: 1px solid var(--border, #e5e7eb);
      padding: 5px 9px;
      border-radius: 7px;
      cursor: pointer;
      color: var(--text-muted, #6b7280);
      font-size: 0.76rem;
      font-weight: 600;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all 0.12s;
    }
    .pipe-row-del:hover {
      background: #fee2e2;
      color: #b91c1c;
      border-color: #fecaca;
    }
    .pipe-row-del svg { width: 13px; height: 13px; display: block; }

    /* ── Add-record modal ── */
    .pp-modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(15,23,42,0.45); z-index: 1100;
      align-items: center; justify-content: center; padding: 20px;
      animation: pp-fade-in 0.16s ease-out;
    }
    .pp-modal-backdrop.open { display: flex; }
    @keyframes pp-fade-in { from { opacity: 0; } to { opacity: 1; } }
    .pp-modal {
      background: #fff; width: min(440px, 100%); border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      animation: pp-card-in 0.18s cubic-bezier(0.2, 0.8, 0.2, 1);
      overflow: hidden;
    }
    @keyframes pp-card-in {
      from { transform: translateY(8px) scale(0.985); opacity: 0; }
      to   { transform: translateY(0)   scale(1);     opacity: 1; }
    }
    .pp-modal-head {
      padding: 18px 22px; border-bottom: 1px solid #e8eaed;
      display: flex; align-items: center;
    }
    .pp-modal-head h3 { margin: 0; flex: 1; font-size: 1.02rem; font-weight: 700; color: #111827; }
    .pp-modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; color: #6b7280; padding: 4px 10px; border-radius: 6px;
    }
    .pp-modal-close:hover { background: #f1f5f9; color: #111827; }
    .pp-modal-body { padding: 16px 22px 4px; }
    .pp-modal-row { margin-bottom: 14px; }
    .pp-modal-row label {
      display: block; font-size: 0.78rem; font-weight: 600; color: #374151;
      margin-bottom: 4px; letter-spacing: 0.01em;
    }
    .pp-modal-row .req { color: #ef4444; }
    .pp-modal-row input,
    .pp-modal-row select,
    .pp-modal-row textarea {
      width: 100%; box-sizing: border-box;
      padding: 8px 10px; font-size: 0.88rem; line-height: 1.4;
      border: 1.5px solid #e2e8f0; border-radius: 8px;
      background: #fff; color: #111827;
    }
    .pp-modal-row input:focus,
    .pp-modal-row select:focus,
    .pp-modal-row textarea:focus {
      outline: none; border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(97,183,70,0.10);
    }
    .pp-modal-actions {
      display: flex; gap: 8px; justify-content: flex-end;
      padding: 14px 22px 18px;
      border-top: 1px solid #f1f5f9;
      background: #fafbfc;
    }
    .pp-modal-actions .btn { padding: 8px 16px; font-size: 0.85rem; }

    /* ── Confirm modal (for delete) ── */
    .pp-confirm-body { padding: 22px 22px 4px; }
    .pp-confirm-body p { font-size: 0.92rem; color: #374151; margin: 0 0 6px; line-height: 1.5; }
    .pp-confirm-body .pp-confirm-sub { font-size: 0.8rem; color: #6b7280; }

    /* ── Premium property page chrome ─────────────────────────────── */
    /* Hero split: meta on left, featured photo on right */
    .prop-hero { overflow: visible; padding-bottom: 24px; }
    .prop-hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 22px;
      align-items: start;
      position: relative; z-index: 1;
    }
    @media (max-width: 880px) {
      .prop-hero-grid { grid-template-columns: 1fr; }
      .prop-hero-photo { order: -1; max-width: 100%; height: 180px; }
    }
    .prop-hero-meta { min-width: 0; }
    .prop-hero-badges {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin: 4px 0 14px;
    }
    .prop-hero-badges .status-badge {
      font-size: 0.78rem;
      padding: 5px 12px;
      border-radius: 100px;
      font-weight: 700;
      letter-spacing: 0.02em;
      box-shadow: 0 1px 2px rgba(0,0,0,.06);
    }
    .prop-hero-photo {
      width: 100%; height: 200px;
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(135deg, var(--brand-light) 0%, var(--bg) 100%);
      border: 1px solid var(--border);
      box-shadow: 0 6px 20px -10px rgba(15,23,42,0.18);
      position: relative;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .prop-hero-photo:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px -10px rgba(15,23,42,0.25);
    }
    .prop-hero-photo img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .prop-hero-photo .photo-count-overlay {
      position: absolute; bottom: 10px; right: 10px;
      background: rgba(15,23,42,0.72);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 5px 10px;
      border-radius: 100px;
      backdrop-filter: blur(6px);
      letter-spacing: 0.04em;
    }
    .prop-hero-photo.placeholder {
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      font-size: 2.5rem;
      cursor: default;
    }
    .prop-hero-photo.placeholder:hover { transform: none; }

    /* Quick action button row in hero */
    .prop-quick-actions {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-top: 6px; margin-bottom: 4px;
    }
    .prop-quick-actions .btn {
      padding: 7px 13px;
      font-size: 0.83rem;
      font-weight: 600;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .prop-quick-actions .btn-secondary {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
    }
    .prop-quick-actions .btn-secondary:hover {
      background: #fff;
      border-color: var(--brand);
      color: var(--brand-dark);
    }

    /* Two-column facts: Property Facts | Financial Details */
    .prop-2col {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
      margin-bottom: 18px;
    }
    @media (max-width: 880px) { .prop-2col { grid-template-columns: 1fr; } }

    /* Facts grid inside a panel */
    .prop-facts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px 18px;
      font-size: 0.86rem;
    }
    .prop-fact-label {
      font-size: 0.66rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 3px;
    }
    .prop-fact-value {
      font-weight: 600;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .prop-fact-value.brand { color: var(--brand-dark, #15803d); }
    .prop-fact-value.muted { color: var(--text-muted); font-weight: 500; }

    /* Notes callout */
    .prop-notes-callout {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(97,183,70,0.07);
      border-left: 3px solid var(--brand);
      font-size: 0.86rem;
      color: var(--text);
      white-space: pre-wrap;
      line-height: 1.5;
    }

    /* Status changer block */
    .prop-status-changer {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 12px 14px; margin-top: 14px;
      border-radius: 10px;
      background: var(--bg);
      border: 1px dashed var(--border);
    }
    .prop-status-changer label {
      font-size: 0.7rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    /* Panel-section pipe row (slightly nicer than default) */
    .os-panel .pipe-row {
      background: var(--bg);
      box-shadow: none;
      border: 1px solid var(--border);
      transition: border-color .12s, transform .12s;
    }
    .os-panel .pipe-row:hover {
      border-color: var(--brand);
      transform: translateX(2px);
    }

    /* Stage panel empty-state */
    .stage-empty {
      text-align: center;
      padding: 18px 12px;
      color: var(--text-muted);
      font-size: 0.82rem;
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: var(--bg);
    }
    .stage-empty a { color: var(--brand-dark); font-weight: 600; }

    /* Contact card row */
    .prop-contact-card {
      display: flex; gap: 12px; align-items: center;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      margin-bottom: 8px;
      transition: border-color .12s, transform .12s;
    }
    .prop-contact-card:last-child { margin-bottom: 0; }
    .prop-contact-card:hover { border-color: var(--brand); transform: translateX(2px); }
    .prop-contact-card .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark, #15803d) 100%);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.95rem;
      flex-shrink: 0;
    }

    /* Photo grid inside panels — bigger tiles, gallery feel */
    .os-panel .photo-grid {
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }
    .os-panel .photo-tile {
      border-radius: 10px;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .os-panel .photo-tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px -6px rgba(15,23,42,0.18);
    }

    /* "+N more" tile that toggles the gallery open */
    .photo-tile-more {
      position: relative;
      background: linear-gradient(135deg, var(--brand-light), var(--bg));
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-weight: 800; font-size: 1.15rem;
      color: var(--brand-dark, #15803d);
      cursor: pointer;
      border-radius: 8px;
      aspect-ratio: 1/1;
      border: 1px dashed rgba(97,183,70,0.40);
      transition: background 0.12s, border-color 0.12s, transform 0.10s;
    }
    .photo-tile-more:hover {
      background: linear-gradient(135deg, rgba(97,183,70,0.20), var(--brand-light));
      border-color: var(--brand);
      transform: scale(1.02);
    }

    /* Delete property zone */
    .prop-danger-zone {
      margin-top: 32px;
      padding: 18px 16px;
      border-radius: 12px;
      border: 1px dashed rgba(239,68,68,0.35);
      background: rgba(239,68,68,0.03);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      text-align: center;
    }
  </style>
</head>
<body class="os-newlayout">

<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<main class="page" id="page">
  <a href="javascript:history.back()" class="os-back-btn"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Back</a>
  <p class="text-muted text-sm mt-12">Loading…</p>
</main>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
  const id = new URLSearchParams(location.search).get('id');
  let property = null;

  async function init(){
    if (!await requireAuth()) return;
    if (!id) { document.getElementById('page').innerHTML = '<p>Missing property id.</p>'; return; }
    await load();
  }

  async function load(){
    try{
      property = await getProperty(id);
      document.title = (property.display_name || property.address_line1) + ' — Prop Spot';
      render();
    }catch(err){
      document.getElementById('page').innerHTML = `<p class="text-muted text-sm">Error: ${escHtml(err.message)}</p>`;
    }
  }

  function pipeRow(stage, r){
    const desc = {
      prospects:    `${escHtml(r.source)} · ${escHtml(r.raw_name || '')} ${r.raw_phone ? '· ' + escHtml(r.raw_phone) : ''}`,
      leads:        `${escHtml(r.source)} ${r.motivation_notes ? '· ' + escHtml(r.motivation_notes.slice(0,80)) : ''}`,
      opportunities:`offer ${formatMoney(r.our_offer)} ${r.appointment_at ? '· apt ' + formatDate(r.appointment_at) : ''}`,
      purchases:    `purchase ${formatMoney(r.purchase_price)} ${r.contract_date ? '· contract ' + formatDate(r.contract_date) : ''}`,
      projects:     `${escHtml(r.kind)} · ${escHtml(r.status)}`
    }[stage];
    const canPromote = stage !== 'projects' && r.status !== 'promoted';
    return `<div class="pipe-row">
      <div>
        <div>${desc || ''}</div>
        <div class="meta">${formatDate(r.created_at)} · <span class="status-pill">${escHtml(r.status)}</span></div>
      </div>
      <div class="pipe-row-actions">
        ${canPromote ? `<button class="btn btn-secondary" style="padding:6px 10px;font-size:.78rem;" onclick="promote('${stage}','${r.id}')">Promote ›</button>` : ''}
        <button class="pipe-row-del" title="Delete this entry" aria-label="Delete"
                onclick="confirmDeleteRecord('${stage}','${r.id}', this)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          Delete
        </button>
      </div>
    </div>`;
  }

  function render(){
    const sections = [
      ['📥 Prospects',     'prospects',     property.prospects],
      ['🎯 Leads',         'leads',         property.leads],
      ['🤝 Opportunities', 'opportunities', property.opportunities],
      ['📝 Purchases',     'purchases',     property.purchases],
      ['🔧 Projects',      'projects',      property.projects]
    ];

    const dateFmt = d => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
    const fields = [
      ['Owner',                     property.owner],
      ['County',                    property.county],
      ['TMS',                       property.tms],
      ['Parcel ID',                 property.parcel_id],
      ['Lockbox code',              property.lockbox_code],
      ['Status',                    propertyStatusLabel(property.status)],
      ['Anticipated purchase date', dateFmt(property.anticipated_close_date)],
      ['Purchase date',             dateFmt(property.purchase_date)],
      ['Purchase price',            property.purchase_price != null ? formatMoney(property.purchase_price) : '—'],
      ['Sold date',                 dateFmt(property.sold_date)],
      ['Sold price',                property.sold_price != null ? formatMoney(property.sold_price) : '—'],
      ['Lender',                    property.lender_name || '—'],
      ['Seller',                    property.seller_name || '—'],

    // ── KPIs for the hero strip ─────────────────────────────────
    const holdingsForCarry = property.holdings_items || [];
    const monthlyCarry = holdingsForCarry.reduce((s, h) => {
      const a = Number(h.amount || 0);
      const f = (h.frequency || '').toLowerCase();
      if (!a) return s;
      if (f === 'monthly')      return s + a;
      if (f === 'weekly')       return s + a * 52 / 12;
      if (f === 'biweekly')     return s + a * 26 / 12;
      if (f === 'quarterly')    return s + a / 3;
      if (f === 'semiannual' || f === 'semi_annual') return s + a / 6;
      if (f === 'annual' || f === 'yearly')          return s + a / 12;
      return s; // one-time / unknown
    }, 0);
    const activeRecords = (property.prospects?.length || 0)
                        + (property.leads?.length || 0)
                        + (property.opportunities?.length || 0)

    const purchase = property.purchase_price != null ? formatMoney(property.purchase_price) : '—';

    let html = `

      <section class="os-hero prop-hero">
        <div class="prop-hero-grid">

            <div class="prop-quick-actions">
              <button class="btn btn-secondary" onclick="openEditDetails()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit details</button>
              <a class="btn btn-secondary" data-app="inbox" data-app-path="/?property_id=${encodeURIComponent(property.id)}" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg> Open Inbox</a>
              <a class="btn btn-secondary" data-app="holdings" data-app-path="/" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg> Holdings Desk</a>
              <a class="btn btn-secondary" href="/fieldcam-property.html?id=${encodeURIComponent(property.id)}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> View on FieldCam</a>
            </div>
          </div>
          ${heroPhoto}
        </div>
        <div class="os-kpi-row" style="margin-top: 18px;">
          <div class="os-kpi">

            <div class="os-kpi-sub">${property.purchase_date ? 'Closed ' + dateFmt(property.purchase_date) : 'Not purchased'}</div>

                     <select id="acq-status-select" class="form-select" style="width:auto;padding:6px 10px;font-size:.85rem;" onchange="changeAcquisitionStatus(this.value)">
                       ${ACQUISITION_STATUSES.map(([k, l]) => `<option value="${k}"${(property.acquisition_status || 'under_contract') === k ? ' selected' : ''}>${l}</option>`).join('')}
                     </select>` : ''}
                 </div>`
        })}
      </div>
    `;

    // ── Pipeline stage panels — pair them up in 2-col grids ────────
    const pipelinePairs = [
      ['📥 Prospects',     'prospects',     property.prospects],
      ['🎯 Leads',         'leads',         property.leads],
      ['🤝 Opportunities', 'opportunities', property.opportunities],
      ['📝 Purchases',     'purchases',     property.purchases]
    ];

    const stagePanel = (label, stage, rows) => panelSection({
      title: `${label} ${rows.length ? `<span style="opacity:.6;margin-left:4px;font-weight:500;">(${rows.length})</span>` : ''}`,
      link: `<a href="#" class="os-panel-link" onclick="event.preventDefault();addRecord('${stage}')">+ Add</a>`,
      body: rows.length ? rows.map(r => pipeRow(stage, r)).join('') : emptyState('Nothing here yet.')
    });

    // Prospects + Leads side-by-side
    html += `<div class="prop-2col">
      ${stagePanel(pipelinePairs[0][0], pipelinePairs[0][1], pipelinePairs[0][2])}
      ${stagePanel(pipelinePairs[1][0], pipelinePairs[1][1], pipelinePairs[1][2])}
    </div>`;

    // Opportunities + Purchases side-by-side
    html += `<div class="prop-2col">
      ${stagePanel(pipelinePairs[2][0], pipelinePairs[2][1], pipelinePairs[2][2])}
      ${stagePanel(pipelinePairs[3][0], pipelinePairs[3][1], pipelinePairs[3][2])}
    </div>`;

    // Projects (full-width — long-form items)
    html += stagePanel('🔧 Projects', 'projects', property.projects);

    // Holdings (full-width)
    const holdings = property.holdings_items || [];
    html += panelSection({
      title: `💼 Holdings ${holdings.length ? `<span style="opacity:.6;margin-left:4px;font-weight:500;">(${holdings.length})</span>` : ''}`,
      link: `<a class="os-panel-link" data-app="holdings" data-app-path="/" href="#">Manage ↗</a>`,
      body: holdings.length
        ? holdings.map(h => {
            const badge = holdingDueBadge(h.next_due_date, h.reminder_days_before);
            const amt = h.amount != null ? `${formatMoney(h.amount)} / ${escHtml(holdingFrequencyLabel(h.frequency))}` : escHtml(holdingFrequencyLabel(h.frequency));
            return `<a class="pipe-row" data-app="holdings" data-app-path="/item.html?id=${h.id}" href="#" style="text-decoration:none;color:inherit;">
              <div style="display:flex;align-items:center;gap:10px;flex:1;">
                <div style="font-size:1.2rem;">${escHtml(holdingCategoryIcon(h.category))}</div>
                <div style="flex:1;">
                  <div>${escHtml(h.name)}</div>
                  <div class="meta">${amt}${h.vendor ? ' · ' + escHtml(h.vendor) : ''}${h.contact_name ? ' · 👤 ' + escHtml(h.contact_name) : ''}</div>
                </div>
              </div>
              <span class="status-pill" style="background:${badge.cls === 'badge-danger' ? '#fee2e2' : badge.cls === 'badge-warn' ? '#fef3c7' : 'var(--brand-light)'}; color:${badge.cls === 'badge-danger' ? '#b91c1c' : badge.cls === 'badge-warn' ? '#92400e' : 'var(--brand)'};">${escHtml(badge.label)}</span>
            </a>`;
          }).join('')
        : emptyState('No holdings yet.', '<a data-app="holdings" data-app-path="/" href="#">Add one in Holdings Desk ↗</a>')
    });

    // Maintenance (full-width) — work orders attached to this property
    const workOrders = property.work_orders || [];
    const _S = (d) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
    const WO_CAT_ICONS = {
      plumbing:    _S('<path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/>'),
      electrical:  _S('<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>'),
      hvac:        _S('<line x1="2" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="22"/><path d="m20 16-4-4 4-4"/><path d="m4 8 4 4-4 4"/><path d="m16 4-4 4-4-4"/><path d="m8 20 4-4 4 4"/>'),
      roofing:     _S('<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>'),
      landscaping: _S('<path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/>'),
      cleaning:    _S('<path d="m9.06 11.9 8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"/><path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1 1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02z"/>'),
      appliance:   _S('<path d="M12 22v-5"/><path d="M9 8V2"/><path d="M15 8V2"/><path d="M18 8v5a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4V8Z"/>'),
      pest:        _S('<rect width="8" height="14" x="8" y="6" rx="4"/><path d="m19 7-3 2"/><path d="m5 7 3 2"/><path d="m19 19-3-2"/><path d="m5 19 3-2"/><path d="M20 13h-4"/><path d="M4 13h4"/><path d="m10 4 1 2"/><path d="m14 4-1 2"/>'),
      general:     _S('<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>'),
      other:       _S('<rect width="8" height="4" x="8" y="2" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/>'),
    };
    const WO_STATUS_LBL = { open:'Open', scheduled:'Scheduled', in_progress:'In Progress',
      completed:'Completed', cancelled:'Cancelled' };
    const WO_PRI_CLASS = { urgent:'#b91c1c', high:'#92400e', normal:'#15803d', low:'#64748b' };
    const _woWrench = _S('<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>');
    html += panelSection({
      title: `<span style="display:inline-flex;align-items:center;gap:6px;">${_S('<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>')} Maintenance${workOrders.length ? `<span style="opacity:.6;font-weight:500;">(${workOrders.length})</span>` : ''}</span>`,
      link: `<a class="os-panel-link" href="/maintenance.html">Manage ↗</a>`,
      body: workOrders.length
        ? workOrders.map(w => {
            const date = w.scheduled_for
              ? new Date(w.scheduled_for).toLocaleDateString('en-US', { month:'short', day:'numeric' })
              : new Date(w.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric' });
            const assigneeChip = w.assigned_user_id ? `<span class="meta">· ${escHtml((w.assigned_user_name || '').split(' ')[0])}</span>` : '';
            return `<div class="pipe-row" style="text-decoration:none;color:inherit;">
              <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;">
                <div style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;background:var(--bg);color:var(--text-muted);flex-shrink:0;">${WO_CAT_ICONS[w.category] || _woWrench}</div>
                <div style="flex:1;min-width:0;">
                  <div>${escHtml(w.title)}</div>
                  <div class="meta">${escHtml(WO_STATUS_LBL[w.status] || w.status)} · ${date}${assigneeChip ? ' ' + assigneeChip : ''}</div>
                </div>
              </div>
              <span class="status-pill" style="background:${WO_PRI_CLASS[w.priority]}22; color:${WO_PRI_CLASS[w.priority]};">${escHtml(w.priority)}</span>
            </div>`;
          }).join('')
        : emptyState('No work orders yet.', '<a href="/maintenance.html">Open Maintenance ↗</a>')
    });

    // Email + Contacts side-by-side
    html += `<div class="prop-2col">
      ${panelSection({
        title: `📧 Email <span class="text-muted text-xs" style="font-weight:400;margin-left:4px;" id="email-threads-count"></span>`,
        link: `<a class="os-panel-link" data-app="inbox" data-app-path="/" href="#">Open Inbox ↗</a>`,
        body: `<div id="email-threads-list" class="text-muted text-xs">Loading…</div>`
      })}
      ${panelSection({
        title: `📇 Contacts ${property.contacts.length ? `<span style="opacity:.6;margin-left:4px;font-weight:500;">(${property.contacts.length})</span>` : ''}`,
        link: `<a href="#" class="os-panel-link" onclick="event.preventDefault();addContactLink()">+ Link</a>`,
        body: property.contacts.length
          ? property.contacts.map(c => `<div class="prop-contact-card">
              <div class="avatar">${escHtml(c.full_name.charAt(0).toUpperCase())}</div>
              <div style="flex:1;min-width:0;">
                <div style="font-weight:600;"><a href="/contact.html?id=${c.id}" style="color:inherit;text-decoration:none;">${escHtml(c.full_name)}</a></div>
                <div class="role-tag">${escHtml(c.role)}${c.is_primary ? ' · primary' : ''}</div>
              </div>
              <button class="icon-btn" style="background:rgba(239,68,68,.12);color:var(--danger);" onclick="unlink('${c.id}','${c.role}')" title="Unlink">×</button>
            </div>`).join('')
          : emptyState('No contacts linked.')
      })}
    </div>`;

    // Files (full-width) — now ABOVE photos
    html += panelSection({
      title: `📎 Files <span class="text-muted text-xs" style="font-weight:400;margin-left:4px;" id="files-count"></span>`,
      link: `<a class="os-panel-link" href="javascript:void(0)" onclick="openSendDocument()" style="margin-right:12px;">📝 Send for signature</a><label class="os-panel-link" style="cursor:pointer;">+ Upload<input type="file" id="file-input" style="display:none;" onchange="handleFileUpload(event)"></label>`,
      body: `<div id="files-list" class="text-muted text-xs">Loading…</div>
             <div id="files-progress" class="text-muted text-xs" style="display:none;margin-top:8px;"></div>`
    });

    // Photos (full-width gallery) — collapsible, lazy-loaded for performance.
    // ── Collapse state ──
    // Auto-collapses by default when there are more than 20 photos to keep
    // the page light on first render. State persists per-property in
    // localStorage so the user's choice sticks across reloads. When
    // collapsed we render PREVIEW_COUNT thumbnails + a "+N more" tile.
    const photoCount        = property.photos.length;
    const PHOTO_AUTO_COLLAPSE_THRESHOLD = 20;
    const PHOTO_PREVIEW_COUNT           = 12;
    const photoCollapseKey  = `propspot_photos_collapsed_${property.id}`;
    const defaultCollapsed  = photoCount > PHOTO_AUTO_COLLAPSE_THRESHOLD;
    let photosCollapsed;
    try {
      const stored = localStorage.getItem(photoCollapseKey);
      photosCollapsed = stored === null ? defaultCollapsed : stored === '1';
    } catch { photosCollapsed = defaultCollapsed; }
    // Don't allow collapse when there's nothing to hide.
    if (photoCount <= PHOTO_PREVIEW_COUNT) photosCollapsed = false;

    const visiblePhotos = photosCollapsed
      ? property.photos.slice(0, PHOTO_PREVIEW_COUNT)
      : property.photos;
    const hiddenCount = photoCount - visiblePhotos.length;

    // Per-image perf hints:
    //   first 4 → eager + high priority (above-the-fold)
    //   5–11   → eager but low priority (warm scrolling)
    //   rest   → lazy + low priority (browser fetches on approach)
    const photoTileHtml = (ph, i) => {
      const eager = i < 8;
      const priority = i < 4 ? 'high' : 'low';
      return `<div class="photo-tile" onclick="openLightbox(${i})">
        <img src="${escHtml(ph.url)}" alt=""
             loading="${eager ? 'eager' : 'lazy'}"
             decoding="async"
             fetchpriority="${priority}">
        ${ph.uploader_name ? `<div class="photo-meta">${escHtml(ph.uploader_name)}</div>` : ''}
      </div>`;
    };

    const photosBody = photoCount
      ? `<div class="photo-grid">
           ${visiblePhotos.map((ph, i) => photoTileHtml(ph, i)).join('')}
           ${hiddenCount > 0 ? `
             <div class="photo-tile photo-tile-more" onclick="window.__togglePhotos && window.__togglePhotos()" title="Show all photos">
               <div>+${hiddenCount}</div>

  // ── Email threads (Inbox app) ────────────────────────────────
  async function loadEmailThreads() {
    const el  = document.getElementById('email-threads-list');
    const cnt = document.getElementById('email-threads-count');
    let rows = [];
    try {
      rows = await apiFetch(`/api/properties/${id}/email-threads`);
    } catch (err) {
      el.textContent = err.message;
      return;
    }
    if (cnt) cnt.textContent = `(${rows.length})`;
    if (!rows.length) {
      el.innerHTML = `No emails linked yet. <a data-app="inbox" data-app-path="/" href="#">Open Inbox ↗</a> to tag a thread.`;
      wireUnifiedNav();
      return;
    }
    const relTime = iso => {
      const t = new Date(iso).getTime();
      const diff = (Date.now() - t) / 1000;
      if (diff < 3600)      return Math.floor(diff / 60) + 'm';
      if (diff < 86400)     return Math.floor(diff / 3600) + 'h';
      if (diff < 86400 * 7) return Math.floor(diff / 86400) + 'd';
      return new Date(iso).toLocaleDateString();
    };
    el.innerHTML = rows.map(t => `
      <a class="pipe-row" data-app="inbox" data-app-path="/thread.html?id=${t.id}" href="#" style="text-decoration:none;color:inherit;">
        <div style="flex:1;">
          <div style="font-weight:${t.unread ? '700' : '500'};">
            ${t.has_attachments ? '📎 ' : ''}${escHtml(t.subject || '(no subject)')}
          </div>
          <div class="meta">
            ${t.inbox_name ? (t.inbox_icon || '📨') + ' ' + escHtml(t.inbox_name) + ' · ' : ''}
            ${t.message_count} message${t.message_count === 1 ? '' : 's'} ·
            ${escHtml((t.participants || []).slice(0,3).join(', '))}
          </div>
        </div>
        <span class="meta">${relTime(t.last_message_at)}</span>
      </a>
    `).join('');
    wireUnifiedNav();
  }

  // ── Files (PDFs, deeds, inspection reports) ──────────────────
  async function loadFiles(){
    try {
      const files = await getPropertyFiles(id);
      const el = document.getElementById('files-list');
      const cnt = document.getElementById('files-count');
      if (cnt) cnt.textContent = `(${files.length})`;
      if (!files.length) {
        el.innerHTML = 'No files yet. Click <strong>Upload</strong> to add one (max 20MB).';
        return;
      }
      el.innerHTML = files.map(f => {
        const sizeKb = f.size_bytes ? Math.round(f.size_bytes / 1024) : null;
        const ext = (f.filename.split('.').pop() || '').toLowerCase();
        const icon = ['pdf'].includes(ext) ? '📄'
                   : ['doc','docx','txt','rtf'].includes(ext) ? '📝'
                   : ['xls','xlsx','csv'].includes(ext) ? '📊'
                   : ['png','jpg','jpeg','gif','webp','heic'].includes(ext) ? '🖼️'
                   : '📎';
        return `
          <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:1.2rem;">${icon}</span>
            <div style="flex:1;min-width:0;">
              <div><a href="${escHtml(f.url)}" target="_blank" rel="noopener" style="font-weight:600;color:var(--text);text-decoration:none;">${escHtml(f.filename)}</a></div>

            </div>
            <button class="icon-btn" style="background:rgba(239,68,68,.15);color:var(--danger);" onclick="confirmDeleteFile('${f.id}','${escHtml(f.filename).replace(/'/g, '&#39;')}')" title="Delete">×</button>

  async function handleFileUpload(e){
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 20 * 1024 * 1024) { showToast('File is over 20MB limit', 'error'); e.target.value = ''; return; }
    const prog = document.getElementById('files-progress');
    prog.style.display = 'block';
    prog.textContent = `Uploading ${file.name}…`;
    try {
      await uploadPropertyFile(id, file);
      prog.style.display = 'none';
      e.target.value = '';
      showToast('Uploaded');
      await loadFiles();
    } catch (err) {
      prog.style.display = 'none';
      showToast(err.message, 'error');
    }
  }

      if (!tpls.length) {

      const pick = prompt(`Pick a template:\n\n${choices}\n\nEnter a number:`);

      location.href = `/inkd-send.html?template_id=${tpl.id}&property_id=${propertyId}`;

  function openLightbox(startIdx) {
    const photos = property.photos;
    if (!photos || !photos.length) return;

    let idx = Math.max(0, Math.min(startIdx, photos.length - 1));
    const total = photos.length;

    const chevL = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;
    const chevR = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;

    const box = document.createElement('div');
    box.className = 'photo-lightbox';

    function render() {
      const ph = photos[idx];
      const noteText = [ph.notes, ph.taken_at ? formatDate(ph.taken_at) : null].filter(Boolean).join(' · ');
      box.innerHTML = `
        <button class="lb-close" title="Close (Esc)">✕</button>
        ${total > 1 ? `<button class="lb-nav lb-prev" title="Previous (←)" ${idx === 0 ? 'disabled' : ''}>${chevL}</button>` : ''}
        <img src="${escHtml(ph.url)}" alt="">
        ${total > 1 ? `<button class="lb-nav lb-next" title="Next (→)" ${idx === total - 1 ? 'disabled' : ''}>${chevR}</button>` : ''}
        <div class="lb-bar">
          ${noteText ? `<span class="lb-notes">${escHtml(noteText)}</span>` : ''}
          ${total > 1 ? `<span class="lb-counter">${idx + 1} / ${total}</span>` : ''}
        </div>
      `;
      box.querySelector('.lb-close').addEventListener('click', close);
      box.querySelector('.lb-prev')?.addEventListener('click', (e) => { e.stopPropagation(); if (idx > 0) { idx--; render(); } });
      box.querySelector('.lb-next')?.addEventListener('click', (e) => { e.stopPropagation(); if (idx < total - 1) { idx++; render(); } });
    }

    function close() {
      document.removeEventListener('keydown', onKey);
      box.remove();
    }

    function onKey(e) {
      if (e.key === 'ArrowLeft'  && idx > 0)           { idx--; render(); }
      if (e.key === 'ArrowRight' && idx < total - 1)   { idx++; render(); }
      if (e.key === 'Escape')                           { close(); }
    }

    box.addEventListener('click', (e) => { if (e.target === box) close(); });
    document.addEventListener('keydown', onKey);
    render();
    document.body.appendChild(box);
  }

      if (v === '' || v == null) v = null;
      if (f.type === 'number' && v != null) v = Number(v);
      if (v != null) data[f.name] = v;
    }
    try {
      await createPipelineRecord(_addStage, data);
      showToast(spec.title.replace('Add ','') + ' added');
      closeAddRecord();
      await load();
    } catch (err) { showToast(err.message, 'error'); }
  }

  // ── Delete with confirm modal ────────────────────────────────────
  let _pendingDelete = null;
  function confirmDeleteRecord(stage, recordId, btn) {
    _pendingDelete = { stage, id: recordId };
    const labels = { prospects:'prospect', leads:'lead', opportunities:'opportunity', purchases:'purchase', projects:'project' };
    document.getElementById('pp-del-text').textContent =
      `Delete this ${labels[stage] || 'item'}? This can't be undone.`;
    document.getElementById('pp-del-modal').classList.add('open');
  }
  function closeDeleteRecord() {
    _pendingDelete = null;
    document.getElementById('pp-del-modal').classList.remove('open');
  }
  async function doDeleteRecord() {
    if (!_pendingDelete) return;
    const { stage, id: rid } = _pendingDelete;
    try {
      await apiFetch(`/api/${stage}/${rid}`, { method: 'DELETE' });
      showToast('Deleted');
      closeDeleteRecord();
      await load();
    } catch (err) {
      showToast(err.message, 'error');
      closeDeleteRecord();
    }
  }

  async function promote(stage, recordId){
    let body = {};
    if (stage === 'purchases') {
      // Show project-kind picker in the same modal style (lightweight reuse).
      const kind = await pickProjectKind();
      if (!kind) return;
      body = { kind };
    }
    try {
      await promotePipelineRecord(stage, recordId, body);
      showToast('Promoted'); await load();
    } catch (e) { showToast(e.message, 'error'); }
  }

  // Promote-to-project kind picker — reuses the add modal shell.
  let _pickResolver = null;
  function pickProjectKind() {
    return new Promise(resolve => {
      _pickResolver = resolve;
      document.getElementById('pp-add-title').textContent = 'Promote to Project';
      document.getElementById('pp-add-body').innerHTML = `
        <div class="pp-modal-row">
          <label for="pp-f-kind">Project type <span class="req">*</span></label>
          <select id="pp-f-kind" required>
            <option value="flip">Flip</option>
            <option value="rental">Rental</option>
          </select>
        </div>`;
      // Swap submit handler temporarily
      const form = document.getElementById('pp-add-form');
      form.onsubmit = (e) => {
        e.preventDefault();
        const v = document.getElementById('pp-f-kind').value;
        document.getElementById('pp-add-modal').classList.remove('open');
        form.onsubmit = submitAddRecord;        // restore default
        const r = _pickResolver; _pickResolver = null;
        r && r(v);
      };
      document.getElementById('pp-add-modal').classList.add('open');
    });
  }

async function addContactLink(){
    const contacts = await getContacts();
    if (!contacts.length){ if (confirm('No contacts yet. Create one?')) window.location.href = '/contacts.html'; return; }
    const choice = prompt(
      'Contact ID? Available:\n' +
      contacts.slice(0, 20).map(c => `${c.id.slice(0,8)} — ${c.full_name} (${c.type})`).join('\n')
    );
    if (!choice) return;
    const match = contacts.find(c => c.id.startsWith(choice.trim()));
    if (!match) return showToast('No match', 'error');
    const role = prompt('Role on this property (e.g. seller, contractor, accountant):', match.type);
    if (!role) return;
    try {
      await linkContactToProperty({ property_id: id, contact_id: match.id, role });
      showToast('Linked'); await load();
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function unlink(contactId, role){
    if (!confirm('Unlink this contact?')) return;
    try {
      await unlinkContactFromProperty({ property_id: id, contact_id: contactId, role });
      showToast('Unlinked'); await load();
    } catch (e) { showToast(e.message, 'error'); }
  }

  // ── Themed dropdown — wraps a <select> with a custom UI ─────────
  // Hides the native <select>, builds a styled trigger + menu, and on
  // pick: writes the value back to the original select and dispatches
  // a 'change' event so existing onchange handlers fire unmodified.
  function enhanceSelect(selectEl) {
    if (selectEl.dataset.ppEnhanced === '1') return;
    selectEl.dataset.ppEnhanced = '1';

    const wrap = document.createElement('div');
    wrap.className = 'pp-select-wrap';
    // Pass through any inline width/min-width style from the original
    if (selectEl.style.width)     wrap.style.width     = selectEl.style.width;
    if (selectEl.style.minWidth)  wrap.style.minWidth  = selectEl.style.minWidth;

    const trigger = document.createElement('button');
    trigger.type = 'button';
    trigger.className = 'pp-select-trigger';
    if (selectEl.disabled) trigger.disabled = true;

    const valueEl = document.createElement('span');
    valueEl.className = 'pp-select-value';

    const chev = document.createElementNS('http://www.w3.org/2000/svg','svg');
    chev.setAttribute('class','pp-select-chev');
    chev.setAttribute('viewBox','0 0 24 24');
    chev.setAttribute('fill','none');
    chev.setAttribute('stroke','currentColor');
    chev.setAttribute('stroke-width','2.5');
    chev.setAttribute('stroke-linecap','round');
    chev.setAttribute('stroke-linejoin','round');
    chev.innerHTML = '<polyline points="6 9 12 15 18 9"/>';
    trigger.appendChild(valueEl);
    trigger.appendChild(chev);

    const menu = document.createElement('div');
    menu.className = 'pp-select-menu';

    function syncValueLabel() {
      const opt = selectEl.options[selectEl.selectedIndex];
      valueEl.textContent = opt ? opt.textContent : '';
    }
    function buildItems() {
      menu.innerHTML = '';
      Array.from(selectEl.options).forEach(opt => {
        const item = document.createElement('div');
        item.className = 'pp-select-item' + (opt.value === selectEl.value ? ' active' : '');
        item.textContent = opt.textContent;
        item.dataset.value = opt.value;
        item.addEventListener('click', () => {
          if (opt.value === selectEl.value) {
            wrap.classList.remove('open');
            return;
          }
          selectEl.value = opt.value;
          syncValueLabel();
          buildItems();
          wrap.classList.remove('open');
          // Fire the same event the original onchange="..." listener expects
          selectEl.dispatchEvent(new Event('change', { bubbles: true }));
        });
        menu.appendChild(item);
      });
    }

    // Position the fixed menu relative to the trigger. Flip above the
    // trigger if there isn't room below (keeps the full option list
    // visible without scrolling, where possible).
    function positionMenu() {
      const rect = trigger.getBoundingClientRect();
      const menuW = Math.max(rect.width, 200);
      // Render hidden to measure desired height
      menu.style.visibility = 'hidden';
      menu.style.display = 'block';
      const desiredH = menu.scrollHeight;
      menu.style.visibility = '';
      menu.style.display = '';

      const gap = 6;
      const vpH = window.innerHeight;
      const vpW = window.innerWidth;
      const spaceBelow = vpH - rect.bottom - gap;
      const spaceAbove = rect.top - gap;
      // Prefer below; flip above only if much more space there.
      const placeAbove = spaceBelow < Math.min(desiredH, 200) && spaceAbove > spaceBelow;

      let top, maxH;
      if (placeAbove) {
        maxH = Math.min(desiredH, spaceAbove);
        top  = rect.top - gap - maxH;
      } else {
        maxH = Math.min(desiredH, spaceBelow);
        top  = rect.bottom + gap;
      }
      // Clamp left so the menu can't run off the right edge
      const left = Math.min(rect.left, vpW - menuW - 6);

      menu.style.top      = Math.max(6, top) + 'px';
      menu.style.left     = Math.max(6, left) + 'px';
      menu.style.minWidth = menuW + 'px';
      menu.style.maxHeight = Math.max(120, maxH) + 'px';
    }

    function reposIfOpen() { if (wrap.classList.contains('open')) positionMenu(); }
    window.addEventListener('resize', reposIfOpen);
    window.addEventListener('scroll',  reposIfOpen, true);

    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      if (trigger.disabled) return;
      // Close any other open dropdowns
      document.querySelectorAll('.pp-select-wrap.open').forEach(w => { if (w !== wrap) w.classList.remove('open'); });
      const opening = !wrap.classList.contains('open');
      wrap.classList.toggle('open');
      if (opening) {
        buildItems();      // rebuild in case options changed
        positionMenu();    // measure + place + clamp
      }
    });

    // Keyboard nav on the trigger
    trigger.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowDown') {
        e.preventDefault(); trigger.click();
      }
    });

    // Insert before the original select, then move the select inside
    // the wrap so form submission still picks it up; hide native UI.
    selectEl.parentNode.insertBefore(wrap, selectEl);
    selectEl.style.display = 'none';
    wrap.appendChild(trigger);
    wrap.appendChild(selectEl);
    // The menu lives on <body> so transforms / overflow:hidden on any
    // ancestor card can't clip it. positionMenu() uses fixed coords
    // from the trigger's bounding rect.
    document.body.appendChild(menu);

    // Mirror wrap.open state onto the menu so CSS [.pp-select-wrap.open
    // .pp-select-menu { display: block }] keeps working even though
    // the menu is no longer a descendant.
    const obs = new MutationObserver(() => {
      menu.style.display = wrap.classList.contains('open') ? 'block' : 'none';
    });
    obs.observe(wrap, { attributes: true, attributeFilter: ['class'] });

    syncValueLabel();
    buildItems();
  }

  // Single doc-wide outside-click handler closes any open dropdown.
  // The menu lives on <body> now, so clicks INSIDE the menu would
  // otherwise be treated as 'outside' the wrap. Allow them via the
  // .pp-select-menu closest() check.
  document.addEventListener('click', (e) => {
    const insideMenu = e.target.closest('.pp-select-menu');
    document.querySelectorAll('.pp-select-wrap.open').forEach(w => {
      if (w.contains(e.target) || insideMenu) return;
      w.classList.remove('open');
    });
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.pp-select-wrap.open').forEach(w => w.classList.remove('open'));
    }
  });

  init();

  // ── Esc closes modals ────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    if (document.getElementById('pp-add-modal')?.classList.contains('open')) closeAddRecord();
    if (document.getElementById('pp-del-modal')?.classList.contains('open')) closeDeleteRecord();
  });
</script>

<!-- ── Add-record modal ─────────────────────────────────────────── -->
<div class="pp-modal-backdrop" id="pp-add-modal" onclick="if(event.target===this)closeAddRecord()">
  <div class="pp-modal">
    <div class="pp-modal-head">
      <h3 id="pp-add-title">Add</h3>
      <button type="button" class="pp-modal-close" onclick="closeAddRecord()" aria-label="Close">✕</button>
    </div>
    <form id="pp-add-form" onsubmit="submitAddRecord(event)">
      <div class="pp-modal-body" id="pp-add-body"></div>
      <div class="pp-modal-actions">
        <button type="button" class="btn btn-secondary" onclick="closeAddRecord()">Cancel</button>
        <button type="submit" class="btn btn-primary">Add</button>
      </div>
    </form>
  </div>
</div>

<!-- ── Delete-confirm modal ─────────────────────────────────────── -->
<div class="pp-modal-backdrop" id="pp-del-modal" onclick="if(event.target===this)closeDeleteRecord()">
  <div class="pp-modal" style="max-width:380px;">
    <div class="pp-modal-head">
      <h3>Confirm delete</h3>
      <button type="button" class="pp-modal-close" onclick="closeDeleteRecord()" aria-label="Close">✕</button>
    </div>
    <div class="pp-confirm-body">
      <p id="pp-del-text">Delete this item?</p>
      <p class="pp-confirm-sub">Related promotions and history will not be removed.</p>
    </div>
    <div class="pp-modal-actions">
      <button type="button" class="btn btn-secondary" onclick="closeDeleteRecord()">Cancel</button>
      <button type="button" class="btn btn-danger" onclick="doDeleteRecord()">Delete</button>
    </div>
  </div>
</div>

</body>
