<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Pulse</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <script>document.documentElement.classList.add('page-loading');try{var _c=document.documentElement.classList;if(localStorage.sidebar_collapsed==='1')_c.add('sidebar-collapsed');var _t=localStorage.getItem('propspot_theme');_c.add('theme-premium');if(_t==='dark')_c.add('theme-dark');}catch(e){}</script>
  <style>
    body.os-newlayout .page { padding:0 !important; max-width:none !important; height:calc(100vh - 56px); display:flex; overflow:hidden; }

    /* ── Outer wrap ─────────────────────────────────────────────── */
    .pulse-wrap { display:flex; width:100%; height:100%; overflow:hidden; }

    /* ── Channel sidebar ────────────────────────────────────────── */
    .ps-sidebar { width:240px; flex:0 0 240px; border-right:1px solid var(--border); display:flex; flex-direction:column; background:var(--surface); overflow:hidden; }
    .ps-sidebar-head { padding:14px 14px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; flex-shrink:0; }
    .ps-app-name { font-weight:800; font-size:.95rem; color:var(--text); flex:1; }
    .ps-sidebar-body { flex:1; overflow-y:auto; padding:4px 0 40px; }

    .ps-section-row { display:flex; align-items:center; padding:10px 14px 2px; }
    .ps-section { font-size:.68rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); font-weight:700; flex:1; }
    .ps-new-btn { width:20px; height:20px; border-radius:5px; border:none; background:transparent; cursor:pointer; color:var(--text-muted); font-size:1.1rem; line-height:1; display:flex; align-items:center; justify-content:center; transition:background .1s,color .1s; }
    .ps-new-btn:hover { background:var(--brand-light); color:var(--brand); }

    .ps-row { display:flex; align-items:center; gap:8px; padding:6px 10px; margin:1px 4px; border-radius:8px; cursor:pointer; font-size:.88rem; color:var(--text-muted); transition:background .1s,color .1s; user-select:none; }
    .ps-row:hover { background:var(--brand-light); color:var(--text); }
    .ps-row.active { background:var(--brand-light); color:var(--brand); font-weight:700; }
    .ps-row-icon { font-size:.85rem; flex-shrink:0; width:16px; text-align:center; font-weight:700; color:var(--text-muted); }
    .ps-row.active .ps-row-icon { color:var(--brand); }
    .ps-row-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .ps-badge { background:var(--brand); color:#fff; border-radius:100px; font-size:.62rem; font-weight:700; padding:1px 6px; min-width:16px; text-align:center; flex-shrink:0; }
    .ps-join-btn { font-size:.68rem; font-weight:700; color:var(--brand-dark,#15803d); border:1px solid rgba(97,183,70,.35); background:rgba(97,183,70,.08); border-radius:100px; padding:2px 8px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
    .ps-join-btn:hover { background:rgba(97,183,70,.15); }
    .ps-dm-avatar { width:22px; height:22px; border-radius:50%; background:var(--brand); color:#fff; display:flex; align-items:center; justify-content:center; font-size:.62rem; font-weight:700; flex-shrink:0; }
    .ps-row.dimmed { opacity:.6; }

    /* ── Main area ──────────────────────────────────────────────── */
    .ps-main { flex:1; min-width:0; display:flex; flex-direction:column; }
    .ps-main-head { height:52px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; padding:0 16px; background:var(--surface); flex-shrink:0; }
    .ps-ch-name { font-weight:700; font-size:.95rem; }
    .ps-ch-desc { font-size:.78rem; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:280px; }
    .ps-members-badge { font-size:.72rem; color:var(--text-muted); background:var(--bg); border:1px solid var(--border); border-radius:100px; padding:2px 8px; white-space:nowrap; cursor:default; }
    .ps-conn { width:8px; height:8px; border-radius:50%; background:#d1d5db; flex-shrink:0; transition:background .3s; }
    .ps-conn.on { background:#22c55e; }
    .ps-settings-btn { width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:var(--surface); cursor:pointer; color:var(--text-muted); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .1s,color .1s,border-color .1s; }
    .ps-settings-btn:hover { background:var(--brand-light); color:var(--brand); border-color:rgba(97,183,70,.3); }

    .ps-messages { flex:1; overflow-y:auto; padding:16px 16px 8px; display:flex; flex-direction:column; gap:0; }

    /* ── Message rows ───────────────────────────────────────────── */
    .ps-msg { display:flex; gap:10px; align-items:flex-start; padding:2px 6px; border-radius:6px; position:relative; }
    .ps-msg:hover { background:var(--brand-light); }
    .ps-msg-avatar { width:34px; height:34px; border-radius:50%; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.85rem; flex-shrink:0; margin-top:1px; }
    .ps-msg-body { flex:1; min-width:0; }
    .ps-msg-meta { display:flex; align-items:baseline; gap:6px; margin-bottom:2px; }
    .ps-msg-name { font-weight:700; font-size:.88rem; }
    .ps-msg-time { font-size:.7rem; color:var(--text-muted); }
    .ps-msg-edited { font-size:.68rem; color:var(--text-muted); font-style:italic; }
    .ps-msg-text { font-size:.9rem; line-height:1.55; word-break:break-word; white-space:pre-wrap; }
    .ps-msg.compact { padding-top:1px; }
    .ps-msg.compact .ps-msg-avatar { visibility:hidden; }
    .ps-msg.compact .ps-msg-meta { display:none; }
    .ps-divider { text-align:center; font-size:.72rem; color:var(--text-muted); margin:12px 0 8px; position:relative; }
    .ps-divider::before { content:''; position:absolute; top:50%; left:0; right:0; height:1px; background:var(--border); }
    .ps-divider span { background:var(--bg); position:relative; padding:0 12px; }
    .ps-empty { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; color:var(--text-muted); }
    .ps-empty svg { opacity:.3; }

    /* @mention highlight in messages */
    .ps-mention { background:rgba(97,183,70,.15); color:var(--brand); border-radius:4px; padding:0 3px; font-weight:600; }
    .ps-mention-me { background:rgba(97,183,70,.28); color:var(--brand); border-radius:4px; padding:0 3px; font-weight:700; }

    /* ── Message action bar (below text, shown on hover) ─────────── */
    .ps-msg-actions {
      display:none; align-items:center; gap:1px;
      margin:3px 0 2px;
    }
    .ps-msg:hover .ps-msg-actions,
    .ps-msg-actions.visible { display:flex; }

    .ps-act-emoji {
      font-size:.88rem; padding:3px 5px; border:none; background:transparent;
      cursor:pointer; border-radius:7px; line-height:1;
      transition:background .1s, transform .08s;
    }
    .ps-act-emoji:hover { background:var(--brand-light); transform:scale(1.15); }

    .ps-act-sep { width:1px; height:14px; background:var(--border); margin:0 4px; flex-shrink:0; }

    .ps-act-btn {
      width:26px; height:26px; border:none; background:transparent;
      cursor:pointer; border-radius:7px; display:flex; align-items:center;
      justify-content:center; color:var(--text-muted); position:relative;
      transition:background .1s, color .1s;
    }
    .ps-act-btn:hover { background:var(--brand-light); color:var(--text); }
    .ps-act-btn.active { background:var(--brand-light); color:var(--brand); }

    /* More options dropdown */
    .ps-more-menu {
      position:absolute; top:calc(100% + 4px); right:0;
      background:var(--surface); border:1px solid var(--border);
      border-radius:11px; box-shadow:0 8px 32px -4px rgba(0,0,0,.2);
      z-index:300; display:none; min-width:170px; padding:4px;
    }
    .ps-more-menu.open { display:block; }
    .ps-more-item {
      display:flex; align-items:center; gap:9px; padding:7px 10px;
      border-radius:7px; cursor:pointer; font-size:.84rem; color:var(--text);
      transition:background .1s; border:none; background:transparent;
      width:100%; text-align:left; white-space:nowrap;
    }
    .ps-more-item:hover { background:var(--brand-light); }
    .ps-more-item.danger { color:#ef4444; }
    .ps-more-item.danger:hover { background:rgba(239,68,68,.08); }
    .ps-more-divider { height:1px; background:var(--border); margin:3px 0; }

    /* ── Reaction chips ─────────────────────────────────────────── */
    .ps-reactions { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; min-height:0; }
    .ps-rx-chip {
      display:inline-flex; align-items:center; gap:4px;
      padding:2px 8px 2px 6px; border-radius:100px;
      border:1.5px solid var(--border); background:var(--bg);
      font-size:.82rem; cursor:pointer; line-height:1;
      transition:border-color .1s, background .1s;
      user-select:none;
    }
    .ps-rx-chip:hover { border-color:var(--brand); background:var(--brand-light); }
    .ps-rx-chip.by-me { border-color:var(--brand); background:rgba(97,183,70,.12); color:var(--brand); }
    .ps-rx-emoji { font-size:1rem; }
    .ps-rx-count { font-size:.75rem; font-weight:600; }

    /* ── Reply quote block (inside message) ────────────────────── */
    .ps-reply-quote {
      display:flex; align-items:stretch; gap:8px;
      background:var(--bg); border:1px solid var(--border);
      border-left:3px solid var(--brand); border-radius:6px;
      padding:6px 10px; margin-bottom:4px; cursor:pointer;
      transition:background .1s;
    }
    .ps-reply-quote:hover { background:var(--brand-light); }
    .ps-reply-quote-name { font-size:.75rem; font-weight:700; color:var(--brand); margin-bottom:2px; }
    .ps-reply-quote-text { font-size:.78rem; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:480px; }

    /* ── Reply context bar above composer ───────────────────────── */
    .ps-reply-bar {
      display:none; align-items:center; gap:8px;
      padding:8px 14px; background:var(--brand-light);
      border-top:1px solid rgba(97,183,70,.2);
      border-bottom:1px solid rgba(97,183,70,.15);
      font-size:.8rem;
    }
    .ps-reply-bar.open { display:flex; }
    .ps-reply-bar-icon { color:var(--brand); flex-shrink:0; }
    .ps-reply-bar-body { flex:1; min-width:0; }
    .ps-reply-bar-to { font-weight:700; color:var(--brand); }
    .ps-reply-bar-preview { color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .ps-reply-bar-close { width:22px; height:22px; border:none; background:transparent; cursor:pointer; color:var(--text-muted); border-radius:5px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .ps-reply-bar-close:hover { background:rgba(0,0,0,.06); color:var(--text); }

    /* ── Inline edit mode ───────────────────────────────────────── */
    .ps-edit-wrap { margin-top:2px; }
    .ps-edit-ta {
      width:100%; padding:8px 10px; border:1.5px solid var(--brand);
      border-radius:8px; font-size:.9rem; font-family:inherit;
      line-height:1.4; resize:none; min-height:52px; max-height:180px;
      background:var(--bg); color:var(--text); box-sizing:border-box;
      display:block;
    }
    .ps-edit-ta:focus { outline:none; box-shadow:0 0 0 3px rgba(97,183,70,.1); }
    .ps-edit-actions { display:flex; gap:6px; margin-top:6px; align-items:center; }
    .ps-edit-save { padding:5px 14px; border-radius:8px; font-size:.83rem; }
    .ps-edit-cancel { padding:5px 12px; border-radius:8px; font-size:.83rem; border:1px solid var(--border); background:var(--bg); cursor:pointer; color:var(--text); }
    .ps-edit-cancel:hover { background:var(--brand-light); }
    .ps-edit-hint { font-size:.7rem; color:var(--text-muted); }

    /* ── Full emoji picker overlay ──────────────────────────────── */
    .ps-emoji-picker {
      position:fixed; background:var(--surface);
      border:1px solid var(--border); border-radius:14px;
      box-shadow:0 8px 36px -4px rgba(0,0,0,.22);
      padding:10px; z-index:1000; display:none; width:280px;
    }
    .ps-emoji-picker.open { display:block; }
    .ps-emoji-grid { display:grid; grid-template-columns:repeat(8, 1fr); gap:2px; }
    .ps-emoji-btn {
      font-size:1.2rem; padding:5px; border:none; background:transparent;
      cursor:pointer; border-radius:6px; line-height:1; text-align:center;
      transition:background .1s, transform .08s;
    }
    .ps-emoji-btn:hover { background:var(--brand-light); transform:scale(1.2); }

    /* ── Markdown in messages ───────────────────────────────────── */
    .ps-msg-text code {
      background:var(--bg); border:1px solid var(--border);
      border-radius:4px; padding:1px 5px; font-family:ui-monospace,monospace;
      font-size:.82em;
    }
    .ps-msg-text pre {
      background:var(--bg); border:1px solid var(--border);
      border-radius:8px; padding:10px 12px; overflow-x:auto;
      margin:4px 0; white-space:pre;
    }
    .ps-msg-text pre code {
      background:transparent; border:none; padding:0;
      font-size:.85em; line-height:1.55; display:block; white-space:pre;
    }

    /* ── Composer ────────────────────────────────────────────────── */
    .ps-composer-wrap { border-top:1px solid var(--border); background:var(--surface); flex-shrink:0; position:relative; }
    .ps-composer { padding:10px 12px; display:flex; gap:8px; align-items:flex-end; }
    .ps-composer textarea { flex:1; resize:none; border:1.5px solid var(--border); border-radius:10px; padding:9px 12px; font-size:.9rem; font-family:inherit; line-height:1.4; max-height:120px; overflow-y:auto; background:var(--bg); color:var(--text); transition:border-color .15s; }
    .ps-composer textarea:focus { outline:none; border-color:var(--brand); box-shadow:0 0 0 3px rgba(97,183,70,.08); }
    .ps-send { padding:9px 18px; font-size:.88rem; border-radius:10px; align-self:flex-end; white-space:nowrap; flex-shrink:0; }
    .ps-composer-hint { font-size:.72rem; color:var(--text-muted); padding:0 12px 8px; }

    /* @mention picker */
    .ps-mention-picker { position:absolute; bottom:100%; left:12px; right:12px; background:var(--surface); border:1px solid var(--border); border-radius:12px; box-shadow:0 -8px 32px -4px rgba(0,0,0,.12); max-height:260px; overflow-y:auto; z-index:300; display:none; margin-bottom:4px; }
    .ps-mention-picker.open { display:block; }
    .ps-mention-item { display:flex; align-items:center; gap:10px; padding:8px 12px; cursor:pointer; transition:background .1s; }
    .ps-mention-item:hover,.ps-mention-item.focused { background:var(--brand-light); }
    .ps-mention-item-avatar { width:28px; height:28px; border-radius:50%; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.72rem; flex-shrink:0; }
    .ps-mention-item-name { font-weight:600; font-size:.85rem; }
    .ps-mention-item-email { font-size:.72rem; color:var(--text-muted); }

    /* ── Modals ─────────────────────────────────────────────────── */
    .ps-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:900; display:none; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
    .ps-backdrop.open { display:flex; }
    .ps-modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; width:min(420px,90vw); box-shadow:0 20px 60px -10px rgba(0,0,0,.3); }
    .ps-modal h3 { margin:0 0 16px; font-size:1.1rem; }
    .ps-modal label { display:block; font-size:.8rem; font-weight:600; color:var(--text-muted); margin-bottom:4px; margin-top:12px; }
    .ps-modal input[type=text],.ps-modal textarea { width:100%; padding:9px 12px; border:1.5px solid var(--border); border-radius:10px; font-size:.9rem; font-family:inherit; background:var(--bg); color:var(--text); box-sizing:border-box; }
    .ps-modal input[type=text]:focus,.ps-modal textarea:focus { outline:none; border-color:var(--brand); }
    .ps-modal textarea { resize:vertical; min-height:64px; }
    .ps-toggle-row { display:flex; align-items:center; gap:10px; margin-top:14px; }
    .ps-toggle-row label { margin:0; font-size:.88rem; font-weight:500; color:var(--text); }
    .ps-modal-foot { display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }
    .ps-btn-cancel { padding:8px 16px; border-radius:9px; border:1px solid var(--border); background:var(--bg); cursor:pointer; font-size:.88rem; color:var(--text); }
    .ps-btn-cancel:hover { background:var(--brand-light); }

    /* ── New DM modal user picker ───────────────────────────────── */
    .ps-ndm-pick { position:relative; }
    .ps-ndm-list {
      position:absolute; top:calc(100% + 4px); left:0; right:0;
      background:var(--surface); border:1px solid var(--border);
      border-radius:10px; box-shadow:0 8px 28px -4px rgba(0,0,0,.15);
      max-height:200px; overflow-y:auto; z-index:500; display:none;
    }
    .ps-ndm-list.open { display:block; }
    .ps-ndm-item { display:flex; align-items:center; gap:9px; padding:8px 12px; cursor:pointer; transition:background .1s; }
    .ps-ndm-item:hover,.ps-ndm-item.focused { background:var(--brand-light); }
    .ps-ndm-item-av { width:28px; height:28px; border-radius:50%; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.7rem; flex-shrink:0; }
    .ps-ndm-tag {
      display:inline-flex; align-items:center; gap:5px;
      background:var(--brand-light); color:var(--brand);
      border:1px solid rgba(97,183,70,.3); border-radius:100px;
      padding:3px 10px; font-size:.82rem; font-weight:600; margin-top:6px;
    }
    .ps-ndm-tag button { border:none; background:transparent; cursor:pointer; color:var(--brand); font-size:1rem; line-height:1; padding:0 0 0 2px; }

    /* ── Channel settings panel (right drawer) ──────────────────── */
    .ps-settings-panel { position:fixed; top:56px; right:0; bottom:0; width:min(360px,90vw); background:var(--surface); border-left:1px solid var(--border); z-index:200; transform:translateX(100%); transition:transform .22s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; box-shadow:-8px 0 32px -8px rgba(0,0,0,.12); }
    .ps-settings-panel.open { transform:translateX(0); }
    .ps-sp-head { padding:16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
    .ps-sp-title { font-weight:700; font-size:.95rem; flex:1; }
    .ps-sp-close { width:28px; height:28px; border:none; background:none; cursor:pointer; color:var(--text-muted); border-radius:6px; display:flex; align-items:center; justify-content:center; }
    .ps-sp-close:hover { background:var(--brand-light); color:var(--text); }
    .ps-sp-body { flex:1; overflow-y:auto; padding:16px; }
    .ps-sp-section { font-size:.72rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); font-weight:700; margin:16px 0 8px; }
    .ps-sp-section:first-child { margin-top:0; }
    .ps-sp-field { margin-bottom:12px; }
    .ps-sp-field label { display:block; font-size:.78rem; font-weight:600; color:var(--text-muted); margin-bottom:4px; }
    .ps-sp-field input,.ps-sp-field textarea { width:100%; padding:8px 10px; border:1.5px solid var(--border); border-radius:9px; font-size:.88rem; font-family:inherit; background:var(--bg); color:var(--text); box-sizing:border-box; }
    .ps-sp-field input:focus,.ps-sp-field textarea:focus { outline:none; border-color:var(--brand); }
    .ps-sp-save { width:100%; padding:9px; border-radius:9px; margin-top:4px; }
    .ps-member-row { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid var(--border); }
    .ps-member-row:last-child { border-bottom:none; }
    .ps-member-avatar { width:28px; height:28px; border-radius:50%; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.72rem; flex-shrink:0; }
    .ps-member-info { flex:1; min-width:0; }
    .ps-member-name { font-size:.85rem; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .ps-member-role { font-size:.7rem; color:var(--text-muted); }
    .ps-member-actions { display:flex; gap:4px; flex-shrink:0; }
    .ps-member-btn { font-size:.68rem; padding:3px 8px; border-radius:6px; border:1px solid var(--border); background:var(--bg); cursor:pointer; color:var(--text-muted); white-space:nowrap; }
    .ps-member-btn:hover { border-color:var(--brand); color:var(--brand); }
    .ps-member-btn.danger:hover { border-color:#ef4444; color:#ef4444; }
    .ps-add-member { display:flex; gap:6px; margin-top:12px; align-items:flex-start; }
    .ps-danger-zone { margin-top:8px; }
    .ps-danger-btn { width:100%; padding:9px; border-radius:9px; border:1.5px solid #ef4444; background:transparent; color:#ef4444; cursor:pointer; font-size:.88rem; font-weight:600; transition:background .1s; }
    .ps-danger-btn:hover { background:rgba(239,68,68,.06); }

    /* Custom user picker (replaces native select) */
    .ps-upick { position:relative; flex:1; }
    .ps-upick-input-wrap { position:relative; }
    .ps-upick-search-icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none; }
    .ps-upick-input { width:100%; padding:8px 10px 8px 30px; border:1.5px solid var(--border); border-radius:9px; font-size:.85rem; font-family:inherit; background:var(--bg); color:var(--text); box-sizing:border-box; cursor:pointer; }
    .ps-upick-input:focus { outline:none; border-color:var(--brand); box-shadow:0 0 0 3px rgba(97,183,70,.08); }
    .ps-upick-input.has-value { background:var(--brand-light); border-color:rgba(97,183,70,.4); color:var(--brand); font-weight:600; }
    .ps-upick-list { position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--surface); border:1px solid var(--border); border-radius:10px; box-shadow:0 8px 28px -4px rgba(0,0,0,.15); max-height:220px; overflow-y:auto; z-index:500; display:none; }
    .ps-upick-list.open { display:block; }
    .ps-upick-item { display:flex; align-items:center; gap:9px; padding:8px 11px; cursor:pointer; transition:background .1s; }
    .ps-upick-item:hover,.ps-upick-item.focused { background:var(--brand-light); }
    .ps-upick-avatar { width:26px; height:26px; border-radius:50%; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.65rem; flex-shrink:0; }
    .ps-upick-info { flex:1; min-width:0; }
    .ps-upick-name { font-size:.84rem; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .ps-upick-email { font-size:.7rem; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .ps-upick-empty { padding:12px; text-align:center; font-size:.8rem; color:var(--text-muted); }

    /* Mobile-only / desktop-only show helpers (used in pulse markup only) */
    .ps-mobile-only { display:none; }

    /* Mobile hamburger button — bigger tap target than .ps-settings-btn */
    .ps-hamburger {
      width:36px; height:36px; border-radius:10px; border:1px solid var(--border);
      background:var(--surface); display:inline-flex; align-items:center; justify-content:center;
      cursor:pointer; transition:background .12s; flex-shrink:0; padding:0; color:var(--text);
    }
    .ps-hamburger:hover { background:var(--brand-light); }
    .ps-hamburger svg { width:20px; height:20px; }

    @media(max-width:768px) {
      .ps-mobile-only { display:inline-flex !important; align-items:center; justify-content:center; }
      .ps-desktop-only { display:none !important; }

      /* Let pulse take the whole viewport on mobile — hide the global
         bottom nav so the chat fills the screen like a native app. */
      body.os-newlayout main.page.page-pulse-fullscreen,
      body.os-newchrome main.page.page-pulse-fullscreen {
        padding:0 !important;
        max-width:none !important;
      }
      body:has(main.page.page-pulse-fullscreen) .mobile-bottom-nav { display:none !important; }

      .pulse-wrap {
        position:relative;
        height:calc(100dvh - 56px);
        height:calc(100vh - 56px);
        overflow:hidden;
      }

      /* Sidebar becomes a slide-in drawer from the left. */
      .ps-sidebar {
        display:flex !important;
        position:absolute; inset:0;
        width:86% !important; max-width:320px !important;
        flex:none;
        transform:translateX(-100%);
        transition:transform .22s ease;
        z-index:4;
        box-shadow:2px 0 24px rgba(0,0,0,.22);
      }
      .pulse-wrap[data-mobile-view="drawer"] .ps-sidebar { transform:none; }

      /* Main fills the available space; sits beneath the drawer. */
      .ps-main {
        position:absolute; inset:0;
        z-index:1;
      }

      /* Backdrop behind the drawer. */
      .ps-mobile-scrim {
        position:absolute; inset:0;
        background:rgba(0,0,0,.5);
        z-index:3;
        opacity:0; pointer-events:none;
        transition:opacity .18s ease;
      }
      .pulse-wrap[data-mobile-view="drawer"] .ps-mobile-scrim {
        opacity:1; pointer-events:auto;
      }

      .ps-ch-desc { display:none; }
      .ps-main-head { padding:0 12px; gap:8px; }
    }

    @media(min-width:769px) {
      .ps-mobile-only { display:none !important; }
    }
  </style>
</head>
<body class="os-newlayout">
<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<main class="page page-pulse-fullscreen">
  <div class="pulse-wrap" id="pulse-wrap">
    <div class="ps-mobile-scrim" onclick="closePulseDrawer()"></div>

    <!-- ── Channel sidebar ──────────────────────────────────── -->
    <div class="ps-sidebar">
      <div class="ps-sidebar-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" style="color:var(--brand);flex-shrink:0;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="ps-app-name">Pulse</span>
      </div>
      <div class="ps-sidebar-body" id="ps-sidebar-body">
        <p class="text-muted text-sm" style="padding:14px;">Loading…</p>
      </div>
    </div>

    <!-- ── Main message area ─────────────────────────────────── -->
    <div class="ps-main" id="ps-main">
      <div class="ps-main-head ps-mobile-only">
        <button class="ps-hamburger" onclick="openPulseDrawer()" title="Channels" aria-label="Channels">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="ps-ch-name">Pulse</span>
      </div>
      <div class="ps-empty" style="height:100%;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="48" height="48"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <p>Select a channel to start</p>
      </div>
    </div>

  </div>
</main>

<!-- ── Full emoji picker (floating, shared) ───────────────────── -->
<div id="ps-emoji-picker" class="ps-emoji-picker"></div>

<!-- ── Create Channel modal ──────────────────────────────────── -->
<div class="ps-backdrop" id="new-ch-modal" onclick="closeModal('new-ch-modal')">
  <div class="ps-modal" onclick="event.stopPropagation()">
    <h3>New Channel</h3>
    <label>Channel name</label>
    <input type="text" id="new-ch-name" placeholder="e.g. renovations" maxlength="64">
    <label>Description <span style="font-weight:400;color:var(--text-muted);">(optional)</span></label>
    <textarea id="new-ch-desc" placeholder="What's this channel about?" rows="2"></textarea>
    <div class="ps-toggle-row">
      <input type="checkbox" id="new-ch-private">
      <label for="new-ch-private">Private — only invited members can see this channel</label>
    </div>
    <div class="ps-modal-foot">
      <button class="ps-btn-cancel" onclick="closeModal('new-ch-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="createChannel()">Create channel</button>
    </div>
  </div>
</div>

<!-- ── New DM modal ───────────────────────────────────────────── -->
<div class="ps-backdrop" id="new-dm-modal" onclick="closeModal('new-dm-modal')">
  <div class="ps-modal" onclick="event.stopPropagation()">
    <h3>New Direct Message</h3>
    <label>Send to</label>
    <div class="ps-ndm-pick">
      <input class="ps-modal input[type=text]" type="text" id="ndm-search"
        style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;font-family:inherit;background:var(--bg);color:var(--text);box-sizing:border-box;"
        placeholder="Search people…" autocomplete="off"
        oninput="filterNdm(this.value)" onfocus="openNdmList()">
      <div class="ps-ndm-list" id="ndm-list"></div>
    </div>
    <div id="ndm-tags" style="display:flex;flex-wrap:wrap;gap:4px;min-height:4px;"></div>
    <div class="ps-modal-foot">
      <button class="ps-btn-cancel" onclick="closeModal('new-dm-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="createDm()">Open DM</button>
    </div>
  </div>
</div>

<!-- ── Channel settings panel ────────────────────────────────── -->
<div class="ps-settings-panel" id="ch-settings-panel">
  <div class="ps-sp-head">
    <span class="ps-sp-title" id="sp-title">Channel settings</span>
    <button class="ps-sp-close" onclick="closeSettings()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="ps-sp-body" id="sp-body"></div>
</div>

<script>window.NAV_CURRENT = 'pulse';</script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
  // ── State ──────────────────────────────────────────────────────
  let myId = null, isOwner = false;
  let activeScope = null; // { type:'channel'|'dm', id, name, my_role }
  let messages = [], sseSource = null;
  let lastSender = null, lastDate = null;
  let allChannels = [], allDms = [], allOrgUsers = [];
  let settingsChannelId = null;
  let pendingMentions = new Map();
  let mentionState = null;

  // Custom user picker (add member panel)
  let upickUsers = [], upickFiltered = [], upickSelected = null, upickFocused = -1;

  // Inline edit state
  let editingMsgId = null, editOrigHtml = null;

  // Reply state
  let replyingTo = null; // { id, senderName, body }

  // Emoji picker state
  let emojiPickerTarget = null;
  const COMMON_EMOJIS = ['👍','👎','❤️','😂','😮','😢','😡','🎉','🔥','👏','🙏','💪','👀','🤔','😎','✅','❌','💯','🚀','⭐','💡','📌','🔔','💰','🏆','😊','🤣','😅','🙌','👋','🎯','✨'];

  // New DM state
  let ndmSelected = null, ndmFiltered = [];

  // Safe single-quote escape for JS string literals in onclick attrs
  function esc1(s) { return String(s ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

  // ── Boot ───────────────────────────────────────────────────────
  async function init() {
    const me = await requireAuth();
    if (!me) return;
    myId = me.id;
    isOwner = !!me.is_owner;

    satelliteApiFetch('pulse', '/api/pulse/users')
      .then(u => { allOrgUsers = Array.isArray(u) ? u : []; })
      .catch(() => {});

    await loadSidebar();

    const general = allChannels.find(c => c.slug === 'general' && c.is_member)
                 || allChannels.find(c => c.is_member);
    if (general) openCh(general.id, general.name || general.slug, general.my_role || 'member');
  }

  // ── Sidebar ────────────────────────────────────────────────────
  async function loadSidebar() {
    const [chRes, dmRes] = await Promise.allSettled([
      satelliteApiFetch('pulse', '/api/pulse/channels'),
      satelliteApiFetch('pulse', '/api/pulse/dms'),
    ]);
    allChannels = chRes.status === 'fulfilled' && Array.isArray(chRes.value) ? chRes.value : [];
    allDms      = dmRes.status === 'fulfilled' && Array.isArray(dmRes.value) ? dmRes.value : [];

    if (!allChannels.length) {
      document.getElementById('ps-sidebar-body').innerHTML =
        `<p class="text-muted text-sm" style="padding:14px;">No channels found. An owner can create one.</p>`;
      return;
    }

    for (const ch of allChannels) {
      if (!ch.is_member && !ch.is_private) {
        try {
          await satelliteApiFetch('pulse', `/api/pulse/channels/${ch.id}/join`, { method: 'POST' });
          ch.is_member = true; ch.my_role = 'member';
        } catch (_) {}
      }
    }
    renderSidebar();
  }

  function renderSidebar() {
    const memberChs   = allChannels.filter(c => c.is_member);
    const joinableChs = allChannels.filter(c => !c.is_member && !c.is_private);
    let html = '';

    html += `<div class="ps-section-row">
      <span class="ps-section">Channels</span>
      ${isOwner ? `<button class="ps-new-btn" onclick="openNewChannelModal()" title="New channel">+</button>` : ''}
    </div>`;

    if (memberChs.length) {
      html += memberChs.map(ch => {
        const active = activeScope?.id === ch.id ? ' active' : '';
        const unread = ch.unread > 0 ? `<span class="ps-badge">${ch.unread}</span>` : '';
        return `<div class="ps-row${active}" data-ch-id="${ch.id}" data-ch-name="${escHtml(ch.name || ch.slug)}" data-ch-role="${escHtml(ch.my_role || 'member')}" onclick="handleChClick(this)">
          <span class="ps-row-icon">#</span>
          <span class="ps-row-name">${escHtml(ch.name || ch.slug)}</span>${unread}
        </div>`;
      }).join('');
    } else {
      html += `<p class="text-muted text-sm" style="padding:6px 14px;">No channels yet.</p>`;
    }

    if (joinableChs.length) {
      html += `<div class="ps-section-row" style="margin-top:8px;"><span class="ps-section">Browse</span></div>`;
      html += joinableChs.map(ch => `
        <div class="ps-row dimmed" data-ch-id="${ch.id}">
          <span class="ps-row-icon">#</span>
          <span class="ps-row-name">${escHtml(ch.name || ch.slug)}</span>
          <button class="ps-join-btn" onclick="joinChannel('${ch.id}',event)">Join</button>
        </div>`).join('');
    }

    // DMs section — always shown with + button
    html += `<div class="ps-section-row" style="margin-top:8px;">
      <span class="ps-section">Direct Messages</span>
      <button class="ps-new-btn" onclick="openNewDmModal()" title="New direct message">+</button>
    </div>`;

    if (allDms.length) {
      html += allDms.map(dm => {
        const others  = (dm.members || []).filter(m => m.user_id !== myId);
        const name    = dm.title || others.map(m => m.full_name || m.email || '?').join(', ') || 'Group DM';
        const active  = activeScope?.id === dm.id ? ' active' : '';
        const unread  = dm.unread > 0 ? `<span class="ps-badge">${dm.unread}</span>` : '';
        const initial = (others[0]?.full_name || others[0]?.email || '?')[0]?.toUpperCase() || '?';
        return `<div class="ps-row${active}" data-dm-id="${dm.id}" data-dm-name="${escHtml(name)}" onclick="handleDmClick(this)">
          <div class="ps-dm-avatar" style="background:${avatarColor(dm.id)}">${escHtml(initial)}</div>
          <span class="ps-row-name">${escHtml(name)}</span>${unread}
        </div>`;
      }).join('');
    } else {
      html += `<p class="text-muted text-sm" style="padding:6px 14px;opacity:.55;">No DMs yet</p>`;
    }

    document.getElementById('ps-sidebar-body').innerHTML = html;
  }

  function handleChClick(el) {
    const id = el.dataset.chId, name = el.dataset.chName, role = el.dataset.chRole;
    if (id) openCh(id, name, role);
  }
  function handleDmClick(el) {
    const id = el.dataset.dmId, name = el.dataset.dmName;
    if (id) openDm(id, name);
  }

  async function joinChannel(id, e) {
    e?.stopPropagation();
    try {
      await satelliteApiFetch('pulse', `/api/pulse/channels/${id}/join`, { method: 'POST' });
      await loadSidebar();
      const ch = allChannels.find(c => c.id === id);
      if (ch) openCh(ch.id, ch.name || ch.slug, 'member');
    } catch (err) { showToast(err.message, 'error'); }
  }

  // ── Open channel / DM ──────────────────────────────────────────
  function openCh(id, name, myRole) {
    activeScope = { type: 'channel', id, name: name.startsWith('#') ? name : '#' + name, my_role: myRole };
    closeSettings(); renderSidebar();
    loadMessages({ channel_id: id });
    satelliteApiFetch('pulse', `/api/pulse/channels/${id}/read`, { method: 'POST' }).catch(() => {});
    closePulseDrawer();
  }

  function openDm(id, name) {
    activeScope = { type: 'dm', id, name };
    closeSettings(); renderSidebar();
    loadMessages({ dm_id: id });
    satelliteApiFetch('pulse', `/api/pulse/dms/${id}/read`, { method: 'POST' }).catch(() => {});
    closePulseDrawer();
  }

  // ── Mobile drawer (≤768px) ─────────────────────────────────────
  function setPulseMobileView(state) {
    const el = document.getElementById('pulse-wrap');
    if (!el) return;
    if (state) el.setAttribute('data-mobile-view', state);
    else el.removeAttribute('data-mobile-view');
  }
  function openPulseDrawer()  { setPulseMobileView('drawer'); }
  function closePulseDrawer() { setPulseMobileView(null); }
  window.addEventListener('popstate', () => {
    if (window.matchMedia('(max-width: 768px)').matches) closePulseDrawer();
  });

  // ── Messages ───────────────────────────────────────────────────
  async function loadMessages(scope) {
    if (editingMsgId) cancelEditMsg();
    replyingTo = null;
    const ch = scope.channel_id ? allChannels.find(c => c.id === scope.channel_id) : null;
    const canManage = isOwner || activeScope?.my_role === 'admin';

    document.getElementById('ps-main').innerHTML = `
      <div class="ps-main-head">
        <button class="ps-hamburger ps-mobile-only" onclick="openPulseDrawer()" title="Channels" aria-label="Channels">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="ps-ch-name">${escHtml(activeScope.name)}</span>
        ${ch?.description ? `<span class="ps-ch-desc">${escHtml(ch.description)}</span>` : ''}
        <span style="flex:1"></span>
        ${ch ? `<span class="ps-members-badge" id="ps-member-count">${ch.member_count ?? 0} members</span>` : ''}
        <span class="ps-conn" id="ps-conn"></span>
        ${scope.channel_id && canManage ? `
          <button class="ps-settings-btn" onclick="openSettings('${scope.channel_id}')" title="Channel settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>` : ''}
      </div>
      <div class="ps-messages" id="ps-messages">
        <p class="text-muted text-sm" style="padding:8px 4px;">Loading…</p>
      </div>
      <div class="ps-composer-wrap">
        <div id="ps-reply-bar" class="ps-reply-bar">
          <span class="ps-reply-bar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg></span>
          <div class="ps-reply-bar-body">
            <div class="ps-reply-bar-to" id="ps-reply-bar-to"></div>
            <div class="ps-reply-bar-preview" id="ps-reply-bar-preview"></div>
          </div>
          <button class="ps-reply-bar-close" onclick="cancelReply()" title="Cancel reply"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div id="ps-mention-picker" class="ps-mention-picker"></div>
        <div class="ps-composer">
          <textarea id="ps-textarea" placeholder="Message ${escHtml(activeScope.name)}… (type @ to mention someone)" rows="1"
            onkeydown="handleKey(event)" oninput="onComposerInput(this)"></textarea>
          <button class="btn btn-primary ps-send" onclick="sendMsg()">Send</button>
        </div>
        <div class="ps-composer-hint">Shift+Enter for new line · @ to mention</div>
      </div>`;

    try {
      const qp = scope.channel_id ? `?channel_id=${scope.channel_id}` : `?dm_id=${scope.dm_id}`;
      const result = await satelliteApiFetch('pulse', '/api/pulse/messages' + qp + '&limit=80');
      messages = Array.isArray(result) ? result : (result?.messages || []);
      renderMsgs();
    } catch (e) {
      const el = document.getElementById('ps-messages');
      if (el) el.innerHTML = `<p style="color:#ef4444;padding:8px;font-size:.85rem;">Error loading messages: ${escHtml(e.message)}</p>`;
    }
    connectSSE(scope);
    document.getElementById('ps-textarea')?.focus();
  }

  function renderMsgs() {
    const el = document.getElementById('ps-messages');
    if (!el) return;
    lastSender = null; lastDate = null;
    if (!messages.length) {
      el.innerHTML = `<div class="ps-empty" style="height:100%;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="40" height="40"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>No messages yet — say hello!</p></div>`;
      return;
    }
    el.innerHTML = messages.map(m => msgHtml(m)).join('');
    el.scrollTop = el.scrollHeight;
  }

  // ── Message HTML ───────────────────────────────────────────────
  function msgHtml(m) {
    const dateStr = new Date(m.created_at).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    let out = '';
    if (dateStr !== lastDate) {
      out += `<div class="ps-divider"><span>${escHtml(dateStr)}</span></div>`;
      lastDate = dateStr; lastSender = null;
    }
    const compact    = m.sender_id === lastSender;
    const time       = new Date(m.created_at).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
    const senderName = m.sender_name || m.sender_email || 'Unknown';
    const initial    = senderName[0]?.toUpperCase() || '?';
    const rawBody    = m.body || m.content || '';
    const textOut    = renderBody(rawBody);
    const edited     = m.edited_at ? ` <span class="ps-msg-edited">(edited)</span>` : '';
    const isOwn      = m.sender_id === myId;

    // Reaction chips
    const rxHtml = reactionsHtml(m.reactions || [], mid);

    // Action bar SVGs
    const svgEdit   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
    const svgDel    = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;
    const svgReply  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>`;
    const svgSmile  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>`;
    const svgDots   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>`;
    const svgCopy   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    const svgTask   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`;

    const quickEmojis = ['👍','❤️','😂','🎉','🔥'];
    const quickBtns = quickEmojis.map(em =>
      `<button class="ps-act-emoji" title="React with ${em}" onclick="reactMsg('${mid}','${em}',event)">${em}</button>`
    ).join('');

    const moreMenu = `<div class="ps-more-menu" id="more-menu-${mid}">
      <button class="ps-more-item" onclick="copyMsgText('${mid}')">${svgCopy} Copy text</button>
      <button class="ps-more-item" onclick="startReply('${mid}','${esc1(senderName)}');closeMoreMenu('${mid}')">${svgReply} Reply to message</button>
      <button class="ps-more-item" onclick="createTaskFromMsg('${mid}');closeMoreMenu('${mid}')">${svgTask} Create task from this</button>
      ${isOwn ? `<div class="ps-more-divider"></div>
      <button class="ps-more-item" onclick="editMsg('${mid}');closeMoreMenu('${mid}')">${svgEdit} Edit message</button>
      <button class="ps-more-item danger" onclick="deleteMsg('${mid}')">${svgDel} Delete message</button>` : ''}
    </div>`;

    const actionBar = `<div class="ps-msg-actions" id="act-${mid}">
      ${quickBtns}
      <button class="ps-act-btn" title="Add reaction" onclick="openEmojiPicker('${mid}',event,this)">${svgSmile}</button>
      <div class="ps-act-sep"></div>
      <button class="ps-act-btn" title="Reply" onclick="startReply('${mid}','${esc1(senderName)}')">${svgReply}</button>
      <button class="ps-act-btn" title="More options" onclick="toggleMoreMenu('${mid}',this)">${svgDots}${moreMenu}</button>
    </div>`;

    // Reply-to quote block
    let replyQuote = '';
    if (m.reply_to) {
      const rt = m.reply_to;
      // Strip HTML from quoted body for the preview
      const tmp = document.createElement('div');
      tmp.innerHTML = renderBody(rt.body || '');
      const preview = tmp.textContent.slice(0, 120);
      replyQuote = `<div class="ps-reply-quote" onclick="scrollToMsg('${rt.id}')">
        <div>
          <div class="ps-reply-quote-name">${escHtml(rt.sender_name)}</div>
          <div class="ps-reply-quote-text">${escHtml(preview)}</div>
