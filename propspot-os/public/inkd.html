<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Ink'd</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="/inkd.css">
  <script>document.documentElement.classList.add('page-loading');try{var _c=document.documentElement.classList;if(localStorage.sidebar_collapsed==='1')_c.add('sidebar-collapsed');var _t=localStorage.getItem('propspot_theme');_c.add('theme-premium');if(_t==='dark')_c.add('theme-dark');}catch(e){}</script>
</head>
<body class="os-newlayout">
<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<main class="page">
  <div class="inkd-page">
    <div class="inkd-dash-header">
      <h1>Ink'd</h1>
      <button class="primary" id="btn-new-envelope">+ Send document</button>
      <a class="primary" href="/inkd-template-editor.html">+ New template</a>
      <a class="secondary" href="/inkd-templates.html">Templates</a>
    </div>
    <div class="lanes">
      <section class="lane" data-lane="draft">  <h2>Drafts</h2>             <div class="cards"></div></section>
      <section class="lane" data-lane="out">    <h2>Out for Signature</h2>  <div class="cards"></div></section>
      <section class="lane" data-lane="action"> <h2>Action Needed</h2>      <div class="cards"></div></section>
      <section class="lane" data-lane="review"> <h2>Completed (review)</h2> <div class="cards"></div></section>
      <section class="lane" data-lane="filed">  <h2>Filed</h2>              <div class="cards"></div></section>
    </div>
  </div>
</main>

<!-- New envelope modal: pick a template + (optionally) a property -->
<div class="modal-overlay" id="new-env-modal" hidden>
  <div class="modal-box new-env-box" role="dialog" aria-modal="true">
    <h2 style="margin-top:0;">Send a document</h2>
    <p class="text-muted text-sm" style="margin-top:-4px;">Pick a template, then attach it to a property. The composer will pre-fill any autofilled fields and let you add recipients.</p>

    <label class="new-env-label">Template
      <select id="ne-template"><option value="">Loading…</option></select>
    </label>

    <label class="new-env-label">Property (optional)
      <input type="text" id="ne-property-search" placeholder="Start typing an address…" autocomplete="off">
      <div id="ne-property-results" class="ne-property-results" hidden></div>
      <div id="ne-property-selected" class="ne-property-selected" hidden>
        <span id="ne-property-selected-label"></span>
        <button type="button" id="ne-property-clear" aria-label="Clear">×</button>
      </div>
    </label>

    <div class="new-env-actions">
      <button type="button" class="secondary" id="ne-cancel">Cancel</button>
      <button type="button" class="primary"   id="ne-continue">Continue</button>
    </div>
  </div>
</div>

<script>window.NAV_CURRENT = 'inkd';</script>
<script src="config.js"></script>
<script src="app.js"></script>
<script src="/inkd.js"></script>
</body>
</html>
