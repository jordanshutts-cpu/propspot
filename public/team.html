<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#f97316">
  <title>FieldCam — Team</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app-header">
  <button class="back-btn" onclick="history.back()">‹</button>
  <span class="header-title">Team Members</span>
</header>

<main class="page" style="padding-top:16px;">
  <div class="card mb-16">
    <div class="card-body">
      <p class="font-bold mb-8">✉️ Invite a Contractor or Employee</p>
      <p class="text-sm text-muted mb-12">They'll receive a link to create their account and join FieldCam.</p>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="invite-email" placeholder="contractor@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Their Name (optional)</label>
        <input class="form-input" type="text" id="invite-name" placeholder="Mike Johnson">
      </div>
      <button class="btn btn-primary btn-full" onclick="sendInvite()" id="invite-btn">📨 Send Invite</button>
      <p id="invite-msg" class="text-sm mt-12" style="display:none;"></p>
      <!-- Shows manual link if email not configured -->
      <div id="invite-link-box" class="hidden mt-12" style="background:var(--bg);border-radius:8px;padding:12px;">
        <p class="text-sm font-bold mb-4">📋 Share this link manually:</p>
        <p id="invite-link-text" class="text-xs text-muted" style="word-break:break-all;"></p>
        <button class="btn btn-secondary btn-full mt-8" onclick="copyInviteLink()" style="font-size:.85rem;">Copy Link</button>
      </div>
    </div>
  </div>

  <div class="section-header">
    <span class="section-title">Current Team</span>
    <span class="badge" id="member-count">0</span>
  </div>

  <div class="card">
    <div class="card-body" id="team-list">
      <p class="text-muted text-sm">Loading team…</p>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <a class="nav-link" href="/dashboard.html"><span class="nav-icon">🏠</span>Properties</a>
  <a class="nav-link" href="/camera.html"><span class="nav-icon">📷</span>Camera</a>
  <a class="nav-link active" href="/team.html"><span class="nav-icon">👥</span>Team</a>
</nav>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
  let currentUserId=null, lastInviteLink=null;

  async function init(){
    const user=await requireAuth(); if(!user)return;
    currentUserId=user.id;
    await loadTeam();
  }

  async function loadTeam(){
    try{
      const members=await getTeamMembers();
      document.getElementById('member-count').textContent=members.length;
      const list=document.getElementById('team-list');
      if(!members.length){list.innerHTML='<p class="text-muted text-sm">No team members yet. Invite someone!</p>';return;}
      list.innerHTML=members.map(m=>{
        const name=m.full_name||m.email||'Unknown';
        const isYou=m.id===currentUserId;
        return `<div class="team-row">
          <div class="avatar">${name.charAt(0).toUpperCase()}</div>
          <div class="team-info">
            <div class="team-name">${escHtml(name)} ${isYou?'<span class="badge" style="font-size:.7rem;">You</span>':''}</div>
            <div class="team-email">${escHtml(m.email||'')}</div>
          </div>
          <span class="badge ${m.is_active?'badge-green':'badge-red'}">${m.is_active?'Active':'Invited'}</span>
        </div>`;
      }).join('');
    }catch(err){
      document.getElementById('team-list').innerHTML=`<p class="text-muted text-sm">Could not load team: ${escHtml(err.message)}</p>`;
    }
  }

  async function sendInvite(){
    const email=document.getElementById('invite-email').value.trim();
    const name=document.getElementById('invite-name').value.trim();
    const btn=document.getElementById('invite-btn'),msg=document.getElementById('invite-msg');
    msg.style.display='none';
    if(!email){msg.textContent='Please enter an email address.';msg.style.color='var(--danger)';msg.style.display='block';return;}
    showSpinner(btn,'Sending…');
    try{
      const res=await inviteUser(email,name||undefined);
      msg.textContent=res.message; msg.style.color='var(--success)'; msg.style.display='block';
      document.getElementById('invite-email').value='';
      document.getElementById('invite-name').value='';
      if(res.inviteLink){
        lastInviteLink=res.inviteLink;
        document.getElementById('invite-link-text').textContent=res.inviteLink;
        document.getElementById('invite-link-box').classList.remove('hidden');
      }
      await loadTeam();
    }catch(err){
      msg.textContent='❌ '+err.message; msg.style.color='var(--danger)'; msg.style.display='block';
    }
    hideSpinner(btn);
  }

  function copyInviteLink(){
    if(lastInviteLink)
      navigator.clipboard.writeText(lastInviteLink).then(()=>showToast('Link copied!'));
  }

  init();
</script>
</body>
</html>
