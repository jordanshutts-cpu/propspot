<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#61B746">
  <title>FieldCam — Camera</title>
  <link rel="stylesheet" href="style.css">
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #000;
      overflow: hidden;
      height: 100%;
    }

    /* ── Full-screen flex column ── */
    .cam-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: #000;
    }

    /* ── Video takes all remaining space ── */
    #video-el {
      flex: 1;
      width: 100%;
      min-height: 0;
      object-fit: cover;
      display: block;
    }

    /* ── Upload-mode placeholder ── */
    #upload-mode-wrap {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px 24px;
    }
    #upload-mode-wrap.active { display: flex; }

    /* ── Top overlay ── */
    .cam-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: env(safe-area-inset-top, 12px) 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,.65), transparent);
      z-index: 20;
    }
    .cam-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      backdrop-filter: blur(6px);
      border: none; color: #fff;
      font-size: 1.25rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .cam-btn:active { background: rgba(255,255,255,.35); }
    .cam-btn.torch-on { background: #f5c518; color: #000; }

    .mode-toggle {
      display: flex;
      gap: 6px;
      flex: 1;
      margin: 0 10px;
    }
    .mode-btn {
      flex: 1;
      padding: 8px 6px;
      border-radius: 8px;
      border: none;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      background: rgba(255,255,255,.15);
      color: rgba(255,255,255,.7);
    }
    .mode-btn.active { background: #61B746; color: #fff; }

    /* ── Bottom panel — part of flex flow (fixes iOS scroll bug) ── */
    .cam-bottom {
      flex-shrink: 0;
      background: rgba(0,0,0,.82);
      backdrop-filter: blur(8px);
      padding: 8px 12px env(safe-area-inset-bottom, 20px);
    }

    /* ── Zoom row ── */
    .zoom-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 4px 4px 8px;
    }
    .zoom-presets {
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    .zoom-preset-btn {
      background: rgba(255,255,255,.15);
      border: 1.5px solid rgba(255,255,255,.25);
      color: rgba(255,255,255,.85);
      border-radius: 100px;
      font-size: .78rem;
      font-weight: 700;
      padding: 5px 13px;
      cursor: pointer;
      transition: background .12s, border-color .12s;
      min-width: 48px;
      text-align: center;
    }
    .zoom-preset-btn.active {
      background: #61B746;
      border-color: #61B746;
      color: #fff;
    }
    .zoom-slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .zoom-lbl {
      color: rgba(255,255,255,.8);
      font-size: .78rem;
      font-weight: 700;
      min-width: 38px;
      text-align: right;
    }
    #zoom-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      border-radius: 3px;
      background: rgba(255,255,255,.3);
      outline: none;
    }
    #zoom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,.5);
    }

    /* ── Thumbnail strip — KEY FIX: explicit block with overflow-x ── */
    .thumb-strip-outer {
      width: 100%;
      overflow-x: scroll;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin-bottom: 8px;
    }
    .thumb-strip-outer::-webkit-scrollbar { display: none; }

    .thumb-strip {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 6px;
      padding: 4px 0;
      min-height: 70px;
      align-items: center;
      width: max-content;  /* lets strip grow naturally */
      min-width: 100%;
    }

    .thumb-empty-msg {
      color: rgba(255,255,255,.4);
      font-size: .75rem;
      white-space: nowrap;
      padding: 0 4px;
    }

    .thumb-wrap {
      position: relative;
      flex-shrink: 0;
      width: 62px; height: 62px;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,.35);
    }
    .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .thumb-remove {
      position: absolute;
      top: 2px; right: 2px;
      width: 18px; height: 18px;
      background: rgba(0,0,0,.75);
      border: none; color: #fff;
      border-radius: 50%;
      font-size: .6rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .thumb-edit {
      position: absolute;
      bottom: 2px; left: 2px;
      width: 20px; height: 20px;
      background: rgba(97,183,70,.85);
      border: none; color: #fff;
      border-radius: 50%;
      font-size: .65rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .thumb-video-icon {
      width: 100%; height: 100%;
      background: #1c1c1e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; font-size: 1.4rem;
      gap: 2px;
    }
    .thumb-video-icon span { font-size: .55rem; opacity: .6; }

    /* ── Video mode ── */
    .shutter-btn.video-idle {
      background: transparent;
      border: 4px solid #FF3B30;
      outline: 3px solid rgba(255,59,48,.3);
    }
    .shutter-btn.video-idle::after {
      content: '';
      width: 22px; height: 22px;
      background: #FF3B30;
      border-radius: 50%;
      position: absolute;
    }
    .shutter-btn.video-rec {
      background: #FF3B30;
      border: 4px solid rgba(255,255,255,.3);
      outline: 3px solid rgba(255,59,48,.4);
      animation: rec-pulse .9s ease-in-out infinite;
    }
    .shutter-btn.video-rec::after {
      content: '';
      width: 20px; height: 20px;
      background: #fff;
      border-radius: 4px;
      position: absolute;
    }
    @keyframes rec-pulse {
      0%,100% { outline-color: rgba(255,59,48,.4); }
      50%      { outline-color: rgba(255,59,48,.9); }
    }
    #rec-timer-row {
      display: none;
      align-items: center;
      justify-content: center;
      padding: 4px 4px 8px;
      gap: 6px;
    }
    #rec-timer {
      color: #FF3B30;
      font-size: .95rem;
      font-weight: 800;
      letter-spacing: 1.5px;
    }

    /* ── Shutter row ── */
    .shutter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px;
    }

    .shutter-btn {
      width: 70px; height: 70px;
      border-radius: 50%;
      background: #fff;
      border: 4px solid rgba(255,255,255,.3);
      outline: 3px solid #61B746;
      cursor: pointer;
      position: relative;
      transition: transform .08s;
    }
    .shutter-btn:active { transform: scale(.91); }

    .shutter-badge {
      position: absolute;
      top: -6px; right: -8px;
      background: #61B746;
      color: #fff;
      border-radius: 100px;
      font-size: .68rem;
      font-weight: 800;
      padding: 2px 6px;
      display: none;
      min-width: 20px;
      text-align: center;
    }
    .shutter-btn.has-photos .shutter-badge { display: block; }

    .upload-all-btn {
      background: #61B746;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
      min-width: 90px;
      line-height: 1.3;
      text-align: center;
    }
    .upload-all-btn:disabled { background: #555; }
    .upload-all-btn.empty    { background: rgba(255,255,255,.12); color: rgba(255,255,255,.4); }

    /* ── Upload progress ── */
    .upload-progress { display: none; padding-top: 8px; }
    .prog-bar  { height: 4px; background: rgba(255,255,255,.2); border-radius: 4px; overflow: hidden; }
    .prog-fill { height: 100%; background: #61B746; transition: width .3s; }
    .prog-lbl  { color: rgba(255,255,255,.7); font-size: .75rem; text-align: center; margin-top: 5px; }

    /* ── Torch tooltip ── */
    #torch-tip {
      display: none;
      position: absolute;
      top: 68px; left: 12px;
      background: rgba(0,0,0,.75);
      color: #fff;
      font-size: .75rem;
      padding: 5px 12px;
      border-radius: 100px;
      z-index: 30;
      white-space: nowrap;
    }

    /* ── Settings sheet ── */
    .sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 90; display: none;
    }
    .sheet-overlay.open { display: block; }
    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #1c1c1e;
      border-radius: 20px 20px 0 0;
      padding: 16px 16px calc(env(safe-area-inset-bottom, 0px) + 24px);
      z-index: 100;
      transform: translateY(100%);
      transition: transform .28s ease;
      max-height: 78dvh;
      overflow-y: auto;
    }
    .sheet.open { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,.2);
      border-radius: 4px;
      margin: 0 auto 14px;
    }
    .sheet-title { color: #fff; font-weight: 700; font-size: .95rem; margin-bottom: 10px; }
    .sheet .form-input, .sheet .form-textarea {
      background: #2c2c2e; color: #fff; border-color: #3a3a3c;
    }
    .sheet .form-label { color: rgba(255,255,255,.65); font-size: .82rem; }
    .prop-opt-dark {
      padding: 10px 12px;
      border: 1.5px solid #3a3a3c;
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer; color: #fff;
    }
    .prop-opt-dark.selected { border-color: #61B746; background: rgba(97,183,70,.18); }
    .prop-opt-dark .opt-name { font-weight: 600; font-size: .88rem; }
    .prop-opt-dark .opt-dist { font-size: .73rem; color: rgba(255,255,255,.45); }
  </style>
</head>
<body>
<div class="cam-wrap">

  <!-- Live video -->
  <video id="video-el" autoplay playsinline muted></video>

  <!-- Library mode placeholder -->
  <div id="upload-mode-wrap">
    <div style="font-size:3.5rem;">🖼️</div>
    <p style="color:rgba(255,255,255,.65);font-size:.9rem;text-align:center;">
      Choose one or multiple photos from your library
    </p>
    <input type="file" id="upload-input" accept="image/*" multiple
           onchange="handleFileSelect(this)" style="display:none">
    <button class="btn btn-primary" style="padding:13px 32px;"
            onclick="document.getElementById('upload-input').click()">
      📂 Choose Photos
    </button>
    <a href="/import.html" style="color:rgba(255,255,255,.5);font-size:.82rem;text-decoration:none;">
      🧠 Smart Geo-Match import →
    </a>
  </div>

  <!-- Top bar -->
  <div class="cam-top">
    <button class="cam-btn" onclick="history.length > 1 ? history.back() : (location.href='/dashboard.html')" title="Back" style="font-size:1.6rem;line-height:1;">‹</button>
    <button class="cam-btn" id="torch-btn" onclick="toggleTorch()">⚡</button>
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-cam"   onclick="setMode('camera')">📷 Photo</button>
      <button class="mode-btn"        id="mode-video" onclick="setMode('video')">🎥 Video</button>
      <button class="mode-btn"        id="mode-up"    onclick="setMode('upload')">🖼 Library</button>
    </div>
    <button class="cam-btn" onclick="flipCamera()">🔄</button>
    <div id="torch-tip">Flash not available on this device</div>
  </div>

  <!-- Bottom panel (in flex flow — fixes iOS scroll) -->
  <div class="cam-bottom">

    <!-- Recording timer (video mode) -->
    <div id="rec-timer-row">
      <span id="rec-timer">● 00:00</span>
    </div>

    <!-- Zoom -->
    <div class="zoom-row" id="zoom-row">
      <div class="zoom-presets" id="zoom-presets">
        <button class="zoom-preset-btn" id="preset-05" onclick="setZoomPreset(0.5)">0.5×</button>
        <button class="zoom-preset-btn active" id="preset-1" onclick="setZoomPreset(1)">1×</button>
        <button class="zoom-preset-btn" id="preset-2" onclick="setZoomPreset(2)">2×</button>
        <button class="zoom-preset-btn" id="preset-5" onclick="setZoomPreset(5)">5×</button>
      </div>
      <div class="zoom-slider-row">
        <span style="color:rgba(255,255,255,.6);font-size:.85rem;">🔍</span>
        <input type="range" id="zoom-slider" min="0.5" max="5" step="0.1" value="1"
               oninput="handleZoom(this.value)">
        <span class="zoom-lbl" id="zoom-lbl">1.0×</span>
      </div>
    </div>

    <!-- Thumbnail strip -->
    <div class="thumb-strip-outer" id="thumb-strip-outer">
      <div class="thumb-strip" id="thumb-strip">
        <span class="thumb-empty-msg" id="thumb-empty-msg">Photos you take appear here</span>
      </div>
    </div>

    <!-- Property indicator -->
    <div id="prop-indicator" onclick="openSheet()" style="
      display:flex;align-items:center;gap:6px;padding:4px 8px 6px;
      cursor:pointer;
    ">
      <span style="font-size:.72rem;color:rgba(255,255,255,.45);">📍</span>
      <span id="prop-indicator-name" style="
        font-size:.75rem;font-weight:600;color:rgba(255,255,255,.55);
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;
      ">Tap ⚙️ to select a property</span>
    </div>

    <!-- Shutter row -->
    <div class="shutter-row">
      <button class="cam-btn" style="width:50px;height:50px;" onclick="openSheet()">⚙️</button>
      <button class="shutter-btn" id="shutter-btn" onclick="shutterPress()">
        <span class="shutter-badge" id="shutter-badge">0</span>
      </button>
      <button class="upload-all-btn empty" id="upload-all-btn" onclick="uploadAll()">
        Upload<br><span id="upload-count">0</span> photos
      </button>
    </div>

    <!-- Progress -->
    <div class="upload-progress" id="upload-progress">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="prog-lbl" id="prog-lbl">Uploading…</div>
      <div style="text-align:center;margin-top:6px;" id="prog-view-link"></div>
    </div>

  </div>
</div>

<!-- Sheet overlay + drawer -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="sheet" id="settings-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">⚙️ Property &amp; Notes</div>

  <div class="form-group">
    <label class="form-label">Assign photos to property</label>
    <div id="sheet-props-list">
      <p style="color:rgba(255,255,255,.4);font-size:.85rem;">Loading…</p>
    </div>
    <a href="/add-property.html"
       style="color:#61B746;font-size:.8rem;display:block;margin-top:8px;">
      + Add new property
    </a>
  </div>

  <div class="form-group" id="folder-group" style="display:none;">
    <label class="form-label">Save to folder (optional)</label>
    <div id="sheet-folder-list">
      <p style="color:rgba(255,255,255,.4);font-size:.82rem;">No folders for this property.</p>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Notes (applied to all photos in this batch)</label>
    <textarea class="form-textarea" id="photo-notes" rows="2"
              placeholder="e.g. Kitchen demo complete…"></textarea>
  </div>

  <button class="btn btn-primary btn-full" onclick="closeSheet()">Done ✓</button>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script src="annotator.js"></script>
<script>
  const params      = new URLSearchParams(location.search);
  const PRESET_PROP = params.get('property_id');

  let stream = null, facingMode = 'environment';
  let torchOn = false, torchSupported = false;
  let currentZoom = 1, zoomMin = 1, zoomMax = 5, hardwareZoom = false;
  let queue = [];
  let selectedPropId = PRESET_PROP || null;
  let selectedFolderId = null;
  let allProps = [];
  let allFolders = [];
  let userLat = null, userLng = null;
  let currentMode = 'camera';

  // Video recording state
  let mediaRecorder = null, recordedChunks = [], isRecording = false;
  let recTimerInterval = null, recSeconds = 0;

  // ── Init ──────────────────────────────────────────────────────
  async function init() {
    const user = await requireAuth(); if (!user) return;
    loadAllProperties();
    startGPS();
    startCamera();
  }

  async function startGPS() {
    try {
      const pos = await getCurrentPosition();
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      if (!selectedPropId) {
        const nearby = await findNearbyProperties(userLat, userLng, 500);
        if (nearby.length > 0) selectProp(nearby[0].id);
      }
    } catch (_) {}
  }

  // ── Camera ────────────────────────────────────────────────────
  async function startCamera() {
    stopCamera();
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 3840 }, height: { ideal: 2160 } },
        audio: false
      });
      const video = document.getElementById('video-el');
      video.srcObject = stream;

      const track = stream.getVideoTracks()[0];
      const caps  = track.getCapabilities?.() || {};

      // Hardware zoom
      if (caps.zoom) {
        hardwareZoom = true;
        zoomMin = caps.zoom.min || 1;
        zoomMax = caps.zoom.max || 5;
        const slider = document.getElementById('zoom-slider');
        slider.min = zoomMin;
        slider.max = zoomMax;
        // Show/hide 0.5x preset based on ultra-wide support
        document.getElementById('preset-05').style.display = zoomMin <= 0.5 ? '' : 'none';
        // Hide 5x preset if max zoom is lower
        document.getElementById('preset-5').style.display = zoomMax >= 4 ? '' : 'none';
      } else {
        hardwareZoom = false;
        zoomMin = 1;
        zoomMax = 3;
        const slider = document.getElementById('zoom-slider');
        slider.min = 1;
        slider.max = zoomMax;
        document.getElementById('preset-05').style.display = 'none';
        document.getElementById('preset-5').style.display = 'none';
      }

      // Torch
      torchSupported = !!caps.torch;
      document.getElementById('torch-btn').style.opacity = torchSupported ? '1' : '0.4';

    } catch (err) {
      showToast('Camera access denied — use Library mode', 'error');
      setMode('upload');
    }
  }

  function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    torchOn = false;
    document.getElementById('torch-btn')?.classList.remove('torch-on');
  }

  async function flipCamera() {
    torchOn = false;
    document.getElementById('torch-btn').classList.remove('torch-on');
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    await startCamera();
  }

  // ── Torch ─────────────────────────────────────────────────────
  async function toggleTorch() {
    if (!torchSupported) {
      const tip = document.getElementById('torch-tip');
      tip.style.display = 'block';
      setTimeout(() => tip.style.display = 'none', 2200);
      return;
    }
    torchOn = !torchOn;
    try {
      await stream.getVideoTracks()[0]
        .applyConstraints({ advanced: [{ torch: torchOn }] });
      document.getElementById('torch-btn').classList.toggle('torch-on', torchOn);
    } catch (_) {
      torchOn = false;
      showToast('Could not toggle flash', 'error');
    }
  }

  // ── Zoom ──────────────────────────────────────────────────────
  async function handleZoom(val) {
    currentZoom = parseFloat(val);
    document.getElementById('zoom-slider').value = currentZoom;
    document.getElementById('zoom-lbl').textContent = currentZoom.toFixed(1) + '×';
    updateZoomPresetHighlight();

    if (hardwareZoom && stream) {
      try {
        const clampedZoom = Math.max(zoomMin, Math.min(zoomMax, currentZoom));
        await stream.getVideoTracks()[0]
          .applyConstraints({ advanced: [{ zoom: clampedZoom }] });
        document.getElementById('video-el').style.transform = '';
        return;
      } catch (_) {}
    }
    // CSS fallback — only scale up (can't do true ultra-wide without hardware)
    if (currentZoom > 1) {
      document.getElementById('video-el').style.transform = `scale(${currentZoom})`;
      document.getElementById('video-el').style.transformOrigin = 'center center';
    } else {
      document.getElementById('video-el').style.transform = '';
    }
  }

  function setZoomPreset(level) {
    handleZoom(level);
  }

  function updateZoomPresetHighlight() {
    const presets = { 'preset-05': 0.5, 'preset-1': 1, 'preset-2': 2, 'preset-5': 5 };
    Object.entries(presets).forEach(([id, val]) => {
      const btn = document.getElementById(id);
      if (btn) btn.classList.toggle('active', Math.abs(currentZoom - val) < 0.15);
    });
  }

  // ── Capture ───────────────────────────────────────────────────
  function capturePhoto() {
    if (currentMode !== 'camera') return;
    const video = document.getElementById('video-el');
    if (!video.srcObject) { showToast('Camera not ready', 'error'); return; }

    // White flash effect
    const flash = document.createElement('div');
    flash.style.cssText = 'position:fixed;inset:0;background:#fff;opacity:.5;z-index:999;pointer-events:none;transition:opacity .12s';
    document.body.appendChild(flash);
    setTimeout(() => { flash.style.opacity = '0'; setTimeout(() => flash.remove(), 120); }, 30);

    const canvas = document.createElement('canvas');
    canvas.width  = video.videoWidth  || 1920;
    canvas.height = video.videoHeight || 1080;
    canvas.getContext('2d').drawImage(video, 0, 0);

    canvas.toBlob(blob => {
      const file = new File([blob], `photo_${Date.now()}.jpg`, { type: 'image/jpeg' });
      const url  = URL.createObjectURL(blob);
      queue.push({ file, url });
      renderThumbs();
    }, 'image/jpeg', 0.88);
  }

  // ── Library select ────────────────────────────────────────────
  function handleFileSelect(input) {
    Array.from(input.files).forEach(file => {
      queue.push({ file, url: URL.createObjectURL(file) });
    });
    input.value = '';
    renderThumbs();
  }

  // ── Thumbnail strip ───────────────────────────────────────────
  function renderThumbs() {
    const strip   = document.getElementById('thumb-strip');
    const outer   = document.getElementById('thumb-strip-outer');
    const btn     = document.getElementById('upload-all-btn');
    const shutter = document.getElementById('shutter-btn');
    const badge   = document.getElementById('shutter-badge');
    const count   = document.getElementById('upload-count');
    const emptyMsg = document.getElementById('thumb-empty-msg');

    if (queue.length === 0) {
      strip.innerHTML = '';
      emptyMsg.style.display = 'inline';
      strip.appendChild(emptyMsg);
      btn.classList.add('empty');
      shutter.classList.remove('has-photos');
      count.textContent = '0';
      badge.textContent = '0';
      return;
    }

    // Build thumbs as HTML string — all inline, no DOM re-parenting
    strip.innerHTML = queue.map((item, i) => `
      <div class="thumb-wrap">
        ${item.isVideo
          ? `<div class="thumb-video-icon">▶<span>Video</span></div>`
          : `<img src="${item.url}" alt="">`
        }
        ${!item.isVideo ? `<button class="thumb-edit" onclick="editThumb(${i},event)">✏️</button>` : ''}
        <button class="thumb-remove" onclick="removeFromQueue(${i})">✕</button>
      </div>`).join('');

    // Update counters
    btn.classList.remove('empty');
    shutter.classList.add('has-photos');
    badge.textContent  = queue.length;
    count.textContent  = queue.length;

    // Scroll to the newest photo (right end)
    requestAnimationFrame(() => { outer.scrollLeft = outer.scrollWidth; });
  }

  function removeFromQueue(idx) {
    URL.revokeObjectURL(queue[idx].url);
    queue.splice(idx, 1);
    renderThumbs();
  }

  function editThumb(idx, event) {
    event.stopPropagation();
    const item = queue[idx];
    openAnnotator(item.file, blob => {
      URL.revokeObjectURL(item.url);
      const newFile = new File([blob], item.file.name, { type: 'image/jpeg' });
      queue[idx] = { file: newFile, url: URL.createObjectURL(blob), isVideo: false };
      renderThumbs();
    }, null);
  }

  // ── Upload all ────────────────────────────────────────────────
  async function uploadAll() {
    if (queue.length === 0) { showToast('Take some photos first!', 'error'); return; }
    if (!selectedPropId)    { openSheet(); showToast('Select a property first', 'error'); return; }

    const btn      = document.getElementById('upload-all-btn');
    const prog     = document.getElementById('upload-progress');
    const fill     = document.getElementById('prog-fill');
    const lbl      = document.getElementById('prog-lbl');
    const viewLink = document.getElementById('prog-view-link');
    const notes    = document.getElementById('photo-notes').value;

    btn.disabled = true;
    prog.style.display = 'block';
    viewLink.innerHTML = '';

    const total = queue.length;
    let done = 0, failed = 0;

    for (let i = 0; i < queue.length; i++) {
      lbl.textContent      = `Uploading ${i + 1} of ${total}…`;
      fill.style.width     = `${(i / total) * 100}%`;
      try {
        await uploadPhoto({ file: queue[i].file, propertyId: selectedPropId,
                            lat: userLat, lng: userLng, notes,
                            folderId: selectedFolderId });
        done++;
      } catch (e) { failed++; console.error(e); }
    }

    fill.style.width = '100%';
    const uploadedPropId = selectedPropId; // capture before any reset
    lbl.textContent  = failed === 0
      ? `✅ All ${done} photos uploaded!`
      : `⚠️ ${done} uploaded, ${failed} failed`;

    if (done > 0) {
      // Offer a tap-to-go link instead of auto-navigating — this prevents
      // losing a new batch the user may have already started queuing.
      viewLink.innerHTML = `<a href="/property.html?id=${uploadedPropId}"
        style="color:#61B746;font-size:.78rem;font-weight:600;text-decoration:none;">
        View photos →</a>`;
    }

    queue.forEach(item => URL.revokeObjectURL(item.url));
    queue = [];
    renderThumbs();

    setTimeout(() => {
      // Hide progress bar only if nothing new is queued; otherwise leave it
      // visible so user knows what already uploaded.
      if (queue.length === 0) {
        prog.style.display = 'none';
        fill.style.width   = '0%';
        viewLink.innerHTML = '';
      }
      btn.disabled = false;
    }, 3000);
  }

  // ── Shutter dispatcher ────────────────────────────────────────
  function shutterPress() {
    if (currentMode === 'video') toggleRecording();
    else capturePhoto();
  }

  // ── Video recording ───────────────────────────────────────────
  function toggleRecording() {
    if (isRecording) stopRecording();
    else startRecording();
  }

  function startRecording() {
    if (!stream) { showToast('Camera not ready', 'error'); return; }
    recordedChunks = [];
    const mimeType = ['video/mp4', 'video/webm;codecs=vp9', 'video/webm']
      .find(t => { try { return MediaRecorder.isTypeSupported(t); } catch(e) { return false; } }) || '';
    try {
      mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
    } catch (e) {
      showToast('Video not supported on this browser', 'error');
      return;
    }
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const type = mimeType || 'video/webm';
      const ext  = type.includes('mp4') ? 'mp4' : 'webm';
      const blob = new Blob(recordedChunks, { type });
      const file = new File([blob], `video_${Date.now()}.${ext}`, { type });
      queue.push({ file, url: URL.createObjectURL(blob), isVideo: true });
      renderThumbs();
    };
    mediaRecorder.start();
    isRecording = true;
    recSeconds  = 0;
    document.getElementById('shutter-btn').classList.replace('video-idle', 'video-rec');
    document.getElementById('zoom-row').style.display     = 'none';
    document.getElementById('rec-timer-row').style.display = 'flex';
    recTimerInterval = setInterval(() => {
      recSeconds++;
      const m = String(Math.floor(recSeconds / 60)).padStart(2, '0');
      const s = String(recSeconds % 60).padStart(2, '0');
      document.getElementById('rec-timer').textContent = `● ${m}:${s}`;
      if (recSeconds >= 120) stopRecording();
    }, 1000);
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    clearInterval(recTimerInterval);
    isRecording = false;
    const btn = document.getElementById('shutter-btn');
    btn.classList.remove('video-rec');
    btn.classList.add('video-idle');
    document.getElementById('rec-timer-row').style.display = 'none';
  }

  // ── Mode ──────────────────────────────────────────────────────
  function setMode(mode) {
    if (isRecording) stopRecording();
    currentMode = mode;
    const video   = document.getElementById('video-el');
    const upWrap  = document.getElementById('upload-mode-wrap');
    const zoomRow = document.getElementById('zoom-row');
    const recRow  = document.getElementById('rec-timer-row');
    const shutter = document.getElementById('shutter-btn');
    ['mode-cam','mode-video','mode-up'].forEach(id =>
      document.getElementById(id)?.classList.remove('active'));

    if (mode === 'camera') {
      document.getElementById('mode-cam').classList.add('active');
      upWrap.classList.remove('active');
      video.style.display   = 'block';
      zoomRow.style.display = '';
      recRow.style.display  = 'none';
      shutter.classList.remove('video-idle', 'video-rec');
      startCamera();
    } else if (mode === 'video') {
      document.getElementById('mode-video').classList.add('active');
      upWrap.classList.remove('active');
      video.style.display   = 'block';
      zoomRow.style.display = 'none';
      recRow.style.display  = 'none';
      shutter.classList.remove('video-rec');
      shutter.classList.add('video-idle');
      startCamera();
    } else {
      document.getElementById('mode-up').classList.add('active');
      stopCamera();
      video.style.display   = 'none';
      upWrap.classList.add('active');
      zoomRow.style.display = 'none';
      recRow.style.display  = 'none';
      shutter.classList.remove('video-idle', 'video-rec');
    }
  }

  // ── Property sheet ────────────────────────────────────────────
  async function loadAllProperties() {
    allProps = await getProperties();
    renderSheetProps();
    // If a property was pre-selected (URL param or GPS will set it), show its name
    if (selectedPropId) {
      const prop = allProps.find(p => p.id === selectedPropId);
      const indEl = document.getElementById('prop-indicator-name');
      if (indEl && prop) indEl.textContent = prop.name || prop.address || 'Selected property';
    }
  }

  function renderSheetProps() {
    const el = document.getElementById('sheet-props-list');
    if (!allProps.length) {
      el.innerHTML = `<p style="color:rgba(255,255,255,.4);font-size:.82rem;">No properties yet.</p>`;
      return;
    }
    el.innerHTML = allProps.map(p => `
      <div class="prop-opt-dark ${p.id === selectedPropId ? 'selected' : ''}"
           id="sheet-prop-${p.id}" onclick="selectProp('${p.id}')">
        <div class="opt-name">${escHtml(p.name)}</div>
        <div class="opt-dist">${escHtml(p.address || '')}</div>
      </div>`).join('');
  }

  async function selectProp(id) {
    selectedPropId = id;
    selectedFolderId = null;
    document.querySelectorAll('.prop-opt-dark').forEach(el => el.classList.remove('selected'));
    document.getElementById(`sheet-prop-${id}`)?.classList.add('selected');
    // Update the property indicator strip
    const prop = allProps.find(p => p.id === id);
    const indEl = document.getElementById('prop-indicator-name');
    if (indEl && prop) indEl.textContent = prop.name || prop.address || 'Selected property';
    await loadFoldersForProp(id);
  }

  async function loadFoldersForProp(propId) {
    const group  = document.getElementById('folder-group');
    const listEl = document.getElementById('sheet-folder-list');
    try {
      allFolders = await getFolders(propId);
    } catch (_) { allFolders = []; }

    if (!allFolders.length) {
      group.style.display = 'none';
      return;
    }

    group.style.display = '';
    renderSheetFolders();
  }

  function renderSheetFolders() {
    const listEl = document.getElementById('sheet-folder-list');
    if (!allFolders.length) {
      listEl.innerHTML = `<p style="color:rgba(255,255,255,.4);font-size:.82rem;">No folders for this property.</p>`;
      return;
    }

    // "None" option + folders
    const noneSelected = selectedFolderId === null;
    listEl.innerHTML = [`
      <div class="prop-opt-dark ${noneSelected ? 'selected' : ''}"
           id="sheet-folder-none" onclick="selectFolder(null)">
        <div class="opt-name" style="color:rgba(255,255,255,.55);">— No folder —</div>
      </div>`
    ].concat(allFolders.map(f => `
      <div class="prop-opt-dark ${selectedFolderId === f.id ? 'selected' : ''}"
           id="sheet-folder-${f.id}" onclick="selectFolder('${f.id}')">
        <div class="opt-name">📁 ${escHtml(f.name)}</div>
        <div class="opt-dist">${f.photo_count || 0} photo${f.photo_count !== 1 ? 's' : ''}</div>
      </div>`)).join('');
  }

  function selectFolder(id) {
    selectedFolderId = id;
    document.querySelectorAll('#sheet-folder-list .prop-opt-dark').forEach(el => el.classList.remove('selected'));
    const targetId = id ? `sheet-folder-${id}` : 'sheet-folder-none';
    document.getElementById(targetId)?.classList.add('selected');
  }

  function openSheet() {
    renderSheetProps();
    if (selectedPropId) loadFoldersForProp(selectedPropId);
    document.getElementById('settings-sheet').classList.add('open');
    document.getElementById('sheet-overlay').classList.add('open');
  }
  function closeSheet() {
    document.getElementById('settings-sheet').classList.remove('open');
    document.getElementById('sheet-overlay').classList.remove('open');
  }

  window.addEventListener('beforeunload', stopCamera);
  init();
</script>
</body>
</html>
