<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Template Editor</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="/inkd-template-editor.css">
  <script>document.documentElement.classList.add('page-loading');try{var _c=document.documentElement.classList;if(localStorage.sidebar_collapsed==='1')_c.add('sidebar-collapsed');var _t=localStorage.getItem('propspot_theme');_c.add('theme-premium');if(_t==='dark')_c.add('theme-dark');}catch(e){}</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
  <style>
    body.os-newlayout main.page.page-inkd-fullscreen { padding: 0 !important; max-width: none !important; height: calc(100vh - 56px); display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 56px 1fr; }
  </style>
</head>
<body class="os-newlayout">
<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<main class="page page-inkd-fullscreen">
  <header class="inkd-editor-header">
    <a class="back" href="/inkd.html">← Ink'd</a>
    <input type="text" id="tpl-name" placeholder="Template name (e.g., Purchase Agreement — FL)">
    <select id="tpl-category">
      <option value="">No category</option>
      <option value="purchase-agreement">Purchase Agreement</option>
      <option value="disclosure">Disclosure</option>
      <option value="addendum">Addendum</option>
      <option value="listing-agreement">Listing Agreement</option>
      <option value="other">Other</option>
    </select>
    <button id="btn-save">Save</button>
  </header>

  <aside class="inkd-editor-toolbox">
    <h3>Fields</h3>
    <p>Click a field type, then click-and-drag on the PDF to place it.</p>
    <button class="field-btn" data-type="text">Text</button>
    <button class="field-btn" data-type="signature">Signature</button>
    <button class="field-btn" data-type="initial">Initial</button>
    <button class="field-btn" data-type="date">Date</button>
    <button class="field-btn" data-type="checkbox">Checkbox</button>

    <h3>Selected field</h3>
    <div id="selected-empty" class="muted">Click a field on the PDF to edit it.</div>
    <div id="selected-form" hidden>
      <label>Label <input type="text" id="f-label"></label>
      <label>Recipient role
        <select id="f-role">
          <option value="">(no recipient)</option>
          <option value="buyer">Buyer</option>
          <option value="seller">Seller</option>
          <option value="agent">Agent</option>
          <option value="witness">Witness</option>
        </select>
      </label>
      <label>Autofill source
        <select id="f-autofill"></select>
      </label>
      <label><input type="checkbox" id="f-required" checked> Required</label>
      <button id="btn-delete-field">Delete field</button>
    </div>
  </aside>

  <div id="pdf-stage">
    <div id="upload-prompt">
      <input type="file" id="pdf-upload" accept="application/pdf">
      <p>Upload a PDF to start.</p>
    </div>
  </div>
</main>

<script>window.NAV_CURRENT = 'inkd';</script>
<script src="config.js"></script>
<script src="app.js"></script>
<script src="/inkd-template-editor.js" type="module"></script>
</body>
</html>
