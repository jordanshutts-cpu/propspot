<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Company Settings</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <script>document.documentElement.classList.add('page-loading');try{var _c=document.documentElement.classList;if(localStorage.sidebar_collapsed==='1')_c.add('sidebar-collapsed');var _t=localStorage.getItem('propspot_theme');_c.add('theme-premium');if(_t==='dark')_c.add('theme-dark');}catch(e){}</script>
  <style>
    .cs-page { max-width: 720px; }
    .cs-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
    .cs-row  { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
    .cs-logo {
      width: 96px; height: 96px; border-radius: 14px;
      background: var(--bg); border: 2px dashed var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; color: var(--text-muted); overflow: hidden; cursor: pointer;
      flex-shrink: 0;
    }
    .cs-logo:hover { border-color: var(--brand); }
    .cs-logo-hint { font-size: .72rem; color: var(--text-muted); margin-top: 6px; text-align: center; }
    .cs-form { flex: 1; min-width: 240px; }
    .cs-save-row { display: flex; gap: 8px; }
    .cs-not-owner {
      padding: 24px; text-align: center; color: var(--text-muted);
      border: 1px dashed var(--border); border-radius: var(--radius);
    }
    .cs-section-title { font-weight: 600; margin: 24px 0 10px; font-size: .95rem; }
    .cs-section-sub   { color: var(--text-muted); font-size: .8rem; margin-bottom: 10px; }
    .mh-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-top: 1px solid var(--border);
      font-size: .85rem;
    }
    .mh-row:first-child { border-top: none; }
    .mh-email { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mh-meta  { color: var(--text-muted); font-size: .75rem; }
    .mh-badge {
      padding: 2px 8px; border-radius: 999px; font-size: .7rem; font-weight: 600;
      white-space: nowrap;
    }
    .mh-badge.ok    { background: #dcfce7; color: #166534; }
    .mh-badge.bad   { background: #fee2e2; color: #991b1b; }
    .mh-summary {
      padding: 12px; border-radius: 8px; margin-bottom: 12px;
      background: var(--bg); border: 1px solid var(--border); font-size: .85rem;
    }
    .mh-summary.warn { background: #fef3c7; border-color: #fcd34d; color: #78350f; }
  </style>
</head>
<body class="os-newlayout">

<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<main class="page cs-page">
  <div class="section-header" style="margin-bottom:14px;">
    <span class="section-title">Company Settings</span>
  </div>

  <div id="cs-content">
    <p class="text-muted text-sm">Loading…</p>
  </div>
</main>

<script>window.NAV_CURRENT = 'company-settings';</script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
  async function init() {
    const me = await requireAuth(); if (!me) return;
    const wrap = document.getElementById('cs-content');
    if (!me.is_owner) {
      wrap.innerHTML = `
        <div class="cs-not-owner">
          Only an owner can edit company settings. Ask an owner if you need to change the name or logo.
        </div>`;
      return;
    }
    try {
      const org = await apiFetch('/api/org');
      wrap.innerHTML = renderForm(org) + renderMailboxHealth();
      wire();
      wireMailboxHealth();
    } catch (err) {
      wrap.innerHTML = `<p class="text-muted text-sm">Error: ${escHtml(err.message)}</p>`;
    }
  }

  function renderMailboxHealth() {
    return `
      <div class="cs-section-title">Mailbox health</div>
      <div class="cs-section-sub">
        Probes every connected Gmail mailbox to confirm its stored token can still
        be decrypted. Mailboxes that fail must be reconnected.
      </div>
      <div class="cs-card">
        <button class="btn btn-secondary" id="mh-check">Check now</button>
        <div id="mh-results" style="margin-top:14px;"></div>
      </div>`;
  }

  function wireMailboxHealth() {
    document.getElementById('mh-check').addEventListener('click', runHealthCheck);
  }

  async function runHealthCheck() {
    const btn = document.getElementById('mh-check');
    const out = document.getElementById('mh-results');
    btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Checking…';
    out.innerHTML = '<p class="text-muted text-sm">Probing tokens…</p>';
    try {
      const data = await apiFetch('/api/inbox/mailboxes/health');
      out.innerHTML = renderHealthResults(data);
    } catch (err) {
      out.innerHTML = `<p class="text-muted text-sm">Error: ${escHtml(err.message)}</p>`;
    } finally {
      btn.disabled = false; btn.textContent = orig;
    }
  }

  function renderProcessDiagnostics(p) {
    if (!p) return '';
    const fpBadge = p.key_fingerprint
      ? `<code style="background:var(--bg);padding:2px 6px;border-radius:4px;">${escHtml(p.key_fingerprint)}</code>`
      : '<span style="color:#991b1b;">missing</span>';
    const rtBadge = p.roundtrip_ok
      ? '<span class="mh-badge ok">OK</span>'
      : '<span class="mh-badge bad">FAIL</span>';
    const keyLen = p.key_byte_length === 32
      ? '32 bytes'
      : `<span style="color:#991b1b;">${p.key_byte_length} bytes (should be 32)</span>`;
    const wsWarn = p.key_has_whitespace
      ? '<div style="color:#991b1b;font-size:.78rem;margin-top:6px;">⚠ Key value has leading/trailing whitespace in the env var — strip it in Railway.</div>'
      : '';
    const rtErr = p.roundtrip_error
      ? `<div style="color:#991b1b;font-size:.78rem;margin-top:6px;">Round-trip error: ${escHtml(p.roundtrip_error)}</div>`
      : '';
    return `
      <div class="cs-card" style="padding:12px 14px;margin-bottom:12px;font-size:.82rem;">
        <div style="font-weight:600;margin-bottom:6px;">Process diagnostics</div>
        <div>Key fingerprint: ${fpBadge} · Key length: ${keyLen}</div>
        <div style="margin-top:4px;">Encrypt+decrypt round-trip in this process: ${rtBadge}</div>
        <div class="text-muted" style="font-size:.76rem;margin-top:6px;">
          PID ${p.pid} · started ${new Date(p.started_at).toLocaleString()} · uptime ${formatUptime(p.uptime_seconds)}
        </div>
        ${wsWarn}${rtErr}
        <div class="text-muted" style="font-size:.74rem;margin-top:8px;">
          Hit "Check now" multiple times — if the PID or fingerprint changes between calls, you're
          load-balanced across replicas with different keys (the root cause of decrypt errors).
        </div>
      </div>`;
  }

  function formatUptime(secs) {
    if (secs < 60) return `${secs}s`;
    if (secs < 3600) return `${Math.round(secs/60)}m`;
    if (secs < 86400) return `${Math.round(secs/3600)}h`;
    return `${Math.round(secs/86400)}d`;
  }

  function renderHealthResults(data) {
    const procBlock = renderProcessDiagnostics(data.process);
    if (!data.total) {
      return procBlock + '<p class="text-muted text-sm">No mailboxes connected.</p>';
    }
    const summary = data.broken
      ? `<div class="mh-summary warn">
           <strong>${data.broken} of ${data.total} mailbox${data.total === 1 ? '' : 'es'} can't be decrypted.</strong>
           ${data.process && data.process.roundtrip_ok === false
             ? 'The encryption key itself is broken in this process — see diagnostics above.'
             : data.process && data.process.roundtrip_ok && data.broken > 0
               ? 'This process can encrypt+decrypt fine, so the stored tokens were written by a different process or different key. Most likely: another Railway service / replica is sharing this database with its own INBOX_TOKEN_KEY. Find and stop it, or align its key, then reconnect.'
               : 'Reconnect each affected mailbox to mint a fresh token.'}
         </div>`
      : `<div class="mh-summary">
           All ${data.total} mailbox${data.total === 1 ? '' : 'es'} healthy.
         </div>`;
    const rows = data.mailboxes.map(m => {
      const badge = m.token_ok
        ? '<span class="mh-badge ok">OK</span>'
        : '<span class="mh-badge bad">Broken</span>';
      const sub = m.token_ok
        ? `connected by ${escHtml(m.connected_by_name || m.connected_by_email || 'unknown')}`
        : escHtml(m.probe_error || 'decrypt failed');
      return `
        <div class="mh-row">
          <div class="mh-email">
            <div>${escHtml(m.email)}</div>
            <div class="mh-meta">${sub}</div>
          </div>
          ${badge}
        </div>`;
    }).join('');
    return procBlock + summary + `<div class="cs-card" style="padding:0;margin-top:8px;">${rows}</div>`;
  }

  function renderForm(org) {
    const initial = (org.company_name || 'C')[0];
    const logoInner = org.company_logo_url
      ? `<img src="${escHtml(org.company_logo_url)}" style="width:100%;height:100%;object-fit:cover;">`
      : escHtml(initial);
    return `
      <div class="cs-card">
        <div class="cs-row">
          <div>
            <div class="cs-logo" id="cs-logo" onclick="document.getElementById('cs-logo-input').click()">${logoInner}</div>
            <input type="file" id="cs-logo-input" accept="image/*" style="display:none">
            <div class="cs-logo-hint">Click to upload logo</div>
          </div>
          <div class="cs-form">
            <div class="form-group">
              <label class="form-label">Company name</label>
              <div class="cs-save-row">
                <input class="form-input" id="cs-name" value="${escHtml(org.company_name || '')}" placeholder="Your company name" style="flex:1;">
                <button class="btn btn-primary" id="cs-save">Save</button>
              </div>
            </div>
          </div>
        </div>
      </div>`;
  }

  function wire() {
    document.getElementById('cs-save').addEventListener('click', async () => {
      const name = document.getElementById('cs-name').value.trim();
      if (!name) return;
      const btn = document.getElementById('cs-save');
      btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Saving…';
      try {
        await apiFetch('/api/org', { method: 'PATCH', body: JSON.stringify({ company_name: name }) });
        showToast('Company name saved');
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false; btn.textContent = orig;
      }
    });

    document.getElementById('cs-logo-input').addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const form = new FormData();
      form.append('logo', file);
      try {
        const org = await apiFetch('/api/org/logo', { method: 'POST', body: form });
        const logoEl = document.getElementById('cs-logo');
        logoEl.innerHTML = `<img src="${escHtml(org.company_logo_url)}" style="width:100%;height:100%;object-fit:cover;">`;
        showToast('Logo uploaded');
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        e.target.value = '';
      }
    });
  }

  init();
</script>
</body>
</html>
