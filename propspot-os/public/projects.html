<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Projects</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <script>document.documentElement.classList.add('page-loading');try{var _c=document.documentElement.classList;if(localStorage.sidebar_collapsed==='1')_c.add('sidebar-collapsed');var _t=localStorage.getItem('propspot_theme');_c.add('theme-premium');if(_t==='dark')_c.add('theme-dark');}catch(e){}</script>
</head>
<body class="os-newlayout">

<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<main class="page">
  <div id="page-hero"></div>

  <div class="search-box" style="margin-bottom: 10px;">
    <span class="search-icon">🔍</span>
    <input class="form-input" type="search" id="search-input" placeholder="Search by address, owner, county, TMS…" oninput="filterProps(this.value)">
  </div>

  <div class="os-section-head">
    <div class="os-section-title" id="props-count">All Projects</div>
    <div class="os-section-line"></div>
    <span id="view-toggle"></span>
    <button class="dt-reset-btn" id="reset-table-btn" onclick="resetTableLayout()" title="Reset column order, widths, and sort" style="display:none;">↺ Reset table</button>
  </div>

  <div id="view-root"><p class="text-muted text-sm">Loading…</p></div>
</main>

<script src="config.js"></script>
<script src="app.js"></script>
<script src="datatable.js"></script>
<script src="kanban.js"></script>
<script>
  window.PAGE_TITLE     = 'Projects';
  // Projects covers everything post-acquisition / pre-sold. Lanes are the
  // top-level property statuses in workflow order.
  window.PAGE_STATUSES  = ['renovating','listed_for_sale','listed_for_rent','under_contract_buyer'];
  window.NAV_CURRENT    = 'projects';
  window.PAGE_TABLE_KEY = 'properties:projects';
  window.PAGE_VIEW_KEY  = 'view:projects';

  // Fixed lane order — Renovating → Listed on MLS → Listed for Rent → UC w/ Buyer.
  // Do not reorder without Jordan's explicit ask.
  const LANES = [
    ['renovating',           'Renovating',      '#2563eb'],
    ['listed_for_sale',      'Listed on MLS',   '#9333ea'],
    ['listed_for_rent',      'Listed for Rent', '#0284c7'],
    ['under_contract_buyer', 'UC with Buyer',   '#db2777']
  ];

  let allProps   = [];
  let scopedProps = [];
  let viewMode   = getViewMode(window.PAGE_VIEW_KEY);

  async function init(){
    if (!await requireAuth()) return;
    renderViewToggle(document.getElementById('view-toggle'), {
      storageKey: window.PAGE_VIEW_KEY,
      onChange: (m) => { viewMode = m; renderCurrent(); }
    });
    try {
      const props = await getProperties();
      allProps = (Array.isArray(props) ? props : [])
        .filter(p => window.PAGE_STATUSES.includes(p.status));
      const q = new URLSearchParams(location.search).get('q');
      if (q) {
        document.getElementById('search-input').value = q;
        filterProps(q);
      } else {
        scopedProps = allProps;
        renderCurrent();
      }
    } catch (err) {
      document.getElementById('view-root').innerHTML =
        `<p class="text-muted text-sm">Error: ${escHtml(err.message)}</p>`;
    }
  }

  function fullSearchString(p){
    return [p.address_line1, p.unit, p.city, p.state, p.zip,
            p.display_name, p.owner, p.owner_name, p.county, p.tms,
            p.lender_name, p.seller_name].filter(Boolean).join(' ').toLowerCase();
  }

  function fmtDate(d) {
    if (!d) return '';
    return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  function fmtMoney(n) {
    if (n == null || n === '') return '';
    return '$' + Number(n).toLocaleString('en-US', { maximumFractionDigits: 0 });
  }

  function renderHero(){
    const list = scopedProps;
    const total = list.length;
    const totalReno = list.reduce((s, p) => s + (Number(p.reno_budget) || 0), 0);
    const totalSpent = list.reduce((s, p) => s + (Number(p.reno_spent) || 0), 0);
    const laneCounts = {};
    for (const [k] of LANES) laneCounts[k] = 0;
    for (const p of list) {
      if (p.status in laneCounts) laneCounts[p.status]++;
    }

    document.getElementById('page-hero').innerHTML = `
      <section class="os-hero">
        <div class="os-hero-eyebrow">Projects</div>
        <h1 class="os-hero-title">Project Pipeline</h1>
        <div class="os-hero-subtitle">${total === 1 ? '1 project' : total + ' projects'} in flight · ${LANES.map(([k,l]) => `${laneCounts[k] || 0} ${l}`).join(' · ')}</div>
        <div class="os-kpi-row">
          <div class="os-kpi">
            <div class="os-kpi-label">Projects</div>
            <div class="os-kpi-value">${total}</div>
            <div class="os-kpi-sub">in flight</div>
          </div>
          <div class="os-kpi">
            <div class="os-kpi-label">Reno Budget</div>
            <div class="os-kpi-value brand">${totalReno > 0 ? fmtMoney(totalReno) : '—'}</div>
            <div class="os-kpi-sub">${list.filter(p => Number(p.reno_budget) > 0).length} budgeted</div>
          </div>
          <div class="os-kpi">
            <div class="os-kpi-label">Reno Spent</div>
            <div class="os-kpi-value ${totalSpent > totalReno && totalReno > 0 ? 'warn' : ''}">${totalSpent > 0 ? fmtMoney(totalSpent) : '—'}</div>
            <div class="os-kpi-sub">${totalReno > 0 ? Math.round((totalSpent / totalReno) * 100) + '% of budget' : 'to date'}</div>
          </div>
          <div class="os-kpi">
            <div class="os-kpi-label">UC with Buyer</div>
            <div class="os-kpi-value brand">${laneCounts['under_contract_buyer'] || 0}</div>
            <div class="os-kpi-sub">closing soon</div>
          </div>
        </div>
      </section>
    `;
  }

  function renderCurrent(){
    renderHero();
    const total = scopedProps.length;
    document.getElementById('props-count').textContent =
      `All Projects · ${total === 1 ? '1 project' : total + ' projects'}`;
    document.getElementById('reset-table-btn').style.display = viewMode === 'table' ? '' : 'none';
    if (viewMode === 'kanban') renderBoard(scopedProps);
    else                       renderTable(scopedProps);
  }

  function renderBoard(list){
    const el = document.getElementById('view-root');
    renderKanban(el, list, {
      lanes: LANES,
      field: 'status',
      onCardMove: async (id, newLane) => {
        const prop = allProps.find(p => p.id === id);
        if (!prop) return;
        const prev = prop.status;
        prop.status = newLane;
        renderCurrent();
        try {
          await updateProperty(id, { status: newLane });
          const label = LANES.find(([k]) => k === newLane)?.[1] || newLane;
          showKbToast(`Moved to ${label}`);
        } catch (err) {
          prop.status = prev;
          renderCurrent();
          showKbToast(`Couldn't save: ${err.message}`, true);
        }
      }
    });
  }

  function renderTable(list){
    const el = document.getElementById('view-root');
    if (!list.length){
      el.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🛠️</div>
        <p>No properties in renovation.</p>
      </div>`;
      return;
    }
    renderDataTable(el, list, {
      storageKey: window.PAGE_TABLE_KEY,
      onRowClick: (row) => { location.href = '/property.html?id=' + row.id; },
      defaultSort: { key: 'updated_at', dir: 'desc' },
      columns: [
        { key: 'address_line1',          label: 'Address', width: 240,
          render: r => `<strong>${escHtml(r.address_line1 || '')}${r.unit ? ' #' + escHtml(r.unit) : ''}</strong>` },
        { key: 'city',                   label: 'City',                  width: 130, render: r => escHtml(r.city || '') },
        { key: 'state',                  label: 'State',                 width: 70,  render: r => escHtml(r.state || '') },
        { key: 'zip',                    label: 'ZIP',                   width: 80,  render: r => escHtml(r.zip || '') },
        { key: 'county',                 label: 'County',                width: 120, render: r => escHtml(r.county || '') },
        { key: 'status',                 label: 'Stage',                 width: 140, render: r => propertyStatusBadge(r.status), sortValue: r => r.status },
        { key: 'reno_budget',            label: 'Reno Budget',           width: 110, render: r => fmtMoney(r.reno_budget), sortValue: r => Number(r.reno_budget) || 0 },
        { key: 'reno_spent',             label: 'Reno Spent',            width: 110, render: r => fmtMoney(r.reno_spent),  sortValue: r => Number(r.reno_spent)  || 0 },
        { key: 'purchase_date',          label: 'Purchased',             width: 110, render: r => fmtDate(r.purchase_date), sortValue: r => r.purchase_date },
        { key: 'purchase_price',         label: 'Purchase $',            width: 110, render: r => fmtMoney(r.purchase_price), sortValue: r => r.purchase_price },
        { key: 'lender_name',            label: 'Lender',                width: 130, render: r => escHtml(r.lender_name || '') },
        { key: 'updated_at',             label: 'Updated',               width: 110, render: r => fmtDate(r.updated_at), sortValue: r => r.updated_at }
      ]
    });
  }

  function filterProps(q){
    q = (q || '').toLowerCase();
    scopedProps = q ? allProps.filter(p => fullSearchString(p).includes(q)) : allProps;
    renderCurrent();
  }

  function resetTableLayout(){
    if (!confirm('Reset column order, widths, and sort to defaults?')) return;
    resetDataTablePrefs(window.PAGE_TABLE_KEY);
    renderCurrent();
  }

  init();
</script>
</body>
</html>
