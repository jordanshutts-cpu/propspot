<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Choose a new password</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <style>body{padding-bottom:0;background:linear-gradient(160deg,#edf7e9 0%,#ffffff 100%)}</style>
</head>
<body>
<div class="login-wrap">
  <img src="logo.png" class="login-logo-img" alt="PropSpot">
  <div class="login-logo">Prop Spot</div>
  <p class="login-tagline">Choose a new password</p>
  <div class="login-card">
    <form id="reset-form" onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label class="form-label">New password</label>
        <input class="form-input" type="password" id="password" placeholder="Min. 6 characters" required autocomplete="new-password" minlength="6">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm new password</label>
        <input class="form-input" type="password" id="confirm" placeholder="Type it again" required autocomplete="new-password" minlength="6">
      </div>
      <p id="error" class="text-sm mb-8" style="color:var(--danger);display:none;"></p>
      <button class="btn btn-primary btn-full" type="submit" id="submit-btn">Reset password</button>
      <p class="text-sm text-center mt-12">
        <a href="/index.html" style="color:var(--brand);text-decoration:none;font-weight:500;">Back to sign in</a>
      </p>
    </form>
  </div>
  <p class="text-muted text-sm mt-16">Prop Spot</p>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
  const token = new URLSearchParams(location.search).get('token');
  if (!token) {
    document.getElementById('reset-form').innerHTML =
      '<p class="text-sm" style="color:var(--danger);">Missing or invalid reset link. <a href="/forgot-password.html">Request a new one</a>.</p>';
  }

  async function handleSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('error');
    errEl.style.display = 'none';

    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    if (password !== confirm) {
      errEl.textContent = "Passwords don't match.";
      errEl.style.display = 'block';
      return;
    }

    showSpinner(btn, 'Saving…');
    try {
      const { token: jwt, user } = await apiFetch('/api/auth/reset-password', {
        method: 'POST',
        body: JSON.stringify({ token, password })
      });
      setToken(jwt);
      setCachedUser(user);
      window.location.href = '/dashboard.html';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      hideSpinner(btn);
    }
  }
</script>
</body>
</html>
