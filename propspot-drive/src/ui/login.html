<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PropSpot Drive</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      -webkit-app-region: drag;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      -webkit-app-region: no-drag;
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1d1d1f;
    }
    .logo p {
      font-size: 13px;
      color: #86868b;
      margin-top: 4px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #6e6e73;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #0071e3; }
    button {
      width: 100%;
      padding: 12px;
      background: #0071e3;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    button:hover { background: #0077ED; }
    button:disabled { background: #d2d2d7; cursor: not-allowed; }
    .error {
      color: #ff3b30;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    .error.visible { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <h1>PropSpot Drive</h1>
      <p>Sign in to sync your files</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label>Server URL</label>
        <input type="url" id="serverUrl" placeholder="https://your-propspot.example.com" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@company.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" id="loginBtn">Sign In</button>
      <p class="error" id="errorMsg"></p>
    </form>
  </div>
  <script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('loginBtn');
    const errorEl = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorEl.classList.remove('visible');

      const result = await window.propspot.login({
        serverUrl: document.getElementById('serverUrl').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      });

      if (!result.success) {
        errorEl.textContent = result.error;
        errorEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
