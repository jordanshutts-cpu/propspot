<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#61B746">
  <title>Prop Spot — Photos</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="style.css">
  <script>document.documentElement.classList.add('page-loading');try{var _c=document.documentElement.classList;if(localStorage.sidebar_collapsed==='1')_c.add('sidebar-collapsed');var _t=localStorage.getItem('propspot_theme');_c.add('theme-premium');if(_t==='dark')_c.add('theme-dark');}catch(e){}</script>
  <style>
    /* ── Hero card ─────────────────────────────────────────────── */
    .fc-hero {
      position: relative;
      background: var(--surface);
      border-radius: 14px;
      box-shadow: 0 1px 3px rgba(0,0,0,.05), 0 4px 16px rgba(0,0,0,.04);
      margin: 14px 20px 18px;
      overflow: hidden;
    }
    .fc-hero-cover {
      width: 100%; height: 160px;
      background: linear-gradient(135deg, rgba(97,183,70,0.12) 0%, rgba(59,130,246,0.08) 100%);
      background-size: cover; background-position: center;
      position: relative;
    }
    .fc-hero-cover::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.85) 100%);
    }
    .fc-hero-cover.has-photo { filter: saturate(0.92); }
    .fc-hero-body { padding: 14px 22px 20px; position: relative; }
    .fc-hero-back {
      position: absolute; top: -132px; left: 14px; z-index: 2;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(4px);
      border: 1px solid rgba(0,0,0,0.05);
      padding: 6px 12px; border-radius: 8px;
      font-size: .82rem; font-weight: 600; color: var(--text);
      cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.08);
      display: inline-flex; align-items: center; gap: 4px;
    }
    .fc-hero-back:hover { background: #fff; transform: translateY(-1px); transition: all .12s; }
    .fc-hero-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text); margin: 0 0 4px; }
    .fc-hero-addr  { font-size: .9rem; color: var(--text-muted); margin-bottom: 16px; }
    .fc-hero-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 14px;
      padding: 14px 16px;
      background: var(--bg);
      border-radius: 10px;
      margin-bottom: 4px;
    }
    .fc-stat { text-align: center; }
    .fc-stat-num   { font-size: 1.25rem; font-weight: 800; color: var(--text); letter-spacing: -0.02em; line-height: 1.1; }
    .fc-stat-label { font-size: .68rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 3px; }
    .fc-hero-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .fc-hero-actions .btn { padding: 7px 14px; font-size: .82rem; font-weight: 600; }

    /* ── Folder tabs ───────────────────────────────────────────── */
    .fc-tabs-wrap { overflow-x: auto; scrollbar-width: none; padding: 0 20px 12px; }
    .fc-tabs-wrap::-webkit-scrollbar { display: none; }
    .fc-tabs { display: flex; gap: 6px; flex-wrap: nowrap; width: max-content; }
    .fc-tab {
      flex-shrink: 0; padding: 6px 14px; border-radius: 100px;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--text-muted); font-size: .8rem; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: all .12s;
    }
    .fc-tab:hover { border-color: var(--brand); color: var(--brand); }
    .fc-tab.active { background: var(--brand); border-color: var(--brand); color: #fff; }
    .fc-tab .fc-tab-count {
      display: inline-block; margin-left: 4px;
      font-size: .68rem; opacity: .75;
    }

    /* ── Date sections ─────────────────────────────────────────── */
    .fc-content { padding: 0 20px 24px; }
    .fc-date-section { margin-bottom: 22px; }
    .fc-date-head {
      display: flex; align-items: baseline; gap: 10px;
      margin-bottom: 10px;
    }
    .fc-date-label {
      font-size: .72rem; font-weight: 800; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .08em;
    }
    .fc-date-count { font-size: .72rem; color: var(--text-muted); font-weight: 500; }

    /* ── Photo grid ────────────────────────────────────────────── */
    .fc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .fc-thumb {
      position: relative; aspect-ratio: 1; border-radius: 12px; overflow: hidden;
      cursor: pointer; background: var(--bg);
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
      transition: transform .15s, box-shadow .15s;
    }
    .fc-thumb:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,.12);
    }
    .fc-thumb img, .fc-thumb video {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform .25s;
    }
    .fc-thumb:hover img, .fc-thumb:hover video { transform: scale(1.04); }
    .fc-thumb-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 8px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,.78));
      color: #fff; font-size: .7rem; line-height: 1.3;
      opacity: 0; transition: opacity .15s;
    }
    .fc-thumb:hover .fc-thumb-overlay { opacity: 1; }
    .fc-thumb-uploader { font-weight: 600; margin-top: 1px; opacity: .85; }
    .fc-video-badge {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,.55); color: #fff;
      border-radius: 6px; font-size: .65rem; padding: 2px 7px; font-weight: 600;
      backdrop-filter: blur(4px);
    }

    /* ── Lightbox — split layout: photo left, panel right ───────── */
    .fc-lb { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.92); flex-direction: row; }
    .fc-lb.open { display: flex; }

    /* Left: photo area (stays dark for comfortable viewing) */
    .fc-lb-left {
      flex: 1; position: relative; min-width: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 16px 80px;
    }
    .fc-lb-close { position: absolute; top: 16px; left: 16px; background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.22); color: #fff; font-size: 1.25rem; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); transition: background .12s, transform .1s; z-index: 10; }
    .fc-lb-close:hover { background: rgba(255,255,255,.28); transform: scale(1.08); }
    .fc-lb-img   { max-width: 100%; max-height: 100%; border-radius: 10px; object-fit: contain; box-shadow: 0 24px 64px rgba(0,0,0,.6); min-height: 0; }
    .fc-lb-video { max-width: 100%; max-height: 100%; border-radius: 10px; }
    .fc-lb-meta  { display: flex; align-items: center; justify-content: center; gap: 10px; color: rgba(255,255,255,.6); font-size: .78rem; margin-top: 10px; text-align: center; flex-shrink: 0; }
    .fc-lb-counter { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2); color: #fff; font-size: .72rem; font-weight: 600; letter-spacing: .06em; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
    .fc-lb-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.22); color: #fff; width: 46px; height: 46px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); transition: background .12s, transform .14s; z-index: 10; }
    .fc-lb-nav:hover { background: rgba(255,255,255,.28); transform: translateY(-50%) scale(1.1); }
    .fc-lb-prev { left: 18px; }
    .fc-lb-next { right: 18px; }
    .fc-lb-nav.hidden { display: none; }

    /* Right: info panel — uses app surface so it matches the rest of the UI */
    .fc-lb-right {
      width: 320px; flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .fc-lb-right-head {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .fc-lb-right-uploader { font-size: .88rem; font-weight: 600; color: var(--text); }
    .fc-lb-right-time { font-size: .75rem; color: var(--text-muted); margin-top: 3px; }
    .fc-lb-right-folder { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }
    .fc-lb-right-counter { font-size: .72rem; color: var(--text-muted); margin-top: 4px; font-weight: 600; }

    /* ── Action buttons (inside right panel) ── */
    .fc-lb-actions {
      display: flex; flex-direction: column; gap: 7px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .fc-lb-actions button {
      width: 100%; padding: 9px 14px;
      border-radius: 9px;
      font-size: .84rem; font-weight: 600;
      cursor: pointer; text-align: left;
      transition: opacity .12s, transform .1s;
    }
    .fc-lb-actions button:hover { opacity: .85; }
    .fc-lb-actions button:active { transform: scale(.98); }
    .fc-lb-actions button:disabled { opacity: .4; cursor: not-allowed; }
    .lb-annotate-btn { background: rgba(97,183,70,.1); color: var(--brand); border: 1.5px solid rgba(97,183,70,.28) !important; }
    .lb-delete-btn   { background: rgba(255,59,48,.07); color: #d93025; border: 1.5px solid rgba(255,59,48,.2) !important; }
    .lb-restore-btn  { background: rgba(97,183,70,.1); color: var(--brand); border: 1.5px solid rgba(97,183,70,.28) !important; }
    .lb-perm-delete-btn { background: rgba(255,59,48,.1); color: #d93025; border: 1.5px solid rgba(255,59,48,.28) !important; }

    /* ── Caption / notes edit ── */
    .fc-lb-notes-section {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .fc-lb-notes-label {
      font-size: .68rem; font-weight: 800; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px;
    }
    .fc-lb-notes-input {
      width: 100%; box-sizing: border-box;
      padding: 8px 10px; border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--bg); color: var(--text);
      font-size: .84rem; font-family: inherit;
      resize: none; min-height: 52px;
      outline: none; transition: border-color .12s;
    }
    .fc-lb-notes-input:focus { border-color: var(--brand); }
    .fc-lb-notes-save {
      margin-top: 6px; padding: 6px 14px;
      border-radius: 7px; border: none;
      background: var(--brand); color: #fff;
      font-size: .8rem; font-weight: 600;
      cursor: pointer; transition: opacity .12s;
    }
    .fc-lb-notes-save:hover { opacity: .88; }
    .fc-lb-notes-save:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Trash tab pill (distinct red accent) ── */
    .fc-tab.trash-tab { color: #c53b30; border-color: rgba(197,59,48,.25); }
    .fc-tab.trash-tab:hover { color: #c53b30; border-color: #c53b30; }
    .fc-tab.trash-tab.active { background: #c53b30; border-color: #c53b30; color: #fff; }
    .fc-empty-trash-btn {
      padding: 6px 12px; border-radius: 100px;
      border: 1.5px solid rgba(197,59,48,.3);
      background: rgba(197,59,48,.06); color: #c53b30;
      font-size: .78rem; font-weight: 600;
      cursor: pointer; transition: all .12s;
    }
    .fc-empty-trash-btn:hover { background: rgba(197,59,48,.12); border-color: #c53b30; }
    .fc-empty-trash-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Comments panel (scrollable, inside right panel) ─────────── */
    .fc-lb-comments-wrap {
      flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden;
    }
    .fc-lb-comments-header {
      padding: 10px 14px 6px;
      color: var(--text-muted);
      font-size: .68rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .07em;
      flex-shrink: 0;
    }
    .fc-lb-comments-list {
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 4px 14px 8px;
      display: flex; flex-direction: column; gap: 10px;
      flex: 1; min-height: 0;
    }
    .lb-comment { display: flex; gap: 9px; align-items: flex-start; }
    .lb-comment-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--brand); color: #fff;
      font-size: .75rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .lb-comment-body { flex: 1; min-width: 0; }
    .lb-comment-author {
      color: var(--text-muted);
      font-size: .7rem; font-weight: 600;
      margin-bottom: 2px;
    }
    .lb-comment-text {
      color: var(--text); font-size: .84rem;
      line-height: 1.45; word-break: break-word;
    }
    .lb-comment-text .mention { color: var(--brand); font-weight: 600; }
    .lb-comment-del {
      background: none; border: none;
      color: var(--text-muted);
      font-size: .72rem; cursor: pointer;
      padding: 2px 4px; flex-shrink: 0;
      border-radius: 4px; line-height: 1;
    }
    .lb-comment-del:hover { color: #d93025; background: rgba(255,59,48,.08); }
    .lb-comments-empty {
      color: var(--text-muted);
      font-size: .82rem; text-align: center; padding: 14px 0;
    }
    .lb-comment-input-wrap {
      padding: 8px 12px calc(env(safe-area-inset-bottom, 0px) + 8px);
      border-top: 1px solid var(--border);
      position: relative; flex-shrink: 0;
    }
    .lb-comment-input-row { display: flex; gap: 8px; align-items: center; }
    .lb-comment-input {
      flex: 1; background: var(--bg);
      border: 1.5px solid var(--border); border-radius: 20px;
      padding: 8px 14px; color: var(--text);
      font-size: .84rem; outline: none; font-family: inherit;
    }
    .lb-comment-input:focus { border-color: var(--brand); }
    .lb-comment-input::placeholder { color: var(--text-muted); }
    .lb-comment-send {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--brand); border: none; color: #fff;
      font-size: .9rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity .15s;
    }
    .lb-comment-send:hover { opacity: .88; }
    .lb-comment-send:disabled { background: var(--border); cursor: default; }

    /* @-mention dropdown */
    .lb-mention-dropdown {
      position: absolute; bottom: calc(100% + 4px);
      left: 12px; right: 12px;
      background: var(--surface); border-radius: 12px;
      overflow: hidden; z-index: 20;
      box-shadow: 0 -4px 20px rgba(0,0,0,.12);
      border: 1px solid var(--border);
    }
    .lb-mention-dropdown.hidden { display: none; }
    .lb-mention-item {
      padding: 10px 14px; color: var(--text); font-size: .85rem;
      cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .lb-mention-item:last-child { border-bottom: none; }
    .lb-mention-item:hover, .lb-mention-item.active { background: rgba(97,183,70,.08); }
    .lb-mention-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--brand); color: #fff;
      font-size: .72rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .lb-mention-name { flex: 1; }
    .lb-mention-email { color: var(--text-muted); font-size: .75rem; }

    /* Mobile: stack vertically, right panel slides up from bottom */
    @media (max-width: 768px) {
      .fc-lb { flex-direction: column; }
      .fc-lb-left { padding: 12px 56px 8px; flex: 1; min-height: 0; }
      .fc-lb-close { top: 12px; left: 12px; width: 34px; height: 34px; }
      .fc-lb-right {
        width: 100%; flex-shrink: 0;
        border-left: none; border-top: 1px solid var(--border);
        border-radius: 16px 16px 0 0;
        max-height: 52vh;
        overflow-y: auto;
      }
      .fc-lb-actions { flex-direction: row; }
      .fc-lb-actions button { text-align: center; flex: 1; }
    }

    .fc-empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .fc-empty-icon { font-size: 3rem; opacity: .35; margin-bottom: 10px; }

    /* ── Select / Share mode ───────────────────────────────────── */
    .fc-select-btn {
      padding: 6px 14px; border-radius: 100px;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--text-muted); font-size: .8rem; font-weight: 600;
      cursor: pointer; transition: all .12s;
    }
    .fc-select-btn:hover { border-color: var(--brand); color: var(--brand); }
    .fc-select-btn.active { background: var(--brand); border-color: var(--brand); color: #fff; }

    .fc-thumb.selectable { cursor: pointer; }
    .fc-thumb.selectable::after {
      content: ''; position: absolute; inset: 0;
      border: 3px solid transparent; border-radius: 12px;
      pointer-events: none; transition: border-color .1s;
    }
    .fc-thumb.selectable:hover::after { border-color: rgba(97,183,70,.4); }
    .fc-thumb.selected::after { border-color: var(--brand); }
    .fc-thumb-check {
      position: absolute; top: 8px; left: 8px; z-index: 2;
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(255,255,255,.85); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: transparent; font-size: .8rem; font-weight: 800;
      transition: all .12s;
    }
    .fc-thumb.selected .fc-thumb-check {
      background: var(--brand); border-color: var(--brand); color: #fff;
    }

    .fc-bulk-bar {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: none; align-items: center; gap: 10px;
      background: var(--text); color: var(--surface);
      padding: 10px 16px; border-radius: 100px;
      box-shadow: 0 10px 32px rgba(0,0,0,.25); z-index: 150;
      font-size: .88rem; font-weight: 600;
    }
    .fc-bulk-bar.open { display: inline-flex; }
    .fc-bulk-count { padding: 0 8px; }
    .fc-bulk-bar .btn { padding: 6px 14px; font-size: .82rem; font-weight: 600; }

    /* Share-link result modal */
    .fc-share-modal {
      display: none; position: fixed; inset: 0; z-index: 250;
      background: rgba(0,0,0,.5); align-items: center; justify-content: center; padding: 20px;
    }
    .fc-share-modal.open { display: flex; }
    .fc-share-modal-box {
      background: var(--surface); border-radius: 12px; padding: 20px;
      width: 100%; max-width: 460px; box-shadow: 0 12px 40px rgba(0,0,0,.25);
    }
    .fc-share-url {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: .85rem; font-family: monospace;
      background: var(--bg); color: var(--text); margin: 12px 0;
      box-sizing: border-box;
    }

    /* Drag-and-drop overlay — visible while the user is dragging a file
       anywhere on the page. Click-through is disabled so it doesn't
       block interactions, and the overlay self-removes on drop/leave. */
    .fc-drop-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(97, 183, 70, 0.16);
      border: 4px dashed var(--brand);
      border-radius: 12px;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .fc-drop-overlay.active { display: flex; }
    .fc-drop-overlay .fc-drop-card {
      background: var(--surface); border-radius: 16px; padding: 24px 32px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.18);
      display: flex; align-items: center; gap: 14px;
      font-size: 1.05rem; color: var(--text); font-weight: 600;
    }
    .fc-drop-overlay .fc-drop-icon { font-size: 1.8rem; }
  </style>
</head>
<body class="os-newlayout" data-page="fieldcam-property">
<!-- Drag-and-drop overlay. Hidden by default; shown via JS when files are
     being dragged over the window. Drop anywhere on the page to upload. -->
<div class="fc-drop-overlay" id="fc-drop-overlay" aria-hidden="true">
  <div class="fc-drop-card">
    <span class="fc-drop-icon">📥</span>
    <span>Drop files anywhere to upload</span>
  </div>
</div>

<aside class="apps-rail" id="apps-rail"></aside>
<header class="top-header" id="top-header"></header>
<div class="user-menu" id="user-menu"></div>

<!-- Mobile-only quick-launch camera FAB — opens camera for THIS property -->
<a class="fc-mobile-camera-fab" id="fc-fab" href="#" title="Open camera" aria-label="Open camera">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
</a>
<script>
  // FAB on a property page should pre-select that property in the camera.
  (function () {
    const id = new URLSearchParams(location.search).get('id');
    const cameraHref = id
      ? `/fieldcam-camera.html?property_id=${encodeURIComponent(id)}&return=${encodeURIComponent(location.pathname + location.search)}`
      : '/fieldcam-camera.html';
    const fab = document.getElementById('fc-fab');
    if (fab) fab.href = cameraHref;
    const takeBtn = document.getElementById('fc-take-photo');
    if (takeBtn) takeBtn.href = cameraHref;
  })();
</script>

<main class="page" style="flex-direction:column;overflow-y:auto;">

  <!-- Hero -->
  <section class="fc-hero">
    <div class="fc-hero-cover" id="fc-hero-cover"></div>
    <div class="fc-hero-body">

      <h1 class="fc-hero-title" id="fc-prop-name">Loading…</h1>
      <div class="fc-hero-addr" id="fc-prop-addr"></div>
      <div class="fc-hero-stats" id="fc-stats">
        <div class="fc-stat"><div class="fc-stat-num" id="stat-photos">—</div><div class="fc-stat-label">Photos</div></div>
        <div class="fc-stat"><div class="fc-stat-num" id="stat-videos">—</div><div class="fc-stat-label">Videos</div></div>
        <div class="fc-stat"><div class="fc-stat-num" id="stat-uploaders">—</div><div class="fc-stat-label">Contributors</div></div>
        <div class="fc-stat"><div class="fc-stat-num" id="stat-last">—</div><div class="fc-stat-label">Last upload</div></div>

        <a class="btn btn-secondary" id="fc-link-property" href="#" style="display:none;">View property page →</a>
      </div>
    </div>
  </section>

  <!-- Folder tabs + Select toggle + Empty Trash -->
  <div class="fc-tabs-wrap" style="display:flex;align-items:center;gap:10px;">
    <div class="fc-tabs" id="fc-tabs" style="flex:1;"></div>
    <button class="fc-empty-trash-btn" id="fc-empty-trash-btn" onclick="confirmEmptyTrash()" style="display:none;" title="Permanently delete all trashed items">Empty Trash</button>
    <button class="fc-select-btn" id="fc-select-btn" onclick="toggleSelect()" title="Select photos to share">Select</button>
  </div>

  <!-- Photo grid (grouped by date) -->
  <div class="fc-content" id="fc-content">
    <p class="text-muted text-sm" style="padding:14px 0;">Loading…</p>
  </div>
</main>

<!-- Lightbox -->
<div class="fc-lb" id="fc-lb">

  <!-- Left: photo viewer (dark background for comfortable viewing) -->
  <div class="fc-lb-left" id="fc-lb-left">
    <button class="fc-lb-close" onclick="closeLb()">✕</button>
    <button class="fc-lb-nav fc-lb-prev hidden" id="fc-lb-prev" onclick="navLb(-1)">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="fc-lb-nav fc-lb-next hidden" id="fc-lb-next" onclick="navLb(1)">

    <div class="fc-lb-actions">
      <button id="lb-annotate-btn" class="lb-annotate-btn" onclick="annotateCurrentPhoto()">✏️ Annotate</button>
      <button id="lb-delete-btn" class="lb-delete-btn" onclick="trashCurrentPhoto()">🗑 Move to Trash</button>
      <button id="lb-restore-btn" class="lb-restore-btn" onclick="restoreCurrentPhoto()" style="display:none;">♻️ Restore</button>
      <button id="lb-perm-delete-btn" class="lb-perm-delete-btn" onclick="permanentlyDeleteCurrentPhoto()" style="display:none;">🗑 Delete Forever</button>
    </div>

    <!-- Caption / notes edit -->
    <div class="fc-lb-notes-section">
      <div class="fc-lb-notes-label">Caption</div>
      <textarea class="fc-lb-notes-input" id="fc-lb-notes-input" placeholder="Add a caption…" rows="2"></textarea>
      <button class="fc-lb-notes-save" onclick="saveLbNotes()" id="fc-lb-notes-save">Save caption</button>
    </div>

    <!-- Comments (scrollable) -->
    <div class="fc-lb-comments-wrap">
      <div class="fc-lb-comments-header">💬 Comments</div>
      <div class="fc-lb-comments-list" id="fc-lb-comments-list">
        <div class="lb-comments-empty">Loading…</div>
      </div>
      <div class="lb-comment-input-wrap">
        <div class="lb-mention-dropdown hidden" id="lb-mention-dropdown"></div>
        <div class="lb-comment-input-row">
          <input type="text" class="lb-comment-input" id="lb-comment-input"
                 placeholder="Add a comment… @mention teammates"
                 oninput="handleCommentInput(this.value)"
                 onkeydown="handleCommentKeydown(event)"
                 autocomplete="off" autocorrect="off" spellcheck="false">
          <button class="lb-comment-send" id="lb-comment-send" onclick="submitComment()" title="Post comment">↑</button>
        </div>
      </div>

  </div>

<script>window.NAV_CURRENT = 'fieldcam';</script>
<script src="config.js"></script>
<script src="app.js"></script>
<script src="annotator.js"></script>
<script>
  const params  = new URLSearchParams(location.search);
  const PROP_ID = params.get('id');
  const TRASH_KEY = '__trash__';

  let allPhotos = [], folders = [], currentFolder = null, lbIdx = -1, lbPhotos = [];
  let selectMode = false, selectedPhotoIds = new Set();
  let trashCount = 0;

  // Comments / mentions state
  let currentUserId = null;
  let teamMembers = [];
  let currentComments = [];
  let _mentionQuery = null;
  let _mentionSelected = -1;

  function goBack() {
    // Prefer the FieldCam map page if it's the referrer; else use history.
    if (document.referrer && document.referrer.includes('/fieldcam.html')) history.back();
    else location.href = '/fieldcam.html';
  }

  async function init() {
    const me = await requireAuth(); if (!me) return;
    if (!PROP_ID) { location.href = '/fieldcam.html'; return; }
    currentUserId = me.id;
    await Promise.all([loadProp(), loadFolders(), loadTrashCount(), loadTeamMembers()]);
    await loadPhotos();
    wireDragAndDropUpload();
  }

  async function loadTeamMembers() {
    try { teamMembers = await apiFetch('/api/users'); }
    catch { teamMembers = []; }
  }

  async function loadTrashCount() {
    try {
      const t = await satelliteApiFetch('fieldcam', '/api/trash/' + PROP_ID);
      trashCount = Array.isArray(t) ? t.length : 0;
    } catch { trashCount = 0; }
  }

  // Drag-and-drop file upload — drop anywhere on the page to upload via
  // the same path as the Upload button. Uses a counter to handle dragleave
  // firing on every nested child the cursor crosses; the overlay only
  // hides when the counter returns to 0 (true page leave).
  function wireDragAndDropUpload() {
    const overlay = document.getElementById('fc-drop-overlay');
    if (!overlay) return;
    let depth = 0;

    function isFileDrag(e) {
      const types = e.dataTransfer && e.dataTransfer.types;
      if (!types) return false;
      // 'Files' appears in dataTransfer.types iff the OS is dragging real files
      // (not just internal drags of DOM elements). On Firefox types is an array
      // and on Chrome it's a DOMStringList — both expose .includes/.contains.
      return Array.from(types).indexOf('Files') !== -1;
    }

    window.addEventListener('dragenter', (e) => {
      if (!isFileDrag(e)) return;
      e.preventDefault();
      depth++;
      overlay.classList.add('active');
    });
    window.addEventListener('dragover', (e) => {
      if (!isFileDrag(e)) return;
      e.preventDefault();                       // required to allow drop
      e.dataTransfer.dropEffect = 'copy';
    });
    window.addEventListener('dragleave', (e) => {
      if (!isFileDrag(e)) return;
      depth = Math.max(0, depth - 1);
      if (depth === 0) overlay.classList.remove('active');
    });
    window.addEventListener('drop', async (e) => {
      if (!isFileDrag(e)) return;
      e.preventDefault();
      depth = 0;
      overlay.classList.remove('active');
      const files = Array.from(e.dataTransfer.files || []).filter(f =>
        f.type.startsWith('image/') || f.type.startsWith('video/')
      );
      if (!files.length) {
        showToast?.('No images or videos in the drop', 'error');
        return;
      }
      await uploadPhotos(files);
    });
  }

  async function loadProp() {
    try {
      const p = await satelliteApiFetch('fieldcam', '/api/properties/' + PROP_ID);
      const name = p.display_name || p.name || p.address_line1 || 'Property';
      const addr = p.address || [p.address_line1, p.city, p.state].filter(Boolean).join(', ');
      document.getElementById('fc-prop-name').textContent = name;
      document.getElementById('fc-prop-addr').textContent = addr;
      document.title = 'Prop Spot — ' + name;
      if (p.latest_photo_url) {
        const cover = document.getElementById('fc-hero-cover');
        cover.style.backgroundImage = `url('${p.latest_photo_url.replace(/'/g, '%27')}')`;
        cover.classList.add('has-photo');
      }
      // Link to the full property page (in the OS, not FieldCam)
      const link = document.getElementById('fc-link-property');
      link.href = '/property.html?id=' + encodeURIComponent(PROP_ID);
      link.style.display = '';
    } catch(e) {
      document.getElementById('fc-prop-name').textContent = 'Property';
    }
  }

  async function loadFolders() {
    try { folders = await satelliteApiFetch('fieldcam', '/api/folders/' + PROP_ID); }
    catch { folders = []; }
  }

  async function loadPhotos() {
    try {
      if (currentFolder === TRASH_KEY) {
        allPhotos = await satelliteApiFetch('fieldcam', '/api/trash/' + PROP_ID);
        trashCount = allPhotos.length;
      } else {
        const qs = currentFolder ? '?folder_id=' + currentFolder : '';
        allPhotos = await satelliteApiFetch('fieldcam', '/api/photos/' + PROP_ID + qs);
      }
    } catch(e) {
      document.getElementById('fc-content').innerHTML = `<p class="text-muted text-sm">Error: ${escHtml(e.message)}</p>`;
      return;
    }
    renderStats();
    renderTabs();
    renderGroupedGrid();
  }

  function renderStats() {
    const photos = allPhotos.filter(p => p.media_type !== 'video');
    const videos = allPhotos.filter(p => p.media_type === 'video');
    const uploaders = new Set(allPhotos.map(p => p.uploader_name).filter(Boolean));
    document.getElementById('stat-photos').textContent    = photos.length;
    document.getElementById('stat-videos').textContent    = videos.length;
    document.getElementById('stat-uploaders').textContent = uploaders.size;
    // Last upload
    const dates = allPhotos.map(p => p.taken_at).filter(Boolean).map(d => new Date(d).getTime());
    if (dates.length) {
      const max = new Date(Math.max(...dates));
      document.getElementById('stat-last').textContent = max.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    } else {
      document.getElementById('stat-last').textContent = '—';
    }
  }

  function renderTabs() {
    const inTrash  = currentFolder === TRASH_KEY;
    const allCount = inTrash ? '—' : allPhotos.length;
    let html = `<button class="fc-tab ${currentFolder===null?'active':''}" onclick="selectFolder(null)">All<span class="fc-tab-count">${allCount}</span></button>`;
    folders.forEach(f => {
      const c = f.photo_count != null ? `<span class="fc-tab-count">${f.photo_count}</span>` : '';
      html += `<button class="fc-tab ${currentFolder===f.id?'active':''}" onclick="selectFolder('${f.id}')">${escHtml(f.name)}${c}</button>`;
    });
    if (trashCount > 0 || inTrash) {
      html += `<button class="fc-tab trash-tab ${inTrash?'active':''}" onclick="selectFolder('${TRASH_KEY}')">🗑 Trash<span class="fc-tab-count">${trashCount}</span></button>`;
    }
    document.getElementById('fc-tabs').innerHTML = html;

    // Empty Trash button only visible while viewing trash with items
    const empty = document.getElementById('fc-empty-trash-btn');
    if (empty) empty.style.display = (inTrash && trashCount > 0) ? '' : 'none';
  }

  async function selectFolder(id) {
    currentFolder = id;
    await loadPhotos();
  }

  function dayLabel(iso) {
    if (!iso) return 'No date';
    const d = new Date(iso);
    const today = new Date(); today.setHours(0,0,0,0);
    const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
    const target = new Date(d); target.setHours(0,0,0,0);
    if (target.getTime() === today.getTime())     return 'Today';
    if (target.getTime() === yesterday.getTime()) return 'Yesterday';
    const diffDays = (today - target) / (86400 * 1000);
    if (diffDays < 7)  return d.toLocaleDateString('en-US', { weekday: 'long' });
    if (diffDays < 365) return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }
  function dayKey(iso) {
    if (!iso) return 'none';
    const d = new Date(iso);
    return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
  }

  function renderGroupedGrid() {
    const el = document.getElementById('fc-content');
    lbPhotos = [...allPhotos];

    if (!allPhotos.length) {
      el.innerHTML = `<div class="fc-empty"><div class="fc-empty-icon">📷</div><p>No photos yet${currentFolder ? ' in this folder' : ''}.</p></div>`;
      return;
    }

    // Group by day (sorted: most recent first). Preserves per-day ordering
    // from the server (typically newest first within each day).
    const groups = new Map();
    allPhotos.forEach((p, i) => {
      const k = dayKey(p.taken_at);
      if (!groups.has(k)) groups.set(k, { label: dayLabel(p.taken_at), iso: p.taken_at, items: [] });
      groups.get(k).items.push({ p, i });
    });
    // Sort groups by date desc (newest first; 'No date' goes last)
    const sortedGroups = [...groups.values()].sort((a, b) => {
      if (!a.iso) return 1;
      if (!b.iso) return -1;
      return new Date(b.iso) - new Date(a.iso);
    });

    el.innerHTML = sortedGroups.map(g => `
      <div class="fc-date-section">
        <div class="fc-date-head">
          <span class="fc-date-label">${escHtml(g.label)}</span>
          <span class="fc-date-count">${g.items.length} ${g.items.length === 1 ? 'item' : 'items'}</span>
        </div>
        <div class="fc-grid">${g.items.map(({ p, i }) => thumbHtml(p, i)).join('')}</div>
      </div>
    `).join('');
  }

  function thumbHtml(p, i) {
    const time     = p.taken_at ? new Date(p.taken_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
    const uploader = p.uploader_name || '';
    const isVideo  = p.media_type === 'video';
    const media    = isVideo
      ? `<video src="${escHtml(p.url)}" muted playsinline></video><span class="fc-video-badge">▶ Video</span>`
      : `<img src="${escHtml(p.url)}" alt="" loading="lazy">`;
    const selectableCls = selectMode ? ' selectable' : '';
    const selectedCls   = selectedPhotoIds.has(p.id) ? ' selected' : '';
    const clickHandler  = selectMode
      ? `toggleSelectPhoto('${p.id}', this)`
      : `openLb(${i})`;
    const check = selectMode ? `<div class="fc-thumb-check">✓</div>` : '';
    return `<div class="fc-thumb${selectableCls}${selectedCls}" onclick="${clickHandler}">
      ${check}
      ${media}
      <div class="fc-thumb-overlay">
        ${time ? escHtml(time) : ''}
        ${uploader ? `<div class="fc-thumb-uploader">${escHtml(uploader)}</div>` : ''}
      </div>
    </div>`;
  }

  // ── Select / Share mode ──────────────────────────────────────────
  function toggleSelect() {
    selectMode ? exitSelect() : enterSelect();
  }
  function enterSelect() {
    selectMode = true;
    selectedPhotoIds.clear();
    document.getElementById('fc-select-btn').classList.add('active');
    document.getElementById('fc-select-btn').textContent = 'Selecting…';
    document.getElementById('fc-bulk-bar').classList.add('open');
    updateBulkBar();
    renderGroupedGrid();
  }
  function exitSelect() {
    selectMode = false;
    selectedPhotoIds.clear();
    document.getElementById('fc-select-btn').classList.remove('active');
    document.getElementById('fc-select-btn').textContent = 'Select';
    document.getElementById('fc-bulk-bar').classList.remove('open');
    renderGroupedGrid();
  }
  function toggleSelectPhoto(id, el) {
    if (selectedPhotoIds.has(id)) {
      selectedPhotoIds.delete(id);
      el.classList.remove('selected');
    } else {
      selectedPhotoIds.add(id);
      el.classList.add('selected');
    }
    updateBulkBar();
  }
  function updateBulkBar() {
    const n = selectedPhotoIds.size;
    document.getElementById('fc-bulk-count').textContent =
      n === 0 ? 'Tap photos to select' : `${n} selected`;
    document.getElementById('fc-bulk-share').disabled    = n === 0;
    document.getElementById('fc-bulk-download').disabled = n === 0;
  }

  // ── Upload photos / videos from a file picker ───────────────────
  async function uploadPhotos(fileList) {
    const files = [...(fileList || [])];
    if (!files.length) return;
    const btnUpload = document.querySelector('.fc-hero-actions .btn-secondary');
    const origLabel = btnUpload?.textContent;
    let ok = 0, fail = 0;
    for (let i = 0; i < files.length; i++) {
      if (btnUpload) btnUpload.textContent = `Uploading ${i + 1}/${files.length}…`;
      const form = new FormData();
      form.append('photo', files[i]);
      if (currentFolder) form.append('folder_id', currentFolder);
      try {
        await satelliteApiFetch('fieldcam', `/api/photos/${PROP_ID}`,
          { method: 'POST', body: form });
        ok++;
      } catch (e) { fail++; console.error('upload failed', files[i].name, e); }
    }
    if (btnUpload) btnUpload.textContent = origLabel || '⬆ Upload';
    document.getElementById('fc-upload-input').value = '';
    showToast?.(
      fail === 0 ? `Uploaded ${ok} ${ok === 1 ? 'file' : 'files'}` :
                   `Uploaded ${ok}, ${fail} failed`,
      fail === 0 ? 'success' : 'error'
    );
    await loadPhotos();
  }

  // ── Download selected photos (one save dialog per file) ─────────
  // Inserts Cloudinary's fl_attachment flag so the browser saves
  // instead of navigating. For larger batches, the user will see N
  // download prompts — server-side zip is its own follow-up.
  function downloadSelected() {
    if (!selectedPhotoIds.size) return;
    const picks = allPhotos.filter(p => selectedPhotoIds.has(p.id));
    picks.forEach((p, i) => {
      const url = p.url.includes('/upload/')
        ? p.url.replace('/upload/', '/upload/fl_attachment/')
        : p.url;
      // Stagger slightly so Chrome doesn't block as "multiple downloads".
      setTimeout(() => {
        const a = document.createElement('a');
        a.href = url;
        a.download = '';
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        a.remove();
      }, i * 250);
    });
    showToast?.(`Downloading ${picks.length} ${picks.length === 1 ? 'file' : 'files'}…`);
  }
  async function shareSelected() {
    if (!selectedPhotoIds.size) return;
    try {
      const r = await satelliteApiFetch('fieldcam', '/api/share', {
        method: 'POST',
        body: JSON.stringify({
          propertyId: PROP_ID,
          photoIds: [...selectedPhotoIds],
          label: `${selectedPhotoIds.size} photos`
        })
      });
      const url = location.origin + '/share.html?token=' + encodeURIComponent(r.token);
      document.getElementById('fc-share-url').value = url;
      document.getElementById('fc-share-modal').classList.add('open');
      exitSelect();
    } catch (e) {
      showToast?.(e.message || 'Failed to create share link', 'error');
      alert('Failed to create share link: ' + (e.message || e));
    }
  }
  function closeShareModal() {
    document.getElementById('fc-share-modal').classList.remove('open');
  }
  async function copyShareUrl() {
    const url = document.getElementById('fc-share-url').value;
    try {
      await navigator.clipboard.writeText(url);
      const btn = document.querySelector('#fc-share-modal .btn-primary');
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = orig; }, 1400);
    } catch (_) {
      document.getElementById('fc-share-url').select();
      document.execCommand?.('copy');
    }
  }

  // ── Lightbox ────────────────────────────────────────────────────
  function openLb(idx) {
    lbIdx = idx;
    showLbPhoto(idx);
    document.getElementById('fc-lb').classList.add('open');
    document.body.style.overflow = 'hidden';
    const p = lbPhotos[idx];
    if (p?.id) loadComments(p.id);
  }

  function showLbPhoto(idx) {
    const p = lbPhotos[idx];
    const isVideo = p?.media_type === 'video';
    const isTrash = currentFolder === TRASH_KEY;
    const isOwn   = p && currentUserId && p.uploaded_by === currentUserId;
    const img = document.getElementById('fc-lb-img');
    const vid = document.getElementById('fc-lb-video');
    if (isVideo) {
      img.style.display = 'none';
      vid.style.display = '';
      vid.src = p.url;
    } else {
      vid.pause?.(); vid.style.display = 'none'; vid.src = '';
      img.style.display = '';
      img.src = p?.url || '';
    }
    const time = p?.taken_at ? new Date(p.taken_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '';
    const total = lbPhotos.length;
    // Left panel: just show counter pill
    const metaEl = document.getElementById('fc-lb-meta');
    metaEl.innerHTML = total > 1 ? `<span class="fc-lb-counter">${idx + 1} / ${total}</span>` : '';
    // Right panel header: uploader, timestamp, folder
    const headEl = document.getElementById('fc-lb-right-head');
    if (headEl) {
      const uploader = p?.uploader_name || '';
      const folder   = p?.folder_name ? `📁 ${p.folder_name}` : '';
      headEl.innerHTML =
        (uploader ? `<div class="fc-lb-right-uploader">${escHtml(uploader)}</div>` : '') +
        (time     ? `<div class="fc-lb-right-time">${escHtml(time)}</div>`          : '') +
        (folder   ? `<div class="fc-lb-right-folder">${escHtml(folder)}</div>`      : '');
    }
    // Populate notes/caption field
    const notesInput = document.getElementById('fc-lb-notes-input');
    if (notesInput) notesInput.value = p?.notes || '';
    document.getElementById('fc-lb-prev').classList.toggle('hidden', idx <= 0);
    document.getElementById('fc-lb-next').classList.toggle('hidden', idx >= total - 1);

    // Show/hide action buttons based on trash mode + ownership.
    // Annotate is hidden for videos and in trash. Trash/Restore/Delete Forever
    // require ownership (server enforces this too).
    const annBtn  = document.getElementById('lb-annotate-btn');
    const delBtn  = document.getElementById('lb-delete-btn');
    const restBtn = document.getElementById('lb-restore-btn');
    const permBtn = document.getElementById('lb-perm-delete-btn');
    annBtn.style.display  = (!isVideo && !isTrash) ? '' : 'none';
    delBtn.style.display  = (!isTrash && isOwn)    ? '' : 'none';
    restBtn.style.display = ( isTrash && isOwn)    ? '' : 'none';
    permBtn.style.display = ( isTrash && isOwn)    ? '' : 'none';
  }

  function closeLb() {
    const vid = document.getElementById('fc-lb-video');
    vid.pause?.(); vid.src = '';
    document.getElementById('fc-lb').classList.remove('open');
    document.body.style.overflow = '';
    lbIdx = -1;
    // Reset right panel
    currentComments = [];
    const list = document.getElementById('fc-lb-comments-list');
    if (list) list.innerHTML = '<div class="lb-comments-empty">Loading…</div>';
    const input = document.getElementById('lb-comment-input');
    if (input) input.value = '';
    const notesInput = document.getElementById('fc-lb-notes-input');
    if (notesInput) notesInput.value = '';
    const headEl = document.getElementById('fc-lb-right-head');
    if (headEl) headEl.innerHTML = '';
    hideMentionDropdown();
  }

  function navLb(dir) {
    const next = lbIdx + dir;
    if (next >= 0 && next < lbPhotos.length) {
      lbIdx = next;
      showLbPhoto(lbIdx);
      const p = lbPhotos[lbIdx];
      if (p?.id) loadComments(p.id);
    }
  }

  // Keyboard nav
  document.addEventListener('keydown', e => {
    if (!document.getElementById('fc-lb').classList.contains('open')) return;
    if (e.key === 'Escape')     closeLb();
    if (e.key === 'ArrowLeft')  navLb(-1);
    if (e.key === 'ArrowRight') navLb(1);
  });

  // Touch swipe on left photo area only (not the right info panel)
  let _sx = null;
  const _swipeEl = document.getElementById('fc-lb-left');
  _swipeEl.addEventListener('touchstart', e => { _sx = e.touches[0].clientX; }, { passive: true });
  _swipeEl.addEventListener('touchend', e => {
    if (_sx === null) return;
    const dx = e.changedTouches[0].clientX - _sx; _sx = null;
    if (Math.abs(dx) > 40) navLb(dx < 0 ? 1 : -1);
  }, { passive: true });

  // ── Photo actions: Annotate / Trash / Restore / Delete Forever / Empty Trash ──
  async function annotateCurrentPhoto() {
    const p = lbPhotos[lbIdx];
    if (!p || p.media_type === 'video') return;
    if (typeof openAnnotator !== 'function') {
      showToast?.('Annotator not loaded', 'error');
      return;
    }
    const photo = p;
    closeLb();
    openAnnotator(photo.url, async blob => {
      try {
        showToast?.('Saving…');
        const form = new FormData();
        form.append('photo', new File([blob], `annotated_${Date.now()}.jpg`, { type: 'image/jpeg' }));
        await satelliteApiFetch('fieldcam', `/api/photos/${photo.id}`, { method: 'PATCH', body: form });
        showToast?.('Photo updated!');
        await loadPhotos();
      } catch (err) {
        showToast?.('Failed: ' + (err.message || err), 'error');
      }
    }, null);
  }

  async function saveLbNotes() {
    const p   = lbPhotos[lbIdx];
    if (!p) return;
    const input = document.getElementById('fc-lb-notes-input');
    const btn   = document.getElementById('fc-lb-notes-save');
    const notes = input?.value?.trim() || null;
    if (btn) btn.disabled = true;
    try {
      const updated = await satelliteApiFetch('fieldcam', `/api/photos/${p.id}/notes`, {
        method: 'PATCH',
        body: JSON.stringify({ notes })
      });
      p.notes = updated.notes;
      showToast?.('Caption saved');
    } catch (err) {
      showToast?.('Failed to save: ' + (err.message || err), 'error');
    } finally {
      if (btn) btn.disabled = false;
    }
  }

  async function trashCurrentPhoto() {
    const p = lbPhotos[lbIdx];
    if (!p) return;
    const label = p.media_type === 'video' ? 'video' : 'photo';
    if (!confirm(`Move this ${label} to trash?`)) return;
    try {
      await satelliteApiFetch('fieldcam', `/api/photos/${p.id}`, { method: 'DELETE' });
      trashCount++;
      closeLb();
      await loadPhotos();
      showToast?.('Moved to Trash');
    } catch (err) {
      showToast?.('Failed: ' + (err.message || err), 'error');
    }
  }

  async function restoreCurrentPhoto() {
    const p = lbPhotos[lbIdx];
    if (!p) return;
    try {
      await satelliteApiFetch('fieldcam', `/api/trash/${p.id}/restore`, { method: 'POST' });
      trashCount = Math.max(0, trashCount - 1);
      closeLb();
      await loadPhotos();
      showToast?.('Photo restored!');
    } catch (err) {
      showToast?.('Failed to restore: ' + (err.message || err), 'error');
    }
  }

  async function permanentlyDeleteCurrentPhoto() {
    const p = lbPhotos[lbIdx];
    if (!p) return;
    const label = p.media_type === 'video' ? 'video' : 'photo';
    if (!confirm(`Permanently delete this ${label}? This cannot be undone.`)) return;
    try {
      await satelliteApiFetch('fieldcam', `/api/trash/${p.id}`, { method: 'DELETE' });
      trashCount = Math.max(0, trashCount - 1);
      closeLb();
      await loadPhotos();
      showToast?.('Permanently deleted');
    } catch (err) {
      showToast?.('Failed: ' + (err.message || err), 'error');
    }
  }

  async function confirmEmptyTrash() {
    if (!trashCount) return;
    if (!confirm(`Permanently delete all ${trashCount} item${trashCount !== 1 ? 's' : ''} in trash? This cannot be undone.`)) return;
    try {
      showToast?.('Emptying trash…');
      await satelliteApiFetch('fieldcam', `/api/trash/empty/${PROP_ID}`, { method: 'DELETE' });
      trashCount = 0;
      await loadPhotos();
      showToast?.('Trash emptied');
    } catch (err) {
      showToast?.('Failed: ' + (err.message || err), 'error');
    }
  }

  // ── Comments ────────────────────────────────────────────────────
  async function loadComments(photoId) {
    const listEl = document.getElementById('fc-lb-comments-list');
    if (!listEl) return;
    listEl.innerHTML = '<div class="lb-comments-empty">Loading…</div>';
    try {
      currentComments = await satelliteApiFetch('fieldcam',
        `/api/comments?photo_id=${encodeURIComponent(photoId)}`);
      renderComments();
    } catch {
      listEl.innerHTML = '<div class="lb-comments-empty">Could not load comments.</div>';
    }
  }

  function renderComments() {
    const listEl = document.getElementById('fc-lb-comments-list');
    if (!listEl) return;
    if (!currentComments.length) {
      listEl.innerHTML = '<div class="lb-comments-empty">No comments yet. Be the first!</div>';
      return;
    }
    listEl.innerHTML = currentComments.map(c => {
      const name     = c.full_name || c.commenter_name || c.email || c.commenter_email || 'Team member';
      const initials = (name[0] || '?').toUpperCase();
      const isOwn    = c.user_id === currentUserId;
      const bodyHtml = highlightMentions(escHtml(c.body));
      return `<div class="lb-comment" data-id="${c.id}">
        <div class="lb-comment-avatar">${escHtml(initials)}</div>
        <div class="lb-comment-body">
          <div class="lb-comment-author">${escHtml(name)} · ${fmtShortDate(c.created_at)}</div>
          <div class="lb-comment-text">${bodyHtml}</div>
        </div>
        ${isOwn ? `<button class="lb-comment-del" onclick="removeComment('${c.id}')" title="Delete">✕</button>` : ''}
      </div>`;
    }).join('');
    listEl.scrollTop = listEl.scrollHeight;
  }

  function fmtShortDate(iso) {
    if (!iso) return '';
    const d  = new Date(iso);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    if (sameDay) return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const sameYear = d.getFullYear() === now.getFullYear();
    return d.toLocaleDateString('en-US', sameYear
      ? { month: 'short', day: 'numeric' }
      : { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function highlightMentions(html) {
    return html.replace(/@([\w.]+)/g, '<span class="mention">@$1</span>');
  }

  async function removeComment(commentId) {
    try {
      await satelliteApiFetch('fieldcam', `/api/comments/${commentId}`, { method: 'DELETE' });
      currentComments = currentComments.filter(c => c.id !== commentId);
      renderComments();
    } catch {
      showToast?.('Failed to delete comment', 'error');
    }
  }

  async function submitComment() {
    const input = document.getElementById('lb-comment-input');
    const body  = input.value.trim();
    const p     = lbPhotos[lbIdx];
    if (!body || !p) return;
    const btn = document.getElementById('lb-comment-send');
    btn.disabled = true;
    try {
      const c = await satelliteApiFetch('fieldcam', '/api/comments', {
        method: 'POST',
        body: JSON.stringify({ photo_id: p.id, body })
      });
      currentComments.push(c);
      input.value = '';
      hideMentionDropdown();
      renderComments();
    } catch (err) {
      showToast?.('Failed to post: ' + (err.message || err), 'error');
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  // ── @-mention autocomplete ─────────────────────────────────────
  function handleCommentInput(value) {
    const input  = document.getElementById('lb-comment-input');
    const cursor = input.selectionStart;
    const before = value.substring(0, cursor);
    const match  = before.match(/@(\w*)$/);
    if (match) {
      _mentionQuery    = match[1].toLowerCase();
      _mentionSelected = -1;
      showMentionDropdown(_mentionQuery);
    } else {
      hideMentionDropdown();
    }
  }

  function handleCommentKeydown(e) {
    const drop = document.getElementById('lb-mention-dropdown');
    const isOpen = !drop.classList.contains('hidden');
    const items  = drop.querySelectorAll('.lb-mention-item');

    if (isOpen && items.length) {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        _mentionSelected = Math.min(_mentionSelected + 1, items.length - 1);
        items.forEach((el, i) => el.classList.toggle('active', i === _mentionSelected));
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        _mentionSelected = Math.max(_mentionSelected - 1, 0);
        items.forEach((el, i) => el.classList.toggle('active', i === _mentionSelected));
        return;
      }
      if (e.key === 'Enter' || e.key === 'Tab') {
        if (_mentionSelected >= 0 && items[_mentionSelected]) {
          e.preventDefault();
          items[_mentionSelected].click();
          return;
        }
      }
    }

    if (e.key === 'Enter' && !e.shiftKey && !isOpen) {
      e.preventDefault();
      submitComment();
    }
  }

  function showMentionDropdown(query) {
    const drop = document.getElementById('lb-mention-dropdown');
    const filtered = teamMembers
      .filter(m => {
        const name = (m.full_name || m.email || '').toLowerCase();
        return !query || name.includes(query);
      })
      .slice(0, 5);
    if (!filtered.length) { hideMentionDropdown(); return; }
    drop.innerHTML = filtered.map(m => {
      const name     = m.full_name || m.email || 'Team member';
      const initials = (name[0] || '?').toUpperCase();
      const email    = m.email || '';
      const safeName = name.replace(/'/g, "\\'");
      return `<div class="lb-mention-item" onclick="insertMention('${escHtml(safeName)}')">
        <div class="lb-mention-avatar">${escHtml(initials)}</div>
        <div class="lb-mention-name">
          <div>${escHtml(name)}</div>
          <div class="lb-mention-email">${escHtml(email)}</div>
        </div>
      </div>`;
    }).join('');
    drop.classList.remove('hidden');
  }

  function hideMentionDropdown() {
    const drop = document.getElementById('lb-mention-dropdown');
    if (drop) drop.classList.add('hidden');
    _mentionQuery    = null;
    _mentionSelected = -1;
  }

  function insertMention(name) {
    const input  = document.getElementById('lb-comment-input');
    const cursor = input.selectionStart;
    const value  = input.value;
    const before = value.substring(0, cursor);
    const atPos  = before.lastIndexOf('@');
    if (atPos >= 0) {
      const after     = value.substring(cursor);
      input.value     = before.substring(0, atPos) + '@' + name + ' ' + after;
      const newCursor = atPos + name.length + 2;
      input.setSelectionRange(newCursor, newCursor);
    }
    hideMentionDropdown();
    input.focus();
  }

  init();
</script>
</body>
</html>
